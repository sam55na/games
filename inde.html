<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }
        .info {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: right;
        }
        .info p {
            margin: 8px 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        button:active {
            transform: scale(0.98);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #e0e0e0;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎡 عجلة الحظ</h2>
        
        <div class="info" id="userInfo">
            <p>🆔 جاري تحميل البيانات...</p>
        </div>
        
        <div id="prizeInfo" class="info" style="background: #fff3cd;">
            <p>🎁 الجائزة المتوقعة: <strong id="expectedPrize">-</strong></p>
        </div>
        
        <button id="spinBtn" onclick="spin()">🎲 أدر العجلة</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // الحصول على بيانات المستخدم من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const user_id = urlParams.get('user_id');
        const total_recharge = parseFloat(urlParams.get('total_recharge')) || 0;
        const total_withdraw = parseFloat(urlParams.get('total_withdraw')) || 0;
        const spin_count = parseInt(urlParams.get('spin_count')) || 0;
        
        // عرض معلومات المستخدم
        const userInfoDiv = document.getElementById('userInfo');
        userInfoDiv.innerHTML = `
            <p>🆔 معرف المستخدم: <strong>${user_id}</strong></p>
            <p>💰 إجمالي الشحن: <strong>${total_recharge.toLocaleString()} ل.س</strong></p>
            <p>💸 إجمالي السحب: <strong>${total_withdraw.toLocaleString()} ل.س</strong></p>
            <p>🎲 عدد المرات: <strong>${spin_count}</strong></p>
        `;
        
        // تحديد الجائزة حسب الشروط
        function determinePrize() {
            const recharge = total_recharge;
            const withdraw = total_withdraw;
            const spins = spin_count;
            
            console.log("تحديد الجائزة:", { recharge, withdraw, spins });
            
            // الشرط 1: أول مرة (25%)
            if (spins === 0) {
                return { name: "25%", value: 25, type: "percent", message: "🎉 بونص 25% على أول شحن!" };
            }
            
            // الشرط 2: الشحن أكثر من 250,000
            if (recharge > 250000 && withdraw === 0) {
                return { name: "100", value: 10000, type: "amount", message: "🎉 ربحت 100! +10,000 ل.س" };
            }
            
            // الشرط 3: الشحن أكثر من 700,000
            if (recharge > 700000 && withdraw < 200000) {
                return { name: "500", value: 50000, type: "amount", message: "🎉 ربحت 500! +50,000 ل.س" };
            }
            
            // الشرط 4: الشحن أكثر من 1,800,000
            if (recharge > 1800000 && withdraw < 400000) {
                return { name: "1000", value: 100000, type: "amount", message: "🎉 ربحت 1000! +100,000 ل.س" };
            }
            
            // الشرط الافتراضي: 5%
            return { name: "5%", value: 5, type: "percent", message: "🎁 بونص 5% على الشحن القادم!" };
        }
        
        // عرض الجائزة المتوقعة
        const expected = determinePrize();
        document.getElementById('expectedPrize').innerText = expected.name;
        
        // دالة إرسال النتيجة للبوت
        async function spin() {
            const spinBtn = document.getElementById('spinBtn');
            const resultDiv = document.getElementById('result');
            
            // تعطيل الزر أثناء المعالجة
            spinBtn.disabled = true;
            spinBtn.innerText = '⏳ جاري المعالجة...';
            
            // تحديد الجائزة
            const prize = determinePrize();
            
            // تحضير البيانات للإرسال
            const newSpinCount = spin_count + 1;
            const dataToSend = {
                prize: prize.name,
                prize_value: prize.value,
                prize_type: prize.type,
                spin_count: newSpinCount,
                total_recharge: total_recharge,
                total_withdraw: total_withdraw,
                user_id: user_id,
                timestamp: new Date().toISOString()
            };
            
            console.log("📤 جاري إرسال البيانات:", dataToSend);
            
            // عرض النتيجة للمستخدم
            let displayMessage = `${prize.message}<br><br>`;
            if (prize.type === "amount") {
                displayMessage += `💰 تم إضافة ${prize.value.toLocaleString()} ل.س إلى رصيدك!`;
            } else {
                displayMessage += `🎁 تم تفعيل بونص ${prize.value}% لمدة ساعتين!`;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.className = 'result success';
            resultDiv.innerHTML = displayMessage;
            
            // ✅ محاولة إرسال البيانات إلى البوت
            try {
                // الطريقة الصحيحة لإرسال البيانات في Telegram WebApp
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.sendData(JSON.stringify(dataToSend));
                    console.log("✅ تم إرسال البيانات بنجاح");
                    resultDiv.innerHTML += '<br><br>✅ تم إرسال الجائزة إلى البوت';
                } else {
                    console.error("❌ Telegram WebApp غير متاح");
                    resultDiv.innerHTML += '<br><br>⚠️ لا يمكن الاتصال بالبوت';
                }
                
                // إغلاق النافذة بعد 3 ثواني
                setTimeout(() => {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.close();
                    }
                }, 3000);
                
            } catch (error) {
                console.error("❌ خطأ في الإرسال:", error);
                resultDiv.innerHTML += '<br><br>❌ حدث خطأ في الإرسال';
            }
            
            // إعادة تمكين الزر (مع تغيير النص)
            spinBtn.innerText = '✅ تم الإرسال';
            setTimeout(() => {
                spinBtn.innerText = '🎲 أدر العجلة';
                spinBtn.disabled = false;
            }, 3000);
        }
        
        // إعلام Telegram بأن التطبيق جاهز
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
            console.log("✅ Telegram WebApp جاهز");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ - DR.DOOM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://www.transparenttextures.com/containers/75/75b5c3c7-7b1b-4c3e-8e3c-7b5c3e8e3c7e.png') repeat;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 20px 20px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 15px;
            position: relative;
        }

        .title h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #0066cc, #00d4ff, #0099ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0,180,255,0.5);
            letter-spacing: 2px;
            animation: gradientShift 3s ease infinite, textGlow 2s ease-in-out infinite alternate;
            display: inline-block;
            padding: 0 20px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(0,180,255,0.3); }
            100% { text-shadow: 0 0 30px rgba(0,180,255,0.8), 0 0 10px rgba(0,100,255,0.5); }
        }

        .title::before,
        .title::after {
            content: '⚡';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            opacity: 0.7;
            animation: iconPulse 1.5s ease infinite;
        }

        .title::before { left: 10px; }
        .title::after { right: 10px; }

        @keyframes iconPulse {
            0%, 100% { opacity: 0.4; transform: translateY(-50%) scale(1); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
        }

        .subtitle {
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-top: -5px;
            letter-spacing: 1px;
        }

        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 15px auto;
        }

        @media (min-width: 400px) {
            .wheel-wrapper { width: 320px; height: 320px; }
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.2, 0.9, 0.1, 1.05);
            box-shadow: 0 0 0 8px rgba(255,255,255,0.2), 0 0 0 12px rgba(0,0,0,0.2), 0 20px 40px rgba(0,0,0,0.4);
        }

        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            z-index: 20;
            filter: drop-shadow(0 0 10px #00ccff);
            animation: pointerGlow 1s ease-in-out infinite alternate;
        }

        @keyframes pointerGlow {
            0% { filter: drop-shadow(0 0 5px #00ccff); }
            100% { filter: drop-shadow(0 0 20px #00ccff) drop-shadow(0 0 5px #ffffff); }
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #fff 0%, #ddd 100%);
            border-radius: 50%;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.2), 0 0 0 8px rgba(255,255,255,0.3);
            overflow: hidden;
        }
        .wheel-center img { width: 80%; height: 80%; object-fit: contain; }

        button {
            margin-top: 25px;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #0066cc);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 20px rgba(0,100,200,0.4);
        }
        button:disabled {
            background: linear-gradient(135deg, #555, #333);
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
            box-shadow: none;
        }
        .timer {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #ffaa44;
            padding: 12px;
            border-radius: 50px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .timer.ready {
            background: rgba(0,100,0,0.6);
            color: #88ff88;
            border-color: #88ff88;
        }
        .timer.warning {
            background: rgba(100,0,0,0.6);
            color: #ff8888;
            border-color: #ff8888;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #fff;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .token-input {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            display: none;
        }
        .token-input input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
            text-align: center;
        }
        .token-input button {
            margin-top: 5px;
            padding: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="loading" id="loadingDiv">
            <div class="spinner"></div>
            <div>جاري تحميل بياناتك...</div>
        </div>
        
        <div id="wheelContent" style="display: none;">
            <div class="title"><h1>DR.DOOM</h1><div class="subtitle">⚡ SPIN & WIN ⚡</div></div>
            <div class="wheel-wrapper">
                <div class="pointer">
                    <svg viewBox="0 0 100 100" fill="none">
                        <path d="M50 0 L58 35 L50 30 L42 35 Z" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
                        <path d="M50 0 L55 40 L50 35 L45 40 Z" fill="#FFF" opacity="0.6"/>
                        <circle cx="50" cy="50" r="8" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
                    </svg>
                </div>
                <canvas id="wheel" width="320" height="320"></canvas>
                <div class="wheel-center"><img src="https://cdn-icons-png.flaticon.com/512/1040/1040246.png" alt="logo"></div>
            </div>
            <button id="spinBtn" style="display: none;">⚡ أدر العجلة ⚡</button>
            <div class="timer" id="timer"></div>
            <div class="token-input" id="tokenInput">
                <input type="password" id="githubToken" placeholder="أدخل GitHub Token للتحديث">
                <button id="saveTokenBtn">💾 حفظ التوكن</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const loadingDiv = document.getElementById('loadingDiv');
        const wheelContent = document.getElementById('wheelContent');
        const timerDiv = document.getElementById('timer');

        // تعريف الجوائز (للشاشة فقط)
        const segments = ["50 ل.س", "100 ل.س", "500 ل.س", "1000 ل.س", "5%", "25%"];
        const baseColors = ["#1a5c9e", "#ffffff", "#1a5c9e", "#ffffff", "#1a5c9e", "#ffffff"];
        const crackColors = ["#0d3b66", "#e8e8e8", "#0d3b66", "#e8e8e8", "#0d3b66", "#e8e8e8"];
        
        let currentRotation = 0;
        let isSpinning = false;
        let userData = null;
        let timerInterval = null;
        let repoData = null;
        let userId = null;

        // ========== نظام التخزين في GitHub ==========
        class RepoStorage {
            constructor() {
                const path = window.location.pathname;
                const parts = path.split('/').filter(p => p.length > 0);
                
                if (parts.length >= 2) {
                    this.owner = parts[0];
                    this.repoName = parts[1];
                } else {
                    this.owner = "YOUR_GITHUB_USERNAME";
                    this.repoName = "YOUR_REPO_NAME";
                }
                
                this.dataUrl = `https://raw.githubusercontent.com/${this.owner}/${this.repoName}/main/wheel_data.json`;
                this.apiUrl = `https://api.github.com/repos/${this.owner}/${this.repoName}/contents/wheel_data.json`;
                
                console.log(`📁 Repository: ${this.owner}/${this.repoName}`);
            }
            
            async readData() {
                try {
                    const response = await fetch(this.dataUrl + '?t=' + Date.now());
                    if (response.ok) {
                        return await response.json();
                    }
                    return { users: {} };
                } catch(e) {
                    console.error("❌ Error reading from GitHub:", e);
                    return { users: {} };
                }
            }
            
            async writeData(data, token) {
                try {
                    const response = await fetch(this.apiUrl, {
                        headers: {
                            'Authorization': `token ${token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (!response.ok) return false;
                    
                    const fileInfo = await response.json();
                    
                    const updateResponse = await fetch(this.apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Update user data - ${new Date().toISOString()}`,
                            content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
                            sha: fileInfo.sha
                        })
                    });
                    
                    return updateResponse.ok;
                } catch(e) {
                    console.error("❌ Error writing to GitHub:", e);
                    return false;
                }
            }
            
            saveToken(token) { localStorage.setItem('github_token', token); }
            getToken() { return localStorage.getItem('github_token'); }
        }

        const storage = new RepoStorage();

        // ========== دوال التحقق من المستخدم ==========
        
        function base64UrlDecode(str) {
            try {
                let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
                while (base64.length % 4) base64 += '=';
                return atob(base64);
            } catch(e) {
                return null;
            }
        }

        // تحويل قيمة الجائزة (50 → 5000, 5% → 5)
        function getMultipliedValue(resultText) {
            if (resultText.includes("%")) {
                return parseInt(resultText);
            } else if (resultText.includes("ل.س")) {
                const numberMatch = resultText.match(/\d+/);
                if (numberMatch) {
                    const value = parseInt(numberMatch[0]);
                    return value * 100;
                }
            }
            return 0;
        }

        // تحديد النتيجة حسب الشروط المطلوبة
        function determineResult() {
            if (!userData) return "5%";
            
            const spinCount = userData.spin_count || 0;
            const totalRecharge = userData.total_recharge || 0;
            const totalWithdraw = userData.total_withdraw || 0;
            const firstUse = userData.first_use || 0;
            
            console.log(`🔍 التدوير رقم: ${spinCount + 1}, إجمالي الشحن: ${totalRecharge}, إجمالي السحب: ${totalWithdraw}`);
            
            // 👈 المستخدمين الجدد (اول استخدام) → 25%
            if (firstUse === 1) return "25%";
            
            // 👈 المرة الثانية (بعد عملية شحن ناجحة) → 50 ل.س (5000 ل.س)
            if (spinCount === 1) return "50 ل.س";
            
            // 👈 المرة الثالثة → 5%
            if (spinCount === 2) return "5%";
            
            // 👈 مجموع مبلغ الشحن > 250,000 ل.س → 100 ل.س (10000 ل.س)
            if (totalRecharge > 250000) return "100 ل.س";
            
            // 👈 الشحن > 700,000 والسحب ≤ 200,000 → 500 ل.س (50000 ل.س)
            if (totalRecharge > 700000 && totalWithdraw <= 200000) return "500 ل.س";
            
            // 👈 الشحن > 1,800,000 والسحب ≤ 400,000 → 1000 ل.س (100000 ل.س)
            if (totalRecharge > 1800000 && totalWithdraw <= 400000) return "1000 ل.س";
            
            // 🔻 في حال عدم توفر أي شرط → 5% دوماً
            return "5%";
        }

        // التحقق من إمكانية التدوير (48 ساعة)
        function canSpin() {
            if (!userData) return false;
            if (userData.first_use === 1) return true;
            
            const lastSpin = userData.last_spin;
            if (!lastSpin) return true;
            
            const lastSpinDate = new Date(lastSpin);
            const now = new Date();
            const diffHours = (now - lastSpinDate) / (1000 * 60 * 60);
            
            return diffHours >= 48;
        }
        
        function getRemainingTime() {
            if (!userData || userData.first_use === 1) return null;
            
            const lastSpin = userData.last_spin;
            if (!lastSpin) return null;
            
            const lastSpinDate = new Date(lastSpin);
            const now = new Date();
            const remainingMs = (48 * 60 * 60 * 1000) - (now - lastSpinDate);
            
            if (remainingMs <= 0) return null;
            
            return {
                hours: Math.floor(remainingMs / (1000 * 60 * 60)),
                minutes: Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60)),
                seconds: Math.floor((remainingMs % (1000 * 60)) / 1000)
            };
        }
        
        function checkAndShowSpinButton() {
            if (!userData) return;
            
            if (canSpin()) {
                spinBtn.style.display = 'block';
                spinBtn.disabled = false;
                timerDiv.className = 'timer ready';
                timerDiv.innerHTML = '⚡✅ يمكنك التدوير الآن! اضغط على الزر أعلاه ✅⚡';
                if (timerInterval) clearInterval(timerInterval);
            } else {
                spinBtn.style.display = 'none';
                const remaining = getRemainingTime();
                if (remaining) {
                    timerDiv.className = 'timer';
                    timerDiv.innerHTML = `⏰ لا يمكنك التدوير الآن!<br>⚡ الوقت المتبقي: ${remaining.hours} ساعة و ${remaining.minutes} دقيقة و ${remaining.seconds} ثانية ⚡`;
                    
                    if (timerInterval) clearInterval(timerInterval);
                    timerInterval = setInterval(() => {
                        const newRemaining = getRemainingTime();
                        if (!newRemaining) {
                            clearInterval(timerInterval);
                            checkAndShowSpinButton();
                        } else {
                            timerDiv.innerHTML = `⏰ لا يمكنك التدوير الآن!<br>⚡ الوقت المتبقي: ${newRemaining.hours} ساعة و ${newRemaining.minutes} دقيقة و ${newRemaining.seconds} ثانية ⚡`;
                        }
                    }, 1000);
                }
            }
        }

        async function updateUserDataInRepo(token) {
            if (!repoData || !userId) return false;
            
            if (!repoData.users[userId]) repoData.users[userId] = {};
            
            repoData.users[userId] = {
                spin_count: userData.spin_count,
                last_spin: userData.last_spin,
                total_recharge: userData.total_recharge,
                total_withdraw: userData.total_withdraw,
                first_use: userData.first_use,
                updated_at: new Date().toISOString()
            };
            
            return await storage.writeData(repoData, token);
        }

        async function loadUserDataFromGitHub(telegramUserId, telegramUserData) {
            try {
                repoData = await storage.readData();
                if (!repoData.users) repoData.users = {};
                
                if (repoData.users[telegramUserId]) {
                    const stored = repoData.users[telegramUserId];
                    userData = {
                        spin_count: stored.spin_count || 0,
                        last_spin: stored.last_spin || null,
                        total_recharge: stored.total_recharge || telegramUserData.total_recharge || 0,
                        total_withdraw: stored.total_withdraw || telegramUserData.total_withdraw || 0,
                        first_use: stored.first_use !== undefined ? stored.first_use : (telegramUserData.first_use || 1)
                    };
                    console.log("📦 بيانات من GitHub:", userData);
                } else {
                    userData = {
                        spin_count: telegramUserData.spin_count || 0,
                        last_spin: telegramUserData.last_spin || null,
                        total_recharge: telegramUserData.total_recharge || 0,
                        total_withdraw: telegramUserData.total_withdraw || 0,
                        first_use: telegramUserData.first_use || 1
                    };
                    console.log("🆕 مستخدم جديد:", userData);
                    
                    const token = storage.getToken();
                    if (token) {
                        repoData.users[telegramUserId] = userData;
                        await storage.writeData(repoData, token);
                    }
                }
                return true;
            } catch(e) {
                console.error("❌ خطأ في التحميل من GitHub:", e);
                userData = {
                    spin_count: telegramUserData.spin_count || 0,
                    last_spin: telegramUserData.last_spin || null,
                    total_recharge: telegramUserData.total_recharge || 0,
                    total_withdraw: telegramUserData.total_withdraw || 0,
                    first_use: telegramUserData.first_use || 1
                };
                return false;
            }
        }

        // ========== رسم العجلة ==========
        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = canvas.width / 2;
            const sliceAngle = (2 * Math.PI) / segments.length;
            
            for (let i = 0; i < segments.length; i++) {
                const startAngle = i * sliceAngle;
                const endAngle = (i + 1) * sliceAngle;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(centerX - radius/2, centerY - radius/2, centerX + radius/2, centerY + radius/2);
                gradient.addColorStop(0, baseColors[i]);
                gradient.addColorStop(1, crackColors[i]);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.strokeStyle = "rgba(0,0,0,0.2)";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.15, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
        }

        // ========== معالجة البيانات من البوت ==========
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');
        
        async function init() {
            if (!encodedData) {
                loadingDiv.innerHTML = '<div style="color: #ff6666;">❌ لا توجد بيانات متاحة</div>';
                return;
            }
            
            try {
                const jsonString = base64UrlDecode(encodedData);
                if (!jsonString) throw new Error("Failed to decode");
                
                const telegramData = JSON.parse(jsonString);
                console.log("✅ بيانات التليجرام:", telegramData);
                
                userId = telegramData.user_id || tg.initDataUnsafe?.user?.id;
                
                if (!userId) {
                    loadingDiv.innerHTML = '<div style="color: #ff6666;">❌ لا يمكن تحديد هوية المستخدم</div>';
                    return;
                }
                
                await loadUserDataFromGitHub(userId, telegramData);
                
                loadingDiv.style.display = 'none';
                wheelContent.style.display = 'block';
                drawWheel();
                checkAndShowSpinButton();
                
                const token = storage.getToken();
                if (!token) {
                    const tokenDiv = document.getElementById('tokenInput');
                    tokenDiv.style.display = 'block';
                    
                    document.getElementById('saveTokenBtn').onclick = () => {
                        const newToken = document.getElementById('githubToken').value.trim();
                        if (newToken) {
                            storage.saveToken(newToken);
                            tokenDiv.style.display = 'none';
                            timerDiv.innerHTML = '✅ تم حفظ التوكن! سيتم حفظ البيانات في GitHub';
                            setTimeout(() => {
                                if (timerDiv.className !== 'timer ready') {
                                    timerDiv.innerHTML = '';
                                }
                            }, 3000);
                        }
                    };
                }
                
            } catch(e) {
                console.error('❌ خطأ:', e);
                loadingDiv.innerHTML = '<div style="color: #ff6666;">❌ خطأ في تحميل البيانات</div>';
            }
        }

        init();

        // ========== حدث الضغط على زر التدوير ==========
        spinBtn.addEventListener('click', async () => {
            if (isSpinning) return;
            if (!canSpin()) {
                checkAndShowSpinButton();
                return;
            }
            
            isSpinning = true;
            spinBtn.disabled = true;
            
            const resultText = determineResult();
            console.log('🎡 النتيجة:', resultText);
            
            const multipliedValue = getMultipliedValue(resultText);
            
            // تحديث بيانات المستخدم
            const now = new Date().toISOString();
            userData.spin_count = (userData.spin_count || 0) + 1;
            userData.last_spin = now;
            userData.first_use = 0;
            
            // إذا كانت الجائزة نقدية، نضيفها إلى إجمالي الشحن
            if (resultText.includes("ل.س")) {
                userData.total_recharge = (userData.total_recharge || 0) + multipliedValue;
                console.log(`💰 إضافة ${multipliedValue} إلى الرصيد، الإجمالي الآن: ${userData.total_recharge}`);
            }
            
            // حفظ في GitHub إذا كان هناك توكن
            const token = storage.getToken();
            if (token) {
                await updateUserDataInRepo(token);
            }
            
            const resultIndex = segments.findIndex(seg => seg === resultText);
            const sliceAngle = 360 / segments.length;
            const targetAngle = 270;
            const resultCenterAngle = (resultIndex * sliceAngle + sliceAngle / 2);
            let neededRotation = (targetAngle - resultCenterAngle + 360) % 360;
            const fullRotations = 5 * 360;
            const extraDegree = neededRotation + fullRotations;
            
            currentRotation += extraDegree;
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            
            setTimeout(() => {
                let resultType = resultText.includes("%") ? "bonus_percent" : "direct_bonus";
                let resultValue = multipliedValue;
                
                console.log(`📤 إرسال للبوت: النوع=${resultType}, القيمة=${resultValue}`);
                
                tg.sendData(JSON.stringify({
                    action: "spin_result",
                    result: resultText,
                    result_type: resultType,
                    result_value: resultValue,
                    user_id: userId,
                    spin_count: userData.spin_count,
                    last_spin: userData.last_spin
                }));
                
                setTimeout(() => tg.close(), 1500);
                isSpinning = false;
            }, 4000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        button:active {
            transform: scale(0.95);
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎡 عجلة الحظ</h2>
        
        <div class="info" id="info">
            <p>🆔 جاري التحميل...</p>
        </div>
        
        <button id="spinBtn" onclick="sendPrize()">🎲 احصل على الجائزة</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // ✅ تأكد من وجود Telegram WebApp
        let tg = null;
        
        try {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            console.log("✅ Telegram WebApp initialized");
        } catch(e) {
            console.error("❌ Telegram WebApp error:", e);
            alert("يرجى فتح البوت من داخل تطبيق Telegram");
        }
        
        // قراءة البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const user_id = urlParams.get('user_id');
        const total_recharge = parseFloat(urlParams.get('total_recharge')) || 0;
        const total_withdraw = parseFloat(urlParams.get('total_withdraw')) || 0;
        const spin_count = parseInt(urlParams.get('spin_count')) || 0;
        
        // عرض معلومات المستخدم
        document.getElementById('info').innerHTML = `
            <p>🆔 المستخدم: <strong>${user_id}</strong></p>
            <p>💰 الشحن: <strong>${total_recharge.toLocaleString()} ل.س</strong></p>
            <p>💸 السحب: <strong>${total_withdraw.toLocaleString()} ل.س</strong></p>
            <p>🎲 عدد اللعب: <strong>${spin_count}</strong></p>
        `;
        
        // تحديد الجائزة
        function getPrize() {
            if (spin_count === 0) {
                return { name: "25%", value: 25, type: "percent" };
            }
            if (total_recharge > 250000 && total_withdraw === 0) {
                return { name: "100", value: 10000, type: "amount" };
            }
            if (total_recharge > 700000 && total_withdraw < 200000) {
                return { name: "500", value: 50000, type: "amount" };
            }
            if (total_recharge > 1800000 && total_withdraw < 400000) {
                return { name: "1000", value: 100000, type: "amount" };
            }
            return { name: "5%", value: 5, type: "percent" };
        }
        
        // إرسال البيانات إلى البوت
        function sendPrize() {
            const prize = getPrize();
            const resultDiv = document.getElementById('result');
            const spinBtn = document.getElementById('spinBtn');
            
            // تعطيل الزر
            spinBtn.disabled = true;
            spinBtn.textContent = '⏳ جاري الإرسال...';
            
            // تحضير البيانات
            const data = {
                prize: prize.name,
                prize_value: prize.value,
                prize_type: prize.type,
                spin_count: spin_count + 1,
                total_recharge: total_recharge,
                total_withdraw: total_withdraw,
                user_id: user_id,
                timestamp: Date.now()
            };
            
            console.log("📤 Sending data:", JSON.stringify(data));
            
            // ✅ الطريقة الصحيحة لإرسال البيانات في WebApp
            if (tg && tg.sendData) {
                try {
                    tg.sendData(JSON.stringify(data));
                    console.log("✅ Data sent successfully");
                    
                    // عرض النتيجة
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'result success';
                    if (prize.type === 'amount') {
                        resultDiv.innerHTML = `🎉 تهانينا! ربحت ${prize.name} ل.س<br>💰 تم إضافة ${prize.value.toLocaleString()} ل.س إلى رصيدك!<br><br>✅ تم إرسال الجائزة إلى البوت`;
                    } else {
                        resultDiv.innerHTML = `🎉 تهانينا! ربحت ${prize.name}<br>🎁 سيتم تفعيل البونص عند الشحن القادم!<br><br>✅ تم إرسال الجائزة إلى البوت`;
                    }
                    
                    // إغلاق النافذة بعد 3 ثواني
                    setTimeout(() => {
                        tg.close();
                    }, 3000);
                    
                } catch(e) {
                    console.error("❌ Error sending data:", e);
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `❌ خطأ في الإرسال: ${e.message}`;
                    spinBtn.disabled = false;
                    spinBtn.textContent = '🎲 احصل على الجائزة';
                }
            } else {
                console.error("❌ tg.sendData is not available");
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = '❌ لا يمكن الاتصال بالبوت، يرجى المحاولة مرة أخرى';
                spinBtn.disabled = false;
                spinBtn.textContent = '🎲 احصل على الجائزة';
            }
        }
        
        // ✅ اختبار إرسال البيانات تلقائياً بعد تحميل الصفحة (للتأكد)
        window.addEventListener('load', function() {
            console.log("✅ Page loaded, WebApp ready:", !!tg);
            if (tg && tg.initDataUnsafe) {
                console.log("✅ User data from Telegram:", tg.initDataUnsafe.user);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>boooot</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #ffd700;
            --secondary-gold: #b8860b;
            --bg-dark: #0f0c29;
            --accent-red: #e94560;
            --text-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: radial-gradient(circle at center, #302b63, #24243e, #0f0c29);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-white);
        }

        .main-wrapper { position: relative; width: 100%; max-width: 600px; padding: 20px; text-align: center; }

        .header-title {
            font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;
            background: linear-gradient(to bottom, var(--primary-gold), var(--secondary-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .wheel-outer-ring {
            position: relative; width: 380px; height: 380px; margin: 40px auto;
            border-radius: 50%; padding: 15px;
            background: conic-gradient(from 0deg, var(--primary-gold), var(--secondary-gold), var(--primary-gold));
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
            border: 8px solid #1a1a2e;
        }

        .wheel-inner {
            position: relative; width: 100%; height: 100%; border-radius: 50%; overflow: hidden;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        canvas { width: 100%; height: 100%; display: block; }

        .wheel-pointer {
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            width: 40px; height: 50px; z-index: 100; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        .wheel-pointer::after {
            content: ''; display: block; width: 0; height: 0;
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 40px solid var(--accent-red);
        }

        .wheel-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: radial-gradient(circle, #fff, var(--primary-gold));
            border-radius: 50%; z-index: 10; border: 4px solid #1a1a2e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .control-panel { margin-top: 30px; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .status-badge { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            margin-bottom: 15px; 
            border: 1px solid rgba(255, 215, 0, 0.2); 
            transition: all 0.3s ease;
        }

        .spin-button {
            display: none; 
            background: linear-gradient(135deg, var(--accent-red), #b20a2c);
            color: white; 
            border: none; 
            padding: 18px 60px; 
            font-size: 1.5rem; 
            font-weight: 900;
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
            transition: 0.3s; 
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .countdown-timer { 
            display: none; 
            background: rgba(0, 0, 0, 0.4); 
            padding: 20px 40px; 
            border-radius: 15px; 
            border: 1px dashed var(--primary-gold); 
        }

        .timer-values { display: flex; gap: 15px; font-size: 1.8rem; font-weight: 900; color: var(--primary-gold); }

        .timer-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; }

        .loader { 
            width: 40px; 
            height: 40px; 
            border: 4px solid rgba(255, 215, 0, 0.1); 
            border-top: 4px solid var(--primary-gold); 
            border-radius: 50%; 
            animation: spin-loader 1s linear infinite; 
        }

        @keyframes spin-loader { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .result-popup {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0);
            background: white; 
            color: #1a1a2e; 
            padding: 40px; 
            border-radius: 30px; 
            z-index: 1000;
            box-shadow: 0 0 100px rgba(0,0,0,0.8); 
            transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); 
            text-align: center;
        }

        .result-popup.active { transform: translate(-50%, -50%) scale(1); }

        .error-message {
            color: #e94560;
            font-size: 1rem;
            margin-top: 10px;
        }

        @media (max-width: 480px) { 
            .wheel-outer-ring { width: 300px; height: 300px; } 
            .header-title { font-size: 1.8rem; }
            .timer-values { font-size: 1.2rem; gap: 5px; }
            .spin-button { padding: 15px 40px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h1 class="header-title">عجلة الحظ الملكية</h1>
    <div id="statusBadge" class="status-badge">جاري التحقق من البيانات...</div>

    <div class="wheel-outer-ring">
        <div class="wheel-pointer"></div>
        <div class="wheel-center"></div>
        <div class="wheel-inner" id="wheelInner">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <div class="control-panel">
        <div id="loadingState" class="loader"></div>
        <button id="spinBtn" class="spin-button" onclick="handleSpin()">تدوير الآن</button>
        <div id="timerContainer" class="countdown-timer">
            <p style="margin-bottom: 10px; font-size: 0.9rem;">يمكنك التدوير مجدداً خلال:</p>
            <div class="timer-values">
                <div><div id="h">00</div><div class="timer-label">ساعة</div></div>
                <div>:</div>
                <div><div id="m">00</div><div class="timer-label">دقيقة</div></div>
                <div>:</div>
                <div><div id="s">00</div><div class="timer-label">ثانية</div></div>
            </div>
        </div>
    </div>
</div>

<div id="resultPopup" class="result-popup">
    <h3>تهانينا! 🎉</h3>
    <p>لقد حصلت على جائزة بقيمة:</p>
    <div id="prizeValue" style="font-size: 3rem; font-weight: 900; color: #e94560;">---</div>
    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; border-radius: 20px; border: none; background: #1a1a2e; color: white; cursor: pointer;">إغلاق</button>
</div>

<script>
    // رابط السكريبت الذي نشرته في Google Apps Script
    const GAS_URL = "https://script.google.com/macros/s/AKfycbypQJCdxaYdjeEmmZehxrGlaT2UNn4DX2SdXDf2ptuFt9-WwlJS7-CIPYFmwnkt5ATg/exec";

    // قائمة الجوائز (6 جوائز)
    const prizes = [
        { label: "⚡", color: "#1a1a2e", textColor: "#ffd700" },
        { label: "⚡", color: "#16213e", textColor: "#ffffff" },
        { label: "⚡", color: "#0f3460", textColor: "#ffd700" },
        { label: "⚡", color: "#e94560", textColor: "#ffffff" },
        { label: "⚡", color: "#533483", textColor: "#ffd700" },
        { label: "⚡", color: "#4eeff9", textColor: "#1a1a2e" }
    ];

    // الحصول على بيانات المستخدم من رابط الصفحة
    const urlParams = new URLSearchParams(window.location.search);
    let userData = {
        id: "Guest",
        deposits: 0,
        withdrawals: 0,
        usage: 0
    };

    // محاولة تحليل userData من الرابط
    try {
        const userDataParam = urlParams.get('userData');
        if (userDataParam) {
            const parsedData = JSON.parse(decodeURIComponent(userDataParam));
            userData = {
                id: parsedData.id || "Guest",
                deposits: parsedData.deposits || 0,
                withdrawals: parsedData.withdrawals || 0,
                usage: 0
            };
            console.log("✅ تم قراءة بيانات المستخدم:", userData);
        } else {
            // إذا لم يكن هناك userData (للتوافق مع الروابط القديمة)
            userData = {
                id: urlParams.get('id') || "Guest",
                deposits: parseInt(urlParams.get('deposits')) || 0,
                withdrawals: parseInt(urlParams.get('withdrawals')) || 0,
                usage: 0
            };
            console.log("⚠️ تم قراءة بيانات المستخدم من معاملات فردية:", userData);
        }
    } catch (e) {
        console.log("❌ خطأ في تحليل userData:", e);
    }

    // عناصر الصفحة
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const wheelInner = document.getElementById('wheelInner');
    const spinBtn = document.getElementById('spinBtn');
    const loadingState = document.getElementById('loadingState');
    const statusBadge = document.getElementById('statusBadge');
    const timerContainer = document.getElementById('timerContainer');

    // ========== نظام منع التدوير المتكرر ==========
    const SPIN_LOCK_KEY = 'spin_lock_' + (userData.id || 'guest');
    const SPIN_LOCK_DURATION = 60000; // دقيقة واحدة بالمللي ثانية

    // التحقق من وجود قفل تدوير عند تحميل الصفحة
    function checkSpinLock() {
        const lastSpinTime = localStorage.getItem(SPIN_LOCK_KEY);
        if (lastSpinTime) {
            const timeSinceLastSpin = Date.now() - parseInt(lastSpinTime);
            if (timeSinceLastSpin < SPIN_LOCK_DURATION) {
                // إذا مر أقل من دقيقة، نمنع التدوير
                const remainingSeconds = Math.ceil((SPIN_LOCK_DURATION - timeSinceLastSpin) / 1000);
                console.log(`⏳ تم التدوير مؤخراً. يرجى الانتظار ${remainingSeconds} ثانية`);
                
                // إخفاء زر التدوير نهائياً
                if (spinBtn) spinBtn.style.display = 'none';
                if (timerContainer) timerContainer.style.display = 'none';
                if (loadingState) loadingState.style.display = 'none';
                if (statusBadge) {
                    statusBadge.innerText = `⏳ تم التدوير مؤخراً. انتظر ${remainingSeconds} ثانية`;
                    statusBadge.style.background = "rgba(255, 193, 7, 0.2)";
                    statusBadge.style.border = "1px solid #ffc107";
                }
                return true; // يوجد قفل نشط
            }
        }
        return false; // لا يوجد قفل
    }
    // ==============================================

    // دالة رسم العجلة
    function drawWheel() {
        const arc = (2 * Math.PI) / prizes.length;
        prizes.forEach((p, i) => {
            const angle = i * arc;
            
            // رسم القطاع
            ctx.beginPath();
            ctx.fillStyle = p.color;
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 250, angle, angle + arc);
            ctx.fill();
            
            // إضافة النص على القطاع
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(angle + arc / 2);
            ctx.fillStyle = p.textColor;
            ctx.font = "bold 30px Cairo";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(p.label, 180, 0);
            ctx.restore();
        });
    }

    // دالة التهيئة والتحقق من أهلية المستخدم
    async function init() {
        // تأكيد إخفاء الزر في البداية
        spinBtn.style.display = 'none';
        timerContainer.style.display = 'none';
        
        // التحقق من قفل التدوير أولاً
        if (checkSpinLock()) {
            return; // إذا كان هناك قفل، لا نكمل
        }
        
        try {
            // تايمر احتياطي 5 ثوانٍ (بدون إظهار الزر)
            const timeoutId = setTimeout(() => {
                if (loadingState.style.display !== 'none') {
                    loadingState.style.display = 'none';
                    statusBadge.innerText = "❌ فشل الاتصال بالسكريبت";
                    statusBadge.style.background = "rgba(233, 69, 96, 0.2)";
                    statusBadge.style.border = "1px solid #e94560";
                    // لا نظهر الزر أبداً في حالة فشل الاتصال
                    spinBtn.style.display = 'none';
                    timerContainer.style.display = 'none';
                }
            }, 10000);

            // الاتصال بالسكريبت للتحقق
            const response = await fetch(`${GAS_URL}?action=checkEligibility&telegramId=${userData.id}`);
            
            if (!response.ok) {
                throw new Error('فشل الاتصال بالسكريبت');
            }
            
            const result = await response.json();
            
            // إلغاء التايمر الاحتياطي
            clearTimeout(timeoutId);
            
            // تحديث عدد مرات الاستخدام
            userData.usage = result.usageCount || 0;
            
            // إخفاء محمل التحميل
            loadingState.style.display = 'none';
            
            // التحقق من إمكانية التدوير - الزر يظهر فقط هنا!
            if (result.canSpin) {
                statusBadge.innerText = "✅ أنت مؤهل للتدوير!";
                statusBadge.style.background = "rgba(76, 175, 80, 0.2)";
                statusBadge.style.border = "1px solid #4CAF50";
                spinBtn.style.display = 'block'; // الزر يظهر فقط هنا
                timerContainer.style.display = 'none';
            } else {
                statusBadge.innerText = "⏳ يرجى الانتظار";
                statusBadge.style.background = "rgba(255, 193, 7, 0.2)";
                statusBadge.style.border = "1px solid #ffc107";
                spinBtn.style.display = 'none'; // تأكيد إخفاء الزر
                timerContainer.style.display = 'block';
                startCountdown(result.remainingTime);
            }
        } catch (e) { 
            // في حالة فشل الاتصال - لا نظهر الزر أبداً
            console.log("خطأ في الاتصال: ", e);
            loadingState.style.display = 'none';
            statusBadge.innerText = "⚠️ خطأ في الاتصال، يرجى المحاولة لاحقاً";
            statusBadge.style.background = "rgba(233, 69, 96, 0.2)";
            statusBadge.style.border = "1px solid #e94560";
            spinBtn.style.display = 'none'; // تأكيد إخفاء الزر
            timerContainer.style.display = 'none'; // إخفاء المؤقت أيضاً
        }
    }

    // دالة العد التنازلي
    function startCountdown(ms) {
        let remaining = ms;
        const update = () => {
            if (remaining <= 0) { 
                location.reload(); 
                return; 
            }
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
            remaining -= 1000;
        };
        update(); 
        setInterval(update, 1000);
    }

    // دالة تحديد الجائزة المستهدفة بناءً على شروط محددة
    function getTargetIndex() {
        // أول مرة: 25%
        if (userData.usage === 0) return 5;
        
        // المرة الثانية مع وجود إيداع: 5000
        if (userData.usage === 1 && userData.deposits > 0) return 0;
        
        // المرة الثالثة: 5%
        if (userData.usage === 2) return 4;
        
        // شروط الجوائز الكبرى
        if (userData.deposits > 250000 && userData.withdrawals === 0) return 1; // 10000
        if (userData.deposits > 650000 && userData.withdrawals <= 200000) return 2; // 50000
        if (userData.deposits > 1500000 && userData.withdrawals <= 400000) return 3; // 100000
        
        // القيمة الافتراضية: 5%
        return 4;
    }

    // دالة معالجة التدوير
    async function handleSpin() {
        // ===== قفل التدوير في الكاش المحلي فوراً =====
        localStorage.setItem(SPIN_LOCK_KEY, Date.now().toString());
        
        // إخفاء زر التدوير فوراً
        spinBtn.style.display = 'none';
        
        // تغيير حالة الشارة
        statusBadge.innerText = "🔄 جاري التدوير...";
        statusBadge.style.background = "rgba(255, 193, 7, 0.2)";
        statusBadge.style.border = "1px solid #ffc107";
        
        // تحديد الجائزة وحساب زاوية الدوران
        const targetIdx = getTargetIndex();
        // 10 دورات كاملة + الزاوية المستهدفة
        const totalRotation = (10 * 360) + (360 - (targetIdx * 60) - 30);
        
        // تدوير العجلة
        wheelInner.style.transform = `rotate(${totalRotation}deg)`;
        
        // بعد انتهاء الدوران (5.5 ثانية)
        setTimeout(async () => {
            const prize = prizes[targetIdx].label;
            document.getElementById('prizeValue').innerText = prize;
            document.getElementById('resultPopup').classList.add('active');
            
            // إرسال النتيجة للسكريبت لحفظها
            try {
                await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        telegramId: userData.id, 
                        prize: prize, 
                        totalDeposits: userData.deposits, 
                        totalWithdrawals: userData.withdrawals 
                    }) 
                });
                console.log("تم حفظ النتيجة بنجاح");
            } catch (e) {
                console.log("خطأ في إرسال النتيجة: ", e);
            }
        }, 5500);
    }

    // تشغيل الرسم والتهيئة عند تحميل الصفحة
    drawWheel();
    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ المتقدمة</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .info-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border-right: 4px solid #667eea;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: bold;
            color: #333;
        }

        .info-value {
            color: #667eea;
            font-weight: bold;
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 20px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #333;
            transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #ff6b6b;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .result-section {
            background: #e8f5e9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            border: 2px solid #4caf50;
        }

        .result-section.show {
            display: block;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-title {
            color: #2e7d32;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result-value {
            color: #1b5e20;
            font-size: 24px;
            font-weight: bold;
        }

        .result-description {
            color: #388e3c;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #spinBtn {
            background-color: #667eea;
            color: white;
            flex: 1;
            max-width: 250px;
        }

        #spinBtn:hover:not(:disabled) {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #spinBtn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .spin-timer {
            text-align: center;
            color: #ff6b6b;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }

        .spin-timer.show {
            display: block;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            border-left: 4px solid #c62828;
        }

        .error-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-available {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .status-locked {
            background: #ffccbc;
            color: #d84315;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 style="text-align: center; color: #333; margin-bottom: 20px;">🎡 عجلة الحظ</h1>

        <div class="error-message" id="errorMessage"></div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">معرّف تلجرام:</span>
                <span class="info-value" id="userId">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">إجمالي الشحن (10 أيام):</span>
                <span class="info-value" id="totalDeposits">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">إجمالي السحب (10 أيام):</span>
                <span class="info-value" id="totalWithdrawals">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">عدد التدويرات:</span>
                <span class="info-value" id="spinCount">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">آخر تدوير:</span>
                <span class="info-value" id="lastSpinTime">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">الحالة:</span>
                <span class="info-value" id="spinStatus">-</span>
            </div>
        </div>

        <div class="wheel-section">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="280" height="280"></canvas>
            </div>

            <div class="result-section" id="resultSection">
                <div class="result-title">🎉 تهانينا!</div>
                <div class="result-value" id="resultValue"></div>
                <div class="result-description" id="resultDescription"></div>
            </div>

            <div class="button-group">
                <button id="spinBtn">أدر العجلة!</button>
            </div>

            <div class="spin-timer" id="spinTimer"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const errorMessage = document.getElementById('errorMessage');
        const resultSection = document.getElementById('resultSection');
        const spinTimer = document.getElementById('spinTimer');

        // البيانات المرسلة من البوت
        let wheelData = {
            userId: null,
            totalDeposits: 0,
            totalWithdrawals: 0,
            spinCount: 0,
            lastSpinTime: null,
            predefinedResult: null,
            canSpin: false,
            spinMessage: '',
            resultDescription: ''
        };

        // الخيارات والألوان
        const segments = ["25%", "50", "5%", "100", "500", "1000"];
        const colors = ["#FF6B6B", "#4ECDC4", "#45B7D1", "#FFA07A", "#98D8C8", "#F7DC6F"];
        const descriptions = {
            "25%": "25% رصيد إضافي على أول عملية شحن",
            "50": "5,000 ل.س هدية",
            "5%": "5% إضافية لعملية الشحن",
            "100": "10,000 ل.س هدية",
            "500": "50,000 ل.س هدية",
            "1000": "100,000 ل.س هدية"
        };

        let currentRotation = 0;

        // استقبال البيانات من البوت عبر initData
        function parseWebAppData() {
            try {
                const initData = tg.initData;
                if (!initData) {
                    showError("لم يتم تلقي بيانات من البوت");
                    return false;
                }

                // محاولة الحصول على البيانات من query parameters
                const params = new URLSearchParams(window.location.search);
                
                wheelData.userId = params.get('user_id') || tg.initDataUnsafe?.user?.id || 'unknown';
                wheelData.totalDeposits = parseInt(params.get('total_deposits')) || 0;
                wheelData.totalWithdrawals = parseInt(params.get('total_withdrawals')) || 0;
                wheelData.spinCount = parseInt(params.get('spin_count')) || 0;
                wheelData.lastSpinTime = params.get('last_spin_time') || 'لم يتم التدوير بعد';
                wheelData.predefinedResult = params.get('result') || null;
                wheelData.canSpin = params.get('can_spin') === 'true';
                wheelData.spinMessage = params.get('message') || '';
                wheelData.resultDescription = params.get('result_description') || '';

                // تحديث واجهة المستخدم
                updateUI();
                return true;
            } catch (e) {
                console.error("خطأ في معالجة البيانات:", e);
                showError("حدث خطأ في معالجة البيانات: " + e.message);
                return false;
            }
        }

        function updateUI() {
            document.getElementById('userId').textContent = wheelData.userId;
            document.getElementById('totalDeposits').textContent = wheelData.totalDeposits.toLocaleString() + ' ل.س';
            document.getElementById('totalWithdrawals').textContent = wheelData.totalWithdrawals.toLocaleString() + ' ل.س';
            document.getElementById('spinCount').textContent = wheelData.spinCount;
            document.getElementById('lastSpinTime').textContent = wheelData.lastSpinTime;

            if (wheelData.canSpin) {
                document.getElementById('spinStatus').innerHTML = '<span class="status-badge status-available">متاح الآن</span>';
                spinBtn.disabled = false;
            } else {
                document.getElementById('spinStatus').innerHTML = '<span class="status-badge status-locked">مغلق - ' + wheelData.spinMessage + '</span>';
                spinBtn.disabled = true;
                if (wheelData.spinMessage.includes('ساعة')) {
                    spinTimer.classList.add('show');
                    spinTimer.textContent = wheelData.spinMessage;
                }
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function drawWheel() {
            const sliceAngle = (2 * Math.PI) / segments.length;
            segments.forEach((text, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(140, 140);
                ctx.arc(140, 140, 140, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();

                // رسم الحدود
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();

                // رسم النص
                ctx.save();
                ctx.translate(140, 140);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.textAlign = "right";
                ctx.fillText(text, 110, 5);
                ctx.restore();
            });
        }

        function getSegmentIndex(result) {
            return segments.indexOf(result);
        }

        function spinWheel() {
            if (!wheelData.canSpin) {
                showError("لا يمكنك التدوير الآن. " + wheelData.spinMessage);
                return;
            }

            if (!wheelData.predefinedResult) {
                showError("لم يتم تحديد نتيجة صحيحة من البوت");
                return;
            }

            spinBtn.disabled = true;
            resultSection.classList.remove('show');

            const targetIndex = getSegmentIndex(wheelData.predefinedResult);
            if (targetIndex === -1) {
                showError("نتيجة غير صحيحة: " + wheelData.predefinedResult);
                spinBtn.disabled = false;
                return;
            }

            const sliceAngle = 360 / segments.length;
            const targetDegree = targetIndex * sliceAngle;
            
            // إضافة 4 دورات كاملة + الدرجة المستهدفة
            const extraDegree = Math.floor(Math.random() * 360) + 1440 + (360 - targetDegree);
            currentRotation += extraDegree;

            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                showResult(wheelData.predefinedResult);
                spinBtn.disabled = false;

                // إرسال النتيجة للبوت
                tg.sendData(JSON.stringify({
                    action: "spin_result",
                    result: wheelData.predefinedResult,
                    user_id: wheelData.userId
                }));
            }, 5000);
        }

        function showResult(result) {
            document.getElementById('resultValue').textContent = result;
            document.getElementById('resultDescription').textContent = descriptions[result] || wheelData.resultDescription;
            resultSection.classList.add('show');
        }

        spinBtn.addEventListener('click', spinWheel);

        // تهيئة الصفحة
        window.addEventListener('load', () => {
            drawWheel();
            if (!parseWebAppData()) {
                spinBtn.disabled = true;
            }
        });

        // تحديث المؤقت كل ثانية إذا كان هناك رسالة وقت
        setInterval(() => {
            if (spinTimer.classList.contains('show') && !wheelData.canSpin) {
                // يمكن إضافة منطق تحديث المؤقت هنا
            }
        }, 1000);
    </script>
</body>
</html>

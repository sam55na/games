<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c1f, #1a1a2e);
            font-family: system-ui;
        }
        .wheel-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format');
            background-size: cover;
        }
        .wheel-wrapper {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1/1;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 0 0 8px gold;
        }
        .lightning-icon {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            animation: glow 1s infinite;
            pointer-events: none;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 5px gold; transform: translateX(-50%) scale(1);}
            50% { text-shadow: 0 0 25px orange; transform: translateX(-50%) scale(1.2);}
        }
        .spin-btn {
            display: block;
            margin: 30px auto;
            padding: 14px 40px;
            background: gold;
            border: none;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .result {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: gold;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="wheel-container">
    <div style="text-align:center">
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="lightning-icon">⚡</div>
        </div>
        <button class="spin-btn" id="spinBtn">🎡 دَوّر</button>
    </div>
</div>
<div class="result" id="resultMsg">✨ اضغط للتدوير ✨</div>

<script>
    const SEGMENTS = [
        { id: "50",   value: 5000,  img: "https://cdn-icons-png.flaticon.com/512/2331/2331967.png" },
        { id: "100",  value: 10000, img: "https://cdn-icons-png.flaticon.com/512/2331/2331970.png" },
        { id: "500",  value: 50000, img: "https://cdn-icons-png.flaticon.com/512/2331/2331976.png" },
        { id: "1000", value: 100000,img: "https://cdn-icons-png.flaticon.com/512/2331/2331985.png" },
        { id: "5%",   value: 0,     img: "https://cdn-icons-png.flaticon.com/512/3208/3208699.png" },
        { id: "25%",  value: 0,     img: "https://cdn-icons-png.flaticon.com/512/1040/1040243.png" }
    ];
    const COLORS = ["#E74C3C","#F39C12","#2ECC71","#3498DB","#9B59B6","#E67E22"];

    let userData = null;
    let targetIndex = -1;
    let spinning = false;
    let currentAngle = 0;
    let images = [];

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const spinBtn = document.getElementById("spinBtn");
    const resultMsg = document.getElementById("resultMsg");

    // استخراج البيانات من الرابط
    function getDataFromURL() {
        const params = new URLSearchParams(window.location.search);
        const encoded = params.get('data');
        if (!encoded) return null;
        try {
            return JSON.parse(atob(encoded));
        } catch(e) {
            return null;
        }
    }

    // تحديد الجائزة حسب البيانات (بدون عشوائية)
    function determinePrize(data) {
        if (data.spins_count === 0 && !data.first_spin_used) return 5; // 25%
        if (data.spins_count === 1 && data.total_charge > 0) return 0; // 50
        if (data.spins_count === 2) return 4; // 5%
        if (data.total_charge > 250000) return 1; // 100
        if (data.total_charge > 700000 && data.total_withdraw <= 200000) return 2; // 500
        if (data.total_charge > 1800000 && data.total_withdraw <= 400000) return 3; // 1000
        return 4; // 5% افتراضي
    }

    // إرسال النتيجة إلى البوت (بشكل فوري)
    function sendResultToBot(segment, prizeAmount, userInfo) {
        if (!window.Telegram?.WebApp) {
            console.log("WebApp not available");
            return;
        }

        const payload = {
            user_id: userInfo.user_id,
            new_spin_time: Math.floor(Date.now() / 1000),
            new_spins_count: userInfo.spins_count + 1,
            first_spin_used: segment.id === "25%" ? 1 : userInfo.first_spin_used,
            prize_amount: prizeAmount,
            prize_type: segment.id
        };

        // ✅ إرسال البيانات عبر sendData()
        window.Telegram.WebApp.sendData(JSON.stringify(payload));
        console.log("✅ تم إرسال البيانات:", payload);

        // إغلاق الويب آب بعد ثانية (اختياري)
        setTimeout(() => {
            window.Telegram.WebApp.close();
        }, 1500);
    }

    // رسم العجلة
    function drawWheel() {
        const size = canvas.width;
        const center = size/2;
        const radius = size/2 - 8;
        const angleStep = (Math.PI * 2) / SEGMENTS.length;

        for (let i = 0; i < SEGMENTS.length; i++) {
            const start = currentAngle + i * angleStep;
            const end = start + angleStep;
            ctx.beginPath();
            ctx.arc(center, center, radius, start, end);
            ctx.lineTo(center, center);
            ctx.fillStyle = COLORS[i];
            ctx.fill();
            ctx.stroke();
        }

        for (let i = 0; i < SEGMENTS.length; i++) {
            const mid = currentAngle + (i + 0.5) * angleStep;
            const x = center + Math.cos(mid) * radius * 0.65;
            const y = center + Math.sin(mid) * radius * 0.65;
            if (images[i]?.complete) {
                ctx.drawImage(images[i], x-28, y-28, 56, 56);
            }
        }
    }

    // تحميل الصور
    function loadImages(cb) {
        let loaded = 0;
        SEGMENTS.forEach((seg, i) => {
            const img = new Image();
            img.src = seg.img;
            img.onload = () => {
                images[i] = img;
                if (++loaded === SEGMENTS.length) cb();
            };
            img.onerror = () => {
                images[i] = null;
                if (++loaded === SEGMENTS.length) cb();
            };
        });
    }

    // بدء التدوير والتوقف عند الجائزة المحددة
    function startSpin() {
        if (spinning || targetIndex === -1) return;

        spinning = true;
        spinBtn.disabled = true;

        const spins = 12;
        const angleStep = (Math.PI * 2) / SEGMENTS.length;
        const currentRaw = (Math.PI * 2 - (currentAngle % (Math.PI * 2))) % (Math.PI * 2);
        const currentSeg = Math.floor(currentRaw / angleStep) % SEGMENTS.length;

        let delta = (targetIndex - currentSeg + SEGMENTS.length) % SEGMENTS.length;
        let finalAngle = currentAngle + (spins * 2 * Math.PI) + (delta * angleStep);

        const duration = 2500;
        const startTime = performance.now();
        const startAngle = currentAngle;

        function animate(now) {
            const t = Math.min(1, (now - startTime) / duration);
            const ease = 1 - Math.pow(1-t, 3);
            currentAngle = startAngle + (finalAngle - startAngle) * ease;
            drawWheel();

            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                currentAngle = finalAngle % (Math.PI * 2);
                drawWheel();

                const prizeSegment = SEGMENTS[targetIndex];
                const prizeAmount = prizeSegment.value;
                let msg = `🎁 ربحت: ${prizeSegment.id} `;
                if (prizeAmount > 0) msg += `= ${prizeAmount} ل.س`;
                resultMsg.innerText = msg;

                // ✅ إرسال النتيجة إلى البوت فوراً
                sendResultToBot(prizeSegment, prizeAmount, userData);

                spinning = false;
                spinBtn.disabled = false;
            }
        }

        requestAnimationFrame(animate);
    }

    // تهيئة العجلة
    function init() {
        const urlData = getDataFromURL();
        if (!urlData) {
            resultMsg.innerText = "❌ خطأ في البيانات";
            return;
        }

        userData = urlData;
        targetIndex = determinePrize(userData);

        resultMsg.innerText = `🎯 الجائزة المحددة: ${SEGMENTS[targetIndex].id}`;

        loadImages(() => {
            drawWheel();
            spinBtn.onclick = startSpin;
        });

        // تكبير الحجم
        const resize = () => {
            const size = document.querySelector('.wheel-wrapper').clientWidth;
            canvas.width = size;
            canvas.height = size;
            drawWheel();
        };
        window.addEventListener('resize', resize);
        setTimeout(resize, 100);

        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    }

    init();
</script>
</body>
</html>

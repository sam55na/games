<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOMB - اختبار الغرف</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a2a;
            border-radius: 20px;
            padding: 20px;
        }
        button {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .room-list {
            margin: 20px 0;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            min-height: 200px;
        }
        .room-card {
            background: #0a0a1a;
            border: 1px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            cursor: pointer;
        }
        .room-card:hover {
            background: #2a2a3a;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
        }
        .success { background: #2ecc71; color: #000; }
        .error { background: #e74c3c; color: #fff; }
        .info { background: #3498db; color: #fff; }
        .waiting {
            background: #f39c12;
            color: #000;
            text-align: center;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            display: none;
        }
        .waiting.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 BOOMB - اختبار الغرف</h1>
        
        <div class="status" id="status">🔄 جاري الاتصال بـ Firebase...</div>
        
        <div>
            <p>اللاعب: <strong id="userId"></strong></p>
            <p>الرصيد: $<span id="balance">100</span></p>
        </div>
        
        <button id="createBtn" onclick="createRoom()">➕ إنشاء غرفة جديدة</button>
        <button id="refreshBtn" onclick="loadRooms()">🔄 تحديث الغرف</button>
        
        <h3>الغرف المتاحة:</h3>
        <div class="room-list" id="roomsList">
            <div style="color:#888;">جاري التحميل...</div>
        </div>
        
        <div class="waiting" id="waitingPanel">
            ⏳ انتظار لاعب آخر...<br>
            <span id="waitingRoomId"></span>
            <br><br>
            <button onclick="cancelWaiting()">إلغاء الانتظار</button>
        </div>
        
        <div class="waiting" id="gamePanel" style="background:#2ecc71;">
            🎮 بدأت اللعبة!<br>
            <span id="gameInfo"></span>
        </div>
        
        <div id="log" style="margin-top:20px; background:#000; padding:10px; border-radius:10px; font-family:monospace; font-size:12px; max-height:200px; overflow-y:auto;">
            📋 سجل الأحداث:<br>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };

        // Initialize Firebase
        let app, db;
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 8),
            name: 'زائر_' + Math.floor(Math.random() * 1000),
            balance: 100
        };
        
        let currentRoom = null;
        let roomListener = null;

        function addLog(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? '#e74c3c' : (type === 'success' ? '#2ecc71' : '#3498db');
            logDiv.innerHTML += `<div style="color:${color};">[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        function showStatus(msg, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = msg;
            statusDiv.className = `status ${type}`;
            setTimeout(() => {
                if (statusDiv.className === `status ${type}`) {
                    statusDiv.className = 'status';
                    statusDiv.textContent = '✅ جاهز';
                }
            }, 3000);
        }

        async function initFirebase() {
            try {
                addLog('🔄 جاري تهيئة Firebase...');
                app = firebase.initializeApp(firebaseConfig);
                db = firebase.database(app);
                
                // اختبار الاتصال
                const testRef = db.ref('.info/connected');
                testRef.on('value', (snap) => {
                    if (snap.val() === true) {
                        addLog('✅ Firebase متصل بنجاح!');
                        showStatus('✅ متصل بـ Firebase', 'success');
                    } else {
                        addLog('❌ Firebase غير متصل', 'error');
                        showStatus('❌ غير متصل', 'error');
                    }
                });
                
                return true;
            } catch (error) {
                addLog(`❌ خطأ في تهيئة Firebase: ${error.message}`, 'error');
                showStatus(`خطأ: ${error.message}`, 'error');
                return false;
            }
        }

        async function loadUserData() {
            try {
                const userRef = db.ref(`users/${currentUser.id}`);
                const snap = await userRef.once('value');
                if (snap.exists()) {
                    currentUser.balance = snap.val().balance;
                    addLog(`📁 تم تحميل بيانات المستخدم: ${currentUser.name} (رصيد: $${currentUser.balance})`);
                } else {
                    await userRef.set({
                        id: currentUser.id,
                        name: currentUser.name,
                        balance: currentUser.balance,
                        createdAt: Date.now()
                    });
                    addLog(`📁 تم إنشاء مستخدم جديد: ${currentUser.name}`);
                }
                document.getElementById('userId').textContent = `${currentUser.name} (${currentUser.id.slice(-6)})`;
                document.getElementById('balance').textContent = currentUser.balance;
            } catch (error) {
                addLog(`❌ خطأ في تحميل المستخدم: ${error.message}`, 'error');
            }
        }

        async function createRoom() {
            addLog('🔨 محاولة إنشاء غرفة جديدة...');
            
            if (currentRoom) {
                addLog('⚠️ أنت بالفعل في غرفة!', 'error');
                showStatus('أنت بالفعل في غرفة!', 'error');
                return;
            }
            
            if (currentUser.balance < 10) {
                addLog('⚠️ الرصيد غير كافي!', 'error');
                showStatus('الرصيد غير كافي!', 'error');
                return;
            }
            
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري الإنشاء...';
            
            try {
                const roomId = Date.now().toString();
                addLog(`📝 إنشاء غرفة بالمعرف: ${roomId}`);
                
                const roomData = {
                    id: roomId,
                    player1: { id: currentUser.id, name: currentUser.name },
                    player2: null,
                    status: 'waiting',
                    bet: 10,
                    createdAt: Date.now()
                };
                
                // حفظ الغرفة في Firebase
                await db.ref(`rooms/${roomId}`).set(roomData);
                addLog(`✅ تم إنشاء الغرفة بنجاح! المعرف: ${roomId.slice(-4)}`, 'success');
                showStatus(`✅ تم إنشاء الغرفة ${roomId.slice(-4)}`, 'success');
                
                currentRoom = roomId;
                enterWaitingRoom(roomId);
                
            } catch (error) {
                addLog(`❌ فشل إنشاء الغرفة: ${error.message}`, 'error');
                showStatus(`فشل الإنشاء: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '➕ إنشاء غرفة جديدة';
            }
        }

        function enterWaitingRoom(roomId) {
            addLog(`⏳ دخول غرفة الانتظار: ${roomId.slice(-4)}`);
            
            document.getElementById('roomsList').style.display = 'none';
            document.getElementById('createBtn').style.display = 'none';
            document.getElementById('refreshBtn').style.display = 'none';
            
            const waitingPanel = document.getElementById('waitingPanel');
            waitingPanel.classList.add('active');
            document.getElementById('waitingRoomId').innerHTML = `غرفة: ${roomId.slice(-4)}<br>في انتظار لاعب آخر...`;
            
            // الاستماع لتغييرات الغرفة
            if (roomListener) roomListener();
            
            const roomRef = db.ref(`rooms/${roomId}`);
            roomListener = roomRef.on('value', (snap) => {
                const room = snap.val();
                addLog(`📡 تحديث الغرفة: status=${room?.status}`);
                
                if (room && room.status === 'full') {
                    addLog(`🎉 انضم لاعب آخر! بدء اللعبة...`, 'success');
                    roomRef.off();
                    startGame(roomId, room);
                } else if (!room) {
                    addLog(`❌ تم حذف الغرفة`, 'error');
                    roomRef.off();
                    cancelWaiting();
                }
            });
        }

        function startGame(roomId, room) {
            addLog(`🎮 بدء اللعبة في الغرفة ${roomId.slice(-4)}`, 'success');
            
            document.getElementById('waitingPanel').classList.remove('active');
            
            const gamePanel = document.getElementById('gamePanel');
            gamePanel.classList.add('active');
            
            const isPlayer1 = room.player1.id === currentUser.id;
            document.getElementById('gameInfo').innerHTML = `
                🎮 بدأت اللعبة!<br>
                أنت: ${isPlayer1 ? 'اللاعب الأول 🔴' : 'اللاعب الثاني 🔵'}<br>
                الخصم: ${isPlayer1 ? room.player2.name : room.player1.name}<br>
                الرهان: $${room.bet}<br>
                <button onclick="endGameTest()" style="margin-top:10px;">إنهاء اللعبة (اختبار)</button>
            `;
            
            showStatus('بدأت اللعبة!', 'success');
        }

        function cancelWaiting() {
            addLog(`❌ إلغاء الانتظار`);
            
            if (currentRoom) {
                db.ref(`rooms/${currentRoom}`).remove();
                addLog(`🗑️ تم حذف الغرفة ${currentRoom.slice(-4)}`);
            }
            
            if (roomListener) roomListener();
            roomListener = null;
            currentRoom = null;
            
            document.getElementById('roomsList').style.display = 'block';
            document.getElementById('createBtn').style.display = 'block';
            document.getElementById('refreshBtn').style.display = 'block';
            document.getElementById('waitingPanel').classList.remove('active');
            
            loadRooms();
        }

        function endGameTest() {
            addLog(`🏁 انتهاء اللعبة (اختبار)`);
            document.getElementById('gamePanel').classList.remove('active');
            cancelWaiting();
        }

        async function joinRoom(roomId) {
            addLog(`🔗 محاولة الانضمام للغرفة: ${roomId.slice(-4)}`);
            
            if (currentRoom) {
                addLog('⚠️ أنت بالفعل في غرفة!', 'error');
                return;
            }
            
            try {
                const roomRef = db.ref(`rooms/${roomId}`);
                const snap = await roomRef.once('value');
                const room = snap.val();
                
                if (!room) {
                    addLog('❌ الغرفة غير موجودة', 'error');
                    loadRooms();
                    return;
                }
                
                if (room.status === 'finished') {
                    addLog('❌ الغرفة منتهية', 'error');
                    loadRooms();
                    return;
                }
                
                if (room.player1?.id === currentUser.id) {
                    addLog('👑 أنت منشئ الغرفة، ادخل للانتظار');
                    currentRoom = roomId;
                    enterWaitingRoom(roomId);
                    return;
                }
                
                if (!room.player2 && room.status === 'waiting') {
                    if (currentUser.balance < room.bet) {
                        addLog('⚠️ الرصيد غير كافي!', 'error');
                        return;
                    }
                    
                    // خصم الرهان
                    currentUser.balance -= room.bet;
                    await db.ref(`users/${currentUser.id}`).update({ balance: currentUser.balance });
                    document.getElementById('balance').textContent = currentUser.balance;
                    addLog(`💰 تم خصم $${room.bet} من الرصيد`);
                    
                    // تحديث الغرفة
                    await roomRef.update({
                        player2: { id: currentUser.id, name: currentUser.name },
                        status: 'full'
                    });
                    
                    addLog(`✅ انضممت للغرفة بنجاح!`, 'success');
                    currentRoom = roomId;
                    startGame(roomId, { ...room, player2: { id: currentUser.id, name: currentUser.name }, status: 'full' });
                } else {
                    addLog('❌ الغرفة ممتلئة', 'error');
                }
                
            } catch (error) {
                addLog(`❌ خطأ في الانضمام: ${error.message}`, 'error');
            }
        }

        async function loadRooms() {
            addLog('🔄 تحميل قائمة الغرف...');
            
            try {
                const roomsRef = db.ref('rooms');
                const snap = await roomsRef.once('value');
                const rooms = snap.val() || {};
                
                const roomsList = document.getElementById('roomsList');
                roomsList.innerHTML = '';
                
                const availableRooms = Object.values(rooms).filter(r => 
                    r.status === 'waiting' && 
                    r.player1?.id !== currentUser.id
                );
                
                addLog(`📋 تم العثور على ${availableRooms.length} غرفة متاحة`);
                
                if (availableRooms.length === 0) {
                    roomsList.innerHTML = '<div style="color:#888;text-align:center;padding:20px;">✨ لا توجد غرف متاحة<br>أنشئ غرفة جديدة</div>';
                } else {
                    availableRooms.forEach(room => {
                        const card = document.createElement('div');
                        card.className = 'room-card';
                        card.innerHTML = `
                            <div><strong>غرفة ${room.id.slice(-4)}</strong></div>
                            <div>👤 ${room.player1.name}</div>
                            <div>💰 رهان: $${room.bet}</div>
                            <div>🟢 متاحة</div>
                        `;
                        card.onclick = () => joinRoom(room.id);
                        roomsList.appendChild(card);
                    });
                }
                
            } catch (error) {
                addLog(`❌ خطأ في تحميل الغرف: ${error.message}`, 'error');
                document.getElementById('roomsList').innerHTML = `<div style="color:#e74c3c;">خطأ: ${error.message}</div>`;
            }
        }

        async function testFirebaseWrite() {
            addLog('🧪 اختبار الكتابة في Firebase...');
            try {
                const testId = 'test_' + Date.now();
                await db.ref(`test/${testId}`).set({
                    message: 'Hello from BOOMB!',
                    timestamp: Date.now()
                });
                addLog('✅ نجحت الكتابة في Firebase!', 'success');
                
                // قراءة الاختبار
                const snap = await db.ref(`test/${testId}`).once('value');
                addLog(`📖 قراءة الاختبار: ${JSON.stringify(snap.val())}`, 'success');
                
                // تنظيف
                await db.ref(`test/${testId}`).remove();
                addLog('🧹 تم تنظيف بيانات الاختبار');
            } catch (error) {
                addLog(`❌ فشل اختبار Firebase: ${error.message}`, 'error');
            }
        }

        async function init() {
            addLog('🚀 بدء تشغيل اللعبة...');
            
            const connected = await initFirebase();
            if (!connected) {
                addLog('❌ فشل الاتصال بـ Firebase', 'error');
                return;
            }
            
            await loadUserData();
            
            // اختبار الكتابة
            await testFirebaseWrite();
            
            // تحميل الغرف
            await loadRooms();
            
            // تحديث الغرف كل 5 ثواني
            setInterval(loadRooms, 5000);
            
            addLog('✅ التهيئة كاملة!', 'success');
            showStatus('جاهز!', 'success');
        }
        
        window.createRoom = createRoom;
        window.loadRooms = loadRooms;
        window.cancelWaiting = cancelWaiting;
        window.endGameTest = endGameTest;
        
        init();
    </script>
</body>
</html>

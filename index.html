<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سلوتس أبولو - فتحة المجرة</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            perspective: 800px;
        }

        /* الحاوية الرئيسية */
        .game-container {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            border-radius: 4rem;
            padding: 1.8rem 2.2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
            border: 1px solid rgba(210, 180, 140, 0.4);
        }

        /* لوحة السلوتس */
        .slots-machine {
            background: linear-gradient(145deg, #1a1f2e, #0e111b);
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 20px 30px -8px black;
        }

        /* شبكة الرموز */
        .reels-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            background: #04070c;
            padding: 20px;
            border-radius: 2rem;
            border: 1px solid #ffd96655;
        }

        /* كل عمود (reel) */
        .reel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* كل خانة رمز */
        .symbol {
            background: radial-gradient(ellipse at 30% 35%, #252b3d, #13182a);
            aspect-ratio: 1 / 1;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 6px cyan;
            box-shadow: 0 8px 0 #070a12, inset 0 1px 1px rgba(255,255,255,0.2);
            transition: all 0.08s linear;
            color: #f9eec1;
            transform-style: preserve-3d;
        }

        /* تأثير النقر السريع (spin animation) */
        .symbol-spinning {
            animation: reelShake 0.07s infinite alternate;
        }

        @keyframes reelShake {
            0% { transform: translateY(0px) rotateX(0deg); background: #2e3a55; }
            100% { transform: translateY(-6px) rotateX(8deg); background: #3f4e72; }
        }

        /* تأثير الفوز (وميض ذهبي) */
        .win-glow {
            animation: winFlash 0.4s ease-out 3;
            box-shadow: 0 0 0 3px gold, 0 0 20px 5px #ffb347;
        }

        @keyframes winFlash {
            0% { filter: brightness(1); box-shadow: 0 0 0 0 gold; }
            50% { filter: brightness(1.6); box-shadow: 0 0 15px 8px #ffd966; background: #c9a53b; color: black; }
            100% { filter: brightness(1); box-shadow: 0 0 0 0 gold; }
        }

        /* معلومات اللعبة */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 1.6rem;
            margin-bottom: 1rem;
            background: #0a0e17aa;
            backdrop-filter: blur(8px);
            padding: 0.8rem 1.8rem;
            border-radius: 3rem;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .balance-box, .win-box {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .balance-box span, .win-box span {
            color: #b9c7ff;
            font-size: 1rem;
        }

        .balance-value, .win-value {
            color: #f5d742;
            text-shadow: 0 0 5px #ffb347;
            font-family: 'Orbitron', monospace;
        }

        /* أزرار التحكم */
        .button-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 1.8rem;
        }

        .spin-btn, .reset-btn {
            background: linear-gradient(135deg, #2c354b, #1b212f);
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 0.8rem 2rem;
            border-radius: 3rem;
            color: #ffeaac;
            font-family: inherit;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 6px 0 #0b0e16;
            letter-spacing: 2px;
        }

        .spin-btn:active, .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #0b0e16;
        }

        .spin-btn {
            background: linear-gradient(135deg, #4e3b2c, #2e241b);
            box-shadow: 0 6px 0 #3a2a1f;
            color: #ffcf7a;
        }

        /* رسالة الفوز */
        .message-area {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.3rem;
            font-weight: bold;
            background: #00000088;
            border-radius: 2rem;
            padding: 0.4rem;
            color: #ffd966;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        /* paylines indicator صغير */
        .paylines-note {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 1rem;
            color: #aab3cf;
        }

        @media (max-width: 650px) {
            .reels-container { gap: 6px; padding: 12px; }
            .symbol { font-size: 2rem; border-radius: 0.8rem; }
            .spin-btn, .reset-btn { font-size: 1.2rem; padding: 0.5rem 1.2rem; }
            .balance-box, .win-box { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="slots-machine">
        <div class="reels-container" id="reelsContainer"></div>
        
        <div class="info-panel">
            <div class="balance-box"><span>💰 الرصيد</span> <span class="balance-value" id="balance">1000</span></div>
            <div class="win-box"><span>🏆 آخر ربح</span> <span class="win-value" id="lastWin">0</span></div>
        </div>
        
        <div class="button-bar">
            <button class="spin-btn" id="spinBtn">🎰 دَوِّر</button>
            <button class="reset-btn" id="resetBtn">🔄 إعادة تعيين</button>
        </div>
        <div class="message-area" id="messageBox">✨ اضغط تدوير للمغامرة ✨</div>
        <div class="paylines-note">🎲 10 خطوط دفع | 5 أعمدة × 3 صفوف | رموز أسطورية</div>
    </div>
</div>

<script>
    (function(){
        // ---------- رموز غير مألوفة (عالية الجودة) ----------
        const SYMBOLS = [
            { id: "🔮", name: "بلورة القدر", value: 50,  rare: 4 },    // نادرة
            { id: "⚡", name: "صاعقة الأثير", value: 30, rare: 6 },
            { id: "🌀", name: "دوامة الكون", value: 20, rare: 8 },
            { id: "🌙", name: "هلال الظلال", value: 15, rare: 10 },
            { id: "🔥", name: "لهب الخلود", value: 25, rare: 7 },
            { id: "❄️", name: "قلب الجليد", value: 12, rare: 12 },
            { id: "👁️", name: "عين الحقيقة", value: 40, rare: 5 },
            { id: "⚜️", name: "ختم الأبدية", value: 35, rare: 6 }
        ];
        
        // توزيع الرموز حسب الندرة (بناء بايزي)
        function getRandomSymbol() {
            let totalRarity = SYMBOLS.reduce((sum, s) => sum + s.rare, 0);
            let rand = Math.random() * totalRarity;
            let accum = 0;
            for(let sym of SYMBOLS) {
                accum += sym.rare;
                if(rand <= accum) return sym;
            }
            return SYMBOLS[0];
        }
        
        // إعدادات اللعبة
        const ROWS = 3;
        const COLS = 5;
        const PAYLINES = 10;      // 10 خطوط دفع محددة مسبقاً
        const BET_AMOUNT = 10;     // الرهان لكل دورة
        
        let balance = 1000;
        let currentGrid = [];      // مصفوفة ثنائية الأبعاد [row][col] -> كائن الرمز
        let isSpinning = false;
        
        // DOM elements
        const reelsContainer = document.getElementById('reelsContainer');
        const balanceSpan = document.getElementById('balance');
        const lastWinSpan = document.getElementById('lastWin');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const messageBox = document.getElementById('messageBox');
        
        // --- خطوط الدفع (10 خطوط عالمية احترافية) ---
        // كل خط هو مسار [عمود0, عمود1, عمود2, عمود3, عمود4] كل قيمة تمثل index الصف (0,1,2)
        const paylinesPattern = [
            [0,0,0,0,0], // الخط العلوي
            [1,1,1,1,1], // الخط الأوسط
            [2,2,2,2,2], // الخط السفلي
            [0,1,2,1,0], // V shape
            [2,1,0,1,2], // V معكوس
            [0,0,1,2,2], // متعرج هابط
            [2,2,1,0,0], // متعرج صاعد
            [1,0,1,2,1], // منحنى خاص
            [1,2,1,0,1], // منحنى معكوس
            [0,1,1,1,0]  // قوس صغير
        ];
        
        // إنشاء الواجهة (شبكة 5x3)
        function buildUI() {
            reelsContainer.innerHTML = '';
            for(let c = 0; c < COLS; c++) {
                const reelDiv = document.createElement('div');
                reelDiv.className = 'reel';
                reelDiv.setAttribute('data-col', c);
                for(let r = 0; r < ROWS; r++) {
                    const symbolDiv = document.createElement('div');
                    symbolDiv.className = 'symbol';
                    symbolDiv.setAttribute('data-row', r);
                    symbolDiv.setAttribute('data-col', c);
                    symbolDiv.textContent = '🔮'; // رمز مؤقت
                    reelDiv.appendChild(symbolDiv);
                }
                reelsContainer.appendChild(reelDiv);
            }
        }
        
        // تحديث واجهة الرموز بناءً على currentGrid
        function updateUI() {
            for(let c = 0; c < COLS; c++) {
                const reel = reelsContainer.children[c];
                for(let r = 0; r < ROWS; r++) {
                    const cell = reel.children[r];
                    const symbolObj = currentGrid[r][c];
                    cell.textContent = symbolObj.id;
                    // إزالة أي تأثيرات فوز قديمة
                    cell.classList.remove('win-glow');
                }
            }
        }
        
        // إنشاء شبكة عشوائية جديدة
        function generateRandomGrid() {
            const newGrid = [];
            for(let r = 0; r < ROWS; r++) {
                newGrid[r] = [];
                for(let c = 0; c < COLS; c++) {
                    newGrid[r][c] = getRandomSymbol();
                }
            }
            return newGrid;
        }
        
        // حساب المكاسب حسب خطوط الدفع مع مضاعفات احترافية
        function calculateWinnings(grid, bet) {
            let totalWin = 0;
            const winningLinesInfo = [];
            
            for(let lineIdx = 0; lineIdx < paylinesPattern.length; lineIdx++) {
                const pattern = paylinesPattern[lineIdx];
                // احصل على الرموز على طول هذا الخط
                const symbolsOnLine = [];
                for(let col = 0; col < COLS; col++) {
                    const rowIdx = pattern[col];
                    symbolsOnLine.push(grid[rowIdx][col]);
                }
                // تحقق من تطابق الرموز المتتالية من العمود 0 إلى اليمين
                let matchCount = 1;
                const firstSymbol = symbolsOnLine[0];
                for(let i = 1; i < symbolsOnLine.length; i++) {
                    if(symbolsOnLine[i].id === firstSymbol.id) {
                        matchCount++;
                    } else {
                        break;
                    }
                }
                
                if(matchCount >= 3) { // 3 رموز متطابقة أو أكثر تربح
                    let multiplier = 0;
                    if(matchCount === 3) multiplier = 1.2;
                    else if(matchCount === 4) multiplier = 2.5;
                    else if(matchCount === 5) multiplier = 6;
                    
                    let lineWin = Math.floor(firstSymbol.value * multiplier * (bet / 10));
                    if(lineWin > 0) {
                        totalWin += lineWin;
                        winningLinesInfo.push({line: lineIdx+1, count: matchCount, symbol: firstSymbol.id, win: lineWin, pattern: pattern});
                    }
                }
            }
            
            // مكافأة خاصة (جاكبوت صغير إذا كان جميع الرموز نادرة فائقة)
            let allSpecial = true;
            for(let r=0; r<ROWS; r++) {
                for(let c=0; c<COLS; c++) {
                    if(grid[r][c].value < 35) allSpecial = false;
                }
            }
            if(allSpecial) {
                let jackpotBonus = 500;
                totalWin += jackpotBonus;
                messageBox.innerHTML = `💎 جاكبوت أسطوري! +${jackpotBonus} 💎`;
                setTimeout(() => {}, 100);
            }
            
            return { totalWin, winningLinesInfo };
        }
        
        // تأثيرات الفوز على الخلايا المشاركة في أي خط رابح
        function applyWinEffects(grid, winningLines) {
            // إزالة أي تأثيرات قديمة أولاً
            for(let c=0; c<COLS; c++) {
                for(let r=0; r<ROWS; r++) {
                    const cell = reelsContainer.children[c].children[r];
                    cell.classList.remove('win-glow');
                }
            }
            
            // مجموعة الخلايا التي فازت (لإضافة تأثير وميض)
            const cellsToGlow = new Set(); // key "row,col"
            for(let win of winningLines) {
                const pattern = win.pattern;
                for(let col=0; col<COLS; col++) {
                    const rowIdx = pattern[col];
                    cellsToGlow.add(`${rowIdx},${col}`);
                }
            }
            
            for(let c=0; c<COLS; c++) {
                for(let r=0; r<ROWS; r++) {
                    if(cellsToGlow.has(`${r},${c}`)) {
                        const cell = reelsContainer.children[c].children[r];
                        cell.classList.add('win-glow');
                    }
                }
            }
        }
        
        // تحديث الرصيد وعرض الرسائل
        function updateBalanceAndDisplay(winAmount, winLinesInfo) {
            if(winAmount > 0) {
                balance += winAmount;
                balanceSpan.textContent = balance;
                lastWinSpan.textContent = winAmount;
                let lineText = winLinesInfo.map(w => `خط ${w.line} (${w.symbol}×${w.count}) +${w.win}`).join(' | ');
                messageBox.innerHTML = `🎉 فوز! 🎉 ${winAmount} نقطة 🔥 ${lineText || ''}`;
                // تأثير صوتي وهمي (vibration خفيف)
                if(navigator.vibrate) navigator.vibrate(100);
            } else {
                lastWinSpan.textContent = "0";
                messageBox.innerHTML = `😔 لا مكاسب هذه المرة. حاول مجدداً! 🎰`;
            }
            balanceSpan.textContent = balance;
        }
        
        // دوران احترافي مع حركة (spin مع مؤثرات)
        async function spinReels() {
            if(isSpinning) {
                messageBox.innerHTML = "⏳ انتظر حتى يكتمل الدوران...";
                return;
            }
            if(balance < BET_AMOUNT) {
                messageBox.innerHTML = "⚠️ رصيد غير كافٍ! اضغط إعادة تعيين ⚠️";
                return;
            }
            
            isSpinning = true;
            spinBtn.disabled = true;
            resetBtn.disabled = true;
            
            // خصم الرهان
            balance -= BET_AMOUNT;
            balanceSpan.textContent = balance;
            messageBox.innerHTML = "🌀 جاري الدوران... حظ سعيد! 🌀";
            
            // توليد الشبكة النهائية أولاً (لنعرف النتيجة بعد الدوران)
            const newGridFinal = generateRandomGrid();
            
            // محاكاة تأثير التدوير لكل عمود (animate تغيير الرموز بسرعة)
            const spinDuration = 650; // 0.65 ثانية
            const steps = 12;
            const intervalTime = spinDuration / steps;
            
            // لكل عمود نقوم بتغيير الرموز بشكل سريع لإيهام بالدوران
            let step = 0;
            const interval = setInterval(() => {
                if(step >= steps) {
                    clearInterval(interval);
                    // تطبيق الشبكة النهائية الحقيقية
                    currentGrid = newGridFinal.map(row => [...row]); // deep copy
                    updateUI();
                    
                    // حساب المكاسب بناءً على الشبكة النهائية
                    const { totalWin, winningLinesInfo } = calculateWinnings(currentGrid, BET_AMOUNT);
                    
                    // إظهار تأثيرات الفوز
                    if(totalWin > 0) {
                        applyWinEffects(currentGrid, winningLinesInfo);
                        updateBalanceAndDisplay(totalWin, winningLinesInfo);
                    } else {
                        updateBalanceAndDisplay(0, []);
                        // إزالة أي تأثيرات فوز قديمة
                        for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) reelsContainer.children[c].children[r].classList.remove('win-glow');
                    }
                    
                    // إنهاء حالة الدوران
                    isSpinning = false;
                    spinBtn.disabled = false;
                    resetBtn.disabled = false;
                    
                    // إذا كان الرصيد صفراً ننبه
                    if(balance <= 0) messageBox.innerHTML = "💀 نفذ الرصيد! اضغط إعادة تعيين للاستمرار 💀";
                    else if(totalWin > 0) messageBox.innerHTML = messageBox.innerHTML; // تم بالفعل
                    else messageBox.innerHTML = "✨ أدر من جديد! المجرة تنتظرك ✨";
                    
                    return;
                }
                
                // خلال كل خطوة، نعرض رموز عشوائية مؤقتة
                for(let c = 0; c < COLS; c++) {
                    const reelDiv = reelsContainer.children[c];
                    for(let r = 0; r < ROWS; r++) {
                        const tempSym = getRandomSymbol();
                        const cell = reelDiv.children[r];
                        if(!cell.classList.contains('win-glow')) {
                            cell.textContent = tempSym.id;
                            cell.classList.add('symbol-spinning');
                        }
                    }
                }
                step++;
            }, intervalTime);
            
            // إزالة class spinning بعد انتهاء الدوران (في clearInterval أعلاه)
            // لكن نزيل بعد الانتهاء
            const removeSpinningClass = () => {
                for(let c=0; c<COLS; c++) {
                    for(let r=0; r<ROWS; r++) {
                        const cell = reelsContainer.children[c].children[r];
                        cell.classList.remove('symbol-spinning');
                    }
                }
            };
            setTimeout(() => {
                if(!isSpinning) removeSpinningClass();
                else setTimeout(removeSpinningClass, spinDuration+50);
            }, spinDuration);
        }
        
        // إعادة تعيين اللعبة بالكامل
        function resetGame() {
            if(isSpinning) return;
            balance = 1000;
            balanceSpan.textContent = balance;
            lastWinSpan.textContent = "0";
            // توليد شبكة جديدة عادية
            currentGrid = generateRandomGrid();
            updateUI();
            messageBox.innerHTML = "🔄 تم إعادة التعيين! رصيد 1000 نقطة. ابدأ اللعب 🎰";
            // إزالة أي تأثيرات وميض
            for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) reelsContainer.children[c].children[r].classList.remove('win-glow', 'symbol-spinning');
        }
        
        // تهيئة اللعبة وتعبئة الشبكة الأولى
        function initGame() {
            buildUI();
            currentGrid = generateRandomGrid();
            updateUI();
            balanceSpan.textContent = balance;
            lastWinSpan.textContent = "0";
            spinBtn.addEventListener('click', spinReels);
            resetBtn.addEventListener('click', resetGame);
        }
        
        initGame();
    })();
</script>
</body>
</html>

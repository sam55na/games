<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB 3D | لعبة المدفع الاحترافية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
        }

        /* ==================== UI Overlay ==================== */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .game-header {
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance-display {
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #ffd700;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
        }

        .balance-display span {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-left: 5px;
        }

        /* ==================== Game Info ==================== */
        .current-turn {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #ffd700;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .throw-timer {
            position: fixed;
            top: 80px;
            right: 25px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ff6666;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ff6666;
            box-shadow: 0 0 15px rgba(255,102,102,0.3);
        }

        .power-bar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 6px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ffd700;
            backdrop-filter: blur(5px);
        }

        .power-bar {
            height: 24px;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            border-radius: 25px;
            width: 0%;
            transition: width 0.02s linear;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .power-label {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 0.8rem;
            white-space: nowrap;
            font-weight: bold;
        }

        /* ==================== Direction Indicator ==================== */
        .direction-line {
            position: fixed;
            background: rgba(255,215,0,0.8);
            height: 3px;
            transform-origin: left center;
            z-index: 95;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255,215,0,0.8);
            transition: all 0.02s linear;
        }

        .direction-line::after {
            content: "▶";
            position: absolute;
            right: -12px;
            top: -8px;
            color: #ffd700;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* ==================== Waiting Room ==================== */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-content {
            background: linear-gradient(145deg, rgba(26,26,42,0.95), rgba(15,15,31,0.95));
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .waiting-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .room-card {
            background: linear-gradient(145deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-5px);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
        }

        .room-number {
            font-size: 1.1rem;
            color: #ffd700;
            font-weight: bold;
            font-family: monospace;
        }

        .room-status {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .room-creator {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 10px;
        }

        .room-bet {
            font-size: 0.9rem;
            color: #ffd700;
            margin-top: 8px;
        }

        .create-room-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            color: #000;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .create-room-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .create-room-btn:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .waiting-message {
            font-size: 1.4rem;
            color: #ffd700;
            margin: 25px 0;
            display: none;
            animation: pulse 1s infinite;
        }

        .waiting-message.active {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        .active-game-badge {
            position: fixed;
            top: 75px;
            left: 20px;
            background: linear-gradient(135deg, #ff4444, #cc3333);
            color: white;
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.75rem;
            z-index: 100;
            pointer-events: none;
            display: none;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(255,68,68,0.3);
        }

        .active-game-badge.visible {
            display: block;
        }

        /* ==================== Game Area ==================== */
        .game-area {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 120px;
            display: none;
        }

        .game-area.active {
            display: flex;
            flex-direction: column;
        }

        .grid-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            background: rgba(26,26,42,0.8);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 6px;
            transition: all 0.15s ease;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 1px 2px rgba(0,0,0,0.2);
        }

        .grid-cell.colored-red {
            background: linear-gradient(145deg, #ff5555, #cc3333);
            box-shadow: 0 0 12px rgba(255,68,68,0.5);
        }

        .grid-cell.colored-blue {
            background: linear-gradient(145deg, #5555ff, #3333cc);
            box-shadow: 0 0 12px rgba(68,68,255,0.5);
        }

        /* Cannons Area */
        .cannons-area {
            height: 100px;
            background: linear-gradient(0deg, #1a1a2a, #0f0f1f);
            border-top: 2px solid #ffd700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15%;
            position: relative;
        }

        .cannon {
            text-align: center;
            cursor: grab;
            transition: transform 0.05s linear;
            position: relative;
        }

        .cannon:active {
            cursor: grabbing;
        }

        .cannon-icon {
            font-size: 3rem;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            transition: transform 0.02s linear;
        }

        .cannon-left .cannon-icon {
            transform: rotate(-20deg);
        }

        .cannon-right .cannon-icon {
            transform: rotate(20deg) scaleX(-1);
        }

        .cannon-power {
            font-size: 0.7rem;
            color: #ffd700;
            margin-top: 5px;
        }

        /* Ball Animation */
        .ball {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            z-index: 200;
            pointer-events: none;
            filter: drop-shadow(0 0 8px currentColor);
            transition: all 0.02s linear;
        }

        /* Result Modal */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .result-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .result-content {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            min-width: 320px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-title {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .result-message {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .result-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 35px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .result-btn:hover {
            transform: scale(1.05);
            background: #ffaa33;
        }

        .back-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.02);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffd700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .current-turn { font-size: 0.8rem; top: 70px; padding: 6px 18px; }
            .throw-timer { font-size: 1rem; top: 70px; padding: 6px 15px; }
            .power-bar-container { width: 240px; bottom: 20px; }
            .cannons-area { padding: 0 10%; }
            .cannon-icon { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- UI Overlay -->
    <div class="ui-overlay">
        <div class="game-header">
            <div class="logo">💣 BOOMB 3D</div>
            <div class="balance-display">💰 الرصيد: $<span id="mainBalance">0</span></div>
        </div>
    </div>

    <!-- Game Info -->
    <div class="current-turn" id="currentTurn">⏳ انتظار...</div>
    <div class="throw-timer" id="throwTimer">--s</div>
    <div class="power-bar-container">
        <div class="power-label">⚡ اسحب للخلف لتحديد القوة والاتجاه</div>
        <div class="power-bar" id="powerBar"></div>
    </div>
    <div class="active-game-badge" id="activeGameBadge">🎮 في لعبة نشطة</div>
    <button class="back-btn" id="backBtn" onclick="window.exitGame()">🏠 العودة للغرف</button>

    <!-- Waiting Room -->
    <div class="waiting-room" id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">🎮 غرف اللعب</div>
            <div class="rooms-grid" id="roomsGrid">
                <div style="grid-column:1/-1;text-align:center;color:#888;padding:30px;">🔄 جاري التحميل...</div>
            </div>
            <button class="create-room-btn" id="createRoomBtn">➕ إنشاء غرفة جديدة</button>
            <div class="waiting-message" id="waitingMessage">
                ⏳ انتظار لاعب آخر...<br>
                <span id="waitingRoomCode" style="font-size:0.9rem; color:#aaa;"></span>
            </div>
        </div>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="grid-container">
            <div class="game-grid" id="gameGrid"></div>
        </div>
        <div class="cannons-area" id="cannonsArea">
            <div class="cannon cannon-left" id="cannonLeft">
                <div class="cannon-icon">🔫</div>
                <div class="cannon-power">اللاعب 🔴</div>
            </div>
            <div class="cannon cannon-right" id="cannonRight">
                <div class="cannon-icon">🔫</div>
                <div class="cannon-power">اللاعب 🔵</div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="result-btn" onclick="window.closeResult()">موافق</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        // ==================== GAME CONFIGURATION ====================
        const CONFIG = {
            BET_AMOUNT: 10,
            GRID_SIZE: 10,
            THROW_TIME: 15,
            THROWS_PER_PLAYER: 3,
            WIN_MULTIPLIER: 1.8,
            GRAVITY: 0.25,
            BOUNCE: 0.65
        };

        // ==================== USER DATA ====================
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 8),
            name: 'زائر_' + Math.floor(Math.random() * 1000),
            balance: 100,
            inGame: false,
            roomId: null
        };

        // ==================== GAME STATE ====================
        let gameState = {
            active: false,
            roomId: null,
            roomData: null,
            grid: [],
            currentPlayer: 1,
            player1Throws: CONFIG.THROWS_PER_PLAYER,
            player2Throws: CONFIG.THROWS_PER_PLAYER,
            dragging: false,
            power: 0,
            bombActive: false,
            dragStartX: 0,
            dragStartY: 0,
            directionAngle: 0,
            ballAnimation: null
        };

        // ==================== DOM Elements ====================
        let timerInterval = null;
        let roomListener = null;
        let gameListener = null;
        let directionLine = null;

        // ==================== HELPER FUNCTIONS ====================
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 120px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? 'linear-gradient(135deg, #e74c3c, #c0392b)' : 'linear-gradient(135deg, #2c3e50, #1a2632)'};
                color: white;
                padding: 12px 28px;
                border-radius: 50px;
                z-index: 1000;
                font-weight: bold;
                font-size: 0.9rem;
                white-space: nowrap;
                box-shadow: 0 5px 20px rgba(0,0,0,0.3);
                animation: slideUp 0.3s ease;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        async function saveUserToDB() {
            await db.ref(`users/${currentUser.id}`).set({
                id: currentUser.id,
                name: currentUser.name,
                balance: currentUser.balance,
                inGame: currentUser.inGame,
                roomId: currentUser.roomId,
                lastSeen: Date.now()
            });
            document.getElementById('mainBalance').textContent = currentUser.balance;
        }

        async function loadUserFromDB() {
            const snap = await db.ref(`users/${currentUser.id}`).once('value');
            if (snap.exists()) {
                const data = snap.val();
                currentUser.balance = data.balance;
                currentUser.name = data.name;
                currentUser.inGame = data.inGame || false;
                currentUser.roomId = data.roomId;
            } else {
                await saveUserToDB();
            }
            document.getElementById('mainBalance').textContent = currentUser.balance;
        }

        // ==================== GRID FUNCTIONS ====================
        function createGridVisual() {
            const gridContainer = document.getElementById('gameGrid');
            gridContainer.innerHTML = '';
            
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    gridContainer.appendChild(cell);
                }
            }
        }
        
        function updateGridVisual() {
            const cells = document.querySelectorAll('#gameGrid .grid-cell');
            for (let i = 0; i < cells.length; i++) {
                const row = Math.floor(i / CONFIG.GRID_SIZE);
                const col = i % CONFIG.GRID_SIZE;
                const value = gameState.grid[row]?.[col];
                cells[i].className = 'grid-cell';
                if (value === 1) cells[i].classList.add('colored-red');
                else if (value === 2) cells[i].classList.add('colored-blue');
            }
        }
        
        function resetGrid() {
            gameState.grid = Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0));
            updateGridVisual();
        }

        // ==================== BALL PHYSICS WITH BOUNCE ====================
        function createDirectionLine(cannonX, cannonY, angle, power) {
            if (directionLine) directionLine.remove();
            
            const line = document.createElement('div');
            line.className = 'direction-line';
            
            const length = 50 + (power / 100) * 100;
            const rad = angle * Math.PI / 180;
            const endX = cannonX + Math.cos(rad) * length;
            const endY = cannonY + Math.sin(rad) * length;
            
            line.style.position = 'fixed';
            line.style.left = cannonX + 'px';
            line.style.top = cannonY + 'px';
            line.style.width = length + 'px';
            line.style.transform = `rotate(${angle}deg)`;
            line.style.transformOrigin = 'left center';
            line.style.background = `rgba(255,215,0,${0.3 + power / 200})`;
            line.style.height = `${3 + power / 50}px`;
            
            document.body.appendChild(line);
            directionLine = line;
            
            setTimeout(() => {
                if (directionLine) directionLine.remove();
                directionLine = null;
            }, 100);
        }
        
        function shootBall(power, angle, isLeft) {
            if (gameState.bombActive || !gameState.active) return;
            
            // Get cannon position
            const cannonRect = isLeft ? 
                document.getElementById('cannonLeft').getBoundingClientRect() : 
                document.getElementById('cannonRight').getBoundingClientRect();
            
            const startX = cannonRect.left + cannonRect.width / 2;
            const startY = cannonRect.top + cannonRect.height / 2;
            
            // Calculate initial velocity (opposite to drag direction)
            const rad = angle * Math.PI / 180;
            const velocity = 8 + (power / 100) * 12;
            let vx = Math.cos(rad) * velocity * (isLeft ? 1 : -1);
            let vy = Math.sin(rad) * velocity;
            
            // Create ball element
            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.style.backgroundColor = isLeft ? '#ff5555' : '#5555ff';
            ball.style.boxShadow = `0 0 15px ${isLeft ? '#ff5555' : '#5555ff'}`;
            ball.style.left = startX + 'px';
            ball.style.top = startY + 'px';
            document.body.appendChild(ball);
            
            gameState.bombActive = true;
            
            let posX = startX;
            let posY = startY;
            let velX = vx;
            let velY = vy;
            let lastHitCell = null;
            
            function animateBall() {
                // Apply gravity
                velY += CONFIG.GRAVITY;
                
                // Update position
                posX += velX;
                posY += velY;
                
                // Update ball position
                ball.style.left = posX + 'px';
                ball.style.top = posY + 'px';
                
                // Check ground collision (bottom of screen)
                const groundY = window.innerHeight - 100;
                if (posY >= groundY) {
                    posY = groundY;
                    velY = -velY * CONFIG.BOUNCE;
                    velX *= 0.98;
                    
                    // Create bounce effect
                    ball.style.transform = 'scale(1.2)';
                    setTimeout(() => { if (ball) ball.style.transform = ''; }, 100);
                    
                    if (Math.abs(velY) < 1 && Math.abs(velX) < 1) {
                        ball.remove();
                        gameState.bombActive = false;
                        afterShoot();
                        return;
                    }
                }
                
                // Check grid collision
                const gridRect = document.getElementById('gameGrid').getBoundingClientRect();
                if (posX > gridRect.left && posX < gridRect.right && posY > gridRect.top && posY < gridRect.bottom) {
                    const cellWidth = gridRect.width / CONFIG.GRID_SIZE;
                    const cellHeight = gridRect.height / CONFIG.GRID_SIZE;
                    const col = Math.floor((posX - gridRect.left) / cellWidth);
                    const row = Math.floor((posY - gridRect.top) / cellHeight);
                    
                    if (row >= 0 && row < CONFIG.GRID_SIZE && col >= 0 && col < CONFIG.GRID_SIZE) {
                        const cellKey = `${row},${col}`;
                        if (lastHitCell !== cellKey && gameState.grid[row][col] === 0) {
                            gameState.grid[row][col] = gameState.currentPlayer;
                            updateGridVisual();
                            lastHitCell = cellKey;
                            
                            // Bounce effect on hit
                            velX *= 0.95;
                            velY *= -0.5;
                        }
                    }
                }
                
                // Check boundaries (left/right)
                if (posX < 0 || posX > window.innerWidth) {
                    ball.remove();
                    gameState.bombActive = false;
                    afterShoot();
                    return;
                }
                
                // Continue animation
                if (gameState.bombActive) {
                    requestAnimationFrame(animateBall);
                }
            }
            
            requestAnimationFrame(animateBall);
        }
        
        function afterShoot() {
            if (gameState.currentPlayer === 1) gameState.player1Throws--;
            else gameState.player2Throws--;
            
            if (gameState.player1Throws === 0 && gameState.player2Throws === 0) {
                endGame();
            } else {
                switchPlayer();
            }
            saveGameState();
        }
        
        function switchPlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            const turnText = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
            document.getElementById('currentTurn').textContent = turnText;
            startTimer();
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            let timeLeft = CONFIG.THROW_TIME;
            document.getElementById('throwTimer').textContent = `${timeLeft}s`;
            
            timerInterval = setInterval(() => {
                if (!gameState.active) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                document.getElementById('throwTimer').textContent = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (gameState.currentPlayer === 1) gameState.player1Throws--;
                    else gameState.player2Throws--;
                    
                    if (gameState.player1Throws === 0 && gameState.player2Throws === 0) {
                        endGame();
                    } else {
                        switchPlayer();
                    }
                    saveGameState();
                }
            }, 1000);
        }
        
        async function saveGameState() {
            if (!gameState.roomId) return;
            await db.ref(`rooms/${gameState.roomId}/game`).set({
                grid: gameState.grid,
                currentPlayer: gameState.currentPlayer,
                player1Throws: gameState.player1Throws,
                player2Throws: gameState.player2Throws,
                timestamp: Date.now()
            });
        }
        
        async function endGame() {
            gameState.active = false;
            if (timerInterval) clearInterval(timerInterval);
            if (gameListener) gameListener();
            
            let player1Score = 0, player2Score = 0;
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    if (gameState.grid[row][col] === 1) player1Score++;
                    if (gameState.grid[row][col] === 2) player2Score++;
                }
            }
            
            const isPlayer1 = gameState.roomData?.player1?.id === currentUser.id;
            let resultMessage = '';
            let won = false;
            
            if (player1Score > player2Score) {
                if (isPlayer1) {
                    const winAmount = CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER;
                    currentUser.balance += winAmount;
                    await saveUserToDB();
                    resultMessage = `🎉 فزت! +$${winAmount.toFixed(2)} (${player1Score} - ${player2Score})`;
                    won = true;
                } else {
                    resultMessage = `🔴 فاز اللاعب الأول (${player1Score} - ${player2Score})`;
                }
            } else if (player2Score > player1Score) {
                if (!isPlayer1) {
                    const winAmount = CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER;
                    currentUser.balance += winAmount;
                    await saveUserToDB();
                    resultMessage = `🎉 فزت! +$${winAmount.toFixed(2)} (${player1Score} - ${player2Score})`;
                    won = true;
                } else {
                    resultMessage = `🔵 فاز اللاعب الثاني (${player1Score} - ${player2Score})`;
                }
            } else {
                currentUser.balance += CONFIG.BET_AMOUNT;
                await saveUserToDB();
                resultMessage = `🤝 تعادل! تم إعادة $${CONFIG.BET_AMOUNT}`;
            }
            
            document.getElementById('resultTitle').textContent = won ? '🏆 فوز! 🏆' : 'انتهت الجولة';
            document.getElementById('resultMessage').innerHTML = resultMessage;
            document.getElementById('resultModal').classList.add('active');
            
            if (gameState.roomId) {
                await db.ref(`rooms/${gameState.roomId}`).remove();
            }
            
            currentUser.inGame = false;
            currentUser.roomId = null;
            await saveUserToDB();
            
            showLobby();
        }

        // ==================== ROOM FUNCTIONS ====================
        window.createRoom = async function() {
            console.log('createRoom called');
            
            if (currentUser.inGame) {
                showToast('⚠️ أنت بالفعل في لعبة!', true);
                return;
            }
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                showToast(`⚠️ رصيدك غير كافي! تحتاج $${CONFIG.BET_AMOUNT}`, true);
                return;
            }
            
            const btn = document.getElementById('createRoomBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> جاري الإنشاء...';
            
            try {
                const roomId = Date.now().toString();
                const roomData = {
                    id: roomId,
                    player1: { id: currentUser.id, name: currentUser.name },
                    player2: null,
                    status: 'waiting',
                    bet: CONFIG.BET_AMOUNT,
                    createdAt: Date.now()
                };
                
                await db.ref(`rooms/${roomId}`).set(roomData);
                console.log('Room created:', roomId);
                
                currentUser.inGame = true;
                currentUser.roomId = roomId;
                await saveUserToDB();
                
                showToast('✅ تم إنشاء الغرفة! انتظر لاعب آخر...');
                enterWaitingRoom(roomId);
                
            } catch (error) {
                console.error('Create error:', error);
                showToast('❌ فشل إنشاء الغرفة', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '➕ إنشاء غرفة جديدة';
            }
        };
        
        window.joinRoom = async function(roomId) {
            console.log('joinRoom called:', roomId);
            
            if (currentUser.inGame && currentUser.roomId !== roomId) {
                showToast('⚠️ أنت بالفعل في لعبة!', true);
                return;
            }
            
            const snap = await db.ref(`rooms/${roomId}`).once('value');
            const room = snap.val();
            
            if (!room) {
                showToast('❌ الغرفة غير موجودة', true);
                loadRooms();
                return;
            }
            
            if (room.status === 'finished') {
                showToast('❌ انتهت هذه الغرفة', true);
                loadRooms();
                return;
            }
            
            if (room.player1?.id === currentUser.id) {
                currentUser.inGame = true;
                currentUser.roomId = roomId;
                await saveUserToDB();
                enterWaitingRoom(roomId);
                return;
            }
            
            if (!room.player2 && room.status === 'waiting') {
                if (currentUser.balance < CONFIG.BET_AMOUNT) {
                    showToast(`⚠️ رصيد غير كافي!`, true);
                    return;
                }
                
                currentUser.balance -= CONFIG.BET_AMOUNT;
                await saveUserToDB();
                
                await db.ref(`rooms/${roomId}`).update({
                    player2: { id: currentUser.id, name: currentUser.name },
                    status: 'full'
                });
                
                currentUser.inGame = true;
                currentUser.roomId = roomId;
                await saveUserToDB();
                
                const updatedRoom = { ...room, player2: { id: currentUser.id, name: currentUser.name }, status: 'full' };
                startGame(roomId, updatedRoom);
            } else {
                showToast('❌ الغرفة ممتلئة', true);
            }
        };
        
        function enterWaitingRoom(roomId) {
            document.getElementById('roomsGrid').style.display = 'none';
            document.getElementById('createRoomBtn').style.display = 'none';
            const waitingMsg = document.getElementById('waitingMessage');
            waitingMsg.classList.add('active');
            document.getElementById('waitingRoomCode').textContent = `غرفة: ${roomId.slice(-4)}`;
            document.getElementById('activeGameBadge').classList.add('visible');
            document.getElementById('activeGameBadge').innerHTML = `🎮 غرفة: ${roomId.slice(-4)}`;
            
            if (roomListener) roomListener();
            
            const roomRef = db.ref(`rooms/${roomId}`);
            roomListener = roomRef.on('value', async (snap) => {
                const room = snap.val();
                if (room && room.status === 'full') {
                    roomRef.off();
                    startGame(roomId, room);
                } else if (!room) {
                    roomRef.off();
                    showToast('❌ تم إلغاء الغرفة', true);
                    exitGame();
                }
            });
        }
        
        async function startGame(roomId, room) {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('waitingMessage').classList.remove('active');
            
            const gameArea = document.getElementById('gameArea');
            gameArea.classList.add('active');
            
            gameState = {
                active: true,
                roomId: roomId,
                roomData: room,
                grid: Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0)),
                currentPlayer: 1,
                player1Throws: CONFIG.THROWS_PER_PLAYER,
                player2Throws: CONFIG.THROWS_PER_PLAYER,
                dragging: false,
                power: 0,
                bombActive: false,
                dragStartX: 0,
                dragStartY: 0,
                directionAngle: 0,
                ballAnimation: null
            };
            
            createGridVisual();
            resetGrid();
            
            document.getElementById('currentTurn').textContent = '🔴 دور اللاعب الأول';
            startTimer();
            document.getElementById('activeGameBadge').classList.add('visible');
            document.getElementById('activeGameBadge').innerHTML = '🎮 جولة نشطة';
            
            const saved = await db.ref(`rooms/${roomId}/game`).once('value');
            if (saved.exists()) {
                const data = saved.val();
                if (data.grid) gameState.grid = data.grid;
                gameState.currentPlayer = data.currentPlayer || 1;
                gameState.player1Throws = data.player1Throws || CONFIG.THROWS_PER_PLAYER;
                gameState.player2Throws = data.player2Throws || CONFIG.THROWS_PER_PLAYER;
                updateGridVisual();
                document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
            }
            
            if (gameListener) gameListener();
            gameListener = db.ref(`rooms/${roomId}/game`).on('value', (snap) => {
                const data = snap.val();
                if (data && gameState.active && !gameState.bombActive) {
                    if (data.grid) {
                        for (let r = 0; r < CONFIG.GRID_SIZE; r++) {
                            for (let c = 0; c < CONFIG.GRID_SIZE; c++) {
                                if (data.grid[r]?.[c] !== gameState.grid[r]?.[c]) {
                                    gameState.grid[r][c] = data.grid[r][c];
                                }
                            }
                        }
                        updateGridVisual();
                    }
                    gameState.currentPlayer = data.currentPlayer;
                    gameState.player1Throws = data.player1Throws;
                    gameState.player2Throws = data.player2Throws;
                    document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
                }
            });
            
            setupDragEvents();
        }
        
        function setupDragEvents() {
            const leftCannon = document.getElementById('cannonLeft');
            const rightCannon = document.getElementById('cannonRight');
            const powerBar = document.getElementById('powerBar');
            
            let dragActive = false;
            let startX = 0, startY = 0;
            let currentCannon = null;
            let isLeftCannon = false;
            
            const onDragStart = (e, isLeft) => {
                if (!gameState.active || gameState.bombActive) return;
                const localPlayer = (gameState.roomData?.player1?.id === currentUser.id) ? 1 : 2;
                if (gameState.currentPlayer !== localPlayer) {
                    showToast('⏳ ليس دورك الآن!', true);
                    return;
                }
                if ((isLeft && gameState.currentPlayer !== 1) || (!isLeft && gameState.currentPlayer !== 2)) {
                    showToast('⏳ هذا ليس مدفعك!', true);
                    return;
                }
                
                dragActive = true;
                startX = e.clientX;
                startY = e.clientY;
                isLeftCannon = isLeft;
                currentCannon = isLeft ? leftCannon : rightCannon;
                gameState.power = 0;
                gameState.directionAngle = 0;
                powerBar.style.width = '0%';
                
                currentCannon.style.cursor = 'grabbing';
                e.preventDefault();
            };
            
            const onDragMove = (e) => {
                if (!dragActive || !gameState.active) return;
                
                const dx = startX - e.clientX;
                const dy = startY - e.clientY;
                const distance = Math.min(150, Math.sqrt(dx * dx + dy * dy));
                const power = Math.min(100, distance / 1.5);
                
                gameState.power = power;
                powerBar.style.width = power + '%';
                
                // Calculate angle (opposite direction to drag)
                let angle = Math.atan2(dy, dx) * 180 / Math.PI;
                if (isLeftCannon) {
                    angle = Math.min(80, Math.max(-80, angle));
                } else {
                    angle = Math.min(80, Math.max(-80, -angle));
                }
                gameState.directionAngle = angle;
                
                // Rotate cannon
                const cannonIcon = currentCannon.querySelector('.cannon-icon');
                if (isLeftCannon) {
                    cannonIcon.style.transform = `rotate(${-20 + angle * 0.3}deg)`;
                } else {
                    cannonIcon.style.transform = `rotate(${20 - angle * 0.3}deg) scaleX(-1)`;
                }
                
                // Show direction line
                const cannonRect = currentCannon.getBoundingClientRect();
                const cannonX = cannonRect.left + cannonRect.width / 2;
                const cannonY = cannonRect.top + cannonRect.height / 2;
                createDirectionLine(cannonX, cannonY, isLeftCannon ? angle : -angle, power);
            };
            
            const onDragEnd = () => {
                if (!dragActive) return;
                dragActive = false;
                
                if (currentCannon) {
                    const cannonIcon = currentCannon.querySelector('.cannon-icon');
                    if (isLeftCannon) {
                        cannonIcon.style.transform = 'rotate(-20deg)';
                    } else {
                        cannonIcon.style.transform = 'rotate(20deg) scaleX(-1)';
                    }
                    currentCannon.style.cursor = 'grab';
                }
                
                if (gameState.power > 10 && gameState.active) {
                    shootBall(gameState.power, gameState.directionAngle, isLeftCannon);
                }
                
                gameState.power = 0;
                powerBar.style.width = '0%';
                if (directionLine) {
                    directionLine.remove();
                    directionLine = null;
                }
            };
            
            leftCannon.addEventListener('mousedown', (e) => onDragStart(e, true));
            rightCannon.addEventListener('mousedown', (e) => onDragStart(e, false));
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', onDragEnd);
            
            // Touch events
            leftCannon.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onDragStart(e.touches[0], true);
            });
            rightCannon.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onDragStart(e.touches[0], false);
            });
            document.addEventListener('touchmove', (e) => {
                e.preventDefault();
                onDragMove(e.touches[0]);
            });
            document.addEventListener('touchend', onDragEnd);
        }
        
        function showLobby() {
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('roomsGrid').style.display = 'grid';
            document.getElementById('createRoomBtn').style.display = 'block';
            document.getElementById('waitingMessage').classList.remove('active');
            document.getElementById('activeGameBadge').classList.remove('visible');
            document.getElementById('currentTurn').textContent = '⏳ انتظار...';
            document.getElementById('throwTimer').textContent = '--s';
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('powerBar').style.width = '0%';
            
            currentUser.inGame = false;
            currentUser.roomId = null;
            gameState.active = false;
            if (timerInterval) clearInterval(timerInterval);
            
            if (roomListener) roomListener();
            if (gameListener) gameListener();
            roomListener = null;
            gameListener = null;
            
            loadRooms();
        }
        
        window.exitGame = async function() {
            if (timerInterval) clearInterval(timerInterval);
            gameState.active = false;
            
            if (gameState.roomId) {
                await db.ref(`rooms/${gameState.roomId}`).remove();
            }
            
            if (roomListener) roomListener();
            if (gameListener) gameListener();
            roomListener = null;
            gameListener = null;
            
            currentUser.inGame = false;
            currentUser.roomId = null;
            await saveUserToDB();
            
            showLobby();
        };
        
        window.closeResult = function() {
            document.getElementById('resultModal').classList.remove('active');
            showLobby();
        };
        
        function loadRooms() {
            const roomsRef = db.ref('rooms');
            roomsRef.off('value');
            
            roomsRef.on('value', (snap) => {
                const rooms = snap.val() || {};
                const grid = document.getElementById('roomsGrid');
                grid.innerHTML = '';
                
                const availableRooms = Object.values(rooms).filter(r => r.status === 'waiting');
                
                if (availableRooms.length === 0) {
                    grid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:40px;">
                            <div style="font-size:3rem; margin-bottom:10px;">✨</div>
                            <div style="color:#888;">لا توجد غرف متاحة</div>
                            <div style="color:#666; font-size:0.8rem;">أنشئ غرفة جديدة وانتظر لاعباً آخر</div>
                        </div>
                    `;
                } else {
                    availableRooms.forEach(room => {
                        const isOwnRoom = room.player1?.id === currentUser.id;
                        const card = document.createElement('div');
                        card.className = 'room-card';
                        card.innerHTML = `
                            <div class="room-number">🏠 غرفة ${room.id.slice(-4)}</div>
                            <div class="room-status">${isOwnRoom ? '🟡 غرفتك' : '🟢 متاحة'}</div>
                            <div class="room-bet">💰 رهان: $${room.bet}</div>
                            <div class="room-creator">👤 ${room.player1?.name}</div>
                        `;
                        card.onclick = () => window.joinRoom(room.id);
                        grid.appendChild(card);
                    });
                }
            });
        }
        
        async function init() {
            await loadUserFromDB();
            
            if (currentUser.inGame && currentUser.roomId) {
                const roomSnap = await db.ref(`rooms/${currentUser.roomId}`).once('value');
                if (roomSnap.exists()) {
                    window.joinRoom(currentUser.roomId);
                } else {
                    currentUser.inGame = false;
                    currentUser.roomId = null;
                    await saveUserToDB();
                    showLobby();
                }
            } else {
                showLobby();
            }
        }
        
        window.createRoom = window.createRoom;
        window.joinRoom = window.joinRoom;
        window.exitGame = window.exitGame;
        window.closeResult = window.closeResult;
        
        init();
    </script>
</body>
</html>

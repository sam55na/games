<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>عجلة الحظ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .stats-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            backdrop-filter: blur(10px);
        }

        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 8px 12px;
            min-width: 100px;
        }

        .stat-label {
            font-size: 11px;
            color: #aaa;
            display: block;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
            color: #ffd700;
            display: block;
        }

        .wheel-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: auto;
            background: white;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s;
        }

        canvas:active {
            transform: scale(0.98);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff4444;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
            z-index: 10;
        }

        .spin-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #1a1a2e;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            margin-top: 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-family: inherit;
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .info {
            margin-top: 20px;
            color: white;
            font-size: 1.1rem;
        }

        .result {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
            color: #ffd700;
            font-weight: bold;
        }

        .spins-count {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 عجلة الحظ 🎡</h1>
        
        <!-- عرض إحصائيات المستخدم -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <span class="stat-label">🆔 معرف اللاعب</span>
                <span class="stat-value" id="userId">-</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">💰 شحن (10 أيام)</span>
                <span class="stat-value" id="totalRecharge">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">💸 سحب (10 أيام)</span>
                <span class="stat-value" id="totalWithdraw">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">🎲 عدد التدويرات</span>
                <span class="stat-value" id="spinCount">0</span>
            </div>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
        </div>
        
        <button class="spin-btn" id="spinBtn">🔄 دوران</button>
        
        <div class="info">
            <p>✨ اضغط على الزر أو على العجلة للدوران ✨</p>
        </div>
        
        <div class="result" id="result"></div>
        <div class="spins-count" id="spinsInfo"></div>
    </div>

    <script>
        // ================ استلام البيانات من الرابط ================
        const urlParams = new URLSearchParams(window.location.search);
        
        // المتغيرات الجديدة
        const USER_ID = urlParams.get('user_id') || '0';
        const TOTAL_RECHARGE_10_DAYS = parseFloat(urlParams.get('total_recharge')) || 0;
        const TOTAL_WITHDRAW_10_DAYS = parseFloat(urlParams.get('total_withdraw')) || 0;
        let PREVIOUS_SPINS = parseInt(urlParams.get('spin_count')) || 0;
        
        // تخزين قيمة التدوير الحالية
        let currentSpinNumber = PREVIOUS_SPINS + 1;
        
        // عرض البيانات في الواجهة
        document.getElementById('userId').textContent = USER_ID.substring(0, 12) + (USER_ID.length > 12 ? '...' : '');
        document.getElementById('totalRecharge').textContent = TOTAL_RECHARGE_10_DAYS.toLocaleString() + ' ل.س';
        document.getElementById('totalWithdraw').textContent = TOTAL_WITHDRAW_10_DAYS.toLocaleString() + ' ل.س';
        document.getElementById('spinCount').textContent = PREVIOUS_SPINS;
        
        // عرض معلومات إضافية
        if (PREVIOUS_SPINS > 0) {
            document.getElementById('spinsInfo').innerHTML = `🎲 سبق أن قمت بالتدوير ${PREVIOUS_SPINS} مرة`;
        } else {
            document.getElementById('spinsInfo').innerHTML = `🎲 هذه هي المرة الأولى لك!`;
        }

        // تهيئة Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.enableClosingConfirmation();
        }

        // ================ الجوائز ================
        const prizes = [
            { name: "💝 50", value: 50, type: "amount", color: "#ff6b6b", angle: 0 },
            { name: "🎁 25%", value: 25, type: "percent", color: "#4ecdc4", angle: 45 },
            { name: "💰 100", value: 100, type: "amount", color: "#ffe66d", angle: 90 },
            { name: "🎉 10%", value: 10, type: "percent", color: "#ff6b6b", angle: 135 },
            { name: "💎 500", value: 500, type: "amount", color: "#a8e6cf", angle: 180 },
            { name: "⭐ 50%", value: 50, type: "percent", color: "#ffd3b6", angle: 225 },
            { name: "🏆 1000", value: 1000, type: "amount", color: "#ffaaa5", angle: 270 },
            { name: "🍀 5%", value: 5, type: "percent", color: "#c7f9cc", angle: 315 }
        ];

        const PI = Math.PI;
        const TAU = PI * 2;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');

        let currentAngle = 0;
        let spinning = false;
        let animationId = null;

        // رسم العجلة
        function drawWheel() {
            const size = canvas.width;
            const center = size / 2;
            const radius = size / 2 - 10;
            const anglePerPrize = TAU / prizes.length;

            ctx.clearRect(0, 0, size, size);

            for (let i = 0; i < prizes.length; i++) {
                const start = currentAngle + i * anglePerPrize;
                const end = start + anglePerPrize;
                const prize = prizes[i];

                // رسم القطعة
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, start, end);
                ctx.fillStyle = prize.color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                // رسم النص
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(start + anglePerPrize / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "bold 20px 'Segoe UI'";
                ctx.fillStyle = "#1a1a2e";
                ctx.shadowBlur = 0;
                ctx.fillText(prize.name, radius * 0.65, 10);
                ctx.restore();
            }

            // رسم الدائرة الداخلية
            ctx.beginPath();
            ctx.arc(center, center, 40, 0, TAU);
            ctx.fillStyle = "#ffd700";
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = "#1a1a2e";
            ctx.font = "bold 30px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🎡", center, center);
        }

        // الحصول على الجائزة بناءً على الزاوية
        function getPrize(angle) {
            const anglePerPrize = TAU / prizes.length;
            let normalized = angle % TAU;
            if (normalized < 0) normalized += TAU;
            
            // المؤشر في الأعلى (270 درجة)
            const pointerAngle = (TAU * 3/4);
            let diff = (pointerAngle - normalized + TAU) % TAU;
            let index = Math.floor(diff / anglePerPrize);
            index = (index + prizes.length) % prizes.length;
            
            return prizes[index];
        }

        // إرسال النتيجة إلى البوت
        function sendResult(prize) {
            let prizeValue = prize.value;
            let actualAmount = 0;
            
            // تحويل القيم النقدية
            if (prize.type === "amount") {
                if (prize.name.includes("50")) actualAmount = 5000;
                else if (prize.name.includes("100")) actualAmount = 10000;
                else if (prize.name.includes("500")) actualAmount = 50000;
                else if (prize.name.includes("1000")) actualAmount = 100000;
                else actualAmount = prize.value;
            }
            
            // بناء البيانات المرسلة إلى البوت
            const prizeData = {
                user_id: USER_ID,
                prize: prize.name,
                prize_value: prizeValue,
                prize_type: prize.type,
                actual_amount: actualAmount,
                spin_number: currentSpinNumber,
                previous_spins: PREVIOUS_SPINS,
                total_recharge_last_10_days: TOTAL_RECHARGE_10_DAYS,
                total_withdraw_last_10_days: TOTAL_WITHDRAW_10_DAYS,
                timestamp: new Date().toISOString()
            };
            
            // عرض النتيجة للمستخدم
            let resultText = `🎉 لقد ربحت: ${prize.name} 🎉\n`;
            if (prize.type === "amount") {
                resultText += `💰 القيمة: ${actualAmount.toLocaleString()} ل.س\n`;
                resultText += `✨ هذه هي التدويرة رقم ${currentSpinNumber}`;
            } else {
                resultText += `🎁 بونص: ${prize.value}% على الشحن القادم\n`;
                resultText += `✨ هذه هي التدويرة رقم ${currentSpinNumber}`;
            }
            
            // إضافة معلومات عن إحصائيات الـ 10 أيام
            resultText += `\n📊 إحصائياتك (آخر 10 أيام):\n`;
            resultText += `💰 شحن: ${TOTAL_RECHARGE_10_DAYS.toLocaleString()} ل.س\n`;
            resultText += `💸 سحب: ${TOTAL_WITHDRAW_10_DAYS.toLocaleString()} ل.س`;
            
            resultDiv.innerHTML = resultText;
            
            // تحديث عدد التدويرات في الواجهة
            PREVIOUS_SPINS = currentSpinNumber;
            document.getElementById('spinCount').textContent = PREVIOUS_SPINS;
            currentSpinNumber++;
            
            // إرسال البيانات إلى البوت عبر sendData()
            if (tg) {
                console.log("إرسال البيانات:", prizeData);
                tg.sendData(JSON.stringify(prizeData));
                
                // إغلاق الويب آب بعد 3 ثواني
                setTimeout(() => {
                    tg.close();
                }, 3000);
            } else {
                // للاختبار في المتصفح العادي
                console.log("بيانات الجائزة:", prizeData);
                alert("تم الربح: " + prize.name + "\n(هذا للاختبار فقط، في التليغرام سيتم إضافة الرصيد تلقائياً)\n\nالبيانات المرسلة:\n" + JSON.stringify(prizeData, null, 2));
            }
        }

        // دوران العجلة
        function spinWheel() {
            if (spinning) return;
            
            spinning = true;
            spinBtn.disabled = true;
            resultDiv.innerHTML = "🔄 جاري الدوران... 🔄";
            
            const spinAngle = TAU * (5 + Math.random() * 5); // 5-10 لفات
            const targetAngle = currentAngle + spinAngle;
            const startAngle = currentAngle;
            const startTime = performance.now();
            const duration = 2000; // 2 ثانية
            
            function animateSpin(now) {
                const elapsed = now - startTime;
                const progress = Math.min(1, elapsed / duration);
                
                // منحنى تباطؤ
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentAngle = startAngle + (targetAngle - startAngle) * easeOut;
                drawWheel();
                
                if (progress < 1) {
                    animationId = requestAnimationFrame(animateSpin);
                } else {
                    currentAngle = targetAngle % TAU;
                    drawWheel();
                    
                    const prize = getPrize(currentAngle);
                    sendResult(prize);
                    
                    spinning = false;
                    spinBtn.disabled = false;
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animateSpin);
        }

        // الأحداث
        spinBtn.addEventListener('click', spinWheel);
        canvas.addEventListener('click', spinWheel);
        
        // رسم العجلة لأول مرة
        drawWheel();
    </script>
</body>
</html>

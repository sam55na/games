<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB 3D | مدفع المربعات الثلاثي الأبعاد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Cairo', sans-serif;
        }

        /* واجهة المستخدم */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .game-header {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6));
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffd700;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            pointer-events: auto;
        }

        .balance-display {
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid #ffd700;
        }

        .balance-display span {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .current-turn {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 50px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid #ffd700;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        .throw-timer {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff4444;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ff4444;
        }

        .power-bar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 5px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ffd700;
        }

        .power-bar {
            height: 25px;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            border-radius: 15px;
            width: 0%;
            transition: width 0.02s linear;
        }

        .power-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* غرفة الانتظار */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-content {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 600px;
            width: 90%;
        }

        .waiting-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .room-card {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .room-card:hover {
            transform: scale(1.05);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .room-number {
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: bold;
        }

        .room-status {
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .room-status.available { color: #00ff00; }
        .room-status.occupied { color: #ff4444; }

        .create-room-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .create-room-btn:hover {
            transform: scale(1.05);
            background: #ffaa00;
        }

        .countdown-display {
            font-size: 3rem;
            color: #ffd700;
            margin: 20px 0;
            display: none;
        }

        .countdown-display.active {
            display: block;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* نافذة النتيجة */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .result-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .result-content {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border: 3px solid #ffd700;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            min-width: 300px;
        }

        .result-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .result-message {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .result-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid #ffd700;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .current-turn { font-size: 0.9rem; top: 70px; white-space: nowrap; }
            .throw-timer { font-size: 1rem; top: 70px; padding: 8px 15px; }
            .power-bar-container { width: 250px; bottom: 20px; }
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="game-header">
            <div>💣 BOOMB 3D</div>
            <div class="balance-display">💰 الرصيد: $<span id="mainBalance">0</span></div>
        </div>
    </div>

    <div class="current-turn" id="currentTurn">انتظر...</div>
    <div class="throw-timer" id="throwTimer">15s</div>
    <div class="power-bar-container">
        <div class="power-label">⚡ قوة الرمية</div>
        <div class="power-bar" id="powerBar"></div>
    </div>
    <button class="back-btn" id="backBtn" onclick="backToRooms()">🏠 العودة للغرف</button>

    <!-- غرفة الانتظار -->
    <div class="waiting-room" id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">🎮 غرف اللعب 3D</div>
            <div class="rooms-grid" id="roomsGrid"></div>
            <button class="create-room-btn" onclick="createRoom()">➕ إنشاء غرفة جديدة</button>
            <div class="countdown-display" id="countdownDisplay"></div>
        </div>
    </div>

    <!-- نافذة النتيجة -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="result-btn" onclick="closeResult()">موافق</button>
        </div>
    </div>

    <!-- Three.js Libraries -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ==================== Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database(app);

        // ==================== إعدادات اللعبة ====================
        const CONFIG = {
            BET_AMOUNT: 10,
            GRID_SIZE: 10,
            THROW_TIME: 15,
            THROWS_PER_PLAYER: 3,
            WIN_MULTIPLIER: 1.8
        };

        // ==================== بيانات المستخدم ====================
        let currentUser = {
            id: new URLSearchParams(window.location.search).get('user_id') || 'user_' + Math.random().toString(36).substr(2, 8),
            name: new URLSearchParams(window.location.search).get('username') || 'زائر',
            balance: 100
        };

        // ==================== حالة اللعبة ====================
        let gameState = {
            currentRoom: null,
            gridColors: Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0)),
            currentPlayer: 1,
            player1Throws: CONFIG.THROWS_PER_PLAYER,
            player2Throws: CONFIG.THROWS_PER_PLAYER,
            gameActive: false,
            isDragging: false,
            power: 0,
            dragStart: { x: 0, y: 0 },
            bombActive: false,
            currentBomb: null,
            cameraShake: 0,
            followCamera: false,
            bombFollowCamera: false
        };

        // ==================== Three.js المتغيرات ====================
        let scene, camera, renderer, labelRenderer;
        let gridGroup, cells = [];
        let leftCannon, rightCannon, leftBarrel, rightBarrel;
        let bombMesh = null;
        let animationId = null;

        // ==================== تهيئة المشهد ثلاثي الأبعاد ====================
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.008);

            // الكاميرا
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(8, 6, 12);
            camera.lookAt(0, 0, 0);

            // الـ Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // CSS2D Renderer للنصوص
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);

            // الإضاءة
            setupLighting();

            // الأرضية
            setupGround();

            // إنشاء الشبكة
            create3DGrid();

            // إنشاء المدافع
            createCannons();

            // إضافة تأثيرات جوية
            addAtmosphere();

            // التحكم بالكاميرا
            setupControls();

            // بدء الرسوم المتحركة
            animate();
        }

        function setupLighting() {
            // إضاءة محيطية
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);

            // إضاءة رئيسية
            const mainLight = new THREE.DirectionalLight(0xfff5e6, 1);
            mainLight.position.set(5, 10, 7);
            mainLight.castShadow = true;
            mainLight.receiveShadow = true;
            mainLight.shadow.mapSize.width = 1024;
            mainLight.shadow.mapSize.height = 1024;
            scene.add(mainLight);

            // إضاءة خلفية
            const backLight = new THREE.PointLight(0x4466ff, 0.5);
            backLight.position.set(-3, 5, -5);
            scene.add(backLight);

            // إضاءة ملونة للمدافع
            const redLight = new THREE.PointLight(0xff3333, 0.8);
            redLight.position.set(-4, 1, 2);
            scene.add(redLight);

            const blueLight = new THREE.PointLight(0x3333ff, 0.8);
            blueLight.position.set(4, 1, 2);
            scene.add(blueLight);

            // إضاءة متحركة للجو
            const movingLight = new THREE.PointLight(0xffaa44, 0.5);
            movingLight.position.set(0, 3, 0);
            scene.add(movingLight);
        }

        function setupGround() {
            const gridHelper = new THREE.GridHelper(20, 20, 0xffd700, 0x3366ff);
            gridHelper.position.y = -1.5;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);

            // أرضية شفافة
            const groundPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(18, 12),
                new THREE.ShadowMaterial({ opacity: 0.5, color: 0x000000, transparent: true })
            );
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = -1.4;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);
        }

        function create3DGrid() {
            gridGroup = new THREE.Group();
            const cellSize = 0.8;
            const spacing = 0.02;
            const startX = -4.5;
            const startZ = -4.5;

            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                cells[row] = [];
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    const x = startX + col * (cellSize + spacing);
                    const z = startZ + row * (cellSize + spacing);
                    
                    // المربع الأساسي
                    const geometry = new THREE.BoxGeometry(cellSize, 0.1, cellSize);
                    const material = new THREE.MeshStandardMaterial({
                        color: 0x3a3a4a,
                        metalness: 0.3,
                        roughness: 0.4,
                        emissive: 0x111111
                    });
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(x, 0, z);
                    cube.castShadow = true;
                    cube.receiveShadow = true;
                    cube.userData = { row, col, color: 0 };
                    
                    // إضافة حواف ذهبية
                    const edgesGeo = new THREE.EdgesGeometry(geometry);
                    const edgesMat = new THREE.LineBasicMaterial({ color: 0xffd700 });
                    const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
                    cube.add(wireframe);
                    
                    gridGroup.add(cube);
                    cells[row][col] = cube;
                }
            }
            scene.add(gridGroup);
        }

        function updateCellColor(row, col, player) {
            if (!cells[row] || !cells[row][col]) return;
            
            const cell = cells[row][col];
            const color = player === 1 ? 0xff4444 : 0x4444ff;
            const emissive = player === 1 ? 0x441111 : 0x111144;
            
            cell.material.color.setHex(color);
            cell.material.emissive.setHex(emissive);
            cell.material.emissiveIntensity = 0.5;
            cell.userData.color = player;
            
            // تأثير نبض عند التلوين
            cell.scale.set(1.1, 1.1, 1.1);
            setTimeout(() => {
                if (cell) cell.scale.set(1, 1, 1);
            }, 150);
        }

        function createCannons() {
            // المدفع الأيسر (أحمر)
            leftCannon = new THREE.Group();
            const leftBase = new THREE.Mesh(
                new THREE.CylinderGeometry(0.7, 0.9, 0.5, 32),
                new THREE.MeshStandardMaterial({ color: 0xcc4422, metalness: 0.7, roughness: 0.3, emissive: 0x331100 })
            );
            leftBase.castShadow = true;
            leftBase.position.y = 0.2;
            leftCannon.add(leftBase);
            
            leftBarrel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.25, 0.35, 1.2, 16),
                new THREE.MeshStandardMaterial({ color: 0xff6644, metalness: 0.8, emissive: 0x441100 })
            );
            leftBarrel.castShadow = true;
            leftBarrel.position.set(0.6, 0.3, 0);
            leftBarrel.rotation.z = 0;
            leftCannon.add(leftBarrel);
            
            leftCannon.position.set(-5.5, -0.8, 0);
            scene.add(leftCannon);
            
            // المدفع الأيمن (أزرق)
            rightCannon = new THREE.Group();
            const rightBase = new THREE.Mesh(
                new THREE.CylinderGeometry(0.7, 0.9, 0.5, 32),
                new THREE.MeshStandardMaterial({ color: 0x2244cc, metalness: 0.7, roughness: 0.3, emissive: 0x001133 })
            );
            rightBase.castShadow = true;
            rightBase.position.y = 0.2;
            rightCannon.add(rightBase);
            
            rightBarrel = new THREE.Mesh(
                new THREE.CylinderGeometry(0.25, 0.35, 1.2, 16),
                new THREE.MeshStandardMaterial({ color: 0x4466ff, metalness: 0.8, emissive: 0x001144 })
            );
            rightBarrel.castShadow = true;
            rightBarrel.position.set(-0.6, 0.3, 0);
            rightBarrel.rotation.z = 0;
            rightCannon.add(rightBarrel);
            
            rightCannon.position.set(5.5, -0.8, 0);
            scene.add(rightCannon);
            
            // إضافة كرات نارية حول المدافع
            addMuzzleFlash();
        }
        
        function addMuzzleFlash() {
            const leftFlash = new THREE.PointLight(0xff4400, 0, 2);
            leftFlash.position.set(-5.2, -0.3, 0.8);
            scene.add(leftFlash);
            
            const rightFlash = new THREE.PointLight(0x4488ff, 0, 2);
            rightFlash.position.set(5.2, -0.3, 0.8);
            scene.add(rightFlash);
            
            window.muzzleFlashes = { left: leftFlash, right: rightFlash };
        }

        function addAtmosphere() {
            // جزيئات متطايرة
            const particleCount = 800;
            const particlesGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 40;
                positions[i*3+1] = Math.random() * 8;
                positions[i*3+2] = (Math.random() - 0.5) * 20;
            }
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particlesMaterial = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.05, transparent: true, opacity: 0.4 });
            const particles = new THREE.Points(particlesGeometry, particlesMaterial);
            scene.add(particles);
        }

        function setupControls() {
            // إضافة مستمعي السحب على canvas
            const canvas = renderer.domElement;
            canvas.style.cursor = 'grab';
            
            let dragActive = false;
            
            canvas.addEventListener('mousedown', (e) => {
                if (!gameState.gameActive || gameState.bombActive || gameState.currentPlayer !== getLocalPlayerNumber()) return;
                dragActive = true;
                gameState.dragStart = { x: e.clientX, y: e.clientY };
                gameState.power = 0;
                document.getElementById('powerBar').style.width = '0%';
                canvas.style.cursor = 'grabbing';
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (!dragActive || !gameState.gameActive || gameState.bombActive) return;
                const deltaX = gameState.dragStart.x - e.clientX;
                const deltaY = gameState.dragStart.y - e.clientY;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                gameState.power = Math.min(100, distance / 2);
                document.getElementById('powerBar').style.width = gameState.power + '%';
                
                // تدوير المدفع حسب القوة والاتجاه المعاكس
                const angle = Math.min(35, (gameState.power / 100) * 35);
                if (gameState.currentPlayer === 1) {
                    leftBarrel.rotation.z = angle * Math.PI / 180;
                } else {
                    rightBarrel.rotation.z = -angle * Math.PI / 180;
                }
            });
            
            canvas.addEventListener('mouseup', (e) => {
                if (!dragActive || !gameState.gameActive || gameState.bombActive) {
                    dragActive = false;
                    return;
                }
                dragActive = false;
                canvas.style.cursor = 'grab';
                
                if (gameState.power > 5) {
                    shootBomb(gameState.power);
                }
                
                // إعادة المدفع للوضع الطبيعي
                leftBarrel.rotation.z = 0;
                rightBarrel.rotation.z = 0;
                gameState.power = 0;
                document.getElementById('powerBar').style.width = '0%';
            });
            
            // دعم اللمس
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            });
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY });
                canvas.dispatchEvent(mouseEvent);
            });
            
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                const mouseEvent = new MouseEvent('mouseup', {});
                canvas.dispatchEvent(mouseEvent);
            });
        }

        function getLocalPlayerNumber() {
            if (!gameState.currentRoom) return 1;
            if (gameState.currentRoom.player1?.id === currentUser.id) return 1;
            if (gameState.currentRoom.player2?.id === currentUser.id) return 2;
            return 0;
        }

        // ==================== فيزياء القنبلة (طبطبة) ====================
        class BombPhysics {
            constructor(startPos, direction, power, player) {
                this.pos = startPos.clone();
                this.vel = direction.clone().multiplyScalar(6 + power / 20);
                this.vel.y = 3 + power / 25;
                this.gravity = 0.25;
                this.bounce = 0.7;
                this.player = player;
                this.active = true;
                this.trail = [];
            }
            
            update() {
                if (!this.active) return false;
                
                this.vel.y -= this.gravity;
                this.pos.x += this.vel.x;
                this.pos.y += this.vel.y;
                this.pos.z += this.vel.z;
                
                // ارتطام بالأرض
                if (this.pos.y <= 0.2) {
                    this.pos.y = 0.2;
                    this.vel.y = -this.vel.y * this.bounce;
                    this.vel.x *= 0.98;
                    this.vel.z *= 0.98;
                    
                    // تأثير اهتزاز الكاميرا
                    gameState.cameraShake = 0.15;
                    
                    // تأثير ارتطام
                    if (Math.abs(this.vel.y) > 0.5) {
                        createImpactEffect(this.pos);
                    }
                    
                    if (Math.abs(this.vel.y) < 0.3 && Math.abs(this.vel.x) < 0.2 && Math.abs(this.vel.z) < 0.2) {
                        this.active = false;
                        return false;
                    }
                }
                
                // التحقق من اصطدام المربعات
                checkGridCollision(this.pos, this.player);
                
                // تحديث مسار الكاميرا
                if (gameState.bombFollowCamera) {
                    updateFollowCamera(this.pos);
                }
                
                return true;
            }
        }
        
        function createImpactEffect(position) {
            const ringGeo = new THREE.SphereGeometry(0.15, 8, 8);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400, emissiveIntensity: 0.8 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.copy(position);
            scene.add(ring);
            
            setTimeout(() => scene.remove(ring), 200);
            
            // اهتزاز الكاميرا
            if (gameState.cameraShake > 0) {
                const shake = gameState.cameraShake;
                camera.position.x += (Math.random() - 0.5) * shake;
                camera.position.y += (Math.random() - 0.5) * shake;
                camera.position.z += (Math.random() - 0.5) * shake;
                gameState.cameraShake *= 0.8;
            }
        }
        
        function checkGridCollision(pos, player) {
            const gridStartX = -4.5;
            const gridStartZ = -4.5;
            const cellSize = 0.82;
            
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    const cellX = gridStartX + col * cellSize;
                    const cellZ = gridStartZ + row * cellSize;
                    const halfSize = cellSize / 2;
                    
                    if (Math.abs(pos.x - cellX) < halfSize + 0.2 && 
                        Math.abs(pos.z - cellZ) < halfSize + 0.2 &&
                        pos.y < 0.5) {
                        
                        if (gameState.gridColors[row][col] === 0) {
                            gameState.gridColors[row][col] = player;
                            updateCellColor(row, col, player);
                            
                            // تأثير انفجار صغير
                            createImpactEffect(new THREE.Vector3(cellX, 0.1, cellZ));
                        }
                        break;
                    }
                }
            }
        }
        
        function updateFollowCamera(targetPos) {
            // كاميرا خلف القنبلة
            const offset = new THREE.Vector3(-2, 1.5, 2);
            const targetCamPos = targetPos.clone().add(offset);
            camera.position.lerp(targetCamPos, 0.1);
            camera.lookAt(targetPos);
        }
        
        function resetCamera() {
            camera.position.set(8, 6, 12);
            camera.lookAt(0, 0, 0);
            gameState.bombFollowCamera = false;
        }
        
        function shootBomb(power) {
            if (gameState.bombActive) return;
            
            const isLeft = gameState.currentPlayer === 1;
            const startPos = isLeft ? new THREE.Vector3(-5.2, 0.2, 0.5) : new THREE.Vector3(5.2, 0.2, 0.5);
            
            // اتجاه الرمية (عكس اتجاه السحب)
            const direction = isLeft ? new THREE.Vector3(1, 0.4, 0) : new THREE.Vector3(-1, 0.4, 0);
            
            // وميض المدفع
            if (window.muzzleFlashes) {
                const flash = isLeft ? window.muzzleFlashes.left : window.muzzleFlashes.right;
                flash.intensity = 1.5;
                setTimeout(() => { if (flash) flash.intensity = 0; }, 100);
            }
            
            // إنشاء القنبلة
            const bombGeo = new THREE.SphereGeometry(0.22, 24, 24);
            const bombMat = new THREE.MeshStandardMaterial({
                color: isLeft ? 0xff6666 : 0x6666ff,
                emissive: isLeft ? 0x442222 : 0x222244,
                emissiveIntensity: 0.6,
                metalness: 0.3
            });
            bombMesh = new THREE.Mesh(bombGeo, bombMat);
            bombMesh.castShadow = true;
            bombMesh.position.copy(startPos);
            scene.add(bombMesh);
            
            // إضافة توهج
            const glowGeo = new THREE.SphereGeometry(0.35, 16, 16);
            const glowMat = new THREE.MeshBasicMaterial({ color: isLeft ? 0xff8866 : 0x6688ff, transparent: true, opacity: 0.4 });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            bombMesh.add(glow);
            
            gameState.bombActive = true;
            gameState.bombFollowCamera = true;
            
            const physics = new BombPhysics(startPos, direction, power, gameState.currentPlayer);
            
            function animateBomb() {
                if (!physics.active) {
                    scene.remove(bombMesh);
                    gameState.bombActive = false;
                    gameState.bombFollowCamera = false;
                    resetCamera();
                    afterShoot();
                    return;
                }
                
                physics.update();
                if (bombMesh) bombMesh.position.copy(physics.pos);
                
                // دوران القنبلة
                bombMesh.rotation.x += 0.1;
                bombMesh.rotation.z += 0.15;
                
                requestAnimationFrame(animateBomb);
            }
            
            requestAnimationFrame(animateBomb);
        }
        
        function afterShoot() {
            if (gameState.currentPlayer === 1) {
                gameState.player1Throws--;
                document.getElementById('player1Throws')?.setAttribute('data-value', gameState.player1Throws);
            } else {
                gameState.player2Throws--;
                document.getElementById('player2Throws')?.setAttribute('data-value', gameState.player2Throws);
            }
            
            if (gameState.player1Throws === 0 && gameState.player2Throws === 0) {
                endGame();
            } else {
                switchPlayer();
            }
            
            // مزامنة مع Firebase
            syncGameToFirebase();
        }
        
        function switchPlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            const turnText = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
            document.getElementById('currentTurn').textContent = turnText;
            startThrowTimer();
        }
        
        let timerInterval = null;
        
        function startThrowTimer() {
            if (timerInterval) clearInterval(timerInterval);
            let timeLeft = CONFIG.THROW_TIME;
            document.getElementById('throwTimer').textContent = `${timeLeft}s`;
            
            timerInterval = setInterval(() => {
                if (!gameState.gameActive) {
                    clearInterval(timerInterval);
                    return;
                }
                timeLeft--;
                document.getElementById('throwTimer').textContent = `${timeLeft}s`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (gameState.currentPlayer === 1) {
                        gameState.player1Throws--;
                    } else {
                        gameState.player2Throws--;
                    }
                    
                    if (gameState.player1Throws === 0 && gameState.player2Throws === 0) {
                        endGame();
                    } else {
                        switchPlayer();
                    }
                    syncGameToFirebase();
                }
            }, 1000);
        }
        
        function syncGameToFirebase() {
            if (!gameState.currentRoom) return;
            database.ref(`rooms/${gameState.currentRoom.id}/game`).set({
                gridColors: gameState.gridColors,
                currentPlayer: gameState.currentPlayer,
                player1Throws: gameState.player1Throws,
                player2Throws: gameState.player2Throws,
                timestamp: Date.now()
            });
        }
        
        async function endGame() {
            gameState.gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            let player1Score = 0, player2Score = 0;
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    if (gameState.gridColors[row][col] === 1) player1Score++;
                    if (gameState.gridColors[row][col] === 2) player2Score++;
                }
            }
            
            let resultMsg = '';
            const localPlayer = getLocalPlayerNumber();
            
            if (player1Score > player2Score) {
                const winAmount = CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER;
                if (localPlayer === 1) {
                    currentUser.balance += winAmount;
                    await updateBalanceInDB();
                    resultMsg = `🎉 فزت! +$${winAmount.toFixed(2)} (${player1Score} - ${player2Score})`;
                } else {
                    resultMsg = `🔴 فاز اللاعب الأول (${player1Score} - ${player2Score})`;
                }
            } else if (player2Score > player1Score) {
                const winAmount = CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER;
                if (localPlayer === 2) {
                    currentUser.balance += winAmount;
                    await updateBalanceInDB();
                    resultMsg = `🎉 فزت! +$${winAmount.toFixed(2)} (${player1Score} - ${player2Score})`;
                } else {
                    resultMsg = `🔵 فاز اللاعب الثاني (${player1Score} - ${player2Score})`;
                }
            } else {
                currentUser.balance += CONFIG.BET_AMOUNT;
                await updateBalanceInDB();
                resultMsg = `🤝 تعادل! تم إعادة $${CONFIG.BET_AMOUNT}`;
            }
            
            document.getElementById('resultTitle').textContent = 'انتهت الجولة';
            document.getElementById('resultMessage').innerHTML = resultMsg;
            document.getElementById('resultModal').classList.add('active');
            
            if (gameState.currentRoom) {
                await database.ref(`rooms/${gameState.currentRoom.id}`).remove();
            }
            
            gameState.currentRoom = null;
        }
        
        async function updateBalanceInDB() {
            await database.ref(`users/${currentUser.id}`).set({
                id: currentUser.id,
                name: currentUser.name,
                balance: currentUser.balance,
                lastSeen: Date.now()
            });
            document.getElementById('mainBalance').textContent = currentUser.balance;
        }
        
        // ==================== دوال الغرف ====================
        async function createRoom() {
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                alert(`⚠️ رصيدك غير كافي! تحتاج $${CONFIG.BET_AMOUNT}`);
                return;
            }
            
            const roomId = Date.now().toString();
            const room = {
                id: roomId,
                player1: { id: currentUser.id, name: currentUser.name },
                player2: null,
                status: 'waiting',
                bet: CONFIG.BET_AMOUNT,
                createdAt: Date.now()
            };
            
            await database.ref(`rooms/${roomId}`).set(room);
            joinRoom(roomId);
        }
        
        async function joinRoom(roomId) {
            const snapshot = await database.ref(`rooms/${roomId}`).once('value');
            const room = snapshot.val();
            
            if (!room) { alert('الغرفة غير موجودة'); return; }
            if (room.player1?.id === currentUser.id) {
                gameState.currentRoom = room;
                startWaitingForPlayer(roomId);
            } else if (!room.player2) {
                if (currentUser.balance < CONFIG.BET_AMOUNT) {
                    alert(`⚠️ رصيدك غير كافي! تحتاج $${CONFIG.BET_AMOUNT}`);
                    return;
                }
                await database.ref(`rooms/${roomId}`).update({
                    player2: { id: currentUser.id, name: currentUser.name },
                    status: 'full'
                });
                gameState.currentRoom = { ...room, player2: { id: currentUser.id, name: currentUser.name }, status: 'full' };
                startGame(roomId);
            } else {
                alert('الغرفة ممتلئة');
            }
        }
        
        function startWaitingForPlayer(roomId) {
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('roomsGrid').style.display = 'none';
            const countdownEl = document.getElementById('countdownDisplay');
            countdownEl.classList.add('active');
            countdownEl.textContent = '⏳ انتظار لاعب آخر...';
            
            database.ref(`rooms/${roomId}`).on('value', (snapshot) => {
                const room = snapshot.val();
                if (room && room.status === 'full') {
                    database.ref(`rooms/${roomId}`).off();
                    startGame(roomId);
                }
            });
        }
        
        async function startGame(roomId) {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('countdownDisplay').classList.remove('active');
            document.getElementById('roomsGrid').style.display = 'grid';
            
            currentUser.balance -= CONFIG.BET_AMOUNT;
            await updateBalanceInDB();
            
            // إعادة تعيين حالة اللعبة
            gameState.gridColors = Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0));
            gameState.currentPlayer = 1;
            gameState.player1Throws = CONFIG.THROWS_PER_PLAYER;
            gameState.player2Throws = CONFIG.THROWS_PER_PLAYER;
            gameState.gameActive = true;
            
            // إعادة تعيين الشبكة المرئية
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    updateCellColor(row, col, 0);
                }
            }
            
            document.getElementById('currentTurn').textContent = '🔴 دور اللاعب الأول';
            startThrowTimer();
            
            // تحميل حالة اللعبة من Firebase إذا وجدت
            const gameSnapshot = await database.ref(`rooms/${roomId}/game`).once('value');
            const savedGame = gameSnapshot.val();
            if (savedGame) {
                gameState.gridColors = savedGame.gridColors || gameState.gridColors;
                gameState.currentPlayer = savedGame.currentPlayer || 1;
                gameState.player1Throws = savedGame.player1Throws || CONFIG.THROWS_PER_PLAYER;
                gameState.player2Throws = savedGame.player2Throws || CONFIG.THROWS_PER_PLAYER;
                for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                    for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                        if (gameState.gridColors[row][col]) {
                            updateCellColor(row, col, gameState.gridColors[row][col]);
                        }
                    }
                }
                document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
            }
            
            // الاستماع للتحديثات
            database.ref(`rooms/${roomId}/game`).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && gameState.gameActive) {
                    // تحديث الشبكة من اللاعب الآخر
                    if (data.gridColors) {
                        for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                            for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                                if (data.gridColors[row][col] !== gameState.gridColors[row][col]) {
                                    gameState.gridColors[row][col] = data.gridColors[row][col];
                                    updateCellColor(row, col, data.gridColors[row][col]);
                                }
                            }
                        }
                    }
                    gameState.currentPlayer = data.currentPlayer;
                    gameState.player1Throws = data.player1Throws;
                    gameState.player2Throws = data.player2Throws;
                    document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
                }
            });
        }
        
        function closeResult() {
            document.getElementById('resultModal').classList.remove('active');
            backToRooms();
        }
        
        async function backToRooms() {
            if (timerInterval) clearInterval(timerInterval);
            gameState.gameActive = false;
            gameState.bombActive = false;
            gameState.bombFollowCamera = false;
            resetCamera();
            
            if (gameState.currentRoom) {
                await database.ref(`rooms/${gameState.currentRoom.id}`).remove();
            }
            gameState.currentRoom = null;
            
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('roomsGrid').style.display = 'grid';
            loadRooms();
        }
        
        async function loadRooms() {
            const roomsRef = database.ref('rooms');
            roomsRef.on('value', (snapshot) => {
                const rooms = snapshot.val() || {};
                const roomsGrid = document.getElementById('roomsGrid');
                roomsGrid.innerHTML = '';
                
                const roomList = Object.values(rooms).filter(r => r.status !== 'full').slice(0, 8);
                if (roomList.length === 0) {
                    roomsGrid.innerHTML = '<div style="grid-column:1/-1;color:#888;text-align:center;">لا توجد غرف متاحة، أنشئ غرفة جديدة</div>';
                }
                
                roomList.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div class="room-number">غرفة ${room.id.slice(-4)}</div>
                        <div class="room-status available">🟢 متاحة</div>
                        <div>💰 رهان: $${room.bet}</div>
                        <div>👤 ${room.player1?.name || 'مجهول'}</div>
                    `;
                    card.onclick = () => joinRoom(room.id);
                    roomsGrid.appendChild(card);
                });
            });
        }
        
        // ==================== الرسوم المتحركة ====================
        function animate() {
            requestAnimationFrame(animate);
            
            // تأثير اهتزاز الكاميرا
            if (gameState.cameraShake > 0) {
                camera.position.x += (Math.random() - 0.5) * gameState.cameraShake * 0.05;
                camera.position.y += (Math.random() - 0.5) * gameState.cameraShake * 0.05;
                gameState.cameraShake *= 0.95;
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // ==================== التهيئة ====================
        async function init() {
            init3D();
            
            const userRef = database.ref(`users/${currentUser.id}`);
            const snapshot = await userRef.once('value');
            const savedUser = snapshot.val();
            
            if (savedUser) {
                currentUser.balance = savedUser.balance;
                currentUser.name = savedUser.name;
            } else {
                await updateBalanceInDB();
            }
            
            document.getElementById('mainBalance').textContent = currentUser.balance;
            loadRooms();
        }
        
        // جعل الدوال عامة
        window.createRoom = createRoom;
        window.joinRoom = joinRoom;
        window.backToRooms = backToRooms;
        window.closeResult = closeResult;
        
        init();
    </script>
</body>
</html>

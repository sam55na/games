<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #333;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid red;
            z-index: 10;
        }
        button {
            margin-top: 30px;
            padding: 10px 25px;
            font-size: 18px;
            background-color: #0088cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #ccc;
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>

    <button id="spinBtn">أدر العجلة!</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');

        const segments = ["جائزة 1", "حظ أوفر", "جائزة 2", "خصم 10%", "جائزة كبرى", "حاول ثانية"];
        const colors = ["#FF5733", "#33FF57", "#3357FF", "#F333FF", "#FF33A1", "#33FFF5"];
        
        let currentRotation = 0;

        function drawWheel() {
            const sliceAngle = (2 * Math.PI) / segments.length;
            segments.forEach((text, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
                
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.fillText(text, 60, 10);
                ctx.restore();
            });
        }

        drawWheel();

        spinBtn.addEventListener('click', () => {
            spinBtn.disabled = true;
            const extraDegree = Math.floor(Math.random() * 360) + 1440; // 4 full rotations + random
            currentRotation += extraDegree;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                const actualDegree = currentRotation % 360;
                const sliceAngle = 360 / segments.length;
                // Calculate which segment is at the top (pointer is at 270 degrees in canvas coordinates)
                const index = Math.floor(((360 - actualDegree + 270) % 360) / sliceAngle);
                const result = segments[index];

                // إرسال البيانات للبوت بدون خادم خارجي
                tg.sendData(JSON.stringify({
                    action: "spin_result",
                    result: result
                }));
                
                tg.close();
            }, 4000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB 3D | لعبة المدفع الثلاثية الأبعاد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* واجهة المستخدم */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .game-header {
            background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(0,0,0,0.7));
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffd700;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,215,0,0.4);
            pointer-events: auto;
        }

        .logo {
            font-size: 1.3rem;
            letter-spacing: 2px;
        }

        .balance-display {
            background: rgba(0,0,0,0.6);
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #ffd700;
            font-size: 0.9rem;
        }

        .balance-display span {
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
            margin-right: 5px;
        }

        .current-turn {
            position: fixed;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 8px 25px;
            border-radius: 40px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1rem;
            border: 1px solid #ffd700;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            font-family: monospace;
        }

        .throw-timer {
            position: fixed;
            top: 75px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff6666;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ff6666;
        }

        .power-bar-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(0,0,0,0.75);
            border-radius: 20px;
            padding: 4px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ffd700;
        }

        .power-bar {
            height: 22px;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            border-radius: 16px;
            width: 0%;
            transition: width 0.02s linear;
        }

        .power-label {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* غرفة الانتظار */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-content {
            background: linear-gradient(145deg, #1a1a2a, #0f0f1f);
            border-radius: 30px;
            padding: 35px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .waiting-title {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
            max-height: 380px;
            overflow-y: auto;
            padding: 5px;
        }

        .room-card {
            background: rgba(255,215,0,0.08);
            border: 1px solid #ffd700;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .room-card:hover {
            transform: translateY(-3px);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 8px 20px rgba(255,215,0,0.2);
        }

        .room-number {
            font-size: 1rem;
            color: #ffd700;
            font-weight: bold;
        }

        .room-status {
            font-size: 0.7rem;
            margin-top: 6px;
        }

        .room-status.available { color: #2ecc71; }
        .room-status.waiting { color: #f39c12; }

        .room-creator {
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 5px;
        }

        .create-room-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .create-room-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .create-room-btn:hover:not(:disabled) {
            transform: scale(1.02);
            background: #ffaa33;
        }

        .active-game-badge {
            position: fixed;
            top: 70px;
            left: 20px;
            background: rgba(255,68,68,0.9);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            z-index: 100;
            pointer-events: none;
            display: none;
            font-weight: bold;
        }

        .active-game-badge.visible {
            display: block;
        }

        .countdown-display {
            font-size: 2.5rem;
            color: #ffd700;
            margin: 15px 0;
            display: none;
            font-weight: bold;
        }

        .countdown-display.active {
            display: block;
            animation: pulse 0.6s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* نافذة النتيجة */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .result-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .result-content {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 35px;
            text-align: center;
            min-width: 280px;
        }

        .result-title {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .result-message {
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .result-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 8px 25px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.7rem;
            pointer-events: auto;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffd700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .current-turn { font-size: 0.8rem; top: 65px; padding: 5px 15px; }
            .throw-timer { font-size: 1rem; top: 65px; padding: 5px 12px; }
            .power-bar-container { width: 220px; bottom: 15px; }
            .waiting-title { font-size: 1.4rem; }
            .rooms-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="game-header">
            <div class="logo">💣 BOOMB 3D</div>
            <div class="balance-display">💰 الرصيد: <span id="mainBalance">0</span></div>
        </div>
    </div>

    <div class="current-turn" id="currentTurn">⏳ انتظار...</div>
    <div class="throw-timer" id="throwTimer">--s</div>
    <div class="power-bar-container">
        <div class="power-label">⚡ اسحب للخلف لتحديد القوة</div>
        <div class="power-bar" id="powerBar"></div>
    </div>
    <div class="active-game-badge" id="activeGameBadge">🎮 في لعبة نشطة</div>
    <button class="back-btn" id="backBtn" onclick="window.backToRooms?.()">🏠 الخروج للغرف</button>

    <!-- غرفة الانتظار -->
    <div class="waiting-room" id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">🎮 غرف اللعب</div>
            <div class="rooms-grid" id="roomsGrid">
                <div style="grid-column:1/-1;text-align:center;color:#888;padding:20px;">جاري تحميل الغرف...</div>
            </div>
            <button class="create-room-btn" id="createRoomBtn" onclick="window.createRoom?.()">➕ إنشاء غرفة جديدة</button>
            <div class="countdown-display" id="countdownDisplay"></div>
        </div>
    </div>

    <!-- نافذة النتيجة -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="result-btn" onclick="window.closeResult?.()">موافق</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==================== Firebase ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database(app);

        // ==================== إعدادات اللعبة ====================
        const CONFIG = {
            BET_AMOUNT: 10,
            GRID_SIZE: 10,
            THROW_TIME: 15,
            THROWS_PER_PLAYER: 3,
            WIN_MULTIPLIER: 1.8,
            ROOM_EXPIRE_TIME: 120000
        };

        // ==================== بيانات المستخدم ====================
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 8),
            name: 'زائر_' + Math.floor(Math.random() * 1000),
            balance: 100,
            activeRoomId: null
        };

        // ==================== حالة اللعبة ====================
        let gameState = {
            currentRoom: null,
            gridColors: Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0)),
            currentPlayer: 1,
            player1Throws: CONFIG.THROWS_PER_PLAYER,
            player2Throws: CONFIG.THROWS_PER_PLAYER,
            gameActive: false,
            isDragging: false,
            power: 0,
            dragStart: { x: 0, y: 0 },
            bombActive: false,
            cameraShake: 0,
            followCamera: false,
            roomListeners: []
        };

        // ==================== متغيرات Three.js ====================
        let scene, camera, renderer;
        let cells = [];
        let leftCannon, rightCannon, leftBarrel, rightBarrel;
        let bombMesh = null;
        let timerInterval = null;
        let roomsListener = null;

        // ==================== دوال مساعدة ====================
        function showMessage(msg, isError = false) {
            const div = document.createElement('div');
            div.style.cssText = `
                position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
                background: ${isError ? 'rgba(220,50,50,0.95)' : 'rgba(0,0,0,0.9)'};
                color: ${isError ? '#fff' : '#ffd700'}; padding: 8px 20px;
                border-radius: 40px; z-index: 1000; font-weight: bold;
                border: 1px solid #ffd700; pointer-events: none; font-size: 0.85rem;
                white-space: nowrap; backdrop-filter: blur(5px);
            `;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        async function updateBalanceInDB() {
            await database.ref(`users/${currentUser.id}`).set({
                id: currentUser.id,
                name: currentUser.name,
                balance: currentUser.balance,
                activeRoomId: currentUser.activeRoomId,
                lastSeen: Date.now()
            });
            document.getElementById('mainBalance').textContent = currentUser.balance;
        }

        // ==================== Three.js تهيئة المشهد ====================
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050514);
            scene.fog = new THREE.FogExp2(0x050514, 0.01);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(7, 5.5, 11);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // إضاءة
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            const mainLight = new THREE.DirectionalLight(0xfff5e0, 1);
            mainLight.position.set(5, 12, 6);
            mainLight.castShadow = true;
            mainLight.receiveShadow = true;
            scene.add(mainLight);
            const fillLight = new THREE.PointLight(0x4466aa, 0.5);
            fillLight.position.set(-3, 4, 4);
            scene.add(fillLight);
            const backLight = new THREE.PointLight(0xffaa66, 0.4);
            backLight.position.set(0, 3, -5);
            scene.add(backLight);

            // أرضية شبكية
            const gridHelper = new THREE.GridHelper(18, 20, 0xffaa55, 0x3399ff);
            gridHelper.position.y = -1.4;
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);

            // إنشاء الشبكة
            create3DGrid();
            createCannons();

            // جزيئات
            const particleCount = 600;
            const particlesGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 35;
                positions[i*3+1] = Math.random() * 7;
                positions[i*3+2] = (Math.random() - 0.5) * 18;
            }
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particlesMat = new THREE.PointsMaterial({ color: 0xffaa77, size: 0.045, transparent: true, opacity: 0.4 });
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particles);
        }

        function create3DGrid() {
            const cellSize = 0.78;
            const spacing = 0.03;
            const startX = -4.4;
            const startZ = -4.4;

            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                cells[row] = [];
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    const x = startX + col * (cellSize + spacing);
                    const z = startZ + row * (cellSize + spacing);
                    const geometry = new THREE.BoxGeometry(cellSize, 0.12, cellSize);
                    const material = new THREE.MeshStandardMaterial({
                        color: 0x3a3a55,
                        metalness: 0.25,
                        roughness: 0.5,
                        emissive: 0x111122
                    });
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(x, 0, z);
                    cube.castShadow = true;
                    cube.receiveShadow = true;
                    cube.userData = { row, col, color: 0 };
                    scene.add(cube);
                    cells[row][col] = cube;
                    
                    // حواف ذهبية
                    const edges = new THREE.EdgesGeometry(geometry);
                    const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffcc66 }));
                    cube.add(wire);
                }
            }
        }

        function updateCellColor(row, col, player) {
            if (!cells[row] || !cells[row][col]) return;
            const cube = cells[row][col];
            let color, emissive;
            if (player === 1) {
                color = 0xdd4444;
                emissive = 0x441111;
            } else if (player === 2) {
                color = 0x4444dd;
                emissive = 0x111144;
            } else {
                color = 0x3a3a55;
                emissive = 0x111122;
            }
            cube.material.color.setHex(color);
            cube.material.emissive.setHex(emissive);
            cube.material.emissiveIntensity = player !== 0 ? 0.45 : 0;
            
            if (player !== 0) {
                cube.scale.set(1.08, 1.08, 1.08);
                setTimeout(() => { if (cube) cube.scale.set(1, 1, 1); }, 120);
            }
        }

        function createCannons() {
            // المدفع الأيسر
            leftCannon = new THREE.Group();
            const leftBase = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.8, 0.5, 24), new THREE.MeshStandardMaterial({ color: 0xcc5533, metalness: 0.7, roughness: 0.3 }));
            leftBase.castShadow = true;
            leftBase.position.y = 0.2;
            leftCannon.add(leftBase);
            leftBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.32, 1.1, 16), new THREE.MeshStandardMaterial({ color: 0xff6644, metalness: 0.8 }));
            leftBarrel.castShadow = true;
            leftBarrel.position.set(0.6, 0.3, 0);
            leftCannon.add(leftBarrel);
            leftCannon.position.set(-5.3, -0.7, 0.2);
            scene.add(leftCannon);
            
            // المدفع الأيمن
            rightCannon = new THREE.Group();
            const rightBase = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.8, 0.5, 24), new THREE.MeshStandardMaterial({ color: 0x3355cc, metalness: 0.7, roughness: 0.3 }));
            rightBase.castShadow = true;
            rightBase.position.y = 0.2;
            rightCannon.add(rightBase);
            rightBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.32, 1.1, 16), new THREE.MeshStandardMaterial({ color: 0x4488ff, metalness: 0.8 }));
            rightBarrel.castShadow = true;
            rightBarrel.position.set(-0.6, 0.3, 0);
            rightCannon.add(rightBarrel);
            rightCannon.position.set(5.3, -0.7, 0.2);
            scene.add(rightCannon);
        }

        function addImpactEffect(pos) {
            const ring = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0xff4422, emissiveIntensity: 0.7 }));
            ring.position.copy(pos);
            scene.add(ring);
            setTimeout(() => scene.remove(ring), 180);
        }

        // ==================== فيزياء القنبلة ====================
        class BombPhysics {
            constructor(startPos, direction, power, player) {
                this.pos = startPos.clone();
                const force = 5.5 + power / 18;
                this.vel = direction.clone().multiplyScalar(force);
                this.vel.y = 3.2 + power / 28;
                this.gravity = 0.28;
                this.bounce = 0.68;
                this.player = player;
                this.active = true;
            }
            
            update() {
                if (!this.active) return false;
                this.vel.y -= this.gravity;
                this.pos.x += this.vel.x;
                this.pos.y += this.vel.y;
                this.pos.z += this.vel.z;
                
                if (this.pos.y <= 0.15) {
                    this.pos.y = 0.15;
                    this.vel.y = -this.vel.y * this.bounce;
                    this.vel.x *= 0.98;
                    this.vel.z *= 0.98;
                    gameState.cameraShake = 0.18;
                    addImpactEffect(this.pos);
                    if (Math.abs(this.vel.y) < 0.25 && Math.abs(this.vel.x) < 0.2) {
                        this.active = false;
                        return false;
                    }
                }
                
                this.checkGridCollision();
                return true;
            }
            
            checkGridCollision() {
                const startX = -4.4;
                const startZ = -4.4;
                const cellSize = 0.81;
                for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                    for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                        const cx = startX + col * cellSize;
                        const cz = startZ + row * cellSize;
                        if (Math.abs(this.pos.x - cx) < 0.45 && Math.abs(this.pos.z - cz) < 0.45 && this.pos.y < 0.4) {
                            if (gameState.gridColors[row][col] === 0) {
                                gameState.gridColors[row][col] = this.player;
                                updateCellColor(row, col, this.player);
                                addImpactEffect(new THREE.Vector3(cx, 0.1, cz));
                            }
                        }
                    }
                }
            }
        }
        
        let currentPhysics = null;
        
        function shootBomb(power) {
            if (gameState.bombActive || !gameState.gameActive) return;
            
            const isLeft = gameState.currentPlayer === 1;
            const startPos = isLeft ? new THREE.Vector3(-5.1, 0.25, 0.3) : new THREE.Vector3(5.1, 0.25, 0.3);
            const direction = isLeft ? new THREE.Vector3(0.95, 0.35, 0) : new THREE.Vector3(-0.95, 0.35, 0);
            
            // وميض المدفع
            const flash = new THREE.PointLight(isLeft ? 0xff6644 : 0x4488ff, 1.2, 6);
            flash.position.copy(startPos);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 100);
            
            // القنبلة
            const bombGeo = new THREE.SphereGeometry(0.22, 24, 24);
            const bombMat = new THREE.MeshStandardMaterial({ color: isLeft ? 0xff8866 : 0x6688ff, emissive: isLeft ? 0x552222 : 0x222255, emissiveIntensity: 0.6 });
            bombMesh = new THREE.Mesh(bombGeo, bombMat);
            bombMesh.castShadow = true;
            bombMesh.position.copy(startPos);
            scene.add(bombMesh);
            
            gameState.bombActive = true;
            gameState.followCamera = true;
            currentPhysics = new BombPhysics(startPos, direction, power, gameState.currentPlayer);
            
            function animateBomb() {
                if (!currentPhysics || !currentPhysics.active) {
                    if (bombMesh) scene.remove(bombMesh);
                    gameState.bombActive = false;
                    gameState.followCamera = false;
                    afterShoot();
                    return;
                }
                currentPhysics.update();
                if (bombMesh) bombMesh.position.copy(currentPhysics.pos);
                bombMesh.rotation.x += 0.12;
                bombMesh.rotation.z += 0.1;
                if (gameState.followCamera) {
                    const targetPos = currentPhysics.pos.clone();
                    const offset = new THREE.Vector3(-1.8, 1.2, 2.2);
                    camera.position.lerp(targetPos.clone().add(offset), 0.12);
                    camera.lookAt(targetPos);
                }
                requestAnimationFrame(animateBomb);
            }
            requestAnimationFrame(animateBomb);
        }
        
        function afterShoot() {
            if (gameState.currentPlayer === 1) gameState.player1Throws--;
            else gameState.player2Throws--;
            
            if (gameState.player1Throws === 0 && gameState.player2Throws === 0) endGame();
            else switchPlayer();
            syncGameToFirebase();
        }
        
        function switchPlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
            startThrowTimer();
        }
        
        function startThrowTimer() {
            if (timerInterval) clearInterval(timerInterval);
            let timeLeft = CONFIG.THROW_TIME;
            document.getElementById('throwTimer').textContent = `${timeLeft}s`;
            timerInterval = setInterval(() => {
                if (!gameState.gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                document.getElementById('throwTimer').textContent = `${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (gameState.currentPlayer === 1) gameState.player1Throws--;
                    else gameState.player2Throws--;
                    if (gameState.player1Throws === 0 && gameState.player2Throws === 0) endGame();
                    else switchPlayer();
                    syncGameToFirebase();
                }
            }, 1000);
        }
        
        function syncGameToFirebase() {
            if (!gameState.currentRoom) return;
            database.ref(`rooms/${gameState.currentRoom.id}/game`).set({
                gridColors: gameState.gridColors,
                currentPlayer: gameState.currentPlayer,
                player1Throws: gameState.player1Throws,
                player2Throws: gameState.player2Throws,
                timestamp: Date.now()
            });
        }
        
        async function endGame() {
            gameState.gameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            
            let p1Score = 0, p2Score = 0;
            for (let r = 0; r < CONFIG.GRID_SIZE; r++)
                for (let c = 0; c < CONFIG.GRID_SIZE; c++)
                    if (gameState.gridColors[r][c] === 1) p1Score++;
                    else if (gameState.gridColors[r][c] === 2) p2Score++;
            
            const localPlayer = (gameState.currentRoom?.player1?.id === currentUser.id) ? 1 : (gameState.currentRoom?.player2?.id === currentUser.id) ? 2 : 0;
            let msg = '';
            if (p1Score > p2Score) {
                if (localPlayer === 1) { currentUser.balance += CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER; await updateBalanceInDB(); msg = `🎉 فزت! +$${(CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER).toFixed(2)} (${p1Score}-${p2Score})`; }
                else msg = `🔴 فاز اللاعب الأول (${p1Score} - ${p2Score})`;
            } else if (p2Score > p1Score) {
                if (localPlayer === 2) { currentUser.balance += CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER; await updateBalanceInDB(); msg = `🎉 فزت! +$${(CONFIG.BET_AMOUNT * CONFIG.WIN_MULTIPLIER).toFixed(2)} (${p1Score}-${p2Score})`; }
                else msg = `🔵 فاز اللاعب الثاني (${p1Score} - ${p2Score})`;
            } else {
                currentUser.balance += CONFIG.BET_AMOUNT;
                await updateBalanceInDB();
                msg = `🤝 تعادل! تم إعادة $${CONFIG.BET_AMOUNT}`;
            }
            
            document.getElementById('resultTitle').textContent = 'انتهت الجولة';
            document.getElementById('resultMessage').innerHTML = msg;
            document.getElementById('resultModal').classList.add('active');
            
            if (gameState.currentRoom) {
                await database.ref(`rooms/${gameState.currentRoom.id}`).update({ status: 'finished' });
                setTimeout(() => database.ref(`rooms/${gameState.currentRoom.id}`).remove(), 4000);
            }
            currentUser.activeRoomId = null;
            await updateBalanceInDB();
            gameState.roomListeners.forEach(fn => fn());
            gameState.roomListeners = [];
            gameState.currentRoom = null;
            document.getElementById('activeGameBadge').classList.remove('visible');
            camera.position.set(7, 5.5, 11);
            camera.lookAt(0, 0, 0);
        }
        
        // ==================== دوال الغرف ====================
        async function createRoom() {
            if (currentUser.activeRoomId) { showMessage('⚠️ لديك غرفة نشطة!', true); return; }
            if (currentUser.balance < CONFIG.BET_AMOUNT) { showMessage(`⚠️ رصيدك غير كافي! تحتاج $${CONFIG.BET_AMOUNT}`, true); return; }
            
            const btn = document.getElementById('createRoomBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> جاري الإنشاء...';
            try {
                const roomId = Date.now().toString();
                await database.ref(`rooms/${roomId}`).set({
                    id: roomId, player1: { id: currentUser.id, name: currentUser.name }, player2: null,
                    status: 'waiting', bet: CONFIG.BET_AMOUNT, createdAt: Date.now(), expiresAt: Date.now() + CONFIG.ROOM_EXPIRE_TIME
                });
                currentUser.activeRoomId = roomId;
                await updateBalanceInDB();
                joinRoom(roomId);
            } catch(e) { showMessage('❌ فشل إنشاء الغرفة', true); }
            finally { btn.disabled = false; btn.innerHTML = '➕ إنشاء غرفة جديدة'; }
        }
        
        async function joinRoom(roomId) {
            if (currentUser.activeRoomId && currentUser.activeRoomId !== roomId) { showMessage('⚠️ لديك غرفة نشطة!', true); return; }
            const snap = await database.ref(`rooms/${roomId}`).once('value');
            const room = snap.val();
            if (!room) { showMessage('❌ الغرفة غير موجودة', true); return; }
            if (room.status === 'finished') { showMessage('❌ انتهت الغرفة', true); loadRooms(); return; }
            
            if (room.player1?.id === currentUser.id) {
                currentUser.activeRoomId = roomId;
                await updateBalanceInDB();
                gameState.currentRoom = room;
                startWaiting(roomId);
                return;
            }
            if (!room.player2 && room.status === 'waiting') {
                if (currentUser.balance < CONFIG.BET_AMOUNT) { showMessage(`⚠️ رصيد غير كافي!`, true); return; }
                currentUser.balance -= CONFIG.BET_AMOUNT;
                await updateBalanceInDB();
                await database.ref(`rooms/${roomId}`).update({ player2: { id: currentUser.id, name: currentUser.name }, status: 'full', startTime: Date.now() });
                currentUser.activeRoomId = roomId;
                await updateBalanceInDB();
                gameState.currentRoom = { ...room, player2: { id: currentUser.id, name: currentUser.name }, status: 'full' };
                startGame(roomId);
            } else showMessage('❌ الغرفة ممتلئة', true);
        }
        
        function startWaiting(roomId) {
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('roomsGrid').style.display = 'none';
            const cd = document.getElementById('countdownDisplay');
            cd.classList.add('active');
            cd.innerHTML = '⏳ انتظار لاعب آخر...<br><span style="font-size:0.8rem;">غرفة: ' + roomId.slice(-4) + '</span>';
            document.getElementById('activeGameBadge').classList.add('visible');
            document.getElementById('activeGameBadge').innerHTML = '🎮 غرفة: ' + roomId.slice(-4);
            
            const ref = database.ref(`rooms/${roomId}`);
            const listener = ref.on('value', (snap) => {
                const r = snap.val();
                if (r && r.status === 'full') {
                    ref.off();
                    gameState.currentRoom = r;
                    startGame(roomId);
                } else if (!r) { ref.off(); backToRooms(); }
            });
            gameState.roomListeners.push(() => ref.off());
        }
        
        async function startGame(roomId) {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('countdownDisplay').classList.remove('active');
            
            gameState.gridColors = Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0));
            gameState.currentPlayer = 1;
            gameState.player1Throws = CONFIG.THROWS_PER_PLAYER;
            gameState.player2Throws = CONFIG.THROWS_PER_PLAYER;
            gameState.gameActive = true;
            
            for (let i = 0; i < CONFIG.GRID_SIZE; i++)
                for (let j = 0; j < CONFIG.GRID_SIZE; j++)
                    updateCellColor(i, j, 0);
            
            document.getElementById('currentTurn').textContent = '🔴 دور اللاعب الأول';
            startThrowTimer();
            document.getElementById('activeGameBadge').classList.add('visible');
            document.getElementById('activeGameBadge').innerHTML = '🎮 جولة نشطة';
            
            // استعادة الحالة السابقة
            const saved = await database.ref(`rooms/${roomId}/game`).once('value');
            if (saved.val()) {
                const data = saved.val();
                if (data.gridColors) gameState.gridColors = data.gridColors;
                gameState.currentPlayer = data.currentPlayer || 1;
                gameState.player1Throws = data.player1Throws || CONFIG.THROWS_PER_PLAYER;
                gameState.player2Throws = data.player2Throws || CONFIG.THROWS_PER_PLAYER;
                for (let r=0; r<CONFIG.GRID_SIZE; r++)
                    for (let c=0; c<CONFIG.GRID_SIZE; c++)
                        if (gameState.gridColors[r][c]) updateCellColor(r, c, gameState.gridColors[r][c]);
                document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
            }
            
            const gameRef = database.ref(`rooms/${roomId}/game`);
            const listener = gameRef.on('value', (snap) => {
                const data = snap.val();
                if (data && gameState.gameActive && !gameState.bombActive) {
                    for (let r=0; r<CONFIG.GRID_SIZE; r++)
                        for (let c=0; c<CONFIG.GRID_SIZE; c++)
                            if (data.gridColors?.[r]?.[c] !== gameState.gridColors[r]?.[c]) {
                                gameState.gridColors[r][c] = data.gridColors[r][c];
                                updateCellColor(r, c, data.gridColors[r][c]);
                            }
                    gameState.currentPlayer = data.currentPlayer;
                    gameState.player1Throws = data.player1Throws;
                    gameState.player2Throws = data.player2Throws;
                    document.getElementById('currentTurn').textContent = gameState.currentPlayer === 1 ? '🔴 دور اللاعب الأول' : '🔵 دور اللاعب الثاني';
                }
            });
            gameState.roomListeners.push(() => gameRef.off());
        }
        
        async function backToRooms() {
            if (timerInterval) clearInterval(timerInterval);
            gameState.gameActive = false;
            gameState.bombActive = false;
            gameState.roomListeners.forEach(fn => fn());
            gameState.roomListeners = [];
            if (gameState.currentRoom) {
                await database.ref(`rooms/${gameState.currentRoom.id}`).update({ status: 'finished' });
                setTimeout(() => database.ref(`rooms/${gameState.currentRoom.id}`).remove(), 3000);
            }
            currentUser.activeRoomId = null;
            await updateBalanceInDB();
            gameState.currentRoom = null;
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('roomsGrid').style.display = 'grid';
            document.getElementById('activeGameBadge').classList.remove('visible');
            camera.position.set(7, 5.5, 11);
            camera.lookAt(0, 0, 0);
            loadRooms();
        }
        
        function closeResult() {
            document.getElementById('resultModal').classList.remove('active');
            backToRooms();
        }
        
        function loadRooms() {
            if (roomsListener) roomsListener();
            roomsListener = database.ref('rooms').on('value', (snap) => {
                const rooms = snap.val() || {};
                const grid = document.getElementById('roomsGrid');
                grid.innerHTML = '';
                const now = Date.now();
                const list = Object.values(rooms).filter(r => r.status === 'waiting' && (!r.expiresAt || r.expiresAt > now)).slice(0, 8);
                if (list.length === 0) grid.innerHTML = '<div style="grid-column:1/-1;color:#888;text-align:center;padding:25px;">✨ لا توجد غرف متاحة<br>أنشئ غرفة جديدة</div>';
                list.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div class="room-number">غرفة ${room.id.slice(-4)}</div>
                        <div class="room-status available">🟢 متاحة</div>
                        <div>💰 رهان: $${room.bet}</div>
                        <div class="room-creator">👤 ${room.player1?.name || 'مجهول'}</div>
                    `;
                    card.onclick = () => joinRoom(room.id);
                    grid.appendChild(card);
                });
            });
        }
        
        // ==================== أحداث السحب ====================
        function setupDragEvents() {
            const canvas = renderer.domElement;
            canvas.style.cursor = 'grab';
            let dragging = false;
            canvas.addEventListener('mousedown', (e) => {
                if (!gameState.gameActive || gameState.bombActive) return;
                const local = (gameState.currentRoom?.player1?.id === currentUser.id) ? 1 : (gameState.currentRoom?.player2?.id === currentUser.id) ? 2 : 0;
                if (gameState.currentPlayer !== local) { showMessage('⏳ ليس دورك الآن!', true); return; }
                dragging = true;
                gameState.dragStart = { x: e.clientX, y: e.clientY };
                gameState.power = 0;
                document.getElementById('powerBar').style.width = '0%';
                canvas.style.cursor = 'grabbing';
            });
            canvas.addEventListener('mousemove', (e) => {
                if (!dragging || !gameState.gameActive) return;
                const dx = gameState.dragStart.x - e.clientX;
                const dy = gameState.dragStart.y - e.clientY;
                const dist = Math.min(100, Math.sqrt(dx*dx + dy*dy) / 1.8);
                gameState.power = dist;
                document.getElementById('powerBar').style.width = dist + '%';
                const angle = Math.min(32, dist / 3.2);
                if (gameState.currentPlayer === 1) leftBarrel.rotation.z = angle * Math.PI / 180;
                else rightBarrel.rotation.z = -angle * Math.PI / 180;
            });
            canvas.addEventListener('mouseup', () => {
                if (!dragging || !gameState.gameActive) { dragging = false; canvas.style.cursor = 'grab'; return; }
                dragging = false;
                canvas.style.cursor = 'grab';
                if (gameState.power > 8) shootBomb(gameState.power);
                leftBarrel.rotation.z = 0;
                rightBarrel.rotation.z = 0;
                gameState.power = 0;
                document.getElementById('powerBar').style.width = '0%';
            });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousedown', { clientX: t.clientX, clientY: t.clientY })); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; canvas.dispatchEvent(new MouseEvent('mousemove', { clientX: t.clientX, clientY: t.clientY })); });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mouseup', {})); });
        }
        
        // ==================== الرسوم المتحركة ====================
        function animate() {
            requestAnimationFrame(animate);
            if (gameState.cameraShake > 0 && !gameState.followCamera) {
                camera.position.x += (Math.random() - 0.5) * gameState.cameraShake * 0.04;
                camera.position.y += (Math.random() - 0.5) * gameState.cameraShake * 0.04;
                gameState.cameraShake *= 0.94;
            }
            renderer.render(scene, camera);
        }
        
        // ==================== التهيئة ====================
        async function init() {
            init3D();
            setupDragEvents();
            animate();
            const userSnap = await database.ref(`users/${currentUser.id}`).once('value');
            if (userSnap.val()) {
                currentUser.balance = userSnap.val().balance;
                currentUser.name = userSnap.val().name;
                currentUser.activeRoomId = userSnap.val().activeRoomId;
            }
            document.getElementById('mainBalance').textContent = currentUser.balance;
            if (currentUser.activeRoomId) {
                const roomSnap = await database.ref(`rooms/${currentUser.activeRoomId}`).once('value');
                if (roomSnap.val() && roomSnap.val().status !== 'finished') joinRoom(currentUser.activeRoomId);
                else { currentUser.activeRoomId = null; await updateBalanceInDB(); loadRooms(); }
            } else loadRooms();
        }
        
        window.createRoom = createRoom;
        window.joinRoom = joinRoom;
        window.backToRooms = backToRooms;
        window.closeResult = closeResult;
        
        init();
    </script>
</body>
</html>

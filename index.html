<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ - النظام المتقدم</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Arial Black', 'Cairo', sans-serif;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.95) 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .container {
            text-align: center;
            padding: 15px;
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .wheel-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 50%;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,215,0,0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.4);
            }
        }
        
        canvas {
            max-width: 85vw;
            max-height: 85vw;
            width: auto;
            height: auto;
            border-radius: 50%;
            display: block;
            background: #1a1a1a;
            border: 4px solid #FFD700;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }
        
        .user-info {
            background: rgba(0,0,0,0.85);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 12px 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0;
            font-size: 14px;
            font-weight: bold;
        }
        
        .info-label {
            color: #888;
            font-weight: normal;
        }
        
        .info-value {
            color: #FFD700;
            font-weight: bold;
        }
        
        .spin-button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .spin-button:active {
            transform: scale(0.97);
        }
        
        .spin-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #FFD700;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }
        
        .error-message, .cooldown-message {
            background: rgba(0,0,0,0.9);
            border: 2px solid #ff4444;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
        }
        
        .cooldown-message {
            border-color: #FFD700;
        }
        
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
            margin: 20px 0;
            font-family: monospace;
        }
        
        @media (max-width: 600px) {
            .info-row { font-size: 11px; }
            .spin-button { padding: 12px 30px; font-size: 20px; }
            .result { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // ================ تعريف الجوائز (6 خيارات) ================
        const SEGMENTS = [
            { name: "50", value: 5000, type: "amount", color: "#1a1a1a", textColor: "#FFD700" },
            { name: "100", value: 10000, type: "amount", color: "#2a2a2a", textColor: "#FFD700" },
            { name: "500", value: 50000, type: "amount", color: "#1a1a1a", textColor: "#FFD700" },
            { name: "1000", value: 100000, type: "amount", color: "#2a2a2a", textColor: "#FFD700" },
            { name: "5%", value: 5, type: "percent", color: "#1a1a1a", textColor: "#FFD700" },
            { name: "25%", value: 25, type: "percent", color: "#2a2a2a", textColor: "#FFD700" }
        ];
        
        let canvas = null, ctx = null;
        let currentAngle = 0;
        let spinning = false;
        let spinStartTime = 0;
        let spinDuration = 3000;
        let targetAngle = 0;
        let selectedSegmentIndex = null;
        
        // بيانات المستخدم من الرابط
        let userParams = null;
        
        // مفتاح التخزين المحلي
        const STORAGE_KEY = 'wheel_spin_data';
        
        // ================ قراءة المعاملات من الرابط ================
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                user_id: params.get('user_id'),
                total_recharge: parseFloat(params.get('total_recharge')) || 0,
                total_withdraw: parseFloat(params.get('total_withdraw')) || 0,
                spin_count: parseInt(params.get('spin_count')) || 0,
                last_spin_time: parseInt(params.get('last_spin_time')) || 0
            };
        }
        
        // ================ حفظ حالة المستخدم محلياً ================
        function saveUserSpinData() {
            const data = {
                user_id: userParams.user_id,
                spin_count: userParams.spin_count,
                last_spin_time: userParams.last_spin_time,
                has_claimed_25_percent: userParams.has_claimed_25_percent || false,
                has_recharged: userParams.has_recharged || false
            };
            localStorage.setItem(`${STORAGE_KEY}_${userParams.user_id}`, JSON.stringify(data));
        }
        
        function loadUserSpinData() {
            const saved = localStorage.getItem(`${STORAGE_KEY}_${userParams.user_id}`);
            if (saved) {
                const data = JSON.parse(saved);
                userParams.spin_count = data.spin_count || 0;
                userParams.last_spin_time = data.last_spin_time || 0;
                userParams.has_claimed_25_percent = data.has_claimed_25_percent || false;
                userParams.has_recharged = data.has_recharged || false;
            }
        }
        
        // ================ التحقق من فترة التبريد (48 ساعة) ================
        function isCooldownActive() {
            if (userParams.spin_count === 0) return false;
            const now = Date.now();
            const cooldownHours = 48;
            const cooldownMs = cooldownHours * 60 * 60 * 1000;
            return (now - userParams.last_spin_time) < cooldownMs;
        }
        
        function getRemainingCooldownTime() {
            const now = Date.now();
            const cooldownMs = 48 * 60 * 60 * 1000;
            const elapsed = now - userParams.last_spin_time;
            const remaining = cooldownMs - elapsed;
            if (remaining <= 0) return 0;
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            const seconds = Math.floor((remaining % (60 * 1000)) / 1000);
            return { hours, minutes, seconds, remaining };
        }
        
        // ================ منطق تحديد الجائزة حسب الشروط ================
        function determinePrize() {
            const recharge = userParams.total_recharge;
            const withdraw = userParams.total_withdraw;
            const spinCount = userParams.spin_count;
            
            console.log("تحديد الجائزة:", { recharge, withdraw, spinCount });
            
            if (spinCount === 0 && !userParams.has_claimed_25_percent) {
                userParams.has_claimed_25_percent = true;
                saveUserSpinData();
                return { index: 5, prize: SEGMENTS[5], message: "🎉 تهانينا! ستحصل على 25% رصيد إضافي!" };
            }
            
            if (spinCount === 1 && userParams.has_recharged) {
                return { index: 0, prize: SEGMENTS[0], message: "🎉 ربحت 50 ل.س!" };
            }
            
            if (spinCount === 2) {
                return { index: 4, prize: SEGMENTS[4], message: "🎉 ستحصل على 5% إضافية!" };
            }
            
            if (recharge > 250000 && withdraw === 0) {
                return { index: 1, prize: SEGMENTS[1], message: "🎉 ربحت 100!" };
            }
            
            if (recharge > 700000 && withdraw < 200000) {
                return { index: 2, prize: SEGMENTS[2], message: "🎉 ربحت 500!" };
            }
            
            if (recharge > 1800000 && withdraw < 400000) {
                return { index: 3, prize: SEGMENTS[3], message: "🎉 ربحت 1000!" };
            }
            
            return { index: 4, prize: SEGMENTS[4], message: "🎁 ستحصل على 5% إضافية!" };
        }
        
        // ================ رسم العجلة ================
        function drawWheel(angle = 0) {
            if (!ctx || !canvas) return;
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 250;
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const start = i * angleStep + angle;
                const end = start + angleStep;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = SEGMENTS[i].color;
                ctx.fill();
                
                ctx.strokeStyle = "#FFD700";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(start + angleStep / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "bold 26px 'Segoe UI', 'Arial Black'";
                ctx.fillStyle = SEGMENTS[i].textColor;
                ctx.fillText(SEGMENTS[i].name, radius * 0.65, 5);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 18, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
            ctx.fillStyle = "#000000";
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(canvas.width - 45, centerY - 25);
            ctx.lineTo(canvas.width - 20, centerY);
            ctx.lineTo(canvas.width - 45, centerY + 25);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
            ctx.fillStyle = "#000000";
            ctx.font = "bold 32px Arial";
            ctx.fillText("▼", canvas.width - 42, centerY + 10);
        }
        
        function calculateTargetAngle(prizeIndex, currentAngle) {
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            let targetSegmentCenter = (prizeIndex * angleStep) + (angleStep / 2);
            let neededRotation = (Math.PI * 2 - targetSegmentCenter) % (Math.PI * 2);
            let fullRotations = Math.PI * 2 * 5;
            return currentAngle + neededRotation + fullRotations;
        }
        
        function animateSpin(currentTime) {
            if (!spinning) return;
            
            const elapsed = currentTime - spinStartTime;
            let progress = Math.min(1, elapsed / spinDuration);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            currentAngle = spinStartAngle + (targetAngle - spinStartAngle) * easeOut;
            
            drawWheel(currentAngle);
            
            if (progress < 1) {
                requestAnimationFrame(animateSpin);
            } else {
                spinning = false;
                const spinBtn = document.getElementById('spinBtn');
                if (spinBtn) spinBtn.disabled = false;
                
                const prize = SEGMENTS[selectedSegmentIndex];
                
                // ✅ التعديل الأهم: تحديث البيانات قبل الإرسال
                const newSpinCount = userParams.spin_count + 1;
                const newLastSpinTime = Date.now();
                
                const resultData = {
                    prize: prize.name,
                    prize_value: prize.value,
                    prize_type: prize.type,
                    spin_count: newSpinCount,  // 👈 العدد الجديد
                    total_recharge: userParams.total_recharge,
                    total_withdraw: userParams.total_withdraw,
                    last_spin_time: newLastSpinTime  // 👈 الوقت الجديد
                };
                
                console.log("📤 إرسال البيانات:", resultData);
                
                // إرسال البيانات إلى البوت
                tg.sendData(JSON.stringify(resultData));
                
                // تحديث البيانات محلياً
                userParams.spin_count = newSpinCount;
                userParams.last_spin_time = newLastSpinTime;
                saveUserSpinData();
                
                // عرض النتيجة
                const resultDiv = document.getElementById('result');
                if (resultDiv) {
                    let prizeText = "";
                    if (prize.type === "amount") {
                        prizeText = `${prize.value.toLocaleString()} ل.س`;
                    } else {
                        prizeText = `${prize.value}% رصيد إضافي`;
                    }
                    resultDiv.innerHTML = `🎉🎊 ${prize.name} 🎊🎉<br><small>${prizeText}</small><br><small>✅ تم إرسال الجائزة إلى البوت</small>`;
                }
                
                // إغلاق الويب آب بعد 2 ثانية (اختياري)
                setTimeout(() => {
                    tg.close();
                }, 2000);
            }
        }
        
        function startSpin() {
            if (spinning) return;
            
            if (isCooldownActive() && userParams.spin_count > 0) {
                showCooldownPage();
                return;
            }
            
            const result = determinePrize();
            selectedSegmentIndex = result.index;
            
            spinning = true;
            spinStartAngle = currentAngle;
            targetAngle = calculateTargetAngle(selectedSegmentIndex, currentAngle);
            spinStartTime = performance.now();
            
            const spinBtn = document.getElementById('spinBtn');
            const resultDiv = document.getElementById('result');
            if (spinBtn) spinBtn.disabled = true;
            if (resultDiv) resultDiv.innerHTML = '🌀 جاري الدوران... 🌀';
            
            requestAnimationFrame(animateSpin);
        }
        
        // ================ عرض صفحة التبريد ================
        function showCooldownPage() {
            const app = document.getElementById('app');
            const remaining = getRemainingCooldownTime();
            app.innerHTML = `
                <div class="cooldown-message">
                    <h2>⏰ عذراً!</h2>
                    <p>يمكنك اللعب مرة واحدة كل 48 ساعة</p>
                    <div class="timer" id="timer">${String(remaining.hours).padStart(2,'0')}:${String(remaining.minutes).padStart(2,'0')}:${String(remaining.seconds).padStart(2,'0')}</div>
                    <p>يمكنك العودة بعد انتهاء الوقت المتبقي</p>
                    <button onclick="location.reload()" class="spin-button" style="margin-top:20px">🔄 تحديث</button>
                </div>
            `;
            
            const timerInterval = setInterval(() => {
                const newRemaining = getRemainingCooldownTime();
                if (newRemaining.remaining <= 0) {
                    clearInterval(timerInterval);
                    location.reload();
                } else {
                    const timerEl = document.getElementById('timer');
                    if (timerEl) {
                        timerEl.textContent = `${String(newRemaining.hours).padStart(2,'0')}:${String(newRemaining.minutes).padStart(2,'0')}:${String(newRemaining.seconds).padStart(2,'0')}`;
                    }
                }
            }, 1000);
        }
        
        function showErrorPage() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="error-message">
                    <h2>⛔ خطأ في الوصول</h2>
                    <p>يرجى الدخول من خلال الرابط المخصص للعبة.</p>
                    <a href="javascript:void(0)" onclick="window.history.back()" class="spin-button" style="display:inline-block; margin-top:20px; text-decoration:none">↺ المحاولة مرة أخرى</a>
                </div>
            `;
        }
        
        // ================ عرض واجهة العجلة ================
        function showWheelPage() {
            if (isCooldownActive() && userParams.spin_count > 0) {
                showCooldownPage();
                return;
            }
            
            const prizeResult = determinePrize();
            const expectedPrize = prizeResult.prize;
            
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="user-info">
                    <div class="info-row"><span class="info-label">🆔 معرف المستخدم:</span><span class="info-value">${userParams.user_id}</span></div>
                    <div class="info-row"><span class="info-label">💰 إجمالي الشحن:</span><span class="info-value">${userParams.total_recharge.toLocaleString()} ل.س</span></div>
                    <div class="info-row"><span class="info-label">💸 إجمالي السحب:</span><span class="info-value">${userParams.total_withdraw.toLocaleString()} ل.س</span></div>
                    <div class="info-row"><span class="info-label">🎲 عدد المرات:</span><span class="info-value">${userParams.spin_count}</span></div>
                    <div class="info-row"><span class="info-label">🎁 الجائزة المتوقعة:</span><span class="info-value">${expectedPrize.name}</span></div>
                </div>
                <div class="wheel-wrapper"><canvas id="wheelCanvas" width="500" height="500"></canvas></div>
                <button class="spin-button" id="spinBtn">🔄 أدر العجلة</button>
                <div class="result" id="result">✨ اضغط على الزر لبدء اللعب ✨</div>
            `;
            
            canvas = document.getElementById('wheelCanvas');
            ctx = canvas.getContext('2d');
            drawWheel();
            document.getElementById('spinBtn').addEventListener('click', startSpin);
        }
        
        // ================ التشغيل الرئيسي ================
        function init() {
            userParams = getUrlParams();
            
            if (!userParams.user_id) {
                showErrorPage();
                return;
            }
            
            loadUserSpinData();
            
            if (userParams.spin_count === undefined) userParams.spin_count = 0;
            if (userParams.last_spin_time === undefined) userParams.last_spin_time = 0;
            if (userParams.has_claimed_25_percent === undefined) userParams.has_claimed_25_percent = false;
            if (userParams.has_recharged === undefined) userParams.has_recharged = false;
            
            showWheelPage();
        }
        
        init();
    </script>
</body>
</html>

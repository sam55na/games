<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>سلوتس الأبجدية المفقودة - دفع حقيقي</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0c1a, #02040c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 3rem;
            padding: 1.5rem 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .slots-machine {
            background: linear-gradient(145deg, #151c2c, #0a0f1a);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: inset 0 0 8px #00000066, 0 10px 20px rgba(0,0,0,0.4);
        }

        .reels-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
            background: #03060c;
            padding: 20px;
            border-radius: 1.8rem;
            border: 1px solid #f3b33d55;
        }

        .reel {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .symbol {
            background: radial-gradient(ellipse at 30% 35%, #1e253b, #0f1322);
            aspect-ratio: 1 / 1;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.9rem;
            font-weight: bold;
            text-shadow: 0 0 5px cyan;
            box-shadow: 0 6px 0 #05070e, inset 0 1px 1px rgba(255,255,255,0.15);
            transition: 0.05s linear;
            color: #ffefc0;
        }

        .symbol-spinning {
            animation: quickSpin 0.07s infinite alternate;
        }

        @keyframes quickSpin {
            0% { transform: translateY(0px) scale(0.98); background: #2c3457; }
            100% { transform: translateY(-5px) scale(1.02); background: #3f4e7c; }
        }

        .win-glow {
            animation: winBlast 0.45s ease-out 3;
            box-shadow: 0 0 0 2px gold, 0 0 18px 5px #ffaa33;
            background: radial-gradient(ellipse at 30% 35%, #e5b83c, #b57c1c);
            color: black;
            text-shadow: 0 0 4px white;
        }

        @keyframes winBlast {
            0% { filter: brightness(1); background: #c9a03d; }
            50% { filter: brightness(1.5); background: #ffd966; transform: scale(1.02);}
            100% { filter: brightness(1); background: radial-gradient(ellipse at 30% 35%, #e5b83c, #b57c1c);}
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            background: #03050bc9;
            padding: 0.7rem 1.5rem;
            border-radius: 2.5rem;
            border: 1px solid #ffcd7e55;
        }

        .balance-box, .win-box {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .balance-box span, .win-box span {
            color: #a9c0ff;
            font-size: 0.9rem;
        }

        .balance-value, .win-value {
            color: #ffcf6e;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 3px orange;
        }

        .button-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 1.5rem;
        }

        .spin-btn, .reset-btn {
            background: linear-gradient(135deg, #2f3b5c, #191f30);
            border: none;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0.7rem 2rem;
            border-radius: 3rem;
            color: #ffe2a4;
            font-family: inherit;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 5px 0 #0b0f18;
        }

        .spin-btn:active, .reset-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0b0f18;
        }

        .spin-btn {
            background: linear-gradient(135deg, #694b2c, #3f2a18);
            box-shadow: 0 5px 0 #2a1e12;
            color: #ffdc97;
        }

        .message-area {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            background: #000000aa;
            border-radius: 2rem;
            padding: 0.4rem;
            color: #ffcd7e;
            backdrop-filter: blur(4px);
        }

        .paylines-note {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.8rem;
            color: #9aa9dd;
        }

        @media (max-width: 620px) {
            .reels-container { gap: 6px; padding: 12px; }
            .symbol { font-size: 2rem; border-radius: 0.8rem; }
            .spin-btn, .reset-btn { font-size: 1.1rem; padding: 0.5rem 1rem; }
            .balance-box, .win-box { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="slots-machine">
        <div class="reels-container" id="reelsContainer"></div>

        <div class="info-panel">
            <div class="balance-box"><span>💎 الرصيد</span> <span class="balance-value" id="balance">1000</span></div>
            <div class="win-box"><span>🏅 آخر ربح</span> <span class="win-value" id="lastWin">0</span></div>
        </div>

        <div class="button-bar">
            <button class="spin-btn" id="spinBtn">🎰 دَوِّر</button>
            <button class="reset-btn" id="resetBtn">🔄 إعادة ضبط</button>
        </div>
        <div class="message-area" id="messageBox">⚡ 10 خطوط دفع | تطابق الرموز = ربح حقيقي ⚡</div>
        <div class="paylines-note">📌 10 خطوط دفع نشطة | 5 أعمدة × 3 صفوف | رموز أسطورية فريدة</div>
    </div>
</div>

<script>
    (function(){
        // ========== رموز غير مألوفة بقيم عادلة ==========
        const SYMBOLS_LIST = [
            { id: "🐉", name: "تنين الأثير", value: 55, rarity: 3 },
            { id: "⚜️", name: "الخالد", value: 45, rarity: 4 },
            { id: "🌀", name: "عجلة المصير", value: 35, rarity: 6 },
            { id: "🌑", name: "كسوف الأزل", value: 25, rarity: 8 },
            { id: "🔥", name: "جوهر النار", value: 20, rarity: 9 },
            { id: "❄️", name: "قلب الجليد", value: 18, rarity: 10 },
            { id: "👁️", name: "عين الرؤيا", value: 40, rarity: 5 },
            { id: "⚡", name: "صاعقة القدر", value: 30, rarity: 7 }
        ];

        // اختيار رمز عشوائي بناءً على الندرة (الاحترافية)
        function getWeightedSymbol() {
            let totalWeight = SYMBOLS_LIST.reduce((sum, s) => sum + s.rarity, 0);
            let rand = Math.random() * totalWeight;
            let accum = 0;
            for (let sym of SYMBOLS_LIST) {
                accum += sym.rarity;
                if (rand <= accum) return { ...sym };  // نسخة مستقلة
            }
            return { ...SYMBOLS_LIST[0] };
        }

        const ROWS = 3;
        const COLS = 5;
        const BET = 10;
        let balance = 1000;
        let currentGrid = [];     // [row][col] -> رمز (كائن)
        let isSpinning = false;

        // DOM
        const reelsContainer = document.getElementById('reelsContainer');
        const balanceSpan = document.getElementById('balance');
        const lastWinSpan = document.getElementById('lastWin');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const messageBox = document.getElementById('messageBox');

        // ========== خطوط الدفع العشرة (المسارات الفعلية) ==========
        // كل خط هو مصفوفة length = 5 (عمود 0 إلى 4) وكل قيمة = رقم الصف (0,1,2)
        const PAYLINES_PATTERNS = [
            [0,0,0,0,0], // السطر العلوي
            [1,1,1,1,1], // السطر الأوسط
            [2,2,2,2,2], // السطر السفلي
            [0,1,2,1,0], // شكل V
            [2,1,0,1,2], // شكل V معكوس
            [0,0,1,2,2], // درج نازل
            [2,2,1,0,0], // درج صاعد
            [1,0,1,2,1], // منحنى سحري
            [1,2,1,0,1], // منحنى معكوس سحري
            [0,1,1,1,0]  // قوس صغير
        ];

        // بناء واجهة المستخدم (شبكة 5x3)
        function buildUI() {
            reelsContainer.innerHTML = '';
            for (let c = 0; c < COLS; c++) {
                const reelDiv = document.createElement('div');
                reelDiv.className = 'reel';
                reelDiv.setAttribute('data-col', c);
                for (let r = 0; r < ROWS; r++) {
                    const symbolDiv = document.createElement('div');
                    symbolDiv.className = 'symbol';
                    symbolDiv.setAttribute('data-row', r);
                    symbolDiv.setAttribute('data-col', c);
                    symbolDiv.textContent = '🌀';
                    reelDiv.appendChild(symbolDiv);
                }
                reelsContainer.appendChild(reelDiv);
            }
        }

        // تحديث الشاشة من currentGrid
        function updateUI() {
            for (let c = 0; c < COLS; c++) {
                const reel = reelsContainer.children[c];
                for (let r = 0; r < ROWS; r++) {
                    const cell = reel.children[r];
                    const symbolObj = currentGrid[r][c];
                    cell.textContent = symbolObj.id;
                    cell.classList.remove('win-glow');
                }
            }
        }

        // توليد شبكة عشوائية بالكامل
        function generateRandomGrid() {
            const grid = [];
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    grid[r][c] = getWeightedSymbol();
                }
            }
            return grid;
        }

        // ========== منطق الدفع الصحيح: يجب أن تكون الرموز متطابقة على طول الخط ==========
        // نحسب طول أطول تطابق متتالي يبدأ من العمود 0 (ضرورة أن يكون التطابق من البداية)
        // إذا تطابقت جميع الرموز الخمسة = مكافأة كبرى.
        function calculatePayout(grid, betAmount) {
            let totalWin = 0;
            const winningLinesDetails = []; // لتخزين معلومات عن كل خط رابح
            const winningCellsSet = new Set(); // لتسليط الضوء على الخلايا الفائزة

            for (let lineIdx = 0; lineIdx < PAYLINES_PATTERNS.length; lineIdx++) {
                const pattern = PAYLINES_PATTERNS[lineIdx];
                // استخراج الرموز على طول هذا الخط
                const symbolsOnLine = [];
                for (let col = 0; col < COLS; col++) {
                    const rowIdx = pattern[col];
                    symbolsOnLine.push(grid[rowIdx][col]);
                }

                // الآن نتحقق من التطابق المتسلسل بدءاً من العمود 0
                const firstSymbol = symbolsOnLine[0];
                let matchCount = 1;
                for (let i = 1; i < symbolsOnLine.length; i++) {
                    if (symbolsOnLine[i].id === firstSymbol.id) {
                        matchCount++;
                    } else {
                        break;  // أول رمز مختلف يقطع التطابق
                    }
                }

                // يجب أن يكون على الأقل 3 رموز متطابقة لتحقيق الربح (المعيار العالمي)
                if (matchCount >= 3) {
                    let multiplier = 0;
                    if (matchCount === 3) multiplier = 1.5;
                    else if (matchCount === 4) multiplier = 3.0;
                    else if (matchCount === 5) multiplier = 8.0;  // فوز كبير

                    let lineWin = Math.floor(firstSymbol.value * multiplier * (betAmount / 10));
                    if (lineWin > 0) {
                        totalWin += lineWin;
                        winningLinesDetails.push({
                            line: lineIdx + 1,
                            symbol: firstSymbol.id,
                            count: matchCount,
                            win: lineWin,
                            pattern: pattern
                        });
                        // إضافة الخلايا الفائزة إلى Set
                        for (let col = 0; col < matchCount; col++) {
                            const rowIdx = pattern[col];
                            winningCellsSet.add(`${rowIdx},${col}`);
                        }
                    }
                }
            }

            // مكافأة إضافية: "الغموض الأسطوري" إذا كان هناك 5 رموز متطابقة في أي خط من الخطوط (تم احتسابها أعلاه)
            // ولكن نضيف جائزة خاصة إذا امتلأت الشبكة بنفس الرمز (جميع الخلايا 15 رمز متطابق)
            let firstAll = grid[0][0].id;
            let allSame = true;
            for (let r=0; r<ROWS; r++) {
                for (let c=0; c<COLS; c++) {
                    if (grid[r][c].id !== firstAll) allSame = false;
                }
            }
            if (allSame) {
                let megaBonus = 1500;
                totalWin += megaBonus;
                messageBox.innerHTML = `🏆 جائزة الأسطورة الكبرى! كل الرموز متطابقة +${megaBonus} 🏆`;
                // إضافة جميع الخلايا للتأثير
                for (let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) winningCellsSet.add(`${r},${c}`);
            }

            return { totalWin, winningLinesDetails, winningCellsSet };
        }

        // تطبيق تأثير الفوز على الخلايا الفائزة
        function applyWinEffects(winningCellsSet) {
            // إزالة أي تأثير سابق
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    const cell = reelsContainer.children[c].children[r];
                    cell.classList.remove('win-glow');
                }
            }
            // إضافة تأثير جديد
            for (let cellKey of winningCellsSet) {
                const [row, col] = cellKey.split(',').map(Number);
                const cell = reelsContainer.children[col].children[row];
                cell.classList.add('win-glow');
            }
        }

        // تحديث الرصيد وعرض رسالة الفوز
        function updateBalanceAndMessage(winAmount, winningLines) {
            if (winAmount > 0) {
                balance += winAmount;
                balanceSpan.textContent = balance;
                lastWinSpan.textContent = winAmount;
                let linesMsg = winningLines.map(l => `خط ${l.line} (${l.symbol}×${l.count}) +${l.win}`).join(' · ');
                messageBox.innerHTML = `✨ فوز! ${winAmount} نقطة ✨ ${linesMsg}`;
                if (navigator.vibrate) navigator.vibrate(200);
            } else {
                lastWinSpan.textContent = "0";
                messageBox.innerHTML = `😓 لم يتطابق أي رمز كافي. أدر مجدداً! 😓`;
            }
            balanceSpan.textContent = balance;
        }

        // الدوران مع مؤثرات احترافية
        async function performSpin() {
            if (isSpinning) {
                messageBox.innerHTML = "⌛ الدوران قيد التنفيذ... انتظر قليلاً";
                return;
            }
            if (balance < BET) {
                messageBox.innerHTML = "❌ رصيد غير كافٍ! استخدم إعادة الضبط ❌";
                return;
            }

            isSpinning = true;
            spinBtn.disabled = true;
            resetBtn.disabled = true;

            // خصم الرهان
            balance -= BET;
            balanceSpan.textContent = balance;
            messageBox.innerHTML = "🌀 تدوير البكرات... أتمنى تطابقاً أسطورياً 🌀";

            // الشبكة النهائية (النتيجة الحقيقية)
            const finalGrid = generateRandomGrid();

            // تأثير الدوران المرئي (تغيير سريع للرموز)
            const spinSteps = 14;
            let step = 0;
            const intervalTime = 55; // مللي ثانية
            const spinInterval = setInterval(() => {
                if (step >= spinSteps) {
                    clearInterval(spinInterval);
                    // تطبيق النتيجة النهائية
                    currentGrid = finalGrid.map(row => [...row]);
                    updateUI();

                    // حساب الأرباح بناءً على الشبكة الحقيقية
                    const { totalWin, winningLinesDetails, winningCellsSet } = calculatePayout(currentGrid, BET);
                    
                    if (totalWin > 0) {
                        applyWinEffects(winningCellsSet);
                        updateBalanceAndMessage(totalWin, winningLinesDetails);
                    } else {
                        // إزالة أي تأثيرات سابقة
                        for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) reelsContainer.children[c].children[r].classList.remove('win-glow');
                        updateBalanceAndMessage(0, []);
                    }

                    // إنهاء الدوران
                    isSpinning = false;
                    spinBtn.disabled = false;
                    resetBtn.disabled = false;
                    if (balance <= 0) messageBox.innerHTML = "⚠️ الرصيد صفر! اضغط إعادة ضبط ⚠️";
                    else if (totalWin === 0) messageBox.innerHTML = "🎲 حظ أوفر في المرة القادمة! استمر بالمحاولة 🎲";
                    
                    // إزالة كلاس السبينينج
                    for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) reelsContainer.children[c].children[r].classList.remove('symbol-spinning');
                    return;
                }

                // عرض رموز عشوائية مؤقتة أثناء التدوير
                for (let c = 0; c < COLS; c++) {
                    const reelDiv = reelsContainer.children[c];
                    for (let r = 0; r < ROWS; r++) {
                        const randomTempSym = getWeightedSymbol();
                        const cell = reelDiv.children[r];
                        if (!cell.classList.contains('win-glow')) {
                            cell.textContent = randomTempSym.id;
                            cell.classList.add('symbol-spinning');
                        }
                    }
                }
                step++;
            }, intervalTime);
        }

        // إعادة ضبط كاملة
        function resetFullGame() {
            if (isSpinning) return;
            balance = 1000;
            balanceSpan.textContent = balance;
            lastWinSpan.textContent = "0";
            currentGrid = generateRandomGrid();
            updateUI();
            messageBox.innerHTML = "🔄 تمت إعادة الضبط. رصيد 1000 نقطة. ابدأ اللعب الآن! 🔄";
            for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++) reelsContainer.children[c].children[r].classList.remove('win-glow', 'symbol-spinning');
        }

        // بدء اللعبة
        function init() {
            buildUI();
            currentGrid = generateRandomGrid();
            updateUI();
            spinBtn.addEventListener('click', performSpin);
            resetBtn.addEventListener('click', resetFullGame);
        }

        init();
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB | مدفع المربعات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #050510);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .game-container {
            background: linear-gradient(145deg, #0f0f1f, #080812);
            border-radius: 40px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.2);
        }

        /* ========== غرفة الانتظار ========== */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-card {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border-radius: 35px;
            padding: 35px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 500px;
            width: 90%;
        }

        .waiting-title {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .rooms-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .room-btn {
            background: rgba(255,215,0,0.1);
            border: 1px solid #ffd700;
            border-radius: 50px;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .room-btn:hover {
            background: rgba(255,215,0,0.2);
            transform: scale(1.02);
        }

        .create-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .waiting-text {
            color: #ffd700;
            margin-top: 20px;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ========== لوحة اللعبة ========== */
        .game-board {
            display: none;
        }

        .game-board.active {
            display: block;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .turn-indicator {
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffd700;
            font-weight: bold;
            border: 1px solid #ffd700;
        }

        .balance-box {
            background: rgba(0,0,0,0.6);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            border: 1px solid #ffd700;
        }

        .balance-box span {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .timer-box {
            background: rgba(0,0,0,0.7);
            padding: 8px 18px;
            border-radius: 40px;
            color: #ff6666;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
        }

        /* الشبكة 10x10 */
        .grid-area {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            width: min(70vh, 90vw);
            height: min(70vh, 90vw);
            position: relative;
        }

        .cell {
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 6px;
            transition: all 0.08s ease;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1);
        }

        .cell.red {
            background: linear-gradient(145deg, #ff5555, #cc3333);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }

        .cell.blue {
            background: linear-gradient(145deg, #5555ff, #3333cc);
            box-shadow: 0 0 10px rgba(68,68,255,0.5);
        }

        .cell.hit-effect {
            transform: scale(1.08);
            filter: brightness(1.3);
        }

        /* المدافع وشريط القوة */
        .cannons-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
            margin-top: 10px;
        }

        .cannon {
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.05s linear;
        }

        .cannon-icon {
            font-size: 4rem;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
            transition: transform 0.05s ease;
        }

        .cannon.active .cannon-icon {
            filter: drop-shadow(0 0 15px #ffd700);
            text-shadow: 0 0 10px #ffd700;
        }

        .cannon-label {
            color: #888;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        .cannon.active .cannon-label {
            color: #ffd700;
        }

        /* شريط القوة العمودي */
        .power-side {
            width: 45px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            border: 1px solid #ffd700;
            height: 140px;
            position: relative;
            margin: 0 15px;
        }

        .power-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(0deg, #2ecc71, #f1c40f, #e74c3c);
            border-radius: 30px;
            height: 0%;
            transition: height 0.02s linear;
        }

        .power-text {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 0.7rem;
            white-space: nowrap;
        }

        /* كرة الرمي */
        .ball-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .exit-btn {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
        }

        .exit-btn:hover {
            background: rgba(0,0,0,0.8);
        }

        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .result-modal.active {
            display: flex;
        }

        .result-card {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border-radius: 35px;
            padding: 35px;
            text-align: center;
            border: 2px solid #ffd700;
            min-width: 280px;
        }

        .result-card h2 {
            color: #ffd700;
            margin-bottom: 15px;
        }

        .result-card button {
            background: #ffd700;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            .cannon-icon { font-size: 2.5rem; }
            .power-side { height: 100px; width: 35px; }
            .game-grid { width: min(60vh, 85vw); height: min(60vh, 85vw); }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="waiting-room" id="waitingRoom">
            <div class="waiting-card">
                <div class="waiting-title">🎮 غرف اللعب</div>
                <div class="rooms-list" id="roomsList"></div>
                <button class="create-btn" id="createBtn">➕ إنشاء غرفة ($10)</button>
                <div class="waiting-text" id="waitingText">
                    ⏳ انتظار لاعب آخر...<br>
                    <span id="roomIdDisplay"></span>
                </div>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="info-bar">
                <div class="turn-indicator" id="turnText">⏳ انتظار...</div>
                <div class="balance-box">💰 <span id="balance">0</span></div>
                <div class="timer-box" id="timer">15s</div>
            </div>

            <div class="grid-area">
                <div class="game-grid" id="gameGrid"></div>
            </div>

            <div class="cannons-area">
                <div class="cannon" id="cannonLeft">
                    <div class="cannon-icon">🔫</div>
                    <div class="cannon-label">🔴 اللاعب 1</div>
                </div>
                
                <div class="power-side">
                    <div class="power-text">⚡ القوة</div>
                    <div class="power-fill" id="powerFill"></div>
                </div>
                
                <div class="cannon" id="cannonRight">
                    <div class="cannon-icon">🔫</div>
                    <div class="cannon-label">🔵 اللاعب 2</div>
                </div>
            </div>
        </div>
    </div>
</div>

<canvas class="ball-canvas" id="ballCanvas"></canvas>
<button class="exit-btn" id="exitBtn" onclick="window.exitGame()">🚪 خروج</button>

<div class="result-modal" id="resultModal">
    <div class="result-card">
        <h2 id="resultTitle"></h2>
        <p id="resultMsg"></p>
        <div id="resultStats" style="margin: 15px 0;"></div>
        <button onclick="window.closeResult()">العودة للغرف</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ==================== SOUND SYSTEM ====================
    let audioCtx = null;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    
    function playSound(freq, duration, type = 'sine', volume = 0.3) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }
    
    function playShoot() {
        playSound(180, 0.1, 'triangle', 0.4);
        setTimeout(() => playSound(130, 0.12, 'sine', 0.3), 40);
    }
    
    function playHit() {
        playSound(380, 0.06, 'sine', 0.3);
    }
    
    function playBounce() {
        playSound(220, 0.04, 'triangle', 0.2);
    }
    
    function playGameOver() {
        playSound(280, 0.2, 'sine', 0.3);
        setTimeout(() => playSound(180, 0.3, 'sine', 0.3), 150);
    }

    // ==================== FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
        authDomain: "boomb-fa3e7.firebaseapp.com",
        databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
        projectId: "boomb-fa3e7",
        storageBucket: "boomb-fa3e7.firebasestorage.app",
        messagingSenderId: "499624996530",
        appId: "1:499624996530:web:235f71e450845c748523ab"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // ==================== CONFIG ====================
    const CONFIG = {
        BET: 10,
        WIN: 18,
        GRID: 10,
        THROW_TIME: 15,
        THROWS: 3,
        GRAVITY: 0.28,
        BOUNCE: 0.72,
        FRICTION: 0.995,
        SPEED_MULT: 5.5
    };
    
    // ==================== USER ====================
    let currentUser = {
        id: localStorage.getItem('uid') || 'u_' + Math.random().toString(36).substr(2, 8),
        name: 'لاعب_' + Math.floor(Math.random() * 1000),
        balance: 100
    };
    localStorage.setItem('uid', currentUser.id);
    
    // ==================== GAME STATE ====================
    let gameState = {
        active: false,
        roomId: null,
        roomData: null,
        grid: [],
        currentPlayer: 1,
        p1Throws: CONFIG.THROWS,
        p2Throws: CONFIG.THROWS,
        myRole: null,
        timer: CONFIG.THROW_TIME,
        timerInterval: null,
        gameListener: null,
        isShooting: false,
        power: 0,
        dragging: false,
        dragStart: { x: 0, y: 0 }
    };
    
    // ==================== DOM ELEMENTS ====================
    let canvas, ctx;
    let animationId = null;
    
    // ==================== GRID FUNCTIONS ====================
    function createGrid() {
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';
        for (let i = 0; i < CONFIG.GRID * CONFIG.GRID; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.index = i;
            grid.appendChild(cell);
        }
    }
    
    function updateGrid() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            const r = Math.floor(i / CONFIG.GRID);
            const c = i % CONFIG.GRID;
            const val = gameState.grid[r]?.[c];
            cell.className = 'cell';
            if (val === 1) cell.classList.add('red');
            if (val === 2) cell.classList.add('blue');
        });
    }
    
    function resetGrid() {
        gameState.grid = Array(CONFIG.GRID).fill().map(() => Array(CONFIG.GRID).fill(0));
        updateGrid();
    }
    
    // ==================== BALL PHYSICS - حرية كاملة خارج الحلبة ====================
    class Ball {
        constructor(x, y, vx, vy, player) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.player = player;
            this.radius = 12;
            this.trail = [];
            this.active = true;
            this.bounds = null;
        }
        
        update() {
            this.vy += CONFIG.GRAVITY;
            this.vx *= CONFIG.FRICTION;
            this.vy *= CONFIG.FRICTION;
            this.x += this.vx;
            this.y += this.vy;
            
            // Save trail for visual effect
            this.trail.push({ x: this.x, y: this.y });
            if (this.trail.length > 12) this.trail.shift();
            
            // لا نحد الكرة داخل أي حدود - تتحرك بحرية
            // فقط نتحقق إذا خرجت بعيداً جداً لإنهاء الرمية
            if (Math.abs(this.x) > 3000 || Math.abs(this.y) > 3000) {
                this.active = false;
            }
        }
        
        draw() {
            if (!ctx) return;
            
            // Draw trail
            for (let i = 0; i < this.trail.length; i++) {
                const t = this.trail[i];
                const alpha = (i / this.trail.length) * 0.4;
                ctx.beginPath();
                ctx.arc(t.x, t.y, this.radius * (0.5 + i / this.trail.length * 0.5), 0, Math.PI * 2);
                ctx.fillStyle = this.player === 1 ? `rgba(255, 80, 80, ${alpha})` : `rgba(80, 80, 255, ${alpha})`;
                ctx.fill();
            }
            
            // Draw ball with glow
            ctx.shadowBlur = 18;
            ctx.shadowColor = this.player === 1 ? '#ff4444' : '#4444ff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.player === 1 ? '#ff6666' : '#6666ff';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Inner highlight
            ctx.beginPath();
            ctx.arc(this.x - 3, this.y - 3, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,200,0.8)';
            ctx.fill();
        }
        
        checkGridCollision(gridRect, cellWidth, cellHeight) {
            // التحقق من أن الكرة داخل منطقة الشبكة فقط
            if (this.x >= gridRect.left && this.x <= gridRect.right &&
                this.y >= gridRect.top && this.y <= gridRect.bottom) {
                
                const relX = this.x - gridRect.left;
                const relY = this.y - gridRect.top;
                const col = Math.floor(relX / cellWidth);
                const row = Math.floor(relY / cellHeight);
                
                if (row >= 0 && row < CONFIG.GRID && col >= 0 && col < CONFIG.GRID) {
                    return { row, col };
                }
            }
            return null;
        }
    }
    
    // ==================== SHOOT FUNCTION - كرة بطيئة وحرية كاملة ====================
    async function shoot(power, angleRad, isLeft) {
        if (gameState.isShooting || !gameState.active) return;
        if (gameState.myRole !== gameState.currentPlayer) {
            showMsg('⏳ ليس دورك!');
            return;
        }
        
        initAudio();
        playShoot();
        
        const gridElement = document.querySelector('.game-grid');
        const gridRect = gridElement.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();
        
        // نقطة انطلاق الكرة من المدفع
        const startX = (gridRect.left + (isLeft ? 25 : gridRect.width - 25)) - canvasRect.left;
        const startY = (gridRect.bottom - 15) - canvasRect.top;
        
        // سرعة بطيئة لرؤية واضحة للاصطدامات
        const speed = CONFIG.SPEED_MULT + (power / 100) * 7;
        const vx = Math.cos(angleRad) * speed * (isLeft ? 1 : -1);
        const vy = Math.sin(angleRad) * speed * -1;
        
        const ball = new Ball(startX, startY, vx, vy, gameState.currentPlayer);
        gameState.isShooting = true;
        
        const cellWidth = gridRect.width / CONFIG.GRID;
        const cellHeight = gridRect.height / CONFIG.GRID;
        let lastHit = null;
        
        // حفظ مرجع للحدود لتحديثها عند تغيير حجم الشاشة
        let currentGridRect = gridRect;
        
        function animate() {
            if (!ball.active) {
                cancelAnimationFrame(animationId);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                gameState.isShooting = false;
                afterShoot();
                return;
            }
            
            // تحديث حدود الشبكة (في حال تغير حجم الشاشة)
            const newGridRect = document.querySelector('.game-grid').getBoundingClientRect();
            const newCanvasRect = canvas.getBoundingClientRect();
            
            ball.update();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ball.draw();
            
            // تحديث حدود الاصطدام بالنسبة للكانفاس
            const gridBounds = {
                left: newGridRect.left - newCanvasRect.left,
                right: newGridRect.right - newCanvasRect.left,
                top: newGridRect.top - newCanvasRect.top,
                bottom: newGridRect.bottom - newCanvasRect.top
            };
            
            // التحقق من اصطدام الكرة بالشبكة (فقط داخل الحلبة)
            if (ball.x >= gridBounds.left && ball.x <= gridBounds.right &&
                ball.y >= gridBounds.top && ball.y <= gridBounds.bottom) {
                
                const relX = ball.x - gridBounds.left;
                const relY = ball.y - gridBounds.top;
                const col = Math.floor(relX / cellWidth);
                const row = Math.floor(relY / cellHeight);
                
                if (row >= 0 && row < CONFIG.GRID && col >= 0 && col < CONFIG.GRID) {
                    const cellKey = `${row}-${col}`;
                    if (lastHit !== cellKey && gameState.grid[row][col] === 0) {
                        // تلوين المربع
                        gameState.grid[row][col] = gameState.currentPlayer;
                        updateGrid();
                        playHit();
                        
                        // تأثير بصري
                        const cellDiv = document.querySelector(`.cell[data-index="${row * CONFIG.GRID + col}"]`);
                        if (cellDiv) {
                            cellDiv.classList.add('hit-effect');
                            setTimeout(() => cellDiv.classList.remove('hit-effect'), 150);
                        }
                        lastHit = cellKey;
                        
                        // ارتداد طفيف عند الاصطدام
                        ball.vx *= 0.96;
                        ball.vy *= -0.2;
                    }
                }
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        animate();
    }
    
    async function afterShoot() {
        if (gameState.currentPlayer === 1) gameState.p1Throws--;
        else gameState.p2Throws--;
        
        await updateRoom();
        
        if (gameState.p1Throws <= 0 && gameState.p2Throws <= 0) {
            endGame();
        } else if (gameState.currentPlayer === 1 && gameState.p1Throws <= 0) {
            switchTurn();
        } else if (gameState.currentPlayer === 2 && gameState.p2Throws <= 0) {
            switchTurn();
        } else {
            switchTurn();
        }
    }
    
    function switchTurn() {
        gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
        updateUI();
        resetTimer();
        updateRoom();
    }
    
    function updateUI() {
        const isMyTurn = gameState.myRole === gameState.currentPlayer;
        const throws = gameState.currentPlayer === 1 ? gameState.p1Throws : gameState.p2Throws;
        const playerName = gameState.currentPlayer === 1 ? '🔴 اللاعب 1' : '🔵 اللاعب 2';
        document.getElementById('turnText').textContent = `${playerName} | ${throws} رميات ${isMyTurn ? '👈 دورك' : ''}`;
        
        const leftCannon = document.getElementById('cannonLeft');
        const rightCannon = document.getElementById('cannonRight');
        leftCannon.classList.toggle('active', gameState.currentPlayer === 1);
        rightCannon.classList.toggle('active', gameState.currentPlayer === 2);
    }
    
    function resetTimer() {
        if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        gameState.timer = CONFIG.THROW_TIME;
        document.getElementById('timer').textContent = gameState.timer + 's';
        
        gameState.timerInterval = setInterval(() => {
            if (!gameState.active) return;
            gameState.timer--;
            document.getElementById('timer').textContent = gameState.timer + 's';
            if (gameState.timer <= 0 && !gameState.isShooting) {
                clearInterval(gameState.timerInterval);
                showMsg('⏰ انتهى الوقت!');
                afterShoot();
            }
        }, 1000);
    }
    
    async function updateRoom() {
        if (!gameState.roomId) return;
        await db.ref(`rooms/${gameState.roomId}`).update({
            grid: gameState.grid,
            currentPlayer: gameState.currentPlayer,
            p1Throws: gameState.p1Throws,
            p2Throws: gameState.p2Throws
        });
    }
    
    async function endGame() {
        gameState.active = false;
        clearInterval(gameState.timerInterval);
        if (gameState.gameListener) db.ref(`rooms/${gameState.roomId}`).off();
        
        let p1 = 0, p2 = 0;
        for (let r = 0; r < CONFIG.GRID; r++) {
            for (let c = 0; c < CONFIG.GRID; c++) {
                if (gameState.grid[r][c] === 1) p1++;
                if (gameState.grid[r][c] === 2) p2++;
            }
        }
        
        const isPlayer1 = gameState.roomData?.player1 === currentUser.id;
        let title, msg, winnings = 0;
        
        if (p1 > p2) {
            if (isPlayer1) { winnings = CONFIG.WIN; title = '🎉 فوز!'; msg = `فزت ${p1} - ${p2}`; }
            else { title = '😢 خسارة'; msg = `الخصم فاز ${p1} - ${p2}`; }
        } else if (p2 > p1) {
            if (!isPlayer1) { winnings = CONFIG.WIN; title = '🎉 فوز!'; msg = `فزت ${p2} - ${p1}`; }
            else { title = '😢 خسارة'; msg = `الخصم فاز ${p2} - ${p1}`; }
        } else {
            winnings = CONFIG.BET;
            title = '🤝 تعادل';
            msg = `${p1} - ${p2}`;
        }
        
        if (winnings > 0) {
            currentUser.balance += winnings;
            await saveUser();
        }
        
        playGameOver();
        
        document.getElementById('resultTitle').textContent = title;
        document.getElementById('resultMsg').textContent = msg;
        document.getElementById('resultStats').innerHTML = `
            <div>🔴 الأحمر: ${p1} | 🔵 الأزرق: ${p2}</div>
            <div>💰 رصيدك: $${currentUser.balance}</div>
        `;
        document.getElementById('resultModal').classList.add('active');
        
        await db.ref(`rooms/${gameState.roomId}`).remove();
    }
    
    // ==================== ROOM FUNCTIONS ====================
    async function createRoom() {
        if (currentUser.balance < CONFIG.BET) {
            showMsg('❌ رصيد غير كافي!');
            return;
        }
        
        const btn = document.getElementById('createBtn');
        btn.disabled = true;
        
        try {
            const roomId = 'r_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            currentUser.balance -= CONFIG.BET;
            await saveUser();
            
            const roomData = {
                id: roomId,
                creator: currentUser.id,
                creatorName: currentUser.name,
                player1: currentUser.id,
                player2: null,
                grid: Array(CONFIG.GRID).fill().map(() => Array(CONFIG.GRID).fill(0)),
                currentPlayer: 1,
                p1Throws: CONFIG.THROWS,
                p2Throws: CONFIG.THROWS,
                status: 'waiting'
            };
            
            await db.ref(`rooms/${roomId}`).set(roomData);
            
            gameState.roomId = roomId;
            gameState.roomData = roomData;
            gameState.myRole = 1;
            
            document.getElementById('roomIdDisplay').textContent = `الغرفة: ${roomId.slice(-6)}`;
            document.getElementById('waitingText').style.display = 'block';
            document.getElementById('roomsList').style.display = 'none';
            document.getElementById('createBtn').style.display = 'none';
            
            waitForPlayer(roomId);
            showMsg('✅ غرفة جاهزة، انتظر لاعب آخر');
            
        } catch(e) {
            showMsg('❌ فشل الإنشاء');
            currentUser.balance += CONFIG.BET;
            await saveUser();
        } finally {
            btn.disabled = false;
        }
    }
    
    async function joinRoom(roomId) {
        if (currentUser.balance < CONFIG.BET) {
            showMsg('❌ رصيد غير كافي');
            return;
        }
        
        const snap = await db.ref(`rooms/${roomId}`).once('value');
        const room = snap.val();
        if (!room || room.player2) {
            showMsg('❌ الغرفة غير متاحة');
            loadRooms();
            return;
        }
        
        currentUser.balance -= CONFIG.BET;
        await saveUser();
        
        await db.ref(`rooms/${roomId}`).update({
            player2: currentUser.id,
            status: 'active'
        });
        
        gameState.roomId = roomId;
        gameState.roomData = room;
        gameState.roomData.player2 = currentUser.id;
        gameState.myRole = 2;
        
        startGame();
    }
    
    function waitForPlayer(roomId) {
        const ref = db.ref(`rooms/${roomId}`);
        gameState.gameListener = ref.on('value', (snap) => {
            const room = snap.val();
            if (room && room.status === 'active' && room.player2) {
                ref.off();
                gameState.roomData = room;
                startGame();
            }
        });
    }
    
    function startGame() {
        document.getElementById('waitingRoom').style.display = 'none';
        document.getElementById('gameBoard').classList.add('active');
        
        gameState.active = true;
        gameState.grid = gameState.roomData.grid || Array(CONFIG.GRID).fill().map(() => Array(CONFIG.GRID).fill(0));
        gameState.currentPlayer = gameState.roomData.currentPlayer || 1;
        gameState.p1Throws = gameState.roomData.p1Throws || CONFIG.THROWS;
        gameState.p2Throws = gameState.roomData.p2Throws || CONFIG.THROWS;
        
        createGrid();
        updateGrid();
        updateUI();
        resetTimer();
        
        canvas = document.getElementById('ballCanvas');
        ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const roomRef = db.ref(`rooms/${gameState.roomId}`);
        gameState.gameListener = roomRef.on('value', (snap) => {
            const room = snap.val();
            if (room && gameState.active && !gameState.isShooting) {
                if (room.grid) gameState.grid = room.grid;
                gameState.currentPlayer = room.currentPlayer;
                gameState.p1Throws = room.p1Throws;
                gameState.p2Throws = room.p2Throws;
                updateGrid();
                updateUI();
            }
        });
        
        setupDrag();
    }
    
    // ==================== DRAG SYSTEM ====================
    function setupDrag() {
        const leftCannon = document.getElementById('cannonLeft');
        const rightCannon = document.getElementById('cannonRight');
        const powerFill = document.getElementById('powerFill');
        
        let dragging = false;
        let startX = 0, startY = 0;
        let currentIsLeft = false;
        
        const startDrag = (e, isLeft) => {
            if (!gameState.active || gameState.isShooting) return;
            if (gameState.myRole !== gameState.currentPlayer) {
                showMsg('⏳ ليس دورك!');
                return;
            }
            if ((isLeft && gameState.currentPlayer !== 1) || (!isLeft && gameState.currentPlayer !== 2)) {
                showMsg('⏳ هذا المدفع ليس مخصصاً لدورك!');
                return;
            }
            
            dragging = true;
            currentIsLeft = isLeft;
            startX = e.clientX;
            startY = e.clientY;
            gameState.power = 0;
            powerFill.style.height = '0%';
            
            const cannon = isLeft ? leftCannon : rightCannon;
            cannon.style.cursor = 'grabbing';
        };
        
        const onDrag = (e) => {
            if (!dragging) return;
            const dx = startX - e.clientX;
            const dy = startY - e.clientY;
            const distance = Math.min(150, Math.sqrt(dx*dx + dy*dy));
            gameState.power = Math.min(100, distance / 1.5);
            powerFill.style.height = gameState.power + '%';
            
            const angle = Math.atan2(dy, dx);
            const rotate = Math.min(45, Math.max(-45, angle * 180 / Math.PI * 0.6));
            const cannon = currentIsLeft ? leftCannon : rightCannon;
            const icon = cannon.querySelector('.cannon-icon');
            if (currentIsLeft) {
                icon.style.transform = `rotate(${-20 + rotate}deg)`;
            } else {
                icon.style.transform = `rotate(${20 - rotate}deg) scaleX(-1)`;
            }
        };
        
        const endDrag = (e) => {
            if (!dragging) return;
            dragging = false;
            
            const cannon = currentIsLeft ? leftCannon : rightCannon;
            const icon = cannon.querySelector('.cannon-icon');
            if (currentIsLeft) icon.style.transform = 'rotate(-20deg)';
            else icon.style.transform = 'rotate(20deg) scaleX(-1)';
            cannon.style.cursor = 'pointer';
            
            if (gameState.power > 8 && gameState.active) {
                const dx = startX - (e.clientX || startX);
                const dy = startY - (e.clientY || startY);
                const angle = Math.atan2(dy, dx);
                shoot(gameState.power, angle, currentIsLeft);
            }
            gameState.power = 0;
            powerFill.style.height = '0%';
        };
        
        leftCannon.addEventListener('mousedown', (e) => startDrag(e, true));
        rightCannon.addEventListener('mousedown', (e) => startDrag(e, false));
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', endDrag);
        
        leftCannon.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0], true); });
        rightCannon.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0], false); });
        document.addEventListener('touchmove', (e) => { e.preventDefault(); onDrag(e.touches[0]); });
        document.addEventListener('touchend', endDrag);
    }
    
    // ==================== HELPER FUNCTIONS ====================
    function showMsg(msg) {
        const div = document.createElement('div');
        div.textContent = msg;
        div.style.cssText = `
            position: fixed; top: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #ffd700;
            padding: 10px 25px; border-radius: 40px; border: 1px solid #ffd700;
            z-index: 1000; font-weight: bold;
        `;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
    
    async function saveUser() {
        await db.ref(`users/${currentUser.id}`).set({
            id: currentUser.id,
            name: currentUser.name,
            balance: currentUser.balance
        });
        document.getElementById('balance').textContent = currentUser.balance;
    }
    
    async function loadUser() {
        const snap = await db.ref(`users/${currentUser.id}`).once('value');
        if (snap.exists()) currentUser.balance = snap.val().balance;
        else await saveUser();
        document.getElementById('balance').textContent = currentUser.balance;
    }
    
    async function loadRooms() {
        const snap = await db.ref('rooms').orderByChild('createdAt').limitToLast(20).once('value');
        const rooms = snap.val() || {};
        const available = Object.values(rooms).filter(r => r.status === 'waiting' && !r.player2);
        const listDiv = document.getElementById('roomsList');
        
        if (available.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">لا توجد غرف</div>';
            return;
        }
        
        listDiv.innerHTML = '';
        available.forEach(room => {
            const btn = document.createElement('div');
            btn.className = 'room-btn';
            btn.innerHTML = `
                <span>🏠 غرفة ${room.id.slice(-6)}</span>
                <span>👤 ${room.creatorName}</span>
                <span>💰 $${CONFIG.BET}</span>
            `;
            btn.onclick = () => joinRoom(room.id);
            listDiv.appendChild(btn);
        });
    }
    
    window.exitGame = async function() {
        if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        if (gameState.gameListener && gameState.roomId) {
            db.ref(`rooms/${gameState.roomId}`).off();
            if (gameState.myRole === 1 && !gameState.roomData?.player2) {
                await db.ref(`rooms/${gameState.roomId}`).remove();
                currentUser.balance += CONFIG.BET;
                await saveUser();
            }
        }
        
        gameState.active = false;
        document.getElementById('gameBoard').classList.remove('active');
        document.getElementById('waitingRoom').style.display = 'flex';
        document.getElementById('waitingText').style.display = 'none';
        document.getElementById('roomsList').style.display = 'block';
        document.getElementById('createBtn').style.display = 'block';
        
        if (animationId) cancelAnimationFrame(animationId);
        if (ctx) ctx.clearRect(0, 0, canvas?.width || 0, canvas?.height || 0);
        
        loadRooms();
    };
    
    window.closeResult = function() {
        document.getElementById('resultModal').classList.remove('active');
        window.exitGame();
    };
    
    async function init() {
        await loadUser();
        createGrid();
        loadRooms();
        setInterval(loadRooms, 5000);
        document.getElementById('createBtn').onclick = createRoom;
        
        document.body.addEventListener('click', () => initAudio(), { once: true });
    }
    
    init();
</script>
</body>

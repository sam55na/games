<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <style>
        /* ========================================== */
        /* الإعدادات الأساسية - يمكنك تعديل الألوان هنا */
        /* ========================================== */
        :root {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(255,255,255,0.1);
            --text-color: white;
            --pointer-color: #ff4757;
            --spin-btn-gradient-start: #ff4757;
            --spin-btn-gradient-end: #ff6b81;
            --segment-0-color: #ff6b6b;
            --segment-1-color: #4ecdc4;
            --segment-2-color: #ffe66d;
            --segment-3-color: #ff9f43;
            --segment-4-color: #a8e6cf;
            --segment-5-color: #ffd3b6;
            --segment-text-color: #1a1a2e;
            --prize-50-bg: linear-gradient(135deg, #ff6b6b, #ee5a24);
            --prize-100-bg: linear-gradient(135deg, #4ecdc4, #2ed573);
            --prize-500-bg: linear-gradient(135deg, #ffe66d, #feca57);
            --prize-1000-bg: linear-gradient(135deg, #ff9f43, #ff7f50);
            --prize-5-bg: linear-gradient(135deg, #a8e6cf, #1abc9c);
            --prize-25-bg: linear-gradient(135deg, #ffd3b6, #e67e22);
        }
        
        .prize-50, .prize-100, .prize-500, .prize-1000, .prize-5, .prize-25 {
            animation: prizeGlow 0.5s ease-in-out;
        }
        
        @keyframes prizeGlow {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid var(--pointer-color);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 10;
        }
        
        .pointer::after {
            content: '▼';
            position: absolute;
            top: -48px;
            left: -12px;
            font-size: 24px;
            color: var(--pointer-color);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .spin-btn {
            display: block;
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            background: linear-gradient(135deg, var(--spin-btn-gradient-start), var(--spin-btn-gradient-end));
            border: none;
            border-radius: 50px;
            color: var(--text-color);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(255,71,87,0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end)); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { background: var(--container-bg); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; box-shadow: 0 25px 45px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); }
        .wheel-wrapper { position: relative; width: 320px; height: 320px; margin: 0 auto; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        canvas:hover { transform: scale(1.02); }
        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
        .result { text-align: center; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 15px; color: var(--text-color); font-size: 18px; }
        .info { text-align: center; margin-top: 15px; color: rgba(255,255,255,0.7); font-size: 14px; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .loading.hide { display: none; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--pointer-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 480px) { .wheel-wrapper { width: 280px; height: 280px; } .spin-btn { font-size: 20px; padding: 12px; } }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(0,0,0,0.9); color: white; padding: 12px 24px; border-radius: 50px; font-size: 16px; z-index: 1000; transition: transform 0.3s ease; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 20px;">جاري التحميل...</p>
    </div>

    <div class="container">
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="pointer"></div>
        </div>
        <button class="spin-btn" id="spinBtn">🎡 تدوير 🎡</button>
        <div class="result" id="result"></div>
        <div class="info" id="info"></div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // ==========================================
        // ⚠️ هام: ضع رابط Web App الخاص بك هنا
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxIpH6nYR39UczXisQRmbuY0GmtpSkLG3Nojli-fN11mC7FHP3xcqT6mi4GJrMtTM5gvw/exec";
        
        const SEGMENTS = [
            { name: "50 ل.س", value: 50, type: "amount", color: "var(--segment-0-color)", prizeClass: "prize-50" },
            { name: "100 ل.س", value: 100, type: "amount", color: "var(--segment-1-color)", prizeClass: "prize-100" },
            { name: "500 ل.س", value: 500, type: "amount", color: "var(--segment-2-color)", prizeClass: "prize-500" },
            { name: "1000 ل.س", value: 1000, type: "amount", color: "var(--segment-3-color)", prizeClass: "prize-1000" },
            { name: "5%", value: 5, type: "percent", color: "var(--segment-4-color)", prizeClass: "prize-5" },
            { name: "25%", value: 25, type: "percent", color: "var(--segment-5-color)", prizeClass: "prize-25" }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const USER_ID = urlParams.get('user_id');
        const TOKEN = urlParams.get('token');
        
        const PI = Math.PI;
        const TAU = 2 * PI;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const infoDiv = document.getElementById('info');
        const loadingDiv = document.getElementById('loading');
        const toastEl = document.getElementById('toast');
        
        let currentAngle = 0;
        let spinning = false;
        let targetSegmentIndex = 4; // افتراضي 5%
        
        function showToast(message, isError = false) {
            toastEl.textContent = message;
            toastEl.style.background = isError ? 'rgba(255,71,87,0.9)' : 'rgba(0,0,0,0.9)';
            toastEl.classList.add('show');
            setTimeout(() => { toastEl.classList.remove('show'); }, 3000);
        }
        
        function drawWheel() {
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2;
            ctx.clearRect(0, 0, size, size);
            const angleStep = TAU / SEGMENTS.length;
            for (let i = 0; i < SEGMENTS.length; i++) {
                const startAngle = currentAngle + i * angleStep;
                const endAngle = startAngle + angleStep;
                ctx.beginPath();
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue(SEGMENTS[i].color).trim();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleStep / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--segment-text-color').trim();
                ctx.font = `bold ${size * 0.035}px 'Cairo', 'Segoe UI'`;
                ctx.fillText(SEGMENTS[i].name, radius * 0.7, 0);
                ctx.restore();
            }
            ctx.beginPath();
            ctx.fillStyle = "#1a1a2e";
            ctx.arc(centerX, centerY, radius * 0.15, 0, TAU);
            ctx.fill();
            ctx.beginPath();
            ctx.fillStyle = "#ff4757";
            ctx.arc(centerX, centerY, radius * 0.1, 0, TAU);
            ctx.fill();
        }
        
        function getCurrentSegment() {
            const pointerAngle = -PI / 2;
            let angle = (TAU - (currentAngle % TAU) + pointerAngle) % TAU;
            const segmentIndex = Math.floor(angle / (TAU / SEGMENTS.length)) % SEGMENTS.length;
            return { index: segmentIndex, segment: SEGMENTS[segmentIndex] };
        }
        
        // ==========================================
        // إرسال النتيجة إلى Web App
        // ==========================================
        async function sendResultToBot(segment) {
            try {
                showToast("⏳ جاري حفظ النتيجة...");
                
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        token: TOKEN,
                        prize: {
                            name: segment.name,
                            value: segment.value,
                            type: segment.type
                        }
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `🎉 تهانينا! لقد ربحت ${segment.name} 🎉`;
                    showToast(`✅ تم تسجيل جائزتك: ${segment.name}`);
                    spinBtn.disabled = true;
                } else {
                    resultDiv.innerHTML = `❌ ${data.error || 'حدث خطأ'}`;
                    showToast(data.error || 'حدث خطأ', true);
                    spinBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = '❌ حدث خطأ في الاتصال بالخادم';
                showToast('❌ فشل الاتصال بالخادم', true);
                spinBtn.disabled = false;
            }
        }
        
        function spinWheel() {
            if (spinning) return;
            if (!USER_ID || !TOKEN) {
                showToast('❌ رابط غير صالح', true);
                return;
            }
            
            spinning = true;
            spinBtn.disabled = true;
            
            const angleStep = TAU / SEGMENTS.length;
            const spins = 5 + Math.floor(Math.random() * 4);
            const targetSegmentCenterAngle = (targetSegmentIndex * angleStep) + (angleStep / 2);
            let currentPointerAngle = (TAU - (currentAngle % TAU) + (-PI / 2)) % TAU;
            let currentTargetRelativeAngle = (targetSegmentCenterAngle - currentPointerAngle + TAU) % TAU;
            let finalAngle = currentAngle + (spins * TAU) + currentTargetRelativeAngle;
            
            const duration = 3000;
            const startTime = performance.now();
            const startAngle = currentAngle;
            const angleDiff = finalAngle - startAngle;
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(1, elapsed / duration);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                currentAngle = startAngle + angleDiff * easeProgress;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = finalAngle % TAU;
                    drawWheel();
                    const finalSegment = getCurrentSegment();
                    spinning = false;
                    showResultWithStyle(finalSegment.segment);
                    sendResultToBot(finalSegment.segment);
                }
            }
            requestAnimationFrame(animate);
        }
        
        function showResultWithStyle(segment) {
            const prizeClass = segment.prizeClass;
            resultDiv.innerHTML = `🎉 <span class="${prizeClass}" style="display:inline-block; padding:5px 15px; border-radius:50px;">${segment.name}</span> 🎉`;
        }
        
        // التهيئة
        if (!USER_ID || !TOKEN) {
            infoDiv.innerHTML = '❌ رابط غير صالح - يرجى استخدام الزر داخل البوت';
            spinBtn.disabled = true;
            loadingDiv.classList.add('hide');
        } else {
            infoDiv.innerHTML = `👤 المستخدم: ${USER_ID.substring(0, 8)}...`;
            loadingDiv.classList.add('hide');
        }
        
        drawWheel();
        spinBtn.addEventListener('click', spinWheel);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <button onclick="send()">إرسال للبوت</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        function send() {
            tg.sendData(JSON.stringify({prize: "1000 نقطة", test: true}));
            tg.close();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB 3D | لعبة المدفع الاستراتيجية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            overflow: hidden;
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
            height: 100vh;
            width: 100vw;
        }

        /* ==================== UI Overlay ==================== */
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            pointer-events: none;
        }

        .game-header {
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance-display {
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #ffd700;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        .balance-display span {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-left: 5px;
        }

        /* ==================== Game Info ==================== */
        .current-turn {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 10px 30px;
            border-radius: 50px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1rem;
            border: 1px solid #ffd700;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
        }

        .throw-timer {
            position: fixed;
            top: 80px;
            right: 25px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ff6666;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ff6666;
            box-shadow: 0 0 15px rgba(255,102,102,0.3);
        }

        .power-bar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            background: rgba(0,0,0,0.8);
            border-radius: 30px;
            padding: 6px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ffd700;
            backdrop-filter: blur(5px);
        }

        .power-bar {
            height: 24px;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            border-radius: 25px;
            width: 0%;
            transition: width 0.02s linear;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .power-label {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 0.8rem;
            white-space: nowrap;
            font-weight: bold;
        }

        /* ==================== Waiting Room ==================== */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-content {
            background: linear-gradient(145deg, rgba(26,26,42,0.95), rgba(15,15,31,0.95));
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .waiting-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }

        .room-card {
            background: linear-gradient(145deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-5px);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
        }

        .room-number {
            font-size: 1.1rem;
            color: #ffd700;
            font-weight: bold;
            font-family: monospace;
        }

        .room-status {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .room-status.available {
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
        }

        .room-creator {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 10px;
        }

        .room-bet {
            font-size: 0.9rem;
            color: #ffd700;
            margin-top: 8px;
        }

        .create-room-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            color: #000;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            pointer-events: auto;
        }

        .create-room-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .create-room-btn:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        .waiting-message {
            font-size: 1.4rem;
            color: #ffd700;
            margin: 25px 0;
            display: none;
            animation: pulse 1s infinite;
        }

        .waiting-message.active {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.03); opacity: 0.9; }
        }

        /* ==================== Game Area ==================== */
        .game-area {
            position: fixed;
            top: 100px;
            left: 0;
            right: 0;
            bottom: 120px;
            display: none;
            background: linear-gradient(180deg, #0a0a1a, #050510);
            flex-direction: column;
        }

        .game-area.active {
            display: flex;
        }

        .grid-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            background: rgba(26,26,42,0.8);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 6px;
            transition: all 0.15s ease;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 1px 2px rgba(0,0,0,0.2);
            position: relative;
        }

        .grid-cell.colored-red {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 0 8px rgba(255,68,68,0.4);
        }

        .grid-cell.colored-blue {
            background: linear-gradient(145deg, #4444ff, #0000cc);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), 0 0 8px rgba(68,68,255,0.4);
        }

        .grid-cell.hit {
            animation: cellHit 0.4s ease;
        }

        @keyframes cellHit {
            0% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ==================== Cannons Area ==================== */
        .cannons-area {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            height: 120px;
            position: relative;
        }

        .cannon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: grab;
            user-select: none;
        }

        .cannon:active {
            cursor: grabbing;
        }

        .cannon-icon {
            font-size: 3rem;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
        }

        .cannon-power {
            font-size: 0.8rem;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
        }

        .cannon-left .cannon-icon {
            transform-origin: center;
        }

        .cannon-right .cannon-icon {
            transform: scaleX(-1);
            transform-origin: center;
        }

        /* ==================== Direction Line ==================== */
        .direction-line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffaa33, transparent);
            transform-origin: left center;
            pointer-events: none;
            z-index: 50;
            display: none;
        }

        .direction-line.active {
            display: block;
        }

        /* ==================== Ball Animation ==================== */
        .ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ffff88, #ffaa00);
            border-radius: 50%;
            pointer-events: none;
            z-index: 60;
            box-shadow: 0 0 15px rgba(255,170,0,0.8);
            display: none;
        }

        .ball.active {
            display: block;
        }

        /* ==================== Result Modal ==================== */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .result-modal.active {
            display: flex;
        }

        .result-content {
            background: linear-gradient(145deg, rgba(26,26,42,0.98), rgba(15,15,31,0.98));
            border-radius: 40px;
            padding: 40px;
            border: 2px solid #ffd700;
            text-align: center;
            min-width: 320px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-title {
            font-size: 1.8rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .result-message {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .result-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 35px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }

        .result-btn:hover {
            transform: scale(1.05);
            background: #ffaa33;
        }

        .back-btn {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.02);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffd700;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .notification-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            pointer-events: none;
        }

        .notification {
            background: rgba(20, 20, 20, 0.95);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease;
            border: 1px solid #ffd700;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .current-turn { font-size: 0.8rem; top: 70px; padding: 6px 18px; }
            .throw-timer { font-size: 1rem; top: 70px; padding: 6px 15px; }
            .power-bar-container { width: 240px; bottom: 20px; }
            .cannons-area { padding: 0 10%; }
            .cannon-icon { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <!-- UI Overlay -->
    <div class="ui-overlay">
        <div class="game-header">
            <div class="logo">💣 BOOMB 3D</div>
            <div class="balance-display">💰 الرصيد: $<span id="mainBalance">0</span></div>
        </div>
    </div>

    <!-- Game Info -->
    <div class="current-turn" id="currentTurn">⏳ انتظار...</div>
    <div class="throw-timer" id="throwTimer">--s</div>
    <div class="power-bar-container">
        <div class="power-label">⚡ اسحب للخلف لتحديد القوة</div>
        <div class="power-bar" id="powerBar"></div>
    </div>
    <button class="back-btn" id="backBtn" onclick="window.exitGame()">🏠 العودة للغرف</button>

    <!-- Waiting Room -->
    <div class="waiting-room" id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">🎮 غرف اللعب</div>
            <div class="rooms-grid" id="roomsGrid">
                <div style="grid-column:1/-1;text-align:center;color:#888;padding:30px;">🔄 جاري التحميل...</div>
            </div>
            <button class="create-room-btn" id="createRoomBtn">➕ إنشاء غرفة جديدة</button>
            <div class="waiting-message" id="waitingMessage">
                ⏳ انتظار لاعب آخر...<br>
                <span id="waitingRoomCode" style="font-size:0.9rem; color:#aaa;"></span>
            </div>
        </div>
    </div>

    <!-- Game Area -->
    <div class="game-area" id="gameArea">
        <div class="grid-container" id="gridContainer">
            <canvas id="ballCanvas" style="position: absolute; top: 0; left: 0; z-index: 55;"></canvas>
            <div class="game-grid" id="gameGrid"></div>
            <svg class="direction-line" id="directionLine" style="position: absolute; top: 0; left: 0;"></svg>
        </div>
        <div class="cannons-area" id="cannonsArea">
            <div class="cannon cannon-left" id="cannonLeft">
                <div class="cannon-icon">🔫</div>
                <div class="cannon-power">اللاعب 🔴</div>
            </div>
            <div class="cannon cannon-right" id="cannonRight">
                <div class="cannon-icon">🔫</div>
                <div class="cannon-power">اللاعب 🔵</div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <button class="result-btn" onclick="window.closeResult()">موافق</button>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ==================== FIREBASE CONFIGURATION ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);

        // ==================== GAME CONFIGURATION ====================
        const CONFIG = {
            BET_AMOUNT: 10,
            GRID_SIZE: 10,
            THROW_TIME: 15,
            THROWS_PER_PLAYER: 3,
            WIN_MULTIPLIER: 1.8,
            ADMIN_IDS: ['admin_001', 'admin_sam55na']
        };

        // ==================== USER DATA ====================
        let currentUser = {
            id: localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 8),
            name: localStorage.getItem('userName') || 'زائر_' + Math.floor(Math.random() * 1000),
            balance: 0,
            inGame: false,
            roomId: null,
            isAdmin: false
        };

        // Save user ID to localStorage
        localStorage.setItem('userId', currentUser.id);
        localStorage.setItem('userName', currentUser.name);

        // ==================== GAME STATE ====================
        let gameState = {
            active: false,
            roomId: null,
            roomData: null,
            grid: [],
            currentPlayer: 1,
            player1Throws: CONFIG.THROWS_PER_PLAYER,
            player2Throws: CONFIG.THROWS_PER_PLAYER,
            dragging: false,
            power: 0,
            bombActive: false,
            dragStartX: 0,
            dragStartY: 0,
            throwTimer: CONFIG.THROW_TIME,
            timerInterval: null,
            gameListener: null,
            ballTrajectory: null
        };

        // ==================== HELPER FUNCTIONS ====================
        function showNotification(message, duration = 2500) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideDown 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        async function saveUserToDB() {
            try {
                await db.ref(`users/${currentUser.id}`).set({
                    id: currentUser.id,
                    name: currentUser.name,
                    balance: currentUser.balance,
                    inGame: currentUser.inGame,
                    roomId: currentUser.roomId,
                    isAdmin: currentUser.isAdmin,
                    lastSeen: Date.now()
                });
                document.getElementById('mainBalance').textContent = currentUser.balance;
            } catch (error) {
                console.error('خطأ في حفظ بيانات المستخدم:', error);
            }
        }

        async function loadUserFromDB() {
            try {
                const snap = await db.ref(`users/${currentUser.id}`).once('value');
                if (snap.exists()) {
                    const data = snap.val();
                    currentUser.balance = data.balance || 0;
                    currentUser.name = data.name;
                    currentUser.inGame = data.inGame || false;
                    currentUser.roomId = data.roomId;
                    currentUser.isAdmin = data.isAdmin || CONFIG.ADMIN_IDS.includes(currentUser.id);
                } else {
                    currentUser.isAdmin = CONFIG.ADMIN_IDS.includes(currentUser.id);
                    currentUser.balance = 100; // رصيد ابتدائي
                    await saveUserToDB();
                }
                document.getElementById('mainBalance').textContent = currentUser.balance;
            } catch (error) {
                console.error('خطأ في تحميل بيانات المستخدم:', error);
            }
        }

        // ==================== GRID FUNCTIONS ====================
        function createGridVisual() {
            const gridContainer = document.getElementById('gameGrid');
            gridContainer.innerHTML = '';
            
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    gridContainer.appendChild(cell);
                }
            }
        }
        
        function updateGridVisual() {
            const cells = document.querySelectorAll('#gameGrid .grid-cell');
            for (let i = 0; i < cells.length; i++) {
                const row = Math.floor(i / CONFIG.GRID_SIZE);
                const col = i % CONFIG.GRID_SIZE;
                const value = gameState.grid[row]?.[col];
                cells[i].className = 'grid-cell';
                if (value === 1) cells[i].classList.add('colored-red');
                else if (value === 2) cells[i].classList.add('colored-blue');
            }
        }
        
        function resetGrid() {
            gameState.grid = Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0));
            updateGridVisual();
        }

        // ==================== BALL ANIMATION ====================
        function animateBallTrajectory(startX, startY, endX, endY, power) {
            const canvas = document.getElementById('ballCanvas');
            const ctx = canvas.getContext('2d');
            const gridContainer = document.getElementById('gridContainer');
            const gameGrid = document.getElementById('gameGrid');
            
            canvas.width = gridContainer.offsetWidth;
            canvas.height = gridContainer.offsetHeight;
            
            const duration = 800; // مدة الحركة بالميلي ثانية
            const startTime = Date.now();
            const distance = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
            const bounceCount = Math.floor(power / 20);
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // حساب موضع الكرة مع حركة قوسية
                const easeProgress = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                const currentX = startX + (endX - startX) * easeProgress;
                const currentY = startY + (endY - startY) * easeProgress - Math.sin(easeProgress * Math.PI) * 50;
                
                // رسم الكرة
                ctx.fillStyle = 'rgba(255, 170, 0, 0.9)';
                ctx.beginPath();
                ctx.arc(currentX, currentY, 10, 0, Math.PI * 2);
                ctx.fill();
                
                // رسم ظل الكرة
                ctx.fillStyle = 'rgba(255, 170, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(currentX, currentY + 15, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // رسم مسار الحركة
                ctx.strokeStyle = `rgba(255, 170, 0, ${0.5 * (1 - progress)})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
                ctx.setLineDash([]);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }
            
            animate();
        }

        // ==================== SHOOT MECHANICS ====================
        function shoot(power) {
            if (gameState.bombActive || !gameState.active) return;
            
            const isLeft = gameState.currentPlayer === 1;
            const powerPercent = Math.min(power / 100, 1);
            
            // حساب الخلايا المتأثرة بناءً على القوة
            const affectedRadius = Math.floor(1 + powerPercent * 3);
            const startRow = Math.floor(CONFIG.GRID_SIZE / 2);
            const startCol = isLeft ? 0 : CONFIG.GRID_SIZE - 1;
            
            // محاكاة مسار الكرة
            const affectedCells = [];
            for (let step = 0; step < 15 + Math.floor(powerPercent * 20); step++) {
                const row = Math.min(CONFIG.GRID_SIZE - 1, Math.max(0, startRow + Math.sin(step * 0.3) * affectedRadius));
                const col = Math.min(CONFIG.GRID_SIZE - 1, Math.max(0, startCol + (isLeft ? step : -step) * (powerPercent + 0.5)));
                
                const rowInt = Math.floor(row);
                const colInt = Math.floor(col);
                
                if (gameState.grid[rowInt]?.[colInt] === 0) {
                    gameState.grid[rowInt][colInt] = gameState.currentPlayer;
                    affectedCells.push({ row: rowInt, col: colInt });
                }
            }
            
            // إضافة خلايا عشوائية بناءً على القوة
            const cellsToColor = Math.floor(2 + powerPercent * 8);
            for (let i = 0; i < cellsToColor; i++) {
                const row = Math.floor(Math.random() * CONFIG.GRID_SIZE);
                const col = Math.floor(Math.random() * CONFIG.GRID_SIZE);
                if (gameState.grid[row][col] === 0) {
                    gameState.grid[row][col] = gameState.currentPlayer;
                    affectedCells.push({ row, col });
                }
            }
            
            updateGridVisual();
            
            // تأثير بصري للمدفع
            const cannonIcon = isLeft ? document.querySelector('#cannonLeft .cannon-icon') : document.querySelector('#cannonRight .cannon-icon');
            cannonIcon.style.transform = isLeft ? 'rotate(-40deg)' : 'rotate(40deg) scaleX(-1)';
            setTimeout(() => {
                cannonIcon.style.transform = isLeft ? 'rotate(-20deg)' : 'rotate(20deg) scaleX(-1)';
            }, 150);
            
            showNotification(`💥 رمية بقوة ${Math.round(power)}%`);
            
            gameState.bombActive = true;
            setTimeout(() => {
                gameState.bombActive = false;
                afterShoot();
            }, 800);
        }

        function afterShoot() {
            if (gameState.currentPlayer === 1) {
                gameState.player1Throws--;
            } else {
                gameState.player2Throws--;
            }
            
            // تحديث قاعدة البيانات
            updateGameState();
            
            // التحقق من انتهاء الأدوار
            if (gameState.player1Throws <= 0 && gameState.player2Throws <= 0) {
                endGame();
            } else if (gameState.currentPlayer === 1 && gameState.player1Throws <= 0) {
                switchPlayer();
            } else if (gameState.currentPlayer === 2 && gameState.player2Throws <= 0) {
                switchPlayer();
            } else {
                switchPlayer();
            }
        }

        function switchPlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            resetThrowTimer();
            updateGameUI();
            updateGameState();
        }

        // ==================== GAME STATE MANAGEMENT ====================
        async function updateGameState() {
            if (!gameState.roomId) return;
            
            try {
                await db.ref(`rooms/${gameState.roomId}`).update({
                    grid: gameState.grid,
                    currentPlayer: gameState.currentPlayer,
                    player1Throws: gameState.player1Throws,
                    player2Throws: gameState.player2Throws,
                    lastUpdate: Date.now()
                });
            } catch (error) {
                console.error('خطأ في تحديث حالة اللعبة:', error);
            }
        }

        function updateGameUI() {
            const playerName = gameState.currentPlayer === 1 ? '🔴 اللاعب 1' : '🔵 اللاعب 2';
            const throws = gameState.currentPlayer === 1 ? gameState.player1Throws : gameState.player2Throws;
            document.getElementById('currentTurn').textContent = `${playerName} | رميات متبقية: ${throws}`;
        }

        // ==================== TIMER FUNCTIONS ====================
        function resetThrowTimer() {
            gameState.throwTimer = CONFIG.THROW_TIME;
            updateTimerDisplay();
            
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            
            gameState.timerInterval = setInterval(() => {
                gameState.throwTimer--;
                updateTimerDisplay();
                
                if (gameState.throwTimer <= 0) {
                    clearInterval(gameState.timerInterval);
                    showNotification('⏰ انتهى الوقت! انتقال للاعب التالي');
                    afterShoot();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('throwTimer').textContent = gameState.throwTimer + 's';
        }

        // ==================== ROOM MANAGEMENT ====================
        async function createRoom() {
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                showNotification('❌ رصيد غير كافي لإنشاء غرفة', 3000);
                return;
            }
            
            try {
                document.getElementById('createRoomBtn').disabled = true;
                
                const roomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                
                // خصم الرهان من الرصيد
                currentUser.balance -= CONFIG.BET_AMOUNT;
                await saveUserToDB();
                
                // إنشاء الغرفة
                const roomData = {
                    id: roomId,
                    creator: currentUser.id,
                    creatorName: currentUser.name,
                    player1: currentUser.id,
                    player2: null,
                    bet: CONFIG.BET_AMOUNT,
                    grid: Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0)),
                    currentPlayer: 1,
                    player1Throws: CONFIG.THROWS_PER_PLAYER,
                    player2Throws: CONFIG.THROWS_PER_PLAYER,
                    status: 'waiting',
                    createdAt: Date.now(),
                    lastUpdate: Date.now()
                };
                
                await db.ref(`rooms/${roomId}`).set(roomData);
                
                gameState.roomId = roomId;
                gameState.roomData = roomData;
                
                // الانتظار للاعب الثاني
                waitForPlayer(roomId);
                
                showNotification('✅ تم إنشاء الغرفة بنجاح');
                document.getElementById('waitingRoomCode').textContent = `معرف الغرفة: ${roomId.slice(-6)}`;
                document.getElementById('waitingMessage').classList.add('active');
                
            } catch (error) {
                console.error('خطأ في إنشاء الغرفة:', error);
                showNotification('❌ خطأ في إنشاء الغرفة', 3000);
                currentUser.balance += CONFIG.BET_AMOUNT;
                document.getElementById('createRoomBtn').disabled = false;
            }
        }

        async function joinRoom(roomId) {
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                showNotification('❌ رصيد غير كافي للانضمام للغرفة', 3000);
                return;
            }
            
            try {
                const roomRef = db.ref(`rooms/${roomId}`);
                const snap = await roomRef.once('value');
                
                if (!snap.exists()) {
                    showNotification('❌ الغرفة غير موجودة', 3000);
                    return;
                }
                
                const roomData = snap.val();
                
                if (roomData.player2) {
                    showNotification('❌ الغرفة ممتلئة بالفعل', 3000);
                    return;
                }
                
                // خصم الرهان من الرصيد
                currentUser.balance -= CONFIG.BET_AMOUNT;
                await saveUserToDB();
                
                // إضافة اللاعب الثاني
                await roomRef.update({
                    player2: currentUser.id,
                    status: 'active',
                    startedAt: Date.now()
                });
                
                gameState.roomId = roomId;
                gameState.roomData = roomData;
                gameState.roomData.player2 = currentUser.id;
                gameState.roomData.status = 'active';
                
                startGame();
                
            } catch (error) {
                console.error('خطأ في الانضمام للغرفة:', error);
                showNotification('❌ خطأ في الانضمام للغرفة', 3000);
                currentUser.balance += CONFIG.BET_AMOUNT;
            }
        }

        function waitForPlayer(roomId) {
            const roomRef = db.ref(`rooms/${roomId}`);
            
            // الاستماع للتغييرات في الغرفة
            gameState.gameListener = roomRef.on('value', (snap) => {
                if (snap.exists()) {
                    const roomData = snap.val();
                    
                    if (roomData.status === 'active' && roomData.player2) {
                        // لاعب ثاني انضم
                        gameState.roomData = roomData;
                        startGame();
                    }
                }
            });
        }

        async function loadRooms() {
            try {
                const snap = await db.ref('rooms').orderByChild('createdAt').limitToLast(20).once('value');
                const rooms = snap.val() || {};
                const roomsGrid = document.getElementById('roomsGrid');
                
                const availableRooms = Object.values(rooms).filter(room => room.status === 'waiting' && !room.player2);
                
                if (availableRooms.length === 0) {
                    roomsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#888;padding:30px;">لا توجد غرف متاحة حالياً</div>';
                    return;
                }
                
                roomsGrid.innerHTML = '';
                availableRooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div class="room-number">غرفة #${room.id.slice(-6)}</div>
                        <div class="room-bet">💰 ${room.bet}$</div>
                        <div class="room-creator">من: ${room.creatorName}</div>
                        <div class="room-status available">متاحة</div>
                    `;
                    card.onclick = () => joinRoom(room.id);
                    roomsGrid.appendChild(card);
                });
                
            } catch (error) {
                console.error('خطأ في تحميل الغرف:', error);
            }
        }

        function startGame() {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('gameArea').classList.add('active');
            gameState.active = true;
            
            resetGrid();
            createGridVisual();
            updateGridVisual();
            updateGameUI();
            resetThrowTimer();
            
            // إضافة مستمع لتحديثات اللعبة
            const roomRef = db.ref(`rooms/${gameState.roomId}`);
            gameState.gameListener = roomRef.on('value', (snap) => {
                if (snap.exists()) {
                    const roomData = snap.val();
                    gameState.roomData = roomData;
                    gameState.grid = roomData.grid;
                    gameState.currentPlayer = roomData.currentPlayer;
                    updateGridVisual();
                    updateGameUI();
                }
            });
            
            setupInputHandlers();
        }

        function endGame() {
            gameState.active = false;
            clearInterval(gameState.timerInterval);
            
            if (gameState.gameListener) {
                db.ref(`rooms/${gameState.roomId}`).off('value', gameState.gameListener);
            }
            
            // حساب الفائز
            let player1Score = 0, player2Score = 0;
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    if (gameState.grid[row][col] === 1) player1Score++;
                    else if (gameState.grid[row][col] === 2) player2Score++;
                }
            }
            
            const isPlayer1 = gameState.roomData.player1 === currentUser.id;
            const isPlayer2 = gameState.roomData.player2 === currentUser.id;
            
            let resultTitle, resultMessage, winnings = 0;
            
            if (player1Score > player2Score) {
                if (isPlayer1) {
                    winnings = CONFIG.BET_AMOUNT * 2 * CONFIG.WIN_MULTIPLIER;
                    resultTitle = '🎉 تهانينا! فزت!';
                    resultMessage = `لقد فزت برمية ممتازة!<br>الفوز: $${Math.round(winnings)}`;
                } else {
                    resultTitle = '😢 للأسف خسرت';
                    resultMessage = `اللاعب الآخر فاز بهذه الجولة`;
                }
            } else if (player2Score > player1Score) {
                if (isPlayer2) {
                    winnings = CONFIG.BET_AMOUNT * 2 * CONFIG.WIN_MULTIPLIER;
                    resultTitle = '🎉 تهانينا! فزت!';
                    resultMessage = `لقد فزت برمية ممتازة!<br>الفوز: $${Math.round(winnings)}`;
                } else {
                    resultTitle = '😢 للأسف خسرت';
                    resultMessage = `اللاعب الآخر فاز بهذه الجولة`;
                }
            } else {
                resultTitle = '🤝 تعادل!';
                resultMessage = 'كلا اللاعبين حصلا على نفس النقاط';
                winnings = CONFIG.BET_AMOUNT;
            }
            
            // تحديث الرصيد
            if (winnings > 0) {
                currentUser.balance += winnings;
                saveUserToDB();
            }
            
            showResult(resultTitle, resultMessage);
        }

        function showResult(title, message) {
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').innerHTML = message;
            document.getElementById('resultModal').classList.add('active');
        }

        window.closeResult = function() {
            document.getElementById('resultModal').classList.remove('active');
            exitGame();
        };

        window.exitGame = function() {
            gameState.active = false;
            clearInterval(gameState.timerInterval);
            
            if (gameState.gameListener) {
                db.ref(`rooms/${gameState.roomId}`).off('value', gameState.gameListener);
            }
            
            // حذف الغرفة إذا كان اللاعب الوحيد
            if (gameState.roomId && gameState.roomData) {
                const isCreator = gameState.roomData.creator === currentUser.id;
                if (isCreator && !gameState.roomData.player2) {
                    db.ref(`rooms/${gameState.roomId}`).remove();
                    // استرجاع الرهان
                    currentUser.balance += CONFIG.BET_AMOUNT;
                    saveUserToDB();
                }
            }
            
            document.getElementById('gameArea').classList.remove('active');
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('waitingMessage').classList.remove('active');
            document.getElementById('createRoomBtn').disabled = false;
            
            gameState.roomId = null;
            gameState.roomData = null;
            
            loadRooms();
        };

        // ==================== INPUT HANDLERS ====================
        function setupInputHandlers() {
            const gameArea = document.getElementById('gameArea');
            const directionLine = document.getElementById('directionLine');
            const cannonsArea = document.getElementById('cannonsArea');
            
            let isCurrentPlayerTurn = false;
            
            function checkIfCurrentPlayerTurn() {
                if (gameState.currentPlayer === 1) {
                    return gameState.roomData.player1 === currentUser.id;
                } else {
                    return gameState.roomData.player2 === currentUser.id;
                }
            }
            
            gameArea.addEventListener('mousedown', (e) => {
                if (!gameState.active || gameState.bombActive) return;
                if (!checkIfCurrentPlayerTurn()) {
                    showNotification('⏳ ليس دورك الآن', 2000);
                    return;
                }
                
                gameState.dragging = true;
                gameState.dragStartX = e.clientX;
                gameState.dragStartY = e.clientY;
                gameState.power = 0;
                
                directionLine.classList.add('active');
            });
            
            gameArea.addEventListener('mousemove', (e) => {
                if (!gameState.dragging) return;
                
                const deltaX = gameState.dragStartX - e.clientX;
                const deltaY = gameState.dragStartY - e.clientY;
                
                gameState.power = Math.min(100, Math.sqrt(deltaX * deltaX + deltaY * deltaY) / 3);
                
                // تحديث شريط القوة
                document.getElementById('powerBar').style.width = gameState.power + '%';
                
                // حساب زاوية الاتجاه
                const angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
                
                // رسم خط الاتجاه
                const cannonsRect = cannonsArea.getBoundingClientRect();
                const startX = gameState.currentPlayer === 1 ? 50 : cannonsRect.width - 50;
                const startY = cannonsRect.height - 50;
                
                directionLine.style.width = Math.min(200, gameState.power * 2) + 'px';
                directionLine.style.left = (cannonsRect.left + startX) + 'px';
                directionLine.style.top = (cannonsRect.top + startY) + 'px';
                directionLine.style.transform = `rotate(${angle}deg)`;
            });
            
            gameArea.addEventListener('mouseup', (e) => {
                if (!gameState.dragging) return;
                
                gameState.dragging = false;
                directionLine.classList.remove('active');
                document.getElementById('powerBar').style.width = '0%';
                
                if (gameState.power > 10) {
                    shoot(gameState.power);
                }
            });
            
            // Touch support
            gameArea.addEventListener('touchstart', (e) => {
                if (!gameState.active || gameState.bombActive) return;
                if (!checkIfCurrentPlayerTurn()) return;
                
                gameState.dragging = true;
                gameState.dragStartX = e.touches[0].clientX;
                gameState.dragStartY = e.touches[0].clientY;
                gameState.power = 0;
                directionLine.classList.add('active');
            });
            
            gameArea.addEventListener('touchmove', (e) => {
                if (!gameState.dragging) return;
                
                const deltaX = gameState.dragStartX - e.touches[0].clientX;
                const deltaY = gameState.dragStartY - e.touches[0].clientY;
                
                gameState.power = Math.min(100, Math.sqrt(deltaX * deltaX + deltaY * deltaY) / 3);
                document.getElementById('powerBar').style.width = gameState.power + '%';
            });
            
            gameArea.addEventListener('touchend', (e) => {
                if (!gameState.dragging) return;
                
                gameState.dragging = false;
                directionLine.classList.remove('active');
                document.getElementById('powerBar').style.width = '0%';
                
                if (gameState.power > 10) {
                    shoot(gameState.power);
                }
            });
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            try {
                await loadUserFromDB();
                createGridVisual();
                loadRooms();
                
                // تحديث الغرف كل 5 ثواني
                setInterval(loadRooms, 5000);
                
                document.getElementById('createRoomBtn').addEventListener('click', createRoom);
                
            } catch (error) {
                console.error('خطأ في التهيئة:', error);
                showNotification('❌ خطأ في تحميل اللعبة', 3000);
            }
        }

        // بدء اللعبة عند تحميل الصفحة
        window.addEventListener('load', init);
    </script>
</body>

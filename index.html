<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB 3D | لعبة المدفع الاستراتيجية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #050510 100%);
        }

        /* ==================== HEADER ==================== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(135deg, rgba(0,0,0,0.95), rgba(0,0,0,0.85));
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(255,215,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance-display {
            background: rgba(0,0,0,0.6);
            padding: 10px 25px;
            border-radius: 40px;
            border: 1px solid #ffd700;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
            color: #fff;
        }

        .balance-display span {
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            margin-left: 8px;
        }

        /* ==================== GAME INFO ==================== */
        .game-info {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 35px;
            border-radius: 50px;
            border: 1px solid #ffd700;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,215,0,0.2);
            font-weight: bold;
            color: #ffd700;
            white-space: nowrap;
        }

        .timer {
            position: fixed;
            top: 80px;
            right: 30px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid #ff6666;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff6666;
            font-family: monospace;
            z-index: 100;
            box-shadow: 0 0 15px rgba(255,102,102,0.3);
        }

        /* ==================== WAITING ROOM ==================== */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.97);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-content {
            background: linear-gradient(145deg, rgba(26,26,42,0.95), rgba(15,15,31,0.95));
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 900px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .waiting-title {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            max-height: 450px;
            overflow-y: auto;
            padding: 10px;
        }

        .room-card {
            background: linear-gradient(145deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .room-card:hover {
            transform: translateY(-8px);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 15px 35px rgba(255,215,0,0.3);
        }

        .room-id {
            font-size: 1.2rem;
            color: #ffd700;
            font-weight: bold;
            font-family: monospace;
            margin-bottom: 10px;
        }

        .room-info {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 8px;
        }

        .room-bet {
            font-size: 1.1rem;
            color: #ffd700;
            font-weight: bold;
            margin-top: 12px;
        }

        .room-status {
            display: inline-block;
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .create-room-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            color: #000;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .create-room-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
        }

        .create-room-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .waiting-message {
            font-size: 1.3rem;
            color: #ffd700;
            margin-top: 30px;
            display: none;
            animation: pulse 1.5s infinite;
        }

        .waiting-message.active {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* ==================== GAME AREA ==================== */
        .game-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            flex-direction: column;
            background: linear-gradient(180deg, #0a0a1a, #050510);
        }

        .game-container.active {
            display: flex;
        }

        .game-board {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
        }

        .grid-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
            background: rgba(26,26,42,0.8);
            padding: 15px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 40px rgba(255,215,0,0.2), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .grid-cell {
            background: linear-gradient(145deg, #2a2a3a, #1a1a2a);
            border-radius: 8px;
            transition: all 0.1s ease;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .grid-cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent);
            border-radius: 8px;
            pointer-events: none;
        }

        .grid-cell.player1 {
            background: linear-gradient(145deg, #ff5555, #cc0000);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), 0 0 15px rgba(255,68,68,0.5);
        }

        .grid-cell.player2 {
            background: linear-gradient(145deg, #5555ff, #0000cc);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.2), 0 0 15px rgba(68,68,255,0.5);
        }

        .grid-cell.hit {
            animation: hitEffect 0.4s ease;
        }

        @keyframes hitEffect {
            0% { transform: scale(1.15); }
            50% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* ==================== CANNONS ==================== */
        .cannons-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            height: 140px;
            position: relative;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.3));
        }

        .cannon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .cannon {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px rgba(255,215,0,0.4));
            transition: transform 0.1s ease;
            cursor: grab;
        }

        .cannon:active {
            cursor: grabbing;
        }

        .cannon.player1 {
            transform-origin: center;
        }

        .cannon.player2 {
            transform: scaleX(-1);
            transform-origin: center;
        }

        .cannon-label {
            font-size: 0.9rem;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
        }

        .cannon-label.active {
            color: #ffff00;
            text-shadow: 0 0 10px rgba(255,255,0,0.5);
        }

        /* ==================== POWER BAR ==================== */
        .power-bar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            z-index: 100;
        }

        .power-label {
            color: #ffd700;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
            text-align: center;
        }

        .power-bar-bg {
            background: rgba(0,0,0,0.8);
            border: 2px solid #ffd700;
            border-radius: 30px;
            padding: 6px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }

        .power-bar {
            height: 28px;
            background: linear-gradient(90deg, #2ecc71 0%, #f1c40f 50%, #e74c3c 100%);
            border-radius: 25px;
            width: 0%;
            transition: width 0.02s linear;
            box-shadow: 0 0 15px rgba(255,215,0,0.6);
        }

        /* ==================== RESULT MODAL ==================== */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 300;
        }

        .result-modal.active {
            display: flex;
        }

        .result-content {
            background: linear-gradient(145deg, rgba(26,26,42,0.98), rgba(15,15,31,0.98));
            border-radius: 40px;
            padding: 50px;
            border: 3px solid #ffd700;
            text-align: center;
            min-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .result-message {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .result-stats {
            background: rgba(255,215,0,0.1);
            border: 1px solid #ffd700;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #ffd700;
            font-weight: bold;
        }

        .stat-row:last-child {
            margin-bottom: 0;
        }

        .result-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa33);
            color: #000;
            border: none;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .result-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(255,215,0,0.4);
        }

        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0,0,0,0.7);
            color: #ffd700;
            border: 1px solid #ffd700;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.85rem;
            font-weight: bold;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.05);
        }

        /* ==================== NOTIFICATIONS ==================== */
        .notification-container {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .notification {
            background: rgba(20, 20, 20, 0.95);
            color: #ffd700;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.95rem;
            white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1px solid #ffd700;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .game-info { font-size: 0.9rem; padding: 10px 25px; }
            .timer { font-size: 1rem; padding: 10px 20px; }
            .cannons-section { height: 100px; }
            .cannon { font-size: 2.5rem; }
            .result-content { min-width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">💣 BOOMB 3D</div>
        <div class="balance-display">💰 الرصيد: $<span id="balance">0</span></div>
    </div>

    <!-- Game Info -->
    <div class="game-info" id="gameInfo">⏳ جاري التحميل...</div>
    <div class="timer" id="timer">--s</div>

    <!-- Waiting Room -->
    <div class="waiting-room" id="waitingRoom">
        <div class="waiting-content">
            <div class="waiting-title">🎮 غرف اللعب</div>
            <div class="rooms-grid" id="roomsGrid">
                <div style="grid-column:1/-1;text-align:center;color:#888;padding:40px;">🔄 جاري تحميل الغرف...</div>
            </div>
            <button class="create-room-btn" id="createRoomBtn">➕ إنشاء غرفة جديدة (الرهان: 10$)</button>
            <div class="waiting-message" id="waitingMessage">
                ⏳ انتظار لاعب آخر...<br>
                <span id="roomCode" style="font-size:0.9rem; color:#aaa;"></span>
            </div>
        </div>
    </div>

    <!-- Game Container -->
    <div class="game-container" id="gameContainer">
        <div class="game-board">
            <div class="grid-wrapper">
                <div class="game-grid" id="gameGrid"></div>
                <canvas id="ballCanvas" style="position: absolute; inset: 0; border-radius: 20px;"></canvas>
            </div>
        </div>
        <div class="cannons-section" id="cannonsSection">
            <div class="cannon-container">
                <div class="cannon cannon-left player1" id="cannon1">🔫</div>
                <div class="cannon-label" id="label1">اللاعب 🔴</div>
            </div>
            <div class="cannon-container">
                <div class="cannon cannon-right player2" id="cannon2">🔫</div>
                <div class="cannon-label" id="label2">اللاعب 🔵</div>
            </div>
        </div>
    </div>

    <!-- Power Bar -->
    <div class="power-bar-container" id="powerBarContainer" style="display: none;">
        <div class="power-label">⚡ اسحب للخلف لتحديد القوة</div>
        <div class="power-bar-bg">
            <div class="power-bar" id="powerBar"></div>
        </div>
    </div>

    <!-- Back Button -->
    <button class="back-btn" id="backBtn" onclick="window.exitGame()" style="display: none;">🏠 العودة</button>

    <!-- Result Modal -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-stats" id="resultStats"></div>
            <button class="result-btn" onclick="window.closeResult()">العودة للغرف</button>
        </div>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ==================== AUDIO CONTEXT ====================
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine') {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = frequency;
            osc.type = type;
            
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
        }

        function playShootSound() {
            playSound(150, 0.1, 'triangle');
            setTimeout(() => playSound(200, 0.15, 'sine'), 50);
        }

        function playHitSound() {
            playSound(400, 0.05, 'sine');
            setTimeout(() => playSound(300, 0.1, 'sine'), 30);
        }

        function playExplosionSound() {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    playSound(Math.random() * 200 + 100, 0.1, 'triangle');
                }, i * 30);
            }
        }

        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==================== CONFIG ====================
        const CONFIG = {
            BET_AMOUNT: 10,
            WIN_AMOUNT: 18,
            GRID_SIZE: 10,
            THROW_TIME: 20,
            THROWS_PER_PLAYER: 3,
            GRAVITY: 0.3,
            FRICTION: 0.98
        };

        // ==================== USER DATA ====================
        let currentUser = {
            id: localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 10),
            name: localStorage.getItem('userName') || 'لاعب_' + Math.floor(Math.random() * 10000),
            balance: 0
        };

        localStorage.setItem('userId', currentUser.id);
        localStorage.setItem('userName', currentUser.name);

        // ==================== GAME STATE ====================
        let gameState = {
            active: false,
            roomId: null,
            roomData: null,
            grid: [],
            currentPlayer: 1,
            player1Throws: CONFIG.THROWS_PER_PLAYER,
            player2Throws: CONFIG.THROWS_PER_PLAYER,
            dragging: false,
            power: 0,
            dragStartX: 0,
            dragStartY: 0,
            throwTimer: CONFIG.THROW_TIME,
            timerInterval: null,
            gameListener: null,
            isAnimating: false
        };

        // ==================== HELPER FUNCTIONS ====================
        function showNotification(message, duration = 2500) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideDown 0.3s ease reverse';
                setTimeout(() => notification.remove(), 300);
            }, duration);
        }

        async function saveUserToDB() {
            try {
                await db.ref(`users/${currentUser.id}`).set({
                    id: currentUser.id,
                    name: currentUser.name,
                    balance: currentUser.balance,
                    lastSeen: Date.now()
                });
                document.getElementById('balance').textContent = currentUser.balance;
            } catch (error) {
                console.error('خطأ في حفظ البيانات:', error);
            }
        }

        async function loadUserFromDB() {
            try {
                const snap = await db.ref(`users/${currentUser.id}`).once('value');
                if (snap.exists()) {
                    const data = snap.val();
                    currentUser.balance = data.balance || 0;
                } else {
                    currentUser.balance = 100;
                    await saveUserToDB();
                }
                document.getElementById('balance').textContent = currentUser.balance;
            } catch (error) {
                console.error('خطأ في تحميل البيانات:', error);
            }
        }

        // ==================== GRID FUNCTIONS ====================
        function createGridVisual() {
            const gridContainer = document.getElementById('gameGrid');
            gridContainer.innerHTML = '';
            
            for (let i = 0; i < CONFIG.GRID_SIZE * CONFIG.GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                gridContainer.appendChild(cell);
            }
        }

        function updateGridVisual() {
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach((cell, index) => {
                const row = Math.floor(index / CONFIG.GRID_SIZE);
                const col = index % CONFIG.GRID_SIZE;
                const value = gameState.grid[row]?.[col];
                
                cell.className = 'grid-cell';
                if (value === 1) cell.classList.add('player1');
                else if (value === 2) cell.classList.add('player2');
            });
        }

        function resetGrid() {
            gameState.grid = Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0));
            updateGridVisual();
        }

        // ==================== BALL PHYSICS ====================
        class Ball {
            constructor(startX, startY, velocityX, velocityY) {
                this.x = startX;
                this.y = startY;
                this.vx = velocityX;
                this.vy = velocityY;
                this.radius = 10;
                this.trail = [];
            }

            update() {
                this.vy += CONFIG.GRAVITY;
                this.vx *= CONFIG.FRICTION;
                this.vy *= CONFIG.FRICTION;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) this.trail.shift();
            }

            draw(ctx) {
                // رسم المسار
                ctx.strokeStyle = 'rgba(255, 170, 0, 0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                this.trail.forEach((point, i) => {
                    if (i === 0) ctx.moveTo(point.x, point.y);
                    else ctx.lineTo(point.x, point.y);
                });
                ctx.stroke();

                // رسم الكرة
                ctx.fillStyle = 'rgba(255, 170, 0, 0.95)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                // إضاءة الكرة
                ctx.fillStyle = 'rgba(255, 255, 150, 0.6)';
                ctx.beginPath();
                ctx.arc(this.x - 3, this.y - 3, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fill();
            }

            isOutOfBounds(gridWidth, gridHeight) {
                return this.x < 0 || this.x > gridWidth || this.y < 0 || this.y > gridHeight;
            }
        }

        // ==================== SHOOT MECHANICS ====================
        async function shoot(power) {
            if (gameState.isAnimating || !gameState.active) return;
            
            gameState.isAnimating = true;
            playShootSound();

            const canvas = document.getElementById('ballCanvas');
            const ctx = canvas.getContext('2d');
            const gridWrapper = document.querySelector('.grid-wrapper');
            const gridContainer = document.querySelector('.game-grid');

            canvas.width = gridWrapper.offsetWidth;
            canvas.height = gridWrapper.offsetHeight;

            const isPlayer1 = gameState.currentPlayer === 1;
            const powerPercent = Math.min(power / 100, 1);

            // حساب نقطة البداية من المدفع
            const startX = isPlayer1 ? 30 : canvas.width - 30;
            const startY = canvas.height - 40;

            // حساب السرعة (معاكسة للاعب 1، طبيعية للاعب 2)
            const velocityX = isPlayer1 ? (powerPercent * 15) : -(powerPercent * 15);
            const velocityY = -powerPercent * 12;

            const ball = new Ball(startX, startY, velocityX, velocityY);

            // حساب حجم الخلية
            const cellSize = gridContainer.offsetWidth / CONFIG.GRID_SIZE;
            const gridOffsetX = gridContainer.offsetLeft - gridWrapper.offsetLeft;
            const gridOffsetY = gridContainer.offsetTop - gridWrapper.offsetTop;

            let lastHitCell = null;

            const animationLoop = setInterval(() => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ball.update();
                ball.draw(ctx);

                // التحقق من الاصطدام بالخلايا
                const gridX = (ball.x - gridOffsetX) / cellSize;
                const gridY = (ball.y - gridOffsetY) / cellSize;
                const cellRow = Math.floor(gridY);
                const cellCol = Math.floor(gridX);

                if (cellRow >= 0 && cellRow < CONFIG.GRID_SIZE && cellCol >= 0 && cellCol < CONFIG.GRID_SIZE) {
                    const cellKey = `${cellRow}-${cellCol}`;
                    
                    if (lastHitCell !== cellKey && gameState.grid[cellRow][cellCol] === 0) {
                        gameState.grid[cellRow][cellCol] = gameState.currentPlayer;
                        lastHitCell = cellKey;
                        playHitSound();
                        
                        // تأثير بصري
                        const cell = document.querySelector(`[data-index="${cellRow * CONFIG.GRID_SIZE + cellCol}"]`);
                        if (cell) cell.classList.add('hit');
                        
                        updateGridVisual();
                    }
                }

                // التحقق من خروج الكرة
                if (ball.isOutOfBounds(canvas.width, canvas.height) || Math.abs(ball.vx) < 0.1 && Math.abs(ball.vy) < 0.1) {
                    clearInterval(animationLoop);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    playExplosionSound();
                    
                    setTimeout(() => {
                        gameState.isAnimating = false;
                        afterShoot();
                    }, 300);
                }
            }, 1000 / 60); // 60 FPS
        }

        function afterShoot() {
            if (gameState.currentPlayer === 1) {
                gameState.player1Throws--;
            } else {
                gameState.player2Throws--;
            }

            updateGameState();

            if (gameState.player1Throws <= 0 && gameState.player2Throws <= 0) {
                endGame();
            } else if (gameState.currentPlayer === 1 && gameState.player1Throws <= 0) {
                switchPlayer();
            } else if (gameState.currentPlayer === 2 && gameState.player2Throws <= 0) {
                switchPlayer();
            } else {
                switchPlayer();
            }
        }

        function switchPlayer() {
            gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
            resetThrowTimer();
            updateGameUI();
            updateGameState();
        }

        // ==================== GAME STATE ====================
        async function updateGameState() {
            if (!gameState.roomId) return;

            try {
                await db.ref(`rooms/${gameState.roomId}`).update({
                    grid: gameState.grid,
                    currentPlayer: gameState.currentPlayer,
                    player1Throws: gameState.player1Throws,
                    player2Throws: gameState.player2Throws,
                    lastUpdate: Date.now()
                });
            } catch (error) {
                console.error('خطأ في تحديث الحالة:', error);
            }
        }

        function updateGameUI() {
            const playerName = gameState.currentPlayer === 1 ? '🔴 اللاعب 1' : '🔵 اللاعب 2';
            const throws = gameState.currentPlayer === 1 ? gameState.player1Throws : gameState.player2Throws;
            const isCurrentPlayer = (gameState.currentPlayer === 1 && gameState.roomData.player1 === currentUser.id) ||
                                   (gameState.currentPlayer === 2 && gameState.roomData.player2 === currentUser.id);
            
            document.getElementById('gameInfo').textContent = `${playerName} | الرميات: ${throws} ${isCurrentPlayer ? '👈 دورك' : ''}`;
            
            document.getElementById('label1').classList.toggle('active', gameState.currentPlayer === 1);
            document.getElementById('label2').classList.toggle('active', gameState.currentPlayer === 2);
        }

        // ==================== TIMER ====================
        function resetThrowTimer() {
            gameState.throwTimer = CONFIG.THROW_TIME;
            updateTimerDisplay();

            if (gameState.timerInterval) clearInterval(gameState.timerInterval);

            gameState.timerInterval = setInterval(() => {
                gameState.throwTimer--;
                updateTimerDisplay();

                if (gameState.throwTimer <= 0) {
                    clearInterval(gameState.timerInterval);
                    if (!gameState.isAnimating) {
                        showNotification('⏰ انتهى الوقت!');
                        afterShoot();
                    }
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timer').textContent = gameState.throwTimer + 's';
        }

        // ==================== ROOM MANAGEMENT ====================
        async function createRoom() {
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                showNotification('❌ رصيد غير كافي', 3000);
                return;
            }

            try {
                document.getElementById('createRoomBtn').disabled = true;

                const roomId = 'room_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

                currentUser.balance -= CONFIG.BET_AMOUNT;
                await saveUserToDB();

                const roomData = {
                    id: roomId,
                    creator: currentUser.id,
                    creatorName: currentUser.name,
                    player1: currentUser.id,
                    player2: null,
                    grid: Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0)),
                    currentPlayer: 1,
                    player1Throws: CONFIG.THROWS_PER_PLAYER,
                    player2Throws: CONFIG.THROWS_PER_PLAYER,
                    status: 'waiting',
                    createdAt: Date.now(),
                    lastUpdate: Date.now()
                };

                await db.ref(`rooms/${roomId}`).set(roomData);

                gameState.roomId = roomId;
                gameState.roomData = roomData;

                waitForPlayer(roomId);

                showNotification('✅ تم إنشاء الغرفة');
                document.getElementById('roomCode').textContent = `معرف الغرفة: ${roomId.slice(-6)}`;
                document.getElementById('waitingMessage').classList.add('active');

            } catch (error) {
                console.error('خطأ:', error);
                showNotification('❌ خطأ في الإنشاء', 3000);
                currentUser.balance += CONFIG.BET_AMOUNT;
                document.getElementById('createRoomBtn').disabled = false;
            }
        }

        async function joinRoom(roomId) {
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                showNotification('❌ رصيد غير كافي', 3000);
                return;
            }

            try {
                const snap = await db.ref(`rooms/${roomId}`).once('value');

                if (!snap.exists()) {
                    showNotification('❌ الغرفة غير موجودة', 3000);
                    return;
                }

                const roomData = snap.val();

                if (roomData.player2) {
                    showNotification('❌ الغرفة ممتلئة', 3000);
                    return;
                }

                currentUser.balance -= CONFIG.BET_AMOUNT;
                await saveUserToDB();

                await db.ref(`rooms/${roomId}`).update({
                    player2: currentUser.id,
                    status: 'active',
                    startedAt: Date.now()
                });

                gameState.roomId = roomId;
                gameState.roomData = roomData;
                gameState.roomData.player2 = currentUser.id;
                gameState.roomData.status = 'active';

                startGame();

            } catch (error) {
                console.error('خطأ:', error);
                showNotification('❌ خطأ في الانضمام', 3000);
                currentUser.balance += CONFIG.BET_AMOUNT;
            }
        }

        function waitForPlayer(roomId) {
            const roomRef = db.ref(`rooms/${roomId}`);

            gameState.gameListener = roomRef.on('value', (snap) => {
                if (snap.exists()) {
                    const roomData = snap.val();

                    if (roomData.status === 'active' && roomData.player2) {
                        gameState.roomData = roomData;
                        startGame();
                    }
                }
            });
        }

        async function loadRooms() {
            try {
                const snap = await db.ref('rooms').orderByChild('createdAt').limitToLast(20).once('value');
                const rooms = snap.val() || {};

                const availableRooms = Object.values(rooms).filter(room => room.status === 'waiting' && !room.player2);

                const roomsGrid = document.getElementById('roomsGrid');

                if (availableRooms.length === 0) {
                    roomsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#888;padding:40px;">لا توجد غرف متاحة</div>';
                    return;
                }

                roomsGrid.innerHTML = '';
                availableRooms.forEach(room => {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div class="room-id">#${room.id.slice(-6)}</div>
                        <div class="room-info">من: ${room.creatorName}</div>
                        <div class="room-bet">💰 الرهان: ${CONFIG.BET_AMOUNT}$</div>
                        <div class="room-status">متاحة</div>
                    `;
                    card.onclick = () => joinRoom(room.id);
                    roomsGrid.appendChild(card);
                });

            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        function startGame() {
            document.getElementById('waitingRoom').classList.add('hidden');
            document.getElementById('gameContainer').classList.add('active');
            document.getElementById('powerBarContainer').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';

            gameState.active = true;

            resetGrid();
            createGridVisual();
            updateGridVisual();
            updateGameUI();
            resetThrowTimer();

            const roomRef = db.ref(`rooms/${gameState.roomId}`);
            gameState.gameListener = roomRef.on('value', (snap) => {
                if (snap.exists()) {
                    const roomData = snap.val();
                    gameState.roomData = roomData;
                    gameState.grid = roomData.grid;
                    gameState.currentPlayer = roomData.currentPlayer;
                    gameState.player1Throws = roomData.player1Throws;
                    gameState.player2Throws = roomData.player2Throws;
                    updateGridVisual();
                    updateGameUI();
                }
            });

            setupInputHandlers();
        }

        function endGame() {
            gameState.active = false;
            clearInterval(gameState.timerInterval);

            if (gameState.gameListener) {
                db.ref(`rooms/${gameState.roomId}`).off('value', gameState.gameListener);
            }

            let player1Score = 0, player2Score = 0;
            for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
                for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                    if (gameState.grid[row][col] === 1) player1Score++;
                    else if (gameState.grid[row][col] === 2) player2Score++;
                }
            }

            const isPlayer1 = gameState.roomData.player1 === currentUser.id;
            const isPlayer2 = gameState.roomData.player2 === currentUser.id;

            let resultTitle, resultMessage, winnings = 0;

            if (player1Score > player2Score) {
                if (isPlayer1) {
                    winnings = CONFIG.WIN_AMOUNT;
                    resultTitle = '🎉 تهانينا! فزت!';
                    resultMessage = `لقد فزت بهذه الجولة!`;
                } else {
                    resultTitle = '😢 للأسف خسرت';
                    resultMessage = `اللاعب الآخر فاز بهذه الجولة`;
                }
            } else if (player2Score > player1Score) {
                if (isPlayer2) {
                    winnings = CONFIG.WIN_AMOUNT;
                    resultTitle = '🎉 تهانينا! فزت!';
                    resultMessage = `لقد فزت بهذه الجولة!`;
                } else {
                    resultTitle = '😢 للأسف خسرت';
                    resultMessage = `اللاعب الآخر فاز بهذه الجولة`;
                }
            } else {
                resultTitle = '🤝 تعادل!';
                resultMessage = 'كلا اللاعبين حصلا على نفس النقاط';
                winnings = CONFIG.BET_AMOUNT;
            }

            if (winnings > 0) {
                currentUser.balance += winnings;
                saveUserToDB();
            }

            const statsHTML = `
                <div class="stat-row">
                    <span>نقاط اللاعب 🔴:</span>
                    <span>${player1Score}</span>
                </div>
                <div class="stat-row">
                    <span>نقاط اللاعب 🔵:</span>
                    <span>${player2Score}</span>
                </div>
                <div class="stat-row" style="border-top: 1px solid #ffd700; padding-top: 10px; margin-top: 10px;">
                    <span>رصيدك الجديد:</span>
                    <span>$${currentUser.balance}</span>
                </div>
            `;

            showResult(resultTitle, resultMessage, statsHTML);
        }

        function showResult(title, message, stats) {
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultMessage').textContent = message;
            document.getElementById('resultStats').innerHTML = stats;
            document.getElementById('resultModal').classList.add('active');
        }

        window.closeResult = function() {
            document.getElementById('resultModal').classList.remove('active');
            exitGame();
        };

        window.exitGame = function() {
            gameState.active = false;
            clearInterval(gameState.timerInterval);

            if (gameState.gameListener) {
                db.ref(`rooms/${gameState.roomId}`).off('value', gameState.gameListener);
            }

            if (gameState.roomId && gameState.roomData) {
                const isCreator = gameState.roomData.creator === currentUser.id;
                if (isCreator && !gameState.roomData.player2) {
                    db.ref(`rooms/${gameState.roomId}`).remove();
                    currentUser.balance += CONFIG.BET_AMOUNT;
                    saveUserToDB();
                }
            }

            document.getElementById('gameContainer').classList.remove('active');
            document.getElementById('powerBarContainer').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('waitingRoom').classList.remove('hidden');
            document.getElementById('waitingMessage').classList.remove('active');
            document.getElementById('createRoomBtn').disabled = false;

            gameState.roomId = null;
            gameState.roomData = null;

            loadRooms();
        };

        // ==================== INPUT HANDLERS ====================
        function setupInputHandlers() {
            const gameContainer = document.getElementById('gameContainer');
            const powerBar = document.getElementById('powerBar');

            function isCurrentPlayerTurn() {
                if (gameState.currentPlayer === 1) {
                    return gameState.roomData.player1 === currentUser.id;
                } else {
                    return gameState.roomData.player2 === currentUser.id;
                }
            }

            gameContainer.addEventListener('mousedown', (e) => {
                if (!gameState.active || gameState.isAnimating) return;
                if (!isCurrentPlayerTurn()) {
                    showNotification('⏳ ليس دورك الآن', 2000);
                    return;
                }

                gameState.dragging = true;
                gameState.dragStartX = e.clientX;
                gameState.dragStartY = e.clientY;
                gameState.power = 0;
            });

            gameContainer.addEventListener('mousemove', (e) => {
                if (!gameState.dragging) return;

                const deltaX = gameState.dragStartX - e.clientX;
                const deltaY = gameState.dragStartY - e.clientY;

                gameState.power = Math.min(100, Math.sqrt(deltaX * deltaX + deltaY * deltaY) / 3);
                powerBar.style.width = gameState.power + '%';
            });

            gameContainer.addEventListener('mouseup', (e) => {
                if (!gameState.dragging) return;

                gameState.dragging = false;
                powerBar.style.width = '0%';

                if (gameState.power > 10) {
                    shoot(gameState.power);
                }
            });

            // Touch support
            gameContainer.addEventListener('touchstart', (e) => {
                if (!gameState.active || gameState.isAnimating) return;
                if (!isCurrentPlayerTurn()) return;

                gameState.dragging = true;
                gameState.dragStartX = e.touches[0].clientX;
                gameState.dragStartY = e.touches[0].clientY;
                gameState.power = 0;
            });

            gameContainer.addEventListener('touchmove', (e) => {
                if (!gameState.dragging) return;

                const deltaX = gameState.dragStartX - e.touches[0].clientX;
                const deltaY = gameState.dragStartY - e.touches[0].clientY;

                gameState.power = Math.min(100, Math.sqrt(deltaX * deltaX + deltaY * deltaY) / 3);
                powerBar.style.width = gameState.power + '%';
            });

            gameContainer.addEventListener('touchend', (e) => {
                if (!gameState.dragging) return;

                gameState.dragging = false;
                powerBar.style.width = '0%';

                if (gameState.power > 10) {
                    shoot(gameState.power);
                }
            });
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            try {
                await loadUserFromDB();
                createGridVisual();
                loadRooms();

                setInterval(loadRooms, 5000);

                document.getElementById('createRoomBtn').addEventListener('click', createRoom);

            } catch (error) {
                console.error('خطأ:', error);
                showNotification('❌ خطأ في التحميل', 3000);
            }
        }
        window.addEventListener('load', init);
    </script>
</body>

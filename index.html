<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <style>
        /* ========================================== */
        /* الإعدادات الأساسية - يمكنك تعديل الألوان هنا */
        /* ========================================== */
        :root {
            /* الألوان الأساسية */
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --container-bg: rgba(255,255,255,0.1);
            --text-color: white;
            --pointer-color: #ff4757;
            --spin-btn-gradient-start: #ff4757;
            --spin-btn-gradient-end: #ff6b81;
            
            /* ألوان شرائح العجلة */
            --segment-0-color: #ff6b6b;  /* 50 ل.س */
            --segment-1-color: #4ecdc4;  /* 100 ل.س */
            --segment-2-color: #ffe66d;  /* 500 ل.س */
            --segment-3-color: #ff9f43;  /* 1000 ل.س */
            --segment-4-color: #a8e6cf;  /* 5% */
            --segment-5-color: #ffd3b6;  /* 25% */
            
            /* ألوان النصوص داخل العجلة */
            --segment-text-color: #1a1a2e;
            
            /* ألوان التصميمات الخاصة بالجوائز */
            --prize-50-bg: linear-gradient(135deg, #ff6b6b, #ee5a24);
            --prize-100-bg: linear-gradient(135deg, #4ecdc4, #2ed573);
            --prize-500-bg: linear-gradient(135deg, #ffe66d, #feca57);
            --prize-1000-bg: linear-gradient(135deg, #ff9f43, #ff7f50);
            --prize-5-bg: linear-gradient(135deg, #a8e6cf, #1abc9c);
            --prize-25-bg: linear-gradient(135deg, #ffd3b6, #e67e22);
        }
        
        /* ========================================== */
        /* التصميمات الخاصة بكل جائزة (تظهر عند النتيجة) */
        /* ========================================== */
        .prize-50 {
            background: var(--prize-50-bg);
            animation: prizeGlow 0.5s ease-in-out;
        }
        .prize-100 {
            background: var(--prize-100-bg);
            animation: prizeGlow 0.5s ease-in-out;
        }
        .prize-500 {
            background: var(--prize-500-bg);
            animation: prizeGlow 0.5s ease-in-out;
        }
        .prize-1000 {
            background: var(--prize-1000-bg);
            animation: prizeGlow 0.5s ease-in-out;
        }
        .prize-5 {
            background: var(--prize-5-bg);
            animation: prizeGlow 0.5s ease-in-out;
        }
        .prize-25 {
            background: var(--prize-25-bg);
            animation: prizeGlow 0.5s ease-in-out;
        }
        
        @keyframes prizeGlow {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; text-shadow: 0 0 20px gold; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* تصميم السهم */
        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid var(--pointer-color);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
            z-index: 10;
        }
        
        .pointer::after {
            content: '▼';
            position: absolute;
            top: -48px;
            left: -12px;
            font-size: 24px;
            color: var(--pointer-color);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* زر التدوير */
        .spin-btn {
            display: block;
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            background: linear-gradient(135deg, var(--spin-btn-gradient-start), var(--spin-btn-gradient-end));
            border: none;
            border-radius: 50px;
            color: var(--text-color);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            box-shadow: 0 5px 15px rgba(255,71,87,0.3);
        }
        
        /* باقي التصميمات العامة */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end)); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Segoe UI', 'Cairo', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { background: var(--container-bg); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; box-shadow: 0 25px 45px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); }
        .wheel-wrapper { position: relative; width: 320px; height: 320px; margin: 0 auto; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        canvas:hover { transform: scale(1.02); }
        .spin-btn:active { transform: scale(0.95); }
        .spin-btn:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
        .result { text-align: center; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 15px; color: var(--text-color); font-size: 18px; }
        .info { text-align: center; margin-top: 15px; color: rgba(255,255,255,0.7); font-size: 14px; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
        .loading.hide { display: none; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--pointer-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 480px) { .wheel-wrapper { width: 280px; height: 280px; } .spin-btn { font-size: 20px; padding: 12px; } }
        
        /* تصميم الإشعار المنبثق */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 16px;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color: white; margin-top: 20px;">جاري التحميل...</p>
    </div>

    <div class="container">
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <div class="pointer"></div>
        </div>
        <button class="spin-btn" id="spinBtn">🎡 تدوير 🎡</button>
        <div class="result" id="result"></div>
        <div class="info" id="info"></div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // ==========================================
        // إعدادات العجلة
        // ==========================================
        const SEGMENTS = [
            { name: "50 ل.س", value: 50, type: "amount", color: "var(--segment-0-color)", prizeClass: "prize-50" },
            { name: "100 ل.س", value: 100, type: "amount", color: "var(--segment-1-color)", prizeClass: "prize-100" },
            { name: "500 ل.س", value: 500, type: "amount", color: "var(--segment-2-color)", prizeClass: "prize-500" },
            { name: "1000 ل.س", value: 1000, type: "amount", color: "var(--segment-3-color)", prizeClass: "prize-1000" },
            { name: "5%", value: 5, type: "percent", color: "var(--segment-4-color)", prizeClass: "prize-5" },
            { name: "25%", value: 25, type: "percent", color: "var(--segment-5-color)", prizeClass: "prize-25" }
        ];

        // الحصول على البيانات من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const USER_ID = urlParams.get('user_id');
        const TOKEN = urlParams.get('token');
        
        // جلب الجائزة المحددة من الخادم (محقونة في الرابط عبر البوت)
        // سيتم حقن هذه القيمة من البوت عند إنشاء الرابط
        // يمكن استلامها عبر API إضافي أو حقنها مباشرة
        
        const PI = Math.PI;
        const TAU = 2 * PI;
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        const infoDiv = document.getElementById('info');
        const loadingDiv = document.getElementById('loading');
        const toastEl = document.getElementById('toast');
        
        let currentAngle = 0;
        let spinning = false;
        let targetSegmentIndex = null;
        let predefinedPrize = null;
        
        function showToast(message, isError = false) {
            toastEl.textContent = message;
            toastEl.style.background = isError ? 'rgba(255,71,87,0.9)' : 'rgba(0,0,0,0.9)';
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3000);
        }
        
        // الحصول على الجائزة المحددة مسبقاً من الخادم
        async function fetchPredefinedPrize() {
            if (!USER_ID || !TOKEN) {
                showToast('❌ رابط غير صالح', true);
                return null;
            }
            
            try {
                // استخدام Web App للحصول على الجائزة
                const response = await fetch(window.location.origin + window.location.pathname + '?action=getPrize&user_id=' + USER_ID + '&token=' + TOKEN);
                const data = await response.json();
                if (data.success && data.prize) {
                    return data.prize;
                }
                return null;
            } catch (error) {
                console.error('Error fetching prize:', error);
                return null;
            }
        }
        
        // رسم العجلة
        function drawWheel() {
            const size = canvas.width;
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size / 2;
            
            ctx.clearRect(0, 0, size, size);
            
            const angleStep = TAU / SEGMENTS.length;
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const startAngle = currentAngle + i * angleStep;
                const endAngle = startAngle + angleStep;
                
                // رسم القطعة
                ctx.beginPath();
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue(SEGMENTS[i].color).trim();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fill();
                
                // رسم الحدود
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.stroke();
                
                // رسم النص
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + angleStep / 2);
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--segment-text-color').trim();
                ctx.font = `bold ${size * 0.035}px 'Cairo', 'Segoe UI'`;
                
                const text = SEGMENTS[i].name;
                const textRadius = radius * 0.7;
                ctx.fillText(text, textRadius, 0);
                ctx.restore();
            }
            
            // رسم الدائرة الداخلية
            ctx.beginPath();
            ctx.fillStyle = "#1a1a2e";
            ctx.arc(centerX, centerY, radius * 0.15, 0, TAU);
            ctx.fill();
            
            ctx.beginPath();
            ctx.fillStyle = "#ff4757";
            ctx.arc(centerX, centerY, radius * 0.1, 0, TAU);
            ctx.fill();
        }
        
        // الحصول على القطعة الحالية
        function getCurrentSegment() {
            const pointerAngle = -PI / 2;
            let angle = (TAU - (currentAngle % TAU) + pointerAngle) % TAU;
            const segmentIndex = Math.floor(angle / (TAU / SEGMENTS.length)) % SEGMENTS.length;
            return { index: segmentIndex, segment: SEGMENTS[segmentIndex] };
        }
        
        // تدوير العجلة إلى القطعة المستهدفة
        function spinWheelToSegment(targetIndex) {
            if (spinning) return;
            
            spinning = true;
            spinBtn.disabled = true;
            
            const angleStep = TAU / SEGMENTS.length;
            const currentSegment = getCurrentSegment();
            
            // عدد الدورات (5-8 دورات)
            const spins = 5 + Math.floor(Math.random() * 4);
            
            // حساب الزاوية المستهدفة
            const targetSegmentCenterAngle = (targetIndex * angleStep) + (angleStep / 2);
            
            // الزاوية الحالية للقطعة المستهدفة
            let currentTargetAngle = (currentAngle % TAU);
            
            // حساب عدد الدورات الإضافية
            let fullRotations = spins * TAU;
            
            // حساب الزاوية النهائية
            let finalAngle = currentAngle + fullRotations;
            
            // تعديل الزاوية النهائية لتتوقف عند القطعة المستهدفة
            let currentPointerAngle = (TAU - (currentAngle % TAU) + (-PI / 2)) % TAU;
            let currentTargetRelativeAngle = (targetSegmentCenterAngle - currentPointerAngle + TAU) % TAU;
            
            finalAngle += currentTargetRelativeAngle;
            
            // الرسوم المتحركة
            const duration = 3000;
            const startTime = performance.now();
            const startAngle = currentAngle;
            const angleDiff = finalAngle - startAngle;
            
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(1, elapsed / duration);
                // دالة تسهيل: تبدأ سريعة ثم تبطئ
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                currentAngle = startAngle + angleDiff * easeProgress;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = finalAngle % TAU;
                    drawWheel();
                    
                    const finalSegment = getCurrentSegment();
                    spinning = false;
                    
                    // عرض النتيجة بتصميم خاص
                    showResultWithStyle(finalSegment.segment);
                    
                    // إرسال النتيجة إلى البوت
                    sendResultToBot(finalSegment.segment);
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // عرض النتيجة بتصميم خاص
        function showResultWithStyle(segment) {
            const prizeClass = segment.prizeClass;
            resultDiv.innerHTML = `🎉 <span class="${prizeClass}" style="display:inline-block; padding:5px 15px; border-radius:50px;">${segment.name}</span> 🎉`;
            resultDiv.classList.add(prizeClass);
            
            // إضافة تأثير صوتي (اختياري)
            // playSound();
            
            setTimeout(() => {
                resultDiv.classList.remove(prizeClass);
            }, 1000);
        }
        
        // إرسال النتيجة إلى البوت
        async function sendResultToBot(segment) {
            try {
                // إرسال النتيجة إلى Web App
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: USER_ID,
                        token: TOKEN,
                        prize: {
                            name: segment.name,
                            value: segment.value,
                            type: segment.type,
                            segment_index: SEGMENTS.findIndex(s => s.name === segment.name)
                        }
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast(data.message || 'تم تسجيل الجائزة بنجاح!');
                    spinBtn.textContent = '✓ تم التدوير';
                    spinBtn.disabled = true;
                } else {
                    showToast(data.error || 'حدث خطأ في حفظ الجائزة', true);
                    spinBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error sending result:', error);
                showToast('❌ حدث خطأ في الاتصال بالخادم', true);
                spinBtn.disabled = false;
            }
        }
        
        // الحصول على الجائزة المحددة مسبقاً من الخادم (عبر API)
        async function getPrizeFromServer() {
            try {
                const response = await fetch(window.location.origin + window.location.pathname + '?action=getPrize&user_id=' + USER_ID + '&token=' + TOKEN);
                const data = await response.json();
                if (data.success && data.prize) {
                    return data.prize;
                }
                return null;
            } catch (error) {
                console.error('Error:', error);
                return null;
            }
        }
        
        // التهيئة
        async function init() {
            if (!USER_ID || !TOKEN) {
                resultDiv.innerHTML = '❌ رابط غير صالح';
                infoDiv.innerHTML = 'يرجى استخدام الزر داخل البوت';
                spinBtn.disabled = true;
                loadingDiv.classList.add('hide');
                return;
            }
            
            infoDiv.innerHTML = `👤 المستخدم: ${USER_ID.substring(0, 8)}...`;
            
            // الحصول على الجائزة المحددة
            const prize = await getPrizeFromServer();
            
            if (prize) {
                // تحديد القطعة المستهدفة
                if (prize.value === 25 && prize.type === 'percent') {
                    targetSegmentIndex = 5;
                } else if (prize.value === 5 && prize.type === 'percent') {
                    targetSegmentIndex = 4;
                } else if (prize.value === 50) {
                    targetSegmentIndex = 0;
                } else if (prize.value === 100) {
                    targetSegmentIndex = 1;
                } else if (prize.value === 500) {
                    targetSegmentIndex = 2;
                } else if (prize.value === 1000) {
                    targetSegmentIndex = 3;
                } else {
                    targetSegmentIndex = 4;
                }
                
                infoDiv.innerHTML += `<br>🎁 جائزتك المؤهلة: ${prize.display || prize.name}`;
            } else {
                targetSegmentIndex = 4; // افتراضي 5%
                infoDiv.innerHTML += `<br>🎁 جائزتك: 5% (افتراضي)`;
            }
            
            drawWheel();
            loadingDiv.classList.add('hide');
            
            spinBtn.addEventListener('click', () => {
                if (spinning) return;
                if (targetSegmentIndex !== null) {
                    spinWheelToSegment(targetSegmentIndex);
                } else {
                    spinWheelToSegment(4);
                }
            });
        }
        
        init();
    </script>
</body>
</html>

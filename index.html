<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإيداع - BoomB</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, getDocs, orderBy, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
            authDomain: "boomb-fa3e7.firebaseapp.com",
            projectId: "boomb-fa3e7",
            storageBucket: "boomb-fa3e7.firebasestorage.app",
            messagingSenderId: "499624996530",
            appId: "1:499624996530:web:235f71e450845c748523ab",
            measurementId: "G-42P00L5HJ9"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // ================== إعدادات طرق الدفع ================== //
        let paymentSettings = {
            shamcash: {
                enabled: true,
                name: "شام كاش",
                displayAddress: "0912 345 678",      // 🔹 العنوان الظاهر للمستخدم
                apiAddress: "0912345678",            // 🔹 العنوان الذي يبحث فيه API
                apiKey: "",
                minAmount: 1000,
                maxAmount: 1000000,
                exchangeRateUSD: 13000,
                supportedCurrencies: ["SYP", "USD"]
            },
            syriatel: {
                enabled: true,
                name: "سيرياتيل كاش",
                displayNumbers: ["0944 123 456", "0933 123 456"],  // 🔹 الأرقام الظاهرة للمستخدم
                apiNumbers: ["0944123456", "0933123456"],          // 🔹 الأرقام التي يبحث فيها API
                apiKey: "",
                minAmount: 500,
                maxAmount: 500000,
                exchangeRate: 1
            }
        };
        
        let currentUser = null;
        let currentUserData = null;
        let unsubscribeBalance = null;
        
        // ================== تحميل الإعدادات ================== //
        async function loadPaymentSettings() {
            try {
                const settingsDoc = await getDoc(doc(db, "system", "paymentSettings"));
                if (settingsDoc.exists()) {
                    paymentSettings = settingsDoc.data();
                } else {
                    await setDoc(doc(db, "system", "paymentSettings"), paymentSettings);
                }
            } catch (error) {
                console.error("خطأ:", error);
            }
        }
        
        // ================== حفظ الإعدادات (للمدير فقط) ================== //
        window.savePaymentSettings = async function() {
            if (!currentUserData || !currentUserData.isAdmin) {
                alert("❌ ليس لديك صلاحيات المدير!");
                return;
            }
            
            try {
                const newSettings = {
                    shamcash: {
                        enabled: document.getElementById('shamcash-enabled').checked,
                        name: "شام كاش",
                        displayAddress: document.getElementById('shamcash-display').value,
                        apiAddress: document.getElementById('shamcash-api').value,
                        apiKey: document.getElementById('shamcash-api-key').value,
                        minAmount: parseFloat(document.getElementById('shamcash-min').value),
                        maxAmount: parseFloat(document.getElementById('shamcash-max').value),
                        exchangeRateUSD: parseFloat(document.getElementById('shamcash-usd-rate').value),
                        supportedCurrencies: ["SYP", "USD"]
                    },
                    syriatel: {
                        enabled: document.getElementById('syriatel-enabled').checked,
                        name: "سيرياتيل كاش",
                        displayNumbers: document.getElementById('syriatel-display').value.split(',').map(s => s.trim()),
                        apiNumbers: document.getElementById('syriatel-api').value.split(',').map(s => s.trim()),
                        apiKey: document.getElementById('syriatel-api-key').value,
                        minAmount: parseFloat(document.getElementById('syriatel-min').value),
                        maxAmount: parseFloat(document.getElementById('syriatel-max').value),
                        exchangeRate: parseFloat(document.getElementById('syriatel-rate').value)
                    }
                };
                
                await setDoc(doc(db, "system", "paymentSettings"), newSettings);
                paymentSettings = newSettings;
                alert("✅ تم حفظ إعدادات الدفع بنجاح!");
                location.reload();
            } catch (error) {
                alert("خطأ: " + error.message);
            }
        };
        
        // ================== عرض نموذج الإيداع ================== //
        function showDepositModal() {
            const modal = document.getElementById('deposit-modal');
            const methodsDiv = document.getElementById('deposit-methods');
            
            let methodsHtml = '';
            
            // شام كاش
            if (paymentSettings.shamcash?.enabled) {
                methodsHtml += `
                    <div class="payment-method" onclick="selectPaymentMethod('shamcash')">
                        <div class="method-icon">💳</div>
                        <div class="method-info">
                            <h3>${paymentSettings.shamcash.name}</h3>
                            <p>الحد الأدنى: ${paymentSettings.shamcash.minAmount} SYP</p>
                            <p>الحد الأقصى: ${paymentSettings.shamcash.maxAmount} SYP</p>
                            <div class="address-box">
                                <span class="address-label">📱 عنوان الإيداع:</span>
                                <span class="address-value">${paymentSettings.shamcash.displayAddress}</span>
                                <button class="copy-btn" onclick="copyToClipboard('${paymentSettings.shamcash.displayAddress}')">📋 نسخ</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // سيرياتيل كاش
            if (paymentSettings.syriatel?.enabled) {
                const displayNumbers = paymentSettings.syriatel.displayNumbers.join(' - ');
                methodsHtml += `
                    <div class="payment-method" onclick="selectPaymentMethod('syriatel')">
                        <div class="method-icon">📱</div>
                        <div class="method-info">
                            <h3>${paymentSettings.syriatel.name}</h3>
                            <p>الحد الأدنى: ${paymentSettings.syriatel.minAmount} SYP</p>
                            <p>الحد الأقصى: ${paymentSettings.syriatel.maxAmount} SYP</p>
                            <div class="address-box">
                                <span class="address-label">📞 أرقام الإيداع:</span>
                                <span class="address-value">${displayNumbers}</span>
                                <button class="copy-btn" onclick="copyToClipboard('${displayNumbers}')">📋 نسخ</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if (!methodsHtml) {
                methodsHtml = '<p class="no-methods">⚠️ لا توجد طرق دفع متاحة حالياً</p>';
            }
            
            methodsDiv.innerHTML = methodsHtml;
            modal.style.display = 'flex';
        }
        
        window.closeDepositModal = function() {
            document.getElementById('deposit-modal').style.display = 'none';
            document.getElementById('payment-form').style.display = 'none';
            document.getElementById('deposit-methods').style.display = 'block';
            document.getElementById('selected-method-title').textContent = '';
        };
        
        window.selectPaymentMethod = function(method) {
            window.selectedMethod = method;
            const methodData = paymentSettings[method];
            
            document.getElementById('deposit-methods').style.display = 'none';
            document.getElementById('payment-form').style.display = 'block';
            document.getElementById('selected-method-title').textContent = methodData.name;
            
            // تحديث النموذج حسب الطريقة
            const formFields = document.getElementById('form-fields');
            if (method === 'shamcash') {
                formFields.innerHTML = `
                    <div class="form-group">
                        <label>💰 المبلغ (SYP)</label>
                        <input type="number" id="deposit-amount" placeholder="المبلغ" min="${methodData.minAmount}" max="${methodData.maxAmount}" step="1">
                        <small>الحد الأدنى: ${methodData.minAmount} | الحد الأقصى: ${methodData.maxAmount}</small>
                    </div>
                    <div class="form-group">
                        <label>🆔 رقم العملية (Transaction ID)</label>
                        <input type="text" id="deposit-txid" placeholder="أدخل رقم العملية من تطبيق شام كاش">
                    </div>
                    <div class="form-group">
                        <label>💱 العملة</label>
                        <select id="deposit-currency">
                            <option value="SYP">ليرة سورية (SYP)</option>
                            <option value="USD">دولار أمريكي (USD)</option>
                        </select>
                    </div>
                `;
            } else if (method === 'syriatel') {
                formFields.innerHTML = `
                    <div class="form-group">
                        <label>💰 المبلغ (SYP)</label>
                        <input type="number" id="deposit-amount" placeholder="المبلغ" min="${methodData.minAmount}" max="${methodData.maxAmount}" step="1">
                        <small>الحد الأدنى: ${methodData.minAmount} | الحد الأقصى: ${methodData.maxAmount}</small>
                    </div>
                    <div class="form-group">
                        <label>🆔 رقم العملية (Transaction ID)</label>
                        <input type="text" id="deposit-txid" placeholder="أدخل رقم العملية من تطبيق سيرياتيل كاش">
                    </div>
                `;
            }
        };
        
        // ================== معالجة طلب الإيداع ================== //
        window.submitDeposit = async function() {
            if (!currentUser) {
                alert("الرجاء تسجيل الدخول أولاً");
                return;
            }
            
            const method = window.selectedMethod;
            const amount = parseFloat(document.getElementById('deposit-amount').value);
            const txid = document.getElementById('deposit-txid').value;
            const methodData = paymentSettings[method];
            
            // التحقق من صحة المبلغ
            if (isNaN(amount) || amount < methodData.minAmount) {
                alert(`❌ المبلغ أقل من الحد الأدنى (${methodData.minAmount} SYP)`);
                return;
            }
            if (amount > methodData.maxAmount) {
                alert(`❌ المبلغ أكبر من الحد الأقصى (${methodData.maxAmount} SYP)`);
                return;
            }
            if (!txid) {
                alert("❌ الرجاء إدخال رقم العملية");
                return;
            }
            
            // إظهار رسالة جاري المعالجة
            const submitBtn = event.target;
            const originalText = submitBtn.textContent;
            submitBtn.textContent = "جاري التحقق...";
            submitBtn.disabled = true;
            
            try {
                // هنا يتم الاتصال بـ API للتحقق من العملية
                // نستخدم العناوين APIAddresses المخزنة في الإعدادات
                let verificationResult;
                
                if (method === 'shamcash') {
                    const currency = document.getElementById('deposit-currency')?.value || 'SYP';
                    const exchangeRate = currency === 'USD' ? methodData.exchangeRateUSD : 1;
                    
                    verificationResult = await verifyShamCashTransaction(
                        txid, 
                        amount, 
                        currency,
                        methodData.apiAddress,  // 🔹 العنوان الذي يبحث فيه API
                        methodData.apiKey
                    );
                } else if (method === 'syriatel') {
                    verificationResult = await verifySyriatelTransaction(
                        txid,
                        amount,
                        methodData.apiNumbers,  // 🔹 الأرقام التي يبحث فيها API
                        methodData.apiKey
                    );
                }
                
                if (!verificationResult.success) {
                    alert(verificationResult.message);
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                    return;
                }
                
                // حساب المبلغ بعد سعر الصرف
                let finalAmount = verificationResult.originalAmount;
                if (method === 'shamcash' && verificationResult.currency === 'USD') {
                    finalAmount = verificationResult.originalAmount * paymentSettings.shamcash.exchangeRateUSD;
                }
                
                // إضافة المبلغ للمستخدم
                const userRef = doc(db, "users", currentUser.uid);
                const newBalance = currentBalance + finalAmount;
                await updateDoc(userRef, { balance: newBalance });
                
                // تسجيل العملية
                const depositRecord = {
                    userId: currentUser.uid,
                    username: currentUserData?.username || currentUser.email,
                    method: method,
                    methodName: methodData.name,
                    txid: txid,
                    originalAmount: verificationResult.originalAmount,
                    originalCurrency: verificationResult.currency || 'SYP',
                    exchangeRate: method === 'shamcash' && verificationResult.currency === 'USD' ? paymentSettings.shamcash.exchangeRateUSD : 1,
                    finalAmount: finalAmount,
                    oldBalance: currentBalance,
                    newBalance: newBalance,
                    timestamp: new Date().toISOString(),
                    status: 'completed'
                };
                
                await addDoc(collection(db, "deposits"), depositRecord);
                
                alert(`✅ تم الإيداع بنجاح!\n\nالمبلغ المضاف: ${finalAmount} SYP\nالرصيد الجديد: ${newBalance} SYP`);
                
                closeDepositModal();
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                
            } catch (error) {
                alert("❌ خطأ في معالجة العملية: " + error.message);
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        };
        
        // ================== محاكاة التحقق من API (تستبدل بالـ API الحقيقي) ================== //
        async function verifyShamCashTransaction(txid, expectedAmount, currency, apiAddress, apiKey) {
            // هذا مجرد محاكاة - استبدل بـ API الحقيقي
            console.log(`🔍 التحقق من شام كاش:
                - TXID: ${txid}
                - العنوان المطلوب: ${apiAddress}
                - المبلغ المتوقع: ${expectedAmount}
                - العملة: ${currency}
            `);
            
            return new Promise((resolve) => {
                setTimeout(() => {
                    // محاكاة نجاح العملية
                    if (txid.length > 5) {
                        resolve({
                            success: true,
                            message: "تم التحقق من العملية",
                            originalAmount: expectedAmount,
                            currency: currency,
                            sender: "محول غير معروف"
                        });
                    } else {
                        resolve({
                            success: false,
                            message: "❌ رقم العملية غير موجود في النظام"
                        });
                    }
                }, 1500);
            });
        }
        
        async function verifySyriatelTransaction(txid, expectedAmount, apiNumbers, apiKey) {
            // هذا مجرد محاكاة - استبدل بـ API الحقيقي
            console.log(`🔍 التحقق من سيرياتيل كاش:
                - TXID: ${txid}
                - الأرقام المطلوبة: ${apiNumbers.join(', ')}
                - المبلغ المتوقع: ${expectedAmount}
            `);
            
            return new Promise((resolve) => {
                setTimeout(() => {
                    if (txid.length > 5) {
                        resolve({
                            success: true,
                            message: "تم التحقق من العملية",
                            originalAmount: expectedAmount,
                            currency: "SYP",
                            gsm: apiNumbers[0]
                        });
                    } else {
                        resolve({
                            success: false,
                            message: "❌ رقم العملية غير موجود في النظام"
                        });
                    }
                }, 1500);
            });
        }
        
        // ================== عرض لوحة إدارة الإعدادات (للمدير) ================== //
        window.showPaymentSettings = function() {
            if (!currentUserData?.isAdmin) {
                alert("ليس لديك صلاحيات المدير!");
                return;
            }
            
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('admin-payment-container').style.display = 'block';
            
            // تعبئة النموذج بالبيانات الحالية
            document.getElementById('shamcash-enabled').checked = paymentSettings.shamcash?.enabled || false;
            document.getElementById('shamcash-display').value = paymentSettings.shamcash?.displayAddress || "";
            document.getElementById('shamcash-api').value = paymentSettings.shamcash?.apiAddress || "";
            document.getElementById('shamcash-api-key').value = paymentSettings.shamcash?.apiKey || "";
            document.getElementById('shamcash-min').value = paymentSettings.shamcash?.minAmount || 1000;
            document.getElementById('shamcash-max').value = paymentSettings.shamcash?.maxAmount || 1000000;
            document.getElementById('shamcash-usd-rate').value = paymentSettings.shamcash?.exchangeRateUSD || 13000;
            
            document.getElementById('syriatel-enabled').checked = paymentSettings.syriatel?.enabled || false;
            document.getElementById('syriatel-display').value = (paymentSettings.syriatel?.displayNumbers || []).join(', ');
            document.getElementById('syriatel-api').value = (paymentSettings.syriatel?.apiNumbers || []).join(', ');
            document.getElementById('syriatel-api-key').value = paymentSettings.syriatel?.apiKey || "";
            document.getElementById('syriatel-min').value = paymentSettings.syriatel?.minAmount || 500;
            document.getElementById('syriatel-max').value = paymentSettings.syriatel?.maxAmount || 500000;
            document.getElementById('syriatel-rate').value = paymentSettings.syriatel?.exchangeRate || 1;
        };
        
        window.closePaymentSettings = function() {
            document.getElementById('admin-payment-container').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
        };
        
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text);
            alert("✅ تم نسخ العنوان إلى الحافظة");
        };
        
        // ================== مراقبة حالة المستخدم ================== //
        onAuthStateChanged(auth, async (user) => {
            await loadPaymentSettings();
            
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    currentUserData = { id: user.uid, ...userDoc.data() };
                    currentBalance = currentUserData.balance;
                    
                    document.getElementById('user-name').textContent = currentUserData.username || user.email;
                    document.getElementById('user-balance').textContent = currentBalance;
                    
                    if (unsubscribeBalance) unsubscribeBalance();
                    unsubscribeBalance = onSnapshot(doc(db, "users", user.uid), (doc) => {
                        if (doc.exists()) {
                            currentBalance = doc.data().balance;
                            document.getElementById('user-balance').textContent = currentBalance;
                        }
                    });
                    
                    document.getElementById('main-container').style.display = 'block';
                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('signup-container').style.display = 'none';
                    
                    // إظهار زر إدارة الإيداع للمدير
                    if (currentUserData.isAdmin) {
                        document.getElementById('admin-settings-btn').style.display = 'block';
                    }
                }
            } else {
                currentUser = null;
                currentUserData = null;
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('login-container').style.display = 'block';
            }
        });
        
        window.showLogin = function() {
            document.getElementById('login-container').style.display = 'block';
            document.getElementById('signup-container').style.display = 'none';
        };
        
        window.showSignup = function() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('signup-container').style.display = 'block';
        };
        
        // تصدير الدوال
        window.showDepositModal = showDepositModal;
        window.closeDepositModal = closeDepositModal;
        window.submitDeposit = submitDeposit;
        window.showPaymentSettings = showPaymentSettings;
        window.closePaymentSettings = closePaymentSettings;
        
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .silver-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(192,192,192,0.2);
        }
        
        .gold-text {
            color: #ffd966;
        }
        
        h1, h2 {
            background: linear-gradient(135deg, #ffd966 0%, #ffb347 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            text-align: center;
        }
        
        input, select {
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border: 1px solid #4a4a4a;
            border-radius: 8px;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 14px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #ffd966;
        }
        
        button {
            background: linear-gradient(135deg, #4a4a4a 0%, #3a3a3a 100%);
            color: #e0e0e0;
            border: 1px solid #5a5a5a;
            padding: 10px 20px;
            margin: 8px 4px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .gold-btn {
            background: linear-gradient(135deg, #ffd966 0%, #ffb347 100%);
            color: #1a1a1a;
            font-weight: bold;
        }
        
        .balance-display {
            background: linear-gradient(135deg, #2a2a2a 0%, #222 100%);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            margin: 16px 0;
            border: 1px solid #ffd966;
        }
        
        .balance-amount {
            font-size: 2em;
            font-weight: bold;
            color: #ffd966;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }
        
        .action-buttons button {
            flex: 1;
        }
        
        /* مودال الإيداع */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 100%);
            border-radius: 20px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid #ffd966;
        }
        
        .payment-method {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a3a;
            display: flex;
            gap: 15px;
        }
        
        .payment-method:hover {
            border-color: #ffd966;
            transform: translateX(-5px);
        }
        
        .method-icon {
            font-size: 40px;
        }
        
        .method-info h3 {
            color: #ffd966;
            margin-bottom: 8px;
        }
        
        .address-box {
            background: #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .address-label {
            font-size: 12px;
            color: #aaa;
        }
        
        .address-value {
            font-family: monospace;
            color: #ffd966;
            font-size: 14px;
        }
        
        .copy-btn {
            background: #ffd966;
            color: #1a1a1a;
            padding: 4px 8px;
            font-size: 12px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            color: #ffd966;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .form-group small {
            color: #aaa;
            font-size: 11px;
        }
        
        /* لوحة الإعدادات */
        .settings-section {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .settings-section h3 {
            color: #ffd966;
            margin-bottom: 15px;
        }
        
        .setting-row {
            margin-bottom: 12px;
        }
        
        .setting-row label {
            display: block;
            color: #aaa;
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .checkbox-row input {
            width: auto;
            margin: 0;
        }
        
        .switch-link a {
            color: #ffd966;
            cursor: pointer;
            text-decoration: none;
        }
        
        .info-note {
            text-align: center;
            font-size: 11px;
            color: #6a6a6a;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #3a3a3a;
        }
        
        @media (max-width: 600px) {
            .action-buttons {
                flex-direction: column;
            }
            
            .payment-method {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- واجهة تسجيل الدخول -->
        <div id="login-container" class="silver-card">
            <h1>✨ BoomB ✨</h1>
            <h2 class="gold-text">تسجيل الدخول</h2>
            <input type="email" id="login-email" placeholder="البريد الإلكتروني">
            <input type="password" id="login-password" placeholder="كلمة المرور">
            <button class="gold-btn" onclick="signIn()">دخول</button>
            <div class="switch-link"><a onclick="showSignup()">ليس لديك حساب؟ إنشاء حساب</a></div>
        </div>
        
        <!-- واجهة إنشاء حساب -->
        <div id="signup-container" class="silver-card" style="display: none;">
            <h1>✨ BoomB ✨</h1>
            <h2 class="gold-text">إنشاء حساب جديد</h2>
            <input type="text" id="signup-username" placeholder="اسم المستخدم">
            <input type="email" id="signup-email" placeholder="البريد الإلكتروني">
            <input type="password" id="signup-password" placeholder="كلمة المرور">
            <button class="gold-btn" onclick="signUp()">إنشاء حساب</button>
            <div class="switch-link"><a onclick="showLogin()">لديك حساب؟ تسجيل الدخول</a></div>
        </div>
        
        <!-- الواجهة الرئيسية -->
        <div id="main-container" class="silver-card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h1 style="margin: 0;">✨ BoomB ✨</h1>
                <button onclick="logout()" class="silver-btn" style="padding: 8px 16px;">تسجيل خروج</button>
            </div>
            
            <div id="admin-settings-btn" style="text-align: center; margin-bottom: 12px; display: none;">
                <button onclick="showPaymentSettings()" class="gold-btn">⚙️ إدارة طرق الدفع</button>
            </div>
            
            <div class="balance-display">
                <h3>مرحباً <span id="user-name"></span></h3>
                <div class="balance-amount">💰 <span id="user-balance">0</span> 💰</div>
            </div>
            
            <div class="action-buttons">
                <button class="gold-btn" onclick="showDepositModal()">💎 إيداع</button>
                <button class="gold-btn" onclick="alert('سيتم إضافة رابط السحب قريباً')">💸 سحب</button>
                <button class="gold-btn" onclick="alert('سيتم إضافة رابط اللعبة قريباً')">🎮 العب الآن</button>
            </div>
            
            <div class="info-note">⚡ يتم تحديث الرصيد بشكل فوري</div>
        </div>
        
        <!-- مودال الإيداع -->
        <div id="deposit-modal" class="modal">
            <div class="modal-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="margin: 0;">💎 إيداع</h2>
                    <button onclick="closeDepositModal()" style="background: none; border: none; font-size: 24px;">✖</button>
                </div>
                
                <div id="deposit-methods"></div>
                
                <div id="payment-form" style="display: none;">
                    <h3 id="selected-method-title" class="gold-text"></h3>
                    <div id="form-fields"></div>
                    <div class="action-buttons" style="margin-top: 20px;">
                        <button onclick="closeDepositModal()" class="silver-btn">إلغاء</button>
                        <button onclick="submitDeposit()" class="gold-btn">تأكيد الإيداع</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- لوحة إدارة الإعدادات (للمدير) -->
        <div id="admin-payment-container" class="silver-card" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>⚙️ إدارة طرق الدفع</h2>
                <button onclick="closePaymentSettings()" class="silver-btn">العودة</button>
            </div>
            
            <!-- شام كاش -->
            <div class="settings-section">
                <h3>💳 شام كاش</h3>
                <div class="checkbox-row">
                    <input type="checkbox" id="shamcash-enabled">
                    <label>تفعيل</label>
                </div>
                <div class="setting-row">
                    <label>📱 العنوان الظاهر للمستخدم:</label>
                    <input type="text" id="shamcash-display" placeholder="مثال: 0912 345 678">
                </div>
                <div class="setting-row">
                    <label>🔍 العنوان للبحث في API (بدون مسافات):</label>
                    <input type="text" id="shamcash-api" placeholder="مثال: 0912345678">
                </div>
                <div class="setting-row">
                    <label>🔑 مفتاح API:</label>
                    <input type="text" id="shamcash-api-key" placeholder="API Key">
                </div>
                <div class="setting-row">
                    <label>💰 الحد الأدنى:</label>
                    <input type="number" id="shamcash-min">
                </div>
                <div class="setting-row">
                    <label>💰 الحد الأقصى:</label>
                    <input type="number" id="shamcash-max">
                </div>
                <div class="setting-row">
                    <label>💱 سعر صرف الدولار (USD → SYP):</label>
                    <input type="number" id="shamcash-usd-rate">
                </div>
            </div>
            
            <!-- سيرياتيل كاش -->
            <div class="settings-section">
                <h3>📱 سيرياتيل كاش</h3>
                <div class="checkbox-row">
                    <input type="checkbox" id="syriatel-enabled">
                    <label>تفعيل</label>
                </div>
                <div class="setting-row">
                    <label>📞 الأرقام الظاهرة للمستخدم (مفصولة بفواصل):</label>
                    <input type="text" id="syriatel-display" placeholder="مثال: 0944 123 456, 0933 123 456">
                </div>
                <div class="setting-row">
                    <label>🔍 الأرقام للبحث في API (بدون مسافات):</label>
                    <input type="text" id="syriatel-api" placeholder="مثال: 0944123456, 0933123456">
                </div>
                <div class="setting-row">
                    <label>🔑 مفتاح API:</label>
                    <input type="text" id="syriatel-api-key" placeholder="API Key">
                </div>
                <div class="setting-row">
                    <label>💰 الحد الأدنى:</label>
                    <input type="number" id="syriatel-min">
                </div>
                <div class="setting-row">
                    <label>💰 الحد الأقصى:</label>
                    <input type="number" id="syriatel-max">
                </div>
                <div class="setting-row">
                    <label>💱 سعر الصرف:</label>
                    <input type="number" id="syriatel-rate" step="0.01">
                </div>
            </div>
            
            <button class="gold-btn" onclick="savePaymentSettings()" style="width: 100%;">💾 حفظ الإعدادات</button>
        </div>
    </div>
    
    <script type="module">
        // دوال تسجيل الدخول والتسجيل
        window.signIn = async function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("تم تسجيل الدخول بنجاح!");
            } catch (error) {
                alert("خطأ: " + error.message);
            }
        };
        
        window.signUp = async function() {
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const isAdmin = (email === "asd123@gmail.com");
                await setDoc(doc(db, "users", userCredential.user.uid), {
                    email: email,
                    username: username,
                    balance: 0,
                    createdAt: new Date().toISOString(),
                    isAdmin: isAdmin
                });
                alert("تم إنشاء الحساب بنجاح!");
            } catch (error) {
                alert("خطأ: " + error.message);
            }
        };
        
        window.logout = async function() {
            await signOut(auth);
        };
        
        // استيراد الدوال المفقودة
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
    </script>
</body>
</html>

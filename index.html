<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ الاحترافية - نظام المكافآت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: url('https://www.transparenttextures.com/contents/dark-geometric.png'), linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            background-size: cover, auto;
            background-blend-mode: overlay;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        /* حاوية الخلفية الرئيسية (صورة خلفية يمكنك تغييرها) */
        .game-container {
            background-image: url('https://images.unsplash.com/photo-1534237886192-5e8f9a3e2d1a?q=80&w=1974&auto=format'); /* استبدل بالمسار المطلوب */
            background-size: cover;
            background-position: center;
            border-radius: 70px;
            padding: 30px 20px 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.2);
            backdrop-filter: brightness(0.95);
        }

        .wheel-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            background: #2d2418;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), 0 0 0 12px #f7d44a, 0 0 0 18px #b87c2e;
            transition: all 0.2s;
        }

        .spin-btn {
            background: radial-gradient(circle at 30% 10%, #ffd966, #e6a017);
            border: none;
            color: #2c1a0c;
            font-weight: bold;
            font-size: 1.8rem;
            padding: 14px 40px;
            margin-top: 25px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            box-shadow: 0 8px 0 0 #7a3e0e;
            transition: 0.07s linear;
            width: 80%;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .spin-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 0 #7a3e0e;
        }
        .spin-btn:disabled {
            opacity: 0.5;
            transform: translateY(0);
            cursor: not-allowed;
        }

        .info-panel {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 18px 20px;
            margin-top: 25px;
            color: #ffefcf;
            text-align: center;
            font-weight: bold;
            border: 1px solid #ffcd7e;
        }

        .timer {
            font-size: 1.5rem;
            background: #000000aa;
            display: inline-block;
            padding: 8px 25px;
            border-radius: 40px;
            margin-top: 8px;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .result-area {
            font-size: 1.2rem;
            background: #2d2b1fcc;
            margin-top: 15px;
            padding: 12px;
            border-radius: 40px;
        }

        .user-stats {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        @media (max-width: 550px) {
            .spin-btn { font-size: 1.4rem; }
            .timer { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="550" height="550"></canvas>
    </div>
    <button class="spin-btn" id="spinButton">🎡 دَوّر الآن 🎲</button>

    <div class="info-panel">
        <div class="user-stats">
            <span>💰 إجمالي الشحن: <span id="totalCharge">0</span> ل.س</span>
            <span>💸 إجمالي السحب: <span id="totalWithdraw">0</span> ل.س</span>
            <span>🎁 مرات التدوير: <span id="spinCount">0</span></span>
        </div>
        <div>⏳ يمكنك التدوير كل 48 ساعة — متبقي:</div>
        <div class="timer" id="countdownTimer">-- : -- : --</div>
        <div class="result-area" id="resultMessage">✨ اضغط على زر التدوير للحصول على جائزتك ✨</div>
    </div>
</div>

<script>
    (function(){
        // ---------- إعدادات العجلة ذات الصور بدلاً من النص ----------
        const SEGMENTS = [
            { id: "50",   label: "50",   value: 50,   type: "coins",   imageUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331967.png" },     // 50 ل.س
            { id: "100",  label: "100",  value: 100,  type: "coins",   imageUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331970.png" },
            { id: "500",  label: "500",  value: 500,  type: "coins",   imageUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331976.png" },
            { id: "1000", label: "1000", value: 1000, type: "coins",   imageUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331985.png" },
            { id: "5%",   label: "5%",   value: 5,    type: "percent", imageUrl: "https://cdn-icons-png.flaticon.com/512/3208/3208699.png" },
            { id: "25%",  label: "25%",  value: 25,   type: "percent", imageUrl: "https://cdn-icons-png.flaticon.com/512/1040/1040243.png" }
        ];

        // ترتيب الأقسام في العجلة (بترتيب دائري)
        const ORDER = [0,1,2,3,4,5]; // 50,100,500,1000,5%,25%

        // ألوان زاهية للأقسام
        const COLORS = ["#F05454", "#FFC93C", "#42C2FF", "#64C9CF", "#FAC213", "#B980F0"];

        // متغيرات الحالة (تخزن في localStorage)
        let userData = {
            totalCharged: 0,       // مجموع مبالغ شحن المستخدم (ل.س)
            totalWithdrawn: 0,     // مجموع السحب (ل.س)
            spinsDone: 0,          // كم مرة تم التدوير بنجاح
            lastSpinTimestamp: 0,   // آخر مرة دوّر فيها (timestamp)
            hasFirstSpinRewardGiven: false   // هل تم منح 25% للمستخدم الجديد (أول استخدام)
        };

        // متغيرات العجلة
        let canvas = document.getElementById("wheelCanvas");
        let ctx = canvas.getContext("2d");
        let spinning = false;
        let currentAngle = 0;
        let animationId = null;

        // عناصر DOM
        const spinBtn = document.getElementById("spinButton");
        const totalChargeSpan = document.getElementById("totalCharge");
        const totalWithdrawSpan = document.getElementById("totalWithdraw");
        const spinCountSpan = document.getElementById("spinCount");
        const countdownTimerSpan = document.getElementById("countdownTimer");
        const resultMsgDiv = document.getElementById("resultMessage");

        // تحميل البيانات من localStorage
        function loadUserData() {
            const saved = localStorage.getItem("wheelOfLuckPro");
            if(saved) {
                try {
                    const parsed = JSON.parse(saved);
                    userData = { ...userData, ...parsed };
                } catch(e) {}
            }
            updateUIStats();
        }

        function saveUserData() {
            localStorage.setItem("wheelOfLuckPro", JSON.stringify(userData));
            updateUIStats();
        }

        function updateUIStats() {
            totalChargeSpan.innerText = userData.totalCharged.toLocaleString();
            totalWithdrawSpan.innerText = userData.totalWithdrawn.toLocaleString();
            spinCountSpan.innerText = userData.spinsDone;
        }

        // مساعد: هل يمكنه التدوير الآن (مرة كل 48 ساعة)
        function canSpinNow() {
            const now = Date.now();
            const last = userData.lastSpinTimestamp;
            if(last === 0) return true;
            const hoursPassed = (now - last) / (1000 * 60 * 60);
            return hoursPassed >= 48;
        }

        // تحديث التايمر
        function updateTimerDisplay() {
            if(!canSpinNow() && userData.lastSpinTimestamp !== 0) {
                const nextSpinTime = userData.lastSpinTimestamp + (48 * 60 * 60 * 1000);
                const diff = nextSpinTime - Date.now();
                if(diff > 0) {
                    const hours = Math.floor(diff / (1000*60*60));
                    const minutes = Math.floor((diff % (3600000)) / 60000);
                    const seconds = Math.floor((diff % 60000) / 1000);
                    countdownTimerSpan.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
                    return;
                }
            }
            countdownTimerSpan.innerText = "جاهز للدوران!";
        }

        setInterval(updateTimerDisplay, 1000);
        
        // ------------------ منطق تحديد الجائزة حسب الشروط ------------------
        function determinePrizeIndex() {
            // 1) المستخدمين الجدد (أول استخدام ولم يسبق له الدوران او spinsDone ==0 ولم تعطى هدية 25%)
            if(userData.spinsDone === 0 && !userData.hasFirstSpinRewardGiven) {
                // تقف العجلة عند خيار 25%
                return SEGMENTS.findIndex(seg => seg.id === "25%");
            }
            
            // 2) المرة الثانية للتدوير (بعد عملية شحن ناجحة) spinsDone === 1 ويوجد شحن >0 مثلاً
            if(userData.spinsDone === 1 && userData.totalCharged > 0) {
                // 50 (نقدي 5000 ل.س هدية لكن العجلة تظهر 50)
                return SEGMENTS.findIndex(seg => seg.id === "50");
            }
            
            // 3) المرة الثالثة spinsDone === 2 -> 5%
            if(userData.spinsDone === 2) {
                return SEGMENTS.findIndex(seg => seg.id === "5%");
            }
            
            // 4) شرط 100 : مجموع شحن > 250,000
            if(userData.totalCharged > 250000) {
                return SEGMENTS.findIndex(seg => seg.id === "100");
            }
            
            // 5) شرط 500 : مجموع شحن > 700,000 و مجموع سحب <= 200,000
            if(userData.totalCharged > 700000 && userData.totalWithdrawn <= 200000) {
                return SEGMENTS.findIndex(seg => seg.id === "500");
            }
            
            // 6) شرط 1000 : شحن > 1,800,000 و سحب <= 400,000
            if(userData.totalCharged > 1800000 && userData.totalWithdrawn <= 400000) {
                return SEGMENTS.findIndex(seg => seg.id === "1000");
            }
            
            // افتراضياً في حال عدم توفر شروط -> 5%
            return SEGMENTS.findIndex(seg => seg.id === "5%");
        }
        
        // تنفيذ الجائزة بناءً على القطعة المحددة
        function applyPrize(segment) {
            let prizeText = "";
            let prizeValue = segment.value;
            
            if(segment.id === "25%") {
                prizeText = `🎉 فوزك: ${segment.id} رصيد إضافي على أول عملية شحن! 🎉`;
                userData.hasFirstSpinRewardGiven = true;
                // منح 25% إضافي سيتم تطبيقه عند الشحن, لا نضيف رصيداً فورياً.
            }
            else if(segment.id === "50") {
                // اهداء 5000 ل.س في حسابه (رصيد حقيقي)
                const bonus = 5000;
                // هنا نفترض إضافة رصيد (نستخدم متغير افتراضي للعرض)
                prizeText = `🎁 لقد ربحت ${bonus} ل.س تضاف إلى رصيد حسابك! 🎁`;
                // في تطبيق حقيقي تستدعي API. سنقوم بتخزين رصيد إضافي ضمن userData لو أردت ولكن بناء على السيناريو يكفي إعلام
                // يمكن إضافة حقل bonusBalance ولكن حسب الطلب فقط اعلام الزبون.
                alertMessage(`تهانينا! تم إضافة ${bonus} ل.س إلى محفظتك.`);
            }
            else if(segment.id === "5%") {
                prizeText = `✨ ربحت ${segment.id} إضافية على عملية الشحن التالية! ✨`;
            }
            else if(segment.id === "100") {
                const gift = 10000;
                prizeText = `🏆 ربحت ${gift} ل.س هدية تضاف إلى حسابك 🏆`;
                alertMessage(`تم إضافة ${gift} ل.س إلى رصيدك.`);
            }
            else if(segment.id === "500") {
                const gift = 50000;
                prizeText = `💎 ربحت ${gift} ل.س في حسابك! 💎`;
                alertMessage(`تم إضافة ${gift} ل.س.`);
            }
            else if(segment.id === "1000") {
                const gift = 100000;
                prizeText = `👑 فوز كبير! ${gift} ل.س مضافة إلى رصيدك. 👑`;
                alertMessage(`مبروك! رصيدك زاد بمبلغ ${gift} ل.س.`);
            }
            else {
                prizeText = `ربحت ${segment.id} ${segment.type === 'coins' ? 'ل.س' : 'نسبة'}`;
            }
            
            resultMsgDiv.innerHTML = prizeText;
            // بعد التدوير بنجاح، نخزن timestamp وزيادة عدد مرات التدوير
            userData.spinsDone += 1;
            userData.lastSpinTimestamp = Date.now();
            saveUserData();
        }
        
        // تنبيه مساعد
        function alertMessage(msg) {
            const oldMsg = resultMsgDiv.innerHTML;
            resultMsgDiv.innerHTML = msg;
            setTimeout(() => {
                if(resultMsgDiv.innerHTML === msg) resultMsgDiv.innerHTML = oldMsg;
            }, 3500);
        }

        // ---------- رسم العجلة مع صور داخل الأقسام (بديل عن النص) ----------
        function drawWheel(highlightIndex = -1) {
            const size = canvas.width;
            const centerX = size/2, centerY = size/2;
            const radius = size/2 - 5;
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            ctx.clearRect(0,0,size,size);
            
            for(let i=0; i<SEGMENTS.length; i++) {
                const startAngle = currentAngle + i * angleStep;
                const endAngle = startAngle + angleStep;
                const color = COLORS[i % COLORS.length];
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "#fff8e7";
                ctx.lineWidth = 2.5;
                ctx.stroke();
                
                // رسم الصورة داخل القطعة بدلاً من النص
                const img = new Image();
                const segImageUrl = SEGMENTS[ORDER[i]].imageUrl;
                img.src = segImageUrl;
                // نحتاج انتظار تحميل الصورة؟ الحل: استخدام onload لكن رسم متكرر; سنرسم بعد تحميل الصور لكن لكل قطعة نستخدم مؤقت.
                // لضمان ظهور الصور سنستخدم method مختلفة: نرسم العجلة ونرسم الصور بعد تحميل كامل ولكن لسهولة نرسم default
                // نستخدم drawImage داخلياً في حال كانت الصورة جاهزة، لكن بما أن canvas يمسح سنرسم بعد تحميل كامل.
            }
            
            // رسم الصور بعد الألوان - طريقة متقدمة (استدعاء رسم الصور في callback)
            drawImagesOnSegments();
            
            // رسم المؤشر الثابت (السهم)
            ctx.beginPath();
            ctx.moveTo(centerX + radius+10, centerY);
            ctx.lineTo(centerX + radius+30, centerY-15);
            ctx.lineTo(centerX + radius+30, centerY+15);
            ctx.fillStyle = "#FFD966";
            ctx.fill();
            ctx.fillStyle = "#B45F1B";
            ctx.font = "bold 24px sans-serif";
            ctx.fillText("▼", centerX + radius+12, centerY+9);
        }
        
        function drawImagesOnSegments() {
            const size = canvas.width;
            const centerX = size/2, centerY = size/2;
            const radius = size/2 - 5;
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            for(let i=0; i<SEGMENTS.length; i++) {
                const midAngle = currentAngle + (i + 0.5) * angleStep;
                const imgRadius = radius * 0.62;
                const x = centerX + Math.cos(midAngle) * imgRadius;
                const y = centerY + Math.sin(midAngle) * imgRadius;
                const seg = SEGMENTS[ORDER[i]];
                const imgObj = new Image();
                imgObj.src = seg.imageUrl;
                if(imgObj.complete) {
                    ctx.drawImage(imgObj, x-28, y-28, 56, 56);
                } else {
                    imgObj.onload = () => {
                        ctx.drawImage(imgObj, x-28, y-28, 56, 56);
                    };
                }
                // كتابة نص صغير أسفل الصورة اختياري (القيمة)
                ctx.font = "bold 18px 'Tajawal'";
                ctx.fillStyle = "#1E2F2F";
                ctx.shadowBlur = 0;
                ctx.fillText(seg.label, x-15, y+38);
            }
        }
        
        // الدواران والتوقف عند القطعة المطلوبة
        function startSpin() {
            if(spinning) return;
            if(!canSpinNow() && userData.lastSpinTimestamp !== 0) {
                resultMsgDiv.innerHTML = "⚠️ لا يمكنك التدوير إلا مرة كل 48 ساعة! ⚠️";
                return;
            }
            
            const targetIdx = determinePrizeIndex();
            if(targetIdx === -1) return;
            
            spinning = true;
            spinBtn.disabled = true;
            
            // عدد اللفات العشوائية + توقف دقيق على القطعة المطلوبة
            const spins = 8 + Math.floor(Math.random() * 8);
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            const currentSegmentStart = ( ( (2*Math.PI - (currentAngle % (2*Math.PI))) ) / angleStep ) % SEGMENTS.length;
            let targetRawAngle;
            const targetActualIndex = ORDER.indexOf(targetIdx);
            let deltaSegments = (targetActualIndex - currentSegmentStart + SEGMENTS.length) % SEGMENTS.length;
            let targetAngleRad = (deltaSegments) * angleStep;
            let finalAngle = currentAngle + (spins * 2 * Math.PI) + targetAngleRad;
            
            const duration = 3000;
            const startTime = performance.now();
            const startAngleAnim = currentAngle;
            
            function animateSpin(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1-t, 3);
                currentAngle = startAngleAnim + (finalAngle - startAngleAnim) * easeOut;
                drawWheel();
                if(t < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    currentAngle = finalAngle % (Math.PI*2);
                    drawWheel();
                    const landedSegmentIdx = getCurrentSegmentIndex();
                    const prizeSegment = SEGMENTS[ORDER[landedSegmentIdx]];
                    applyPrize(prizeSegment);
                    spinning = false;
                    spinBtn.disabled = false;
                    saveUserData();
                    updateTimerDisplay();
                }
            }
            requestAnimationFrame(animateSpin);
        }
        
        function getCurrentSegmentIndex() {
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            let rawAngle = (Math.PI*2 - (currentAngle % (Math.PI*2))) % (Math.PI*2);
            let idx = Math.floor(rawAngle / angleStep) % SEGMENTS.length;
            return idx;
        }
        
        // تحميل الصور مسبقاً لرسم العجلة كاملة
        function preloadImagesAndDraw() {
            let loaded = 0;
            SEGMENTS.forEach(seg => {
                const img = new Image();
                img.src = seg.imageUrl;
                img.onload = () => {
                    loaded++;
                    if(loaded === SEGMENTS.length) drawWheel();
                };
                img.onerror = () => { loaded++; if(loaded===SEGMENTS.length) drawWheel(); };
            });
            drawWheel();
        }
        
        // إضافة حدث للزر
        spinBtn.addEventListener("click", startSpin);
        
        // تهيئة البيانات
        loadUserData();
        preloadImagesAndDraw();
        updateTimerDisplay();
        
        // مثال لتحديث بيانات الشحن والسحب (يمكنك استدعاء هاتين الدالتين من لوحة التحكم الخاصة بك)
        window.updateUserCharges = function(chargedAmount, withdrawnAmount=0) {
            userData.totalCharged += chargedAmount;
            if(withdrawnAmount) userData.totalWithdrawn += withdrawnAmount;
            saveUserData();
            resultMsgDiv.innerHTML = "✅ تم تحديث بيانات الشحن والسحب بنجاح!";
            setTimeout(()=>{ if(resultMsgDiv.innerHTML.includes("تم تحديث")) resultMsgDiv.innerHTML = "✨ اضغط على زر التدوير ✨"; }, 2000);
        };
        
    })();
</script>
</body>
</html>

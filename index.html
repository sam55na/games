<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BOOMB | مدفع المربعات</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* حاوية اللعبة الرئيسية */
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #050510;
            position: relative;
        }

        /* رأس اللعبة */
        .game-header {
            background: linear-gradient(90deg, #ff3366, #ff6b3d);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .balance-display {
            background: rgba(0,0,0,0.5);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 1.2rem;
        }

        .balance-display span {
            color: #ffd700;
            font-size: 1.3rem;
        }

        /* ========== غرفة الانتظار ========== */
        .waiting-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: all 0.3s ease;
        }

        .waiting-room.hidden {
            display: none;
        }

        .waiting-content {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 500px;
            width: 90%;
        }

        .waiting-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 30px;
        }

        .rooms-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .room-card {
            background: rgba(255,215,0,0.1);
            border: 2px solid #ffd700;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .room-card:hover:not(.disabled) {
            transform: scale(1.05);
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .room-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .room-number {
            font-size: 2rem;
            color: #ffd700;
            font-weight: bold;
        }

        .room-status {
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .room-status.available {
            color: #00ff00;
        }

        .room-status.occupied {
            color: #ff4444;
        }

        .room-bet {
            font-size: 1.2rem;
            margin-top: 10px;
            color: white;
        }

        .create-room-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .create-room-btn:hover {
            transform: scale(1.05);
            background: #ffaa00;
        }

        .countdown-display {
            font-size: 4rem;
            color: #ffd700;
            margin: 20px 0;
            font-weight: bold;
            display: none;
        }

        .countdown-display.active {
            display: block;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        /* ========== منطقة اللعب ========== */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0a0a1a;
        }

        /* النصف العلوي - شبكة المربعات 10x10 */
        .grid-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(180deg, #0f0f1f, #050510);
        }

        .grid-container {
            background: #1a1a2a;
            border: 3px solid #ffd700;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 2px;
            background: #2a2a3a;
        }

        .grid-cell {
            aspect-ratio: 1;
            background: #3a3a4a;
            border-radius: 4px;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        .grid-cell.colored-red {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }

        .grid-cell.colored-blue {
            background: linear-gradient(135deg, #4444ff, #0000cc);
            box-shadow: 0 0 10px rgba(68,68,255,0.5);
        }

        /* النصف السفلي - المدافع */
        .cannons-area {
            height: 35%;
            background: linear-gradient(0deg, #1a1a2a, #0f0f1f);
            border-top: 3px solid #ffd700;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
        }

        .cannon {
            width: 120px;
            height: 120px;
            position: relative;
            cursor: grab;
            transition: transform 0.05s linear;
        }

        .cannon:active {
            cursor: grabbing;
        }

        .cannon-base {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #ffaa44, #aa4422);
            border-radius: 50%;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 3px solid #ffd700;
        }

        .cannon-barrel {
            position: absolute;
            width: 60px;
            height: 20px;
            background: linear-gradient(90deg, #ffaa44, #cc6622);
            border-radius: 10px;
            bottom: 50px;
            left: 50%;
            transform-origin: left center;
            transition: transform 0.02s linear;
        }

        .cannon-left .cannon-barrel {
            left: auto;
            right: 50%;
            transform-origin: right center;
        }

        .power-bar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 5px;
        }

        .power-bar {
            height: 20px;
            background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
            border-radius: 10px;
            width: 0%;
            transition: width 0.02s linear;
        }

        .current-turn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 20px;
            border-radius: 30px;
            color: #ffd700;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid #ffd700;
            z-index: 50;
        }

        .throw-timer {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff4444;
            font-family: monospace;
            z-index: 50;
        }

        /* نافذة النتيجة */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s;
        }

        .result-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .result-content {
            background: linear-gradient(145deg, #1a1a2a, #0a0a1a);
            border: 3px solid #ffd700;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            min-width: 300px;
        }

        .result-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .result-message {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .result-btn {
            background: #ffd700;
            color: #000;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* أزرار التحكم */
        .control-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid #ffd700;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .cannons-area {
                padding: 0 5%;
            }
            .cannon {
                width: 80px;
                height: 80px;
            }
            .cannon-base {
                width: 60px;
                height: 60px;
            }
            .current-turn {
                font-size: 0.9rem;
                top: 10px;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <div>💣 BOOMB</div>
        <div class="balance-display">💰 الرصيد: $<span id="mainBalance">0</span></div>
    </div>

    <div class="game-area">
        <div class="current-turn" id="currentTurn">انتظر...</div>
        <div class="throw-timer" id="throwTimer">10s</div>

        <!-- منطقة الشبكة 10x10 -->
        <div class="grid-area">
            <div class="grid-container">
                <div class="game-grid" id="gameGrid"></div>
            </div>
        </div>

        <!-- منطقة المدافع -->
        <div class="cannons-area" id="cannonsArea">
            <div class="cannon cannon-left" id="cannonLeft">
                <div class="cannon-base"></div>
                <div class="cannon-barrel"></div>
            </div>
            <div class="power-bar-container">
                <div class="power-bar" id="powerBar"></div>
            </div>
            <div class="cannon cannon-right" id="cannonRight">
                <div class="cannon-base"></div>
                <div class="cannon-barrel"></div>
            </div>
        </div>
    </div>
</div>

<div class="control-btn" id="backBtn" onclick="backToRooms()">🏠 العودة للغرف</div>

<!-- غرفة الانتظار -->
<div class="waiting-room" id="waitingRoom">
    <div class="waiting-content">
        <div class="waiting-title">🎮 غرف اللعب</div>
        <div class="rooms-grid" id="roomsGrid"></div>
        <button class="create-room-btn" onclick="createRoom()">➕ إنشاء غرفة جديدة</button>
        <div class="countdown-display" id="countdownDisplay"></div>
    </div>
</div>

<!-- نافذة النتيجة -->
<div class="result-modal" id="resultModal">
    <div class="result-content">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-message" id="resultMessage"></div>
        <button class="result-btn" onclick="closeResult()">موافق</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // ==================== تهيئة Firebase ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCvPo4HlsNhyf1WBmTzIr6CdR1c2lQ5sHU",
        authDomain: "boomb-fa3e7.firebaseapp.com",
        databaseURL: "https://boomb-fa3e7-default-rtdb.firebaseio.com",
        projectId: "boomb-fa3e7",
        storageBucket: "boomb-fa3e7.firebasestorage.app",
        messagingSenderId: "499624996530",
        appId: "1:499624996530:web:235f71e450845c748523ab"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database(app);

    // ==================== إعدادات اللعبة ====================
    const CONFIG = {
        BET_AMOUNT: 10,
        GRID_SIZE: 10,
        THROW_TIME: 15,
        THROWS_PER_PLAYER: 3
    };

    // ==================== بيانات المستخدم ====================
    let currentUser = {
        id: new URLSearchParams(window.location.search).get('user_id') || 'user_' + Math.random().toString(36).substr(2, 8),
        name: new URLSearchParams(window.location.search).get('username') || 'زائر',
        balance: 100
    };

    // ==================== حالة اللعبة ====================
    let gameState = {
        currentRoom: null,
        rooms: {},
        grid: [],
        currentPlayer: 1,
        player1Throws: CONFIG.THROWS_PER_PLAYER,
        player2Throws: CONFIG.THROWS_PER_PLAYER,
        gameActive: false,
        isDragging: false,
        power: 0,
        startDragX: 0,
        startDragY: 0,
        roomListener: null,
        gameListener: null
    };

    // ==================== عناصر DOM ====================
    const waitingRoom = document.getElementById('waitingRoom');
    const roomsGrid = document.getElementById('roomsGrid');
    const mainBalance = document.getElementById('mainBalance');
    const gameGrid = document.getElementById('gameGrid');
    const powerBar = document.getElementById('powerBar');
    const currentTurnEl = document.getElementById('currentTurn');
    const throwTimerEl = document.getElementById('throwTimer');
    const cannonLeft = document.getElementById('cannonLeft');
    const cannonRight = document.getElementById('cannonRight');
    const countdownDisplay = document.getElementById('countdownDisplay');
    const resultModal = document.getElementById('resultModal');

    // ==================== دوال مساعدة ====================
    function showNotification(msg, type = 'info') {
        // نافذة منبثقة بسيطة
        alert(msg);
    }

    async function updateBalanceInDB() {
        await database.ref(`users/${currentUser.id}`).set({
            id: currentUser.id,
            name: currentUser.name,
            balance: currentUser.balance,
            lastSeen: Date.now()
        });
        mainBalance.textContent = currentUser.balance;
    }

    // ==================== إنشاء شبكة 10x10 ====================
    function createGrid() {
        gameGrid.innerHTML = '';
        for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
            for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.row = row;
                cell.dataset.col = col;
                gameGrid.appendChild(cell);
            }
        }
    }

    function updateGridDisplay() {
        const cells = gameGrid.children;
        for (let i = 0; i < cells.length; i++) {
            const row = Math.floor(i / CONFIG.GRID_SIZE);
            const col = i % CONFIG.GRID_SIZE;
            const color = gameState.grid[row]?.[col];
            cells[i].className = 'grid-cell';
            if (color === 1) cells[i].classList.add('colored-red');
            if (color === 2) cells[i].classList.add('colored-blue');
        }
    }

    function resetGrid() {
        gameState.grid = Array(CONFIG.GRID_SIZE).fill().map(() => Array(CONFIG.GRID_SIZE).fill(0));
        updateGridDisplay();
    }

    // ==================== فيزياء القنبلة ====================
    function shootCannon(power) {
        if (!gameState.gameActive) return;

        const isLeft = gameState.currentPlayer === 1;
        const startX = isLeft ? 150 : window.innerWidth - 150;
        const startY = window.innerHeight * 0.7;
        
        // حساب الزاوية والسرعة
        const angle = isLeft ? -Math.PI / 4 : Math.PI - Math.PI / 4;
        const velocity = 8 + (power / 100) * 12;
        
        let bombX = startX;
        let bombY = startY;
        let vx = Math.cos(angle) * velocity;
        let vy = Math.sin(angle) * velocity;
        const gravity = 0.4;
        
        const gridRect = gameGrid.getBoundingClientRect();
        
        function animateBomb() {
            vx *= 0.99;
            vy += gravity;
            bombX += vx;
            bombY += vy;
            
            // رسم القنبلة (تأثير بصري)
            const bombDiv = document.createElement('div');
            bombDiv.style.position = 'fixed';
            bombDiv.style.width = '12px';
            bombDiv.style.height = '12px';
            bombDiv.style.borderRadius = '50%';
            bombDiv.style.background = isLeft ? '#ff0000' : '#0000ff';
            bombDiv.style.left = bombX + 'px';
            bombDiv.style.top = bombY + 'px';
            bombDiv.style.pointerEvents = 'none';
            bombDiv.style.zIndex = '1000';
            bombDiv.style.boxShadow = '0 0 10px currentColor';
            document.body.appendChild(bombDiv);
            
            setTimeout(() => bombDiv.remove(), 100);
            
            // التحقق من اصطدام الشبكة
            if (bombY > gridRect.top && bombY < gridRect.bottom && 
                bombX > gridRect.left && bombX < gridRect.right) {
                
                const cellWidth = gridRect.width / CONFIG.GRID_SIZE;
                const cellHeight = gridRect.height / CONFIG.GRID_SIZE;
                const col = Math.floor((bombX - gridRect.left) / cellWidth);
                const row = Math.floor((bombY - gridRect.top) / cellHeight);
                
                if (row >= 0 && row < CONFIG.GRID_SIZE && col >= 0 && col < CONFIG.GRID_SIZE) {
                    if (gameState.grid[row][col] === 0) {
                        gameState.grid[row][col] = gameState.currentPlayer;
                        updateGridDisplay();
                    }
                }
            }
            
            // استمرار الحركة حتى الخروج من الشاشة
            if (bombX > 0 && bombX < window.innerWidth && bombY < window.innerHeight) {
                requestAnimationFrame(animateBomb);
            } else {
                // انتهى الرمي
                afterShoot();
            }
        }
        
        requestAnimationFrame(animateBomb);
    }
    
    function afterShoot() {
        // تقليل الرميات
        if (gameState.currentPlayer === 1) {
            gameState.player1Throws--;
        } else {
            gameState.player2Throws--;
        }
        
        // التحقق من انتهاء اللعبة
        if (gameState.player1Throws === 0 && gameState.player2Throws === 0) {
            endGame();
        } else {
            switchPlayer();
        }
    }
    
    function switchPlayer() {
        gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
        currentTurnEl.textContent = `دور ${gameState.currentPlayer === 1 ? '🔴 اللاعب الأول' : '🔵 اللاعب الثاني'}`;
        startThrowTimer();
    }
    
    // ==================== مؤقت الرمية ====================
    let timerInterval = null;
    
    function startThrowTimer() {
        if (timerInterval) clearInterval(timerInterval);
        let timeLeft = CONFIG.THROW_TIME;
        throwTimerEl.textContent = `${timeLeft}s`;
        
        timerInterval = setInterval(() => {
            timeLeft--;
            throwTimerEl.textContent = `${timeLeft}s`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                // انتهاء الوقت - خصم رمية تلقائياً
                if (gameState.currentPlayer === 1) {
                    gameState.player1Throws--;
                } else {
                    gameState.player2Throws--;
                }
                
                if (gameState.player1Throws === 0 && gameState.player2Throws === 0) {
                    endGame();
                } else {
                    switchPlayer();
                }
            }
        }, 1000);
    }
    
    // ==================== دوال التحكم بالمدفع ====================
    let isDragging = false;
    let startDrag = { x: 0, y: 0 };
    
    function onMouseDown(e) {
        if (!gameState.gameActive) return;
        const target = e.target.closest('.cannon');
        if (!target) return;
        
        isDragging = true;
        startDrag.x = e.clientX;
        startDrag.y = e.clientY;
        gameState.power = 0;
        powerBar.style.width = '0%';
    }
    
    function onMouseMove(e) {
        if (!isDragging || !gameState.gameActive) return;
        
        const deltaX = startDrag.x - e.clientX;
        const deltaY = startDrag.y - e.clientY;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        
        gameState.power = Math.min(100, distance / 2);
        powerBar.style.width = gameState.power + '%';
        
        // تدوير المدفع حسب القوة
        const angle = Math.min(45, (gameState.power / 100) * 45);
        if (gameState.currentPlayer === 1) {
            cannonLeft.querySelector('.cannon-barrel').style.transform = `rotate(${angle}deg)`;
        } else {
            cannonRight.querySelector('.cannon-barrel').style.transform = `rotate(-${angle}deg)`;
        }
    }
    
    function onMouseUp(e) {
        if (!isDragging || !gameState.gameActive) return;
        isDragging = false;
        
        if (gameState.power > 5) {
            shootCannon(gameState.power);
        }
        
        // إعادة المدفع للوضع الطبيعي
        cannonLeft.querySelector('.cannon-barrel').style.transform = 'rotate(0deg)';
        cannonRight.querySelector('.cannon-barrel').style.transform = 'rotate(0deg)';
        gameState.power = 0;
        powerBar.style.width = '0%';
    }
    
    // ==================== نهاية اللعبة ====================
    function endGame() {
        gameState.gameActive = false;
        if (timerInterval) clearInterval(timerInterval);
        
        // حساب النقاط
        let player1Score = 0, player2Score = 0;
        for (let row = 0; row < CONFIG.GRID_SIZE; row++) {
            for (let col = 0; col < CONFIG.GRID_SIZE; col++) {
                if (gameState.grid[row][col] === 1) player1Score++;
                if (gameState.grid[row][col] === 2) player2Score++;
            }
        }
        
        let resultMsg = '';
        let winner = null;
        
        if (player1Score > player2Score) {
            const winAmount = CONFIG.BET_AMOUNT * 1.8;
            if (gameState.currentRoom?.player1?.id === currentUser.id) {
                currentUser.balance += winAmount;
                updateBalanceInDB();
                resultMsg = `🎉 فزت! +$${winAmount.toFixed(2)} (${player1Score} - ${player2Score})`;
            } else {
                resultMsg = `🔴 فاز اللاعب الأول (${player1Score} - ${player2Score})`;
            }
        } else if (player2Score > player1Score) {
            const winAmount = CONFIG.BET_AMOUNT * 1.8;
            if (gameState.currentRoom?.player2?.id === currentUser.id) {
                currentUser.balance += winAmount;
                updateBalanceInDB();
                resultMsg = `🎉 فزت! +$${winAmount.toFixed(2)} (${player1Score} - ${player2Score})`;
            } else {
                resultMsg = `🔵 فاز اللاعب الثاني (${player1Score} - ${player2Score})`;
            }
        } else {
            // تعادل - إعادة المبلغ
            currentUser.balance += CONFIG.BET_AMOUNT;
            updateBalanceInDB();
            resultMsg = `🤝 تعادل! تم إعادة $${CONFIG.BET_AMOUNT}`;
        }
        
        document.getElementById('resultTitle').textContent = 'انتهت الجولة';
        document.getElementById('resultMessage').innerHTML = resultMsg;
        resultModal.classList.add('active');
        
        // حذف الغرفة من Firebase
        if (gameState.currentRoom) {
            database.ref(`rooms/${gameState.currentRoom.id}`).remove();
        }
        
        // إلغاء الاستماع
        if (gameState.roomListener) gameState.roomListener();
        if (gameState.gameListener) gameState.gameListener();
        
        gameState.currentRoom = null;
    }
    
    // ==================== دوال الغرف ====================
    async function createRoom() {
        if (currentUser.balance < CONFIG.BET_AMOUNT) {
            showNotification(`⚠️ رصيدك غير كافي! تحتاج $${CONFIG.BET_AMOUNT}`);
            return;
        }
        
        const roomId = Date.now().toString();
        const room = {
            id: roomId,
            player1: { id: currentUser.id, name: currentUser.name },
            player2: null,
            status: 'waiting',
            bet: CONFIG.BET_AMOUNT,
            createdAt: Date.now(),
            grid: null,
            currentPlayer: 1,
            player1Throws: CONFIG.THROWS_PER_PLAYER,
            player2Throws: CONFIG.THROWS_PER_PLAYER
        };
        
        await database.ref(`rooms/${roomId}`).set(room);
        joinRoom(roomId);
    }
    
    async function joinRoom(roomId) {
        const roomRef = database.ref(`rooms/${roomId}`);
        const snapshot = await roomRef.once('value');
        const room = snapshot.val();
        
        if (!room) {
            showNotification('الغرفة غير موجودة');
            return;
        }
        
        if (room.player1?.id === currentUser.id) {
            // أنت صاحب الغرفة
            gameState.currentRoom = room;
            startWaitingForPlayer(roomId);
        } else if (!room.player2) {
            // انضم كلاعب ثاني
            if (currentUser.balance < CONFIG.BET_AMOUNT) {
                showNotification(`⚠️ رصيدك غير كافي! تحتاج $${CONFIG.BET_AMOUNT}`);
                return;
            }
            
            await roomRef.update({
                player2: { id: currentUser.id, name: currentUser.name },
                status: 'full'
            });
            
            gameState.currentRoom = { ...room, player2: { id: currentUser.id, name: currentUser.name }, status: 'full' };
            startGame(roomId);
        } else {
            showNotification('الغرفة ممتلئة');
        }
    }
    
    function startWaitingForPlayer(roomId) {
        waitingRoom.classList.remove('hidden');
        roomsGrid.style.display = 'none';
        countdownDisplay.classList.add('active');
        countdownDisplay.textContent = '⏳ انتظار لاعب آخر...';
        
        const listener = database.ref(`rooms/${roomId}`).on('value', (snapshot) => {
            const room = snapshot.val();
            if (room && room.status === 'full') {
                database.ref(`rooms/${roomId}`).off();
                startGame(roomId);
            }
        });
        gameState.roomListener = () => database.ref(`rooms/${roomId}`).off();
    }
    
    async function startGame(roomId) {
        waitingRoom.classList.add('hidden');
        roomsGrid.style.display = 'flex';
        countdownDisplay.classList.remove('active');
        
        // خصم الرهان
        currentUser.balance -= CONFIG.BET_AMOUNT;
        await updateBalanceInDB();
        
        // تهيئة الشبكة
        resetGrid();
        
        // إعداد حالة اللعبة
        gameState.gameActive = true;
        gameState.currentPlayer = 1;
        gameState.player1Throws = CONFIG.THROWS_PER_PLAYER;
        gameState.player2Throws = CONFIG.THROWS_PER_PLAYER;
        
        currentTurnEl.textContent = 'دور 🔴 اللاعب الأول';
        startThrowTimer();
        
        // إضافة مستمعي الأحداث
        document.addEventListener('mousedown', onMouseDown);
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            onMouseDown(touch);
        });
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            onMouseMove(touch);
        });
        document.addEventListener('touchend', onMouseUp);
        
        // عرض العد التنازلي
        let countdown = 3;
        const countdownInterval = setInterval(() => {
            if (countdown <= 0) {
                clearInterval(countdownInterval);
            } else {
                currentTurnEl.textContent = `يبدأ خلال ${countdown}...`;
                countdown--;
            }
        }, 1000);
        
        // حفظ حالة اللعبة في Firebase للمزامنة
        const gameRef = database.ref(`rooms/${roomId}/game`);
        gameState.gameListener = gameRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // مزامنة الشبكة واللاعبين
                if (data.grid) gameState.grid = data.grid;
                if (data.currentPlayer) gameState.currentPlayer = data.currentPlayer;
                if (data.player1Throws) gameState.player1Throws = data.player1Throws;
                if (data.player2Throws) gameState.player2Throws = data.player2Throws;
                updateGridDisplay();
            }
        });
        
        // تحديث حالة اللعبة في Firebase بعد كل حركة
        window.syncGameState = () => {
            gameRef.set({
                grid: gameState.grid,
                currentPlayer: gameState.currentPlayer,
                player1Throws: gameState.player1Throws,
                player2Throws: gameState.player2Throws,
                timestamp: Date.now()
            });
        };
    }
    
    function closeResult() {
        resultModal.classList.remove('active');
        backToRooms();
    }
    
    function backToRooms() {
        // تنظيف
        if (timerInterval) clearInterval(timerInterval);
        document.removeEventListener('mousedown', onMouseDown);
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
        
        gameState.gameActive = false;
        gameState.currentRoom = null;
        
        waitingRoom.classList.remove('hidden');
        roomsGrid.style.display = 'flex';
        loadRooms();
    }
    
    // ==================== عرض الغرف ====================
    async function loadRooms() {
        const roomsRef = database.ref('rooms');
        roomsRef.on('value', (snapshot) => {
            const rooms = snapshot.val() || {};
            gameState.rooms = rooms;
            
            roomsGrid.innerHTML = '';
            const roomList = Object.values(rooms).filter(r => r.status !== 'full').slice(0, 6);
            
            if (roomList.length === 0) {
                roomsGrid.innerHTML = '<div style="grid-column:1/-1;color:#888;">لا توجد غرف متاحة، أنشئ غرفة جديدة</div>';
            }
            
            roomList.forEach(room => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-number">غرفة ${room.id.slice(-4)}</div>
                    <div class="room-status available">🟢 متاحة</div>
                    <div class="room-bet">💰 رهان: $${room.bet}</div>
                    <div>👤 ${room.player1?.name || 'مجهول'}</div>
                `;
                card.onclick = () => joinRoom(room.id);
                roomsGrid.appendChild(card);
            });
        });
    }
    
    // ==================== التهيئة ====================
    async function init() {
        // تحميل بيانات المستخدم من Firebase
        const userRef = database.ref(`users/${currentUser.id}`);
        const snapshot = await userRef.once('value');
        const savedUser = snapshot.val();
        
        if (savedUser) {
            currentUser.balance = savedUser.balance;
            currentUser.name = savedUser.name;
        } else {
            await updateBalanceInDB();
        }
        
        mainBalance.textContent = currentUser.balance;
        createGrid();
        loadRooms();
    }
    
    init();
</script>
</body>
</html>

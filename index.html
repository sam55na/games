<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عجلة الحظ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 50%, #0f0c1f 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
        }

        /* الحاوية الرئيسية - ملء الشاشة */
        .wheel-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2071&auto=format');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* طبقة شفافة فوق الخلفية لتحسين الرؤية */
        .wheel-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(3px);
        }

        /* محتوى العجلة */
        .wheel-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* حاوية العجلة */
        .wheel-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 550px;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 8px rgba(255, 215, 0, 0.6), 0 0 0 15px rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        /* زر التدوير الأنيق */
        .spin-button {
            margin-top: 40px;
            background: linear-gradient(135deg, #ffd89b, #c7e9fb);
            border: none;
            padding: 16px 50px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c1810;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3), 0 5px 0 0 #b8860b;
            transition: 0.08s linear;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        .spin-button:active {
            transform: translateY(4px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3), 0 2px 0 0 #b8860b;
        }

        .spin-button:disabled {
            opacity: 0.6;
            transform: translateY(0);
            cursor: not-allowed;
        }

        /* مؤشر ثابت أنيق */
        .pointer {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ffd700;
            filter: drop-shadow(0 5px 8px rgba(0,0,0,0.3));
            z-index: 20;
        }

        .pointer::after {
            content: '⚡';
            position: absolute;
            top: -52px;
            left: -12px;
            font-size: 28px;
            color: #ffea00;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        /* رسالة النتيجة - تصميم شفاف وأنيق */
        .result-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-radius: 50px;
            color: #ffd966;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            z-index: 100;
            border: 1px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            white-space: nowrap;
        }

        /* مؤقت أنيق */
        .timer-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffd700;
            font-family: monospace;
            font-size: 1rem;
            font-weight: bold;
            z-index: 100;
            border: 1px solid rgba(255, 215, 0, 0.4);
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .spin-button {
                padding: 12px 35px;
                font-size: 1.2rem;
            }
            .result-message {
                font-size: 0.9rem;
                padding: 10px 20px;
                white-space: normal;
                width: 90%;
                text-align: center;
            }
            .timer-badge {
                font-size: 0.8rem;
                top: 10px;
                right: 10px;
            }
            .pointer {
                top: -20px;
                border-left: 18px solid transparent;
                border-right: 18px solid transparent;
                border-top: 38px solid #ffd700;
            }
            .pointer::after {
                top: -40px;
                left: -10px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
<div class="wheel-container">
    <div class="wheel-content">
        <div class="wheel-wrapper">
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="pointer"></div>
        </div>
        <button class="spin-button" id="spinBtn">🎡 دَوّر</button>
    </div>
    <div class="timer-badge" id="timerDisplay">جاهز</div>
    <div class="result-message" id="resultMsg">✨ اضغط للتدوير ✨</div>
</div>

<script>
    (function() {
        // ==================== إعدادات العجلة ====================
        const SEGMENTS = [
            { id: "50",   value: 50,   type: "coins",   icon: "💰", imgUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331967.png" },
            { id: "100",  value: 100,  type: "coins",   icon: "💵", imgUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331970.png" },
            { id: "500",  value: 500,  type: "coins",   icon: "💎", imgUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331976.png" },
            { id: "1000", value: 1000, type: "coins",   icon: "👑", imgUrl: "https://cdn-icons-png.flaticon.com/512/2331/2331985.png" },
            { id: "5%",   value: 5,    type: "percent", icon: "⭐", imgUrl: "https://cdn-icons-png.flaticon.com/512/3208/3208699.png" },
            { id: "25%",  value: 25,   type: "percent", icon: "🎯", imgUrl: "https://cdn-icons-png.flaticon.com/512/1040/1040243.png" }
        ];

        const COLORS = [
            "#E74C3C", "#F39C12", "#2ECC71", "#3498DB", "#9B59B6", "#E67E22"
        ];

        // بيانات المستخدم
        let userData = {
            totalCharged: 0,
            totalWithdrawn: 0,
            spinsDone: 0,
            lastSpinTimestamp: 0,
            hasFirstSpinRewardGiven: false
        };

        let canvas = document.getElementById("wheelCanvas");
        let ctx = canvas.getContext("2d");
        let spinning = false;
        let currentAngle = 0;
        let animationId = null;
        let loadedImages = 0;
        let segmentImages = [];

        // عناصر DOM
        const spinBtn = document.getElementById("spinBtn");
        const timerDisplay = document.getElementById("timerDisplay");
        const resultMsg = document.getElementById("resultMsg");

        // تحميل البيانات
        function loadData() {
            const saved = localStorage.getItem("luxuryWheel");
            if(saved) {
                try {
                    const parsed = JSON.parse(saved);
                    userData = { ...userData, ...parsed };
                } catch(e) {}
            }
        }

        function saveData() {
            localStorage.setItem("luxuryWheel", JSON.stringify(userData));
        }

        // التحقق من إمكانية التدوير (كل 48 ساعة)
        function canSpin() {
            if(userData.lastSpinTimestamp === 0) return true;
            const hoursPassed = (Date.now() - userData.lastSpinTimestamp) / (1000 * 60 * 60);
            return hoursPassed >= 48;
        }

        // تحديث التايمر
        function updateTimer() {
            if(!canSpin() && userData.lastSpinTimestamp !== 0) {
                const nextTime = userData.lastSpinTimestamp + (48 * 60 * 60 * 1000);
                const diff = nextTime - Date.now();
                if(diff > 0) {
                    const hours = Math.floor(diff / (1000*60*60));
                    const minutes = Math.floor((diff % (3600000)) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    timerDisplay.textContent = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                    return;
                }
            }
            timerDisplay.textContent = "✓ جاهز";
        }

        setInterval(updateTimer, 1000);

        // منطق تحديد الجائزة حسب الشروط
        function getTargetSegmentIndex() {
            // أول استخدام -> 25%
            if(userData.spinsDone === 0 && !userData.hasFirstSpinRewardGiven) {
                return SEGMENTS.findIndex(s => s.id === "25%");
            }
            // ثاني تدوير بعد شحن -> 50
            if(userData.spinsDone === 1 && userData.totalCharged > 0) {
                return SEGMENTS.findIndex(s => s.id === "50");
            }
            // ثالث تدوير -> 5%
            if(userData.spinsDone === 2) {
                return SEGMENTS.findIndex(s => s.id === "5%");
            }
            // شرط 100
            if(userData.totalCharged > 250000) {
                return SEGMENTS.findIndex(s => s.id === "100");
            }
            // شرط 500
            if(userData.totalCharged > 700000 && userData.totalWithdrawn <= 200000) {
                return SEGMENTS.findIndex(s => s.id === "500");
            }
            // شرط 1000
            if(userData.totalCharged > 1800000 && userData.totalWithdrawn <= 400000) {
                return SEGMENTS.findIndex(s => s.id === "1000");
            }
            // default -> 5%
            return SEGMENTS.findIndex(s => s.id === "5%");
        }

        // تطبيق الجائزة
        function applyPrize(segment) {
            let message = "";
            
            if(segment.id === "25%") {
                message = "🎉 25% رصيد إضافي على أول شحن! 🎉";
                userData.hasFirstSpinRewardGiven = true;
            }
            else if(segment.id === "50") {
                message = "🎁 ربحت 5,000 ل.س تضاف إلى حسابك! 🎁";
            }
            else if(segment.id === "5%") {
                message = "✨ 5% إضافية على عملية الشحن التالية ✨";
            }
            else if(segment.id === "100") {
                message = "🏆 ربحت 10,000 ل.س هدية! 🏆";
            }
            else if(segment.id === "500") {
                message = "💎 ربحت 50,000 ل.س في حسابك! 💎";
            }
            else if(segment.id === "1000") {
                message = "👑 فوز كبير! 100,000 ل.س مضافة 👑";
            }
            
            resultMsg.textContent = message;
            setTimeout(() => {
                if(resultMsg.textContent === message) {
                    resultMsg.textContent = "✨ استعد للدوران التالي ✨";
                }
            }, 4000);
            
            userData.spinsDone += 1;
            userData.lastSpinTimestamp = Date.now();
            saveData();
        }

        // رسم العجلة بدون أي نصوص (صور فقط)
        function drawWheel() {
            const size = canvas.width;
            const centerX = size/2, centerY = size/2;
            const radius = size/2 - 8;
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            ctx.clearRect(0, 0, size, size);
            
            // رسم الأقسام
            for(let i = 0; i < SEGMENTS.length; i++) {
                const startAngle = currentAngle + i * angleStep;
                const endAngle = startAngle + angleStep;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = COLORS[i];
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            // رسم الصور في منتصف كل قطعة
            for(let i = 0; i < SEGMENTS.length; i++) {
                const midAngle = currentAngle + (i + 0.5) * angleStep;
                const imgRadius = radius * 0.65;
                const x = centerX + Math.cos(midAngle) * imgRadius;
                const y = centerY + Math.sin(midAngle) * imgRadius;
                
                if(segmentImages[i] && segmentImages[i].complete) {
                    ctx.save();
                    ctx.shadowBlur = 0;
                    ctx.drawImage(segmentImages[i], x - 30, y - 30, 60, 60);
                    ctx.restore();
                }
            }
            
            // رسم دائرة صغيرة في المنتصف
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.12, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700";
            ctx.shadowBlur = 0;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.08, 0, Math.PI * 2);
            ctx.fillStyle = "#FFF8DC";
            ctx.fill();
        }
        
        // تحميل جميع الصور
        function loadAllImages() {
            let loaded = 0;
            SEGMENTS.forEach((seg, idx) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.src = seg.imgUrl;
                img.onload = () => {
                    segmentImages[idx] = img;
                    loaded++;
                    if(loaded === SEGMENTS.length) {
                        drawWheel();
                    }
                };
                img.onerror = () => {
                    // في حال فشل التحميل نستخدم أيقونة نصية كبديل
                    segmentImages[idx] = null;
                    loaded++;
                    if(loaded === SEGMENTS.length) drawWheel();
                };
            });
        }
        
        // دوران العجلة
        function startSpin() {
            if(spinning) return;
            if(!canSpin()) {
                resultMsg.textContent = "⏳ يرجى الانتظار 48 ساعة بين كل تدوير ⏳";
                setTimeout(() => {
                    if(resultMsg.textContent.includes("48 ساعة")) {
                        resultMsg.textContent = "✨ اضغط للتدوير ✨";
                    }
                }, 3000);
                return;
            }
            
            const targetIndex = getTargetSegmentIndex();
            if(targetIndex === -1) return;
            
            spinning = true;
            spinBtn.disabled = true;
            
            const spins = 10 + Math.floor(Math.random() * 8);
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            // حساب الزاوية الحالية للقطعة
            let currentRawAngle = (Math.PI * 2 - (currentAngle % (Math.PI * 2))) % (Math.PI * 2);
            let currentSeg = Math.floor(currentRawAngle / angleStep) % SEGMENTS.length;
            
            let delta = (targetIndex - currentSeg + SEGMENTS.length) % SEGMENTS.length;
            let targetAngleRad = delta * angleStep;
            let finalAngle = currentAngle + (spins * 2 * Math.PI) + targetAngleRad;
            
            const duration = 3200;
            const startTime = performance.now();
            const startAngleAnim = currentAngle;
            
            function animate(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                const easeOut = 1 - Math.pow(1 - t, 3.5);
                currentAngle = startAngleAnim + (finalAngle - startAngleAnim) * easeOut;
                drawWheel();
                
                if(t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = finalAngle % (Math.PI * 2);
                    drawWheel();
                    
                    const finalRawAngle = (Math.PI * 2 - (currentAngle % (Math.PI * 2))) % (Math.PI * 2);
                    const landedSeg = Math.floor(finalRawAngle / angleStep) % SEGMENTS.length;
                    const prize = SEGMENTS[landedSeg];
                    
                    applyPrize(prize);
                    spinning = false;
                    spinBtn.disabled = false;
                    updateTimer();
                    saveData();
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // إضافة بيانات الشحن من الخارج
        window.updateUserFinancials = function(chargedAmount, withdrawnAmount = 0) {
            userData.totalCharged += chargedAmount;
            userData.totalWithdrawn += withdrawnAmount;
            saveData();
            resultMsg.textContent = "✓ تم تحديث بياناتك بنجاح";
            setTimeout(() => {
                if(resultMsg.textContent.includes("تم تحديث")) {
                    resultMsg.textContent = "✨ اضغط للتدوير ✨";
                }
            }, 2000);
        };
        
        // تهيئة
        loadData();
        loadAllImages();
        spinBtn.addEventListener("click", startSpin);
        updateTimer();
        
        // تحسين الرسم عند تغيير الحجم
        function resizeCanvas() {
            const wrapper = document.querySelector('.wheel-wrapper');
            const size = wrapper.clientWidth;
            canvas.width = size;
            canvas.height = size;
            drawWheel();
        }
        
        window.addEventListener('resize', () => {
            setTimeout(resizeCanvas, 100);
        });
        
        setTimeout(resizeCanvas, 100);
    })();
</script>
</body>
</html>

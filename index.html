<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }
        @media (min-width: 400px) {
            .wheel-container {
                width: 300px;
                height: 300px;
            }
        }
        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 35px solid #ff4444;
            z-index: 10;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }
        @media (min-width: 400px) {
            .pointer {
                border-left: 20px solid transparent;
                border-right: 20px solid transparent;
                border-top: 40px solid #ff4444;
            }
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            width: 100%;
        }
        button:hover:not(:disabled) {
            transform: scale(1.02);
        }
        button:disabled {
            background: #ccc;
            transform: none;
            cursor: not-allowed;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
        }
        .timer {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
        .timer.ready {
            background: #d4edda;
            color: #155724;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="loading" id="loadingDiv">
            <div class="spinner"></div>
            جاري تحميل بياناتك...
        </div>
        
        <div id="wheelContent" style="display: none;">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="300" height="300"></canvas>
            </div>
            
            <button id="spinBtn" style="display: none;">🔄 أدر العجلة!</button>
            
            <div class="info" id="info"></div>
            <div class="timer" id="timer"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.hide();

        // الحصول على البيانات من URL
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');
        let userData = null;
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const loadingDiv = document.getElementById('loadingDiv');
        const wheelContent = document.getElementById('wheelContent');
        
        // تعريف الجوائز
        const segments = ["50 ل.س", "100 ل.س", "500 ل.س", "1000 ل.س", "5%", "25%"];
        const colors = ["#FF6B6B", "#4ECDC4", "#45B7D1", "#96CEB4", "#FFEAA7", "#DDA0DD"];
        
        let currentRotation = 0;
        let isSpinning = false;

        // فك تشفير البيانات
        if (encodedData) {
            try {
                const decodedData = atob(encodedData.replace(/-/g, '+').replace(/_/g, '/'));
                userData = JSON.parse(decodedData);
                console.log('User Data loaded:', userData);
                loadingDiv.style.display = 'none';
                wheelContent.style.display = 'block';
                
                // رسم العجلة
                drawWheel();
                displayUserInfo();
                checkAndShowSpinButton();
                
            } catch(e) {
                console.error('Error decoding data:', e);
                loadingDiv.innerHTML = '<div style="color: red;">❌ خطأ في تحميل البيانات</div>';
            }
        } else {
            loadingDiv.innerHTML = '<div style="color: red;">❌ لا توجد بيانات متاحة</div>';
        }

        // دالة التحقق من إمكانية التدوير (48 ساعة)
        function canSpin() {
            if (!userData) return false;
            
            // المستخدم الجديد يمكنه التدوير فوراً
            if (userData.first_use === 1) {
                console.log('First time user - can spin');
                return true;
            }
            
            const lastSpin = userData.last_spin;
            if (!lastSpin) {
                console.log('No last spin record - can spin');
                return true;
            }
            
            const lastSpinDate = new Date(lastSpin);
            const now = new Date();
            const hoursDiff = (now - lastSpinDate) / (1000 * 60 * 60);
            
            console.log(`Hours since last spin: ${hoursDiff}`);
            
            return hoursDiff >= 48;
        }
        
        // دالة الحصول على الوقت المتبقي
        function getRemainingTime() {
            if (!userData) return null;
            if (userData.first_use === 1) return null;
            
            const lastSpin = userData.last_spin;
            if (!lastSpin) return null;
            
            const lastSpinDate = new Date(lastSpin);
            const now = new Date();
            const hoursPassed = (now - lastSpinDate) / (1000 * 60 * 60);
            
            if (hoursPassed >= 48) return null;
            
            const remainingMs = (48 * 60 * 60 * 1000) - (now - lastSpinDate);
            const remainingHours = Math.floor(remainingMs / (1000 * 60 * 60));
            const remainingMinutes = Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
            const remainingSeconds = Math.floor((remainingMs % (1000 * 60)) / 1000);
            
            return { hours: remainingHours, minutes: remainingMinutes, seconds: remainingSeconds };
        }
        
        // دالة عرض وإخفاء زر التدوير
        function checkAndShowSpinButton() {
            const timerDiv = document.getElementById('timer');
            
            if (canSpin()) {
                // إظهار زر التدوير
                spinBtn.style.display = 'block';
                timerDiv.className = 'timer ready';
                timerDiv.innerHTML = '✅ يمكنك التدوير الآن! اضغط على الزر أعلاه.';
                console.log('Spin button shown - user can spin');
            } else {
                // إخفاء زر التدوير
                spinBtn.style.display = 'none';
                const remaining = getRemainingTime();
                if (remaining) {
                    timerDiv.className = 'timer';
                    timerDiv.innerHTML = `⏰ لا يمكنك التدوير الآن!<br>الوقت المتبقي: ${remaining.hours} ساعة و ${remaining.minutes} دقيقة و ${remaining.seconds} ثانية`;
                    
                    // تحديث العد التنازلي كل ثانية
                    setTimeout(() => {
                        checkAndShowSpinButton();
                    }, 1000);
                }
                console.log('Spin button hidden - waiting period');
            }
        }

        function drawWheel(highlightSegment = null) {
            const sliceAngle = (2 * Math.PI) / segments.length;
            segments.forEach((text, i) => {
                ctx.beginPath();
                if (highlightSegment === i && userData && userData.first_use === 1) {
                    ctx.fillStyle = "#FFD700";
                } else {
                    ctx.fillStyle = colors[i];
                }
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 150, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
                
                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 13px 'Segoe UI', Arial";
                ctx.shadowBlur = 0;
                ctx.fillText(text, 70, 10);
                ctx.restore();
            });
        }

        // دالة تحديد النتيجة حسب الشروط
        function determineResult() {
            if (!userData) return "5%";
            
            const spinCount = userData.spin_count || 0;
            const totalRecharge = userData.total_recharge || 0;
            const totalWithdraw = userData.total_withdraw || 0;
            const firstUse = userData.first_use || 1;
            
            console.log(`Determining result - SpinCount: ${spinCount}, TotalRecharge: ${totalRecharge}, TotalWithdraw: ${totalWithdraw}, FirstUse: ${firstUse}`);
            
            // شرط المستخدم الجديد
            if (firstUse === 1) {
                console.log('Result: 25% (new user)');
                return "25%";
            }
            
            // المرة الثانية (بعد شحن ناجح)
            if (spinCount === 1) {
                console.log('Result: 50 ل.س (second spin)');
                return "50 ل.س";
            }
            
            // المرة الثالثة
            if (spinCount === 2) {
                console.log('Result: 5% (third spin)');
                return "5%";
            }
            
            // شرط 100
            if (totalRecharge > 250000) {
                console.log('Result: 100 ل.س (recharge > 250k)');
                return "100 ل.س";
            }
            
            // شرط 500
            if (totalRecharge > 700000 && totalWithdraw <= 200000) {
                console.log('Result: 500 ل.س (recharge > 700k && withdraw <= 200k)');
                return "500 ل.س";
            }
            
            // شرط 1000
            if (totalRecharge > 1800000 && totalWithdraw <= 400000) {
                console.log('Result: 1000 ل.س (recharge > 1.8M && withdraw <= 400k)');
                return "1000 ل.س";
            }
            
            console.log('Result: 5% (default)');
            return "5%";
        }

        function displayUserInfo() {
            if (userData) {
                const infoDiv = document.getElementById('info');
                infoDiv.innerHTML = `
                    📊 <strong>معلومات حسابك</strong><br>
                    ─────────────────<br>
                    🎯 عدد التدويرات السابقة: ${userData.spin_count || 0}<br>
                    💰 مجموع الشحنات: ${(userData.total_recharge || 0).toLocaleString()} ل.س<br>
                    💸 مجموع السحوبات: ${(userData.total_withdraw || 0).toLocaleString()} ل.س<br>
                    📦 شحن آخر 10 أيام: ${(userData.recent_recharge || 0).toLocaleString()} ل.س<br>
                    🚀 سحب آخر 10 أيام: ${(userData.recent_withdraw || 0).toLocaleString()} ل.س<br>
                    ─────────────────<br>
                    🎁 <strong>الجائزة المتوقعة حسب شروطك</strong><br>
                    🏆 ${determineResult()}
                `;
            }
        }

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            
            // التحقق مرة أخرى قبل التدوير
            if (!canSpin()) {
                checkAndShowSpinButton();
                return;
            }
            
            isSpinning = true;
            spinBtn.disabled = true;
            
            // تحديد النتيجة حسب الشروط
            const result = determineResult();
            console.log('Spinning for result:', result);
            
            // العثور على فهرس النتيجة في العجلة
            const resultIndex = segments.findIndex(seg => seg === result);
            
            // حساب الدوران للوصول إلى النتيجة المطلوبة
            const sliceAngle = 360 / segments.length;
            const targetAngle = 270; // موضع المؤشر
            const currentAngle = currentRotation % 360;
            
            const resultCenterAngle = (resultIndex * sliceAngle + sliceAngle / 2);
            let neededRotation = (targetAngle - resultCenterAngle + 360) % 360;
            const fullRotations = 5 * 360;
            const extraDegree = neededRotation + fullRotations;
            
            currentRotation += extraDegree;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                // إرسال النتيجة للبوت
                let resultType = "";
                let resultValue = "";
                
                if (result.includes("%")) {
                    resultType = "bonus_percent";
                    resultValue = parseInt(result);
                } else if (result.includes("ل.س")) {
                    resultType = "direct_bonus";
                    resultValue = parseInt(result);
                }
                
                tg.sendData(JSON.stringify({
                    action: "spin_result",
                    result: result,
                    result_type: resultType,
                    result_value: resultValue
                }));
                
                // تحديث العرض
                const infoDiv = document.getElementById('info');
                infoDiv.innerHTML = `🎉🎉 <strong>النتيجة: ${result}!</strong> 🎉🎉<br><br>${infoDiv.innerHTML}`;
                
                setTimeout(() => {
                    tg.close();
                }, 2000);
                
                isSpinning = false;
            }, 4000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .info {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎡 عجلة الحظ</h2>
        
        <div class="info" id="info">
            <p>🆔 جاري التحميل...</p>
        </div>
        
        <button id="spinBtn" onclick="getPrize()">🎲 احصل على الجائزة</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        // ================ التوكن (نفس توكن البوت) ================
        const BOT_TOKEN = "8391427351:AAEd28dLdeT5_nmFrxwCqehjf6TjfCbI6T4";  // 👈 ضع توكن البوت هنا
        
        // ================ قراءة البيانات من الرابط ================
        const urlParams = new URLSearchParams(window.location.search);
        const USER_ID = urlParams.get('user_id');
        const TOTAL_RECHARGE = parseFloat(urlParams.get('total_recharge')) || 0;
        const TOTAL_WITHDRAW = parseFloat(urlParams.get('total_withdraw')) || 0;
        let SPIN_COUNT = parseInt(urlParams.get('spin_count')) || 0;
        
        // عرض معلومات المستخدم
        function showUserInfo() {
            const infoDiv = document.getElementById('info');
            infoDiv.innerHTML = `
                <p>🆔 معرفك: <strong>${USER_ID}</strong></p>
                <p>💰 إجمالي الشحن: <strong>${TOTAL_RECHARGE.toLocaleString()} ل.س</strong></p>
                <p>💸 إجمالي السحب: <strong>${TOTAL_WITHDRAW.toLocaleString()} ل.س</strong></p>
                <p>🎲 عدد المرات: <strong>${SPIN_COUNT}</strong></p>
            `;
        }
        
        // تحديد الجائزة
        function getPrizeValue() {
            if (SPIN_COUNT === 0) {
                return { name: "25%", value: 25, type: "percent" };
            }
            if (TOTAL_RECHARGE > 250000 && TOTAL_WITHDRAW === 0) {
                return { name: "100", value: 10000, type: "amount" };
            }
            if (TOTAL_RECHARGE > 700000 && TOTAL_WITHDRAW < 200000) {
                return { name: "500", value: 50000, type: "amount" };
            }
            if (TOTAL_RECHARGE > 1800000 && TOTAL_WITHDRAW < 400000) {
                return { name: "1000", value: 100000, type: "amount" };
            }
            return { name: "5%", value: 5, type: "percent" };
        }
        
        // إرسال رسالة إلى البوت
        async function sendMessageToBot(chatId, text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
            
            return await response.json();
        }
        
        // الحصول على الجائزة وإرسالها
        async function getPrize() {
            const spinBtn = document.getElementById('spinBtn');
            const resultDiv = document.getElementById('result');
            
            // تعطيل الزر
            spinBtn.disabled = true;
            spinBtn.innerText = '⏳ جاري المعالجة...';
            
            // تحديد الجائزة
            const prize = getPrizeValue();
            
            // تحضير الرسالة للمستخدم
            let userMessage = "";
            let adminMessage = "";
            
            if (prize.type === "amount") {
                userMessage = `🎉 تهانينا! لقد ربحت ${prize.name} ل.س\n💰 تم إضافة ${prize.value.toLocaleString()} ل.س إلى رصيدك!`;
                adminMessage = `💰 جائزة مالية\nالمستخدم: ${USER_ID}\nالقيمة: ${prize.value} ل.س\nالنوع: ${prize.name}`;
            } else {
                userMessage = `🎉 تهانينا! لقد ربحت ${prize.name}\n🎁 سيتم تفعيل البونص عند عملية الشحن القادمة!`;
                adminMessage = `🎁 بونص مئوي\nالمستخدم: ${USER_ID}\nالنسبة: ${prize.value}%\nالنوع: ${prize.name}`;
            }
            
            try {
                // إرسال رسالة للمستخدم
                const userResult = await sendMessageToBot(USER_ID, userMessage);
                
                if (userResult.ok) {
                    // عرض النجاح للمستخدم
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `✅ تم إرسال الجائزة بنجاح!\n\n${userMessage}`;
                    
                    spinBtn.innerText = '✅ تم الإرسال';
                    
                    // إغلاق النافذة بعد 3 ثواني
                    setTimeout(() => {
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.close();
                        }
                    }, 3000);
                } else {
                    throw new Error("فشل إرسال الرسالة");
                }
                
            } catch (error) {
                console.error("خطأ:", error);
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `❌ حدث خطأ: ${error.message}\nالرجاء المحاولة مرة أخرى`;
                
                spinBtn.disabled = false;
                spinBtn.innerText = '🔄 إعادة المحاولة';
            }
        }
        
        // ================ تهيئة الصفحة ================
        function init() {
            if (!USER_ID || USER_ID === "null") {
                document.getElementById('info').innerHTML = '<p>❌ خطأ: يرجى الدخول من خلال البوت</p>';
                return;
            }
            
            showUserInfo();
            
            // إعلام Telegram بأن الصفحة جاهزة
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        }
        
        init();
    </script>
</body>
</html>

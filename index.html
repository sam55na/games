<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عجلة الحظ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* نفس الستايلات السابقة */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        canvas {
            max-width: 90vw;
            max-height: 90vw;
            width: auto;
            height: auto;
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background: white;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        canvas:hover {
            transform: scale(1.02);
        }
        
        .spin-button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        
        .spin-button:active {
            transform: scale(0.95);
        }
        
        .spin-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.9);
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        <button class="spin-button" id="spinBtn">🔄 ابدأ الدوران</button>
        <div class="result" id="result"></div>
    </div>

    <script>
        // تهيئة تطبيق تليجرام
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // الجوائز والبيانات
        const SEGMENTS = [
            { name: "🏆 1000 نقطة", color: "#FF6B6B", weight: 5 },
            { name: "🎁 قسيمة 20%", color: "#4ECDC4", weight: 15 },
            { name: "🍀 50 نقطة", color: "#45B7D1", weight: 30 },
            { name: "⭐ 10 نقاط", color: "#96CEB4", weight: 25 },
            { name: "😔 للأسف لا شيء", color: "#FFEAA7", weight: 25 }
        ];
        
        let canvas = document.getElementById('wheelCanvas');
        let ctx = canvas.getContext('2d');
        let currentAngle = 0;
        let spinning = false;
        let spinStartTime = 0;
        let spinDuration = 3000;
        let targetAngle = 0;
        let selectedPrize = null;
        
        // رسم العجلة
        function drawWheel(angle = 0) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 250;
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                const start = i * angleStep + angle;
                const end = start + angleStep;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.lineTo(centerX, centerY);
                ctx.fillStyle = SEGMENTS[i].color;
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(start + angleStep / 2);
                ctx.textAlign = "center";
                ctx.fillStyle = "#333";
                ctx.font = "bold 18px 'Segoe UI'";
                ctx.shadowBlur = 0;
                ctx.fillText(SEGMENTS[i].name, radius * 0.65, 10);
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.moveTo(canvas.width - 40, centerY - 20);
            ctx.lineTo(canvas.width - 20, centerY);
            ctx.lineTo(canvas.width - 40, centerY + 20);
            ctx.fillStyle = "#FFD700";
            ctx.fill();
            ctx.fillStyle = "#333";
            ctx.font = "bold 30px Arial";
            ctx.fillText("▼", canvas.width - 38, centerY + 8);
        }
        
        function selectPrizeByWeight() {
            let totalWeight = SEGMENTS.reduce((sum, seg) => sum + seg.weight, 0);
            let random = Math.random() * totalWeight;
            let accumulated = 0;
            
            for (let i = 0; i < SEGMENTS.length; i++) {
                accumulated += SEGMENTS[i].weight;
                if (random <= accumulated) {
                    return { index: i, prize: SEGMENTS[i] };
                }
            }
            return { index: 0, prize: SEGMENTS[0] };
        }
        
        function calculateTargetAngle(prizeIndex, currentAngle) {
            const angleStep = (Math.PI * 2) / SEGMENTS.length;
            let targetSegmentCenter = (prizeIndex * angleStep) + (angleStep / 2);
            let neededRotation = (Math.PI * 2 - targetSegmentCenter) % (Math.PI * 2);
            let fullRotations = Math.PI * 2 * 5;
            return currentAngle + neededRotation + fullRotations;
        }
        
        function animateSpin(currentTime) {
            if (!spinning) return;
            
            const elapsed = currentTime - spinStartTime;
            let progress = Math.min(1, elapsed / spinDuration);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            currentAngle = spinStartAngle + (targetAngle - spinStartAngle) * easeOut;
            
            drawWheel(currentAngle);
            
            if (progress < 1) {
                requestAnimationFrame(animateSpin);
            } else {
                spinning = false;
                document.getElementById('spinBtn').disabled = false;
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `🎉🎊 ${selectedPrize.prize.name} 🎊🎉`;
                
                const resultData = JSON.stringify({
                    prize: selectedPrize.prize.name,
                    timestamp: new Date().toISOString(),
                    userId: tg.initDataUnsafe?.user?.id || 'unknown'
                });
                
                localStorage.setItem('lastSpinResult', resultData);
                localStorage.setItem('lastSpinTime', Date.now());
                tg.sendData(resultData);
                
                setTimeout(() => {
                    resultDiv.innerHTML += `<br><small>✅ تم إرسال الجائزة إلى البوت</small>`;
                }, 500);
            }
        }
        
        async function startSpin() {
            if (spinning) return;
            
            const prizeSelection = selectPrizeByWeight();
            selectedPrize = prizeSelection;
            
            spinning = true;
            spinStartAngle = currentAngle;
            targetAngle = calculateTargetAngle(prizeSelection.index, currentAngle);
            spinStartTime = performance.now();
            
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('result').innerHTML = '🌀 جاري الدوران... 🌀';
            
            requestAnimationFrame(animateSpin);
        }
        
        function loadLastResult() {
            const lastResult = localStorage.getItem('lastSpinResult');
            if (lastResult) {
                const result = JSON.parse(lastResult);
                const lastTime = localStorage.getItem('lastSpinTime');
                if (lastTime && (Date.now() - lastTime) < 24 * 60 * 60 * 1000) {
                    document.getElementById('result').innerHTML = `🕒 آخر جائزة: ${result.prize}`;
                }
            }
        }
        
        document.getElementById('spinBtn').addEventListener('click', startSpin);
        drawWheel();
        loadLastResult();
        
        tg.onEvent('themeChanged', () => {
            document.body.style.backgroundColor = tg.themeParams.bg_color || '#667eea';
        });
    </script>
</body>
</html>
